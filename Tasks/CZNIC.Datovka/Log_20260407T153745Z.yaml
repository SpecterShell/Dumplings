- Locale: cs-CZ
  Key: ReleaseNotes
  Value: |-
    Byla vydána Datovka 4.29.0.
    Nové vlastnosti
    - Myší lze vytahovat zprávy ze seznamu zpráv v hlavním okně i okně vyhledávání jako ZFO soubory.
    - Obsah v editovatelných seznamech (příjemců, příloh, ...) lze odstraňovat stisknutím klávesy Delete (nebo Command+Backspace na macOS).
    - Soubory datových zpráv ze seznamu zpráv v hlavním okně a okně vyhledávání lze vykopírovat jako ZFO soubory stisknutím Ctrl+C. Podobně lze kopírovat i přílohy.
    - V dialogu pro odeslání datových zpráv lze soubory příloh vkládat pomocí Ctrl+V.
    - Všechny uložené datové zprávy lze prohledat na expiraci časového razítka. Všechny zprávy, které jsou k tomu vhodné, lze odeslat k přerazítkování.
    Vylepšení
    - Data z mobilní Datovky (verze 2.6.0 a vyšší) je možné v desktopové aplikaci načítat bez konverze.
    - V průběhu přihlašování Mobilním klíčem se během čekání na potvrzení zobrazují detailnější informace o stavu ověření Mobilním klíčem.
    - Přechod na QuaZIP-1.5.
    Opravy chyb
    - Opravena chyba v importu dat z mobilní aplikace.
    Uživatelům s více jak 6 schránkami se zobrazí výzva k vyplnění krátkého dotazníku.
    Pro překlad a běh aplikace je vyžadována libdatovka-0.7.3 nebo novější.
ReleaseTime: 2026-04-07
