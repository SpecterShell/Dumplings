- Locale: cs-CZ
  Key: ReleaseNotes
  Value: |-
    Byla vydána Datovka 4.29.3.
    Nové vlastnosti
    - Aktualizováno logo a ikona aplikace.
    - Uživatelům se systémy macOS a procesory Arm je nabízen přechod na nativní balík pro Arm, pokud stále používají aplikaci pro procesory Intel.
    Vylepšení
    - Přidáno více vysvětlujícího textu do dialogového okna pro změnu hesla v ISDS.
    Opravy chyb
    - Opravena mizející ikona bežící aplikace v panelu aplikací v desktopovém prostředí Gnome 49.
