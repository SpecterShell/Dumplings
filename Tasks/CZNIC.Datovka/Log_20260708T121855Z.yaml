- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    * Sharing code for generating correspondence overviews with mobile app.
     * Updated application logo and icon.
     * Disabled donations dialogue when having more than 5 production accounts or
       when having records management configured.
     * Added more explanatory texts into the change password dialogue.
     * Offering to download Arm package on macOS when running Intel package in
       Rosetta mode.
     * Fixed disappearing dock icon in Gnome 49. Fixed organisation domain an
       renamed desktop and metainfo files.
