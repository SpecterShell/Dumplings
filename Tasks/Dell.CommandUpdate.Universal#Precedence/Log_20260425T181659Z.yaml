  Key: ReleaseNotes
  Value: |-
    Fixes:
    - This release contains security updates as disclosed in Dell Security Advisory DSA-XXXX-XXX. For more information, see <a href="https://www.dell.com/support/security" target=_"blank">Dell Security Advisories and Notices.</a>.
    - Implemented a fix to automatically clear the Reboot required toast notification after the system restarts.

    Enhancements:
    - Introduced a feature that allows administrators to locally block specific software updates preventing installation through Dell Command Update. Blocklisted updates no longer appear in recommended updates and are automatically skipped during scans or installation.
    - Introduced the ability to limit update-package download rates between 1 to 999 Mbs. Administrators can enable Limit
    Download Rate and specify the desired value in Mbs. The limit applies to new downloads but existing downloads continue at the previous rate.
    - Added a new user interface link that allows users to submit feedback directly from within the Dell Command Update application.
    - Added a Ring Deployment feature for latest or stable driver updates.
    - Improved application stability performance and efficiency.
