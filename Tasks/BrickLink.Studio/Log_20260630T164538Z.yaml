  Value: |-
    973pb2341c01 and 973pb3165c01 had rendering issues in POV-Ray
    Hinge rotation values were inaccurate in certain situations.
    Part 98127 had erroneous white ridges
    Minifigure helmet 115329pb01 and 115329pb02 did not render properly in POV-Ray
