    ﻿P0 installer safety fix.
    - Full setup package is required for this update because it replaces the Windows uninstaller and install registry safely.
    - Existing dedicated ...\Mineradio folders that already contain Mineradio files can be overwritten even if they were created before the new safety marker existed.
    - Mixed folders such as D:\百度盘\翻身(1) are not adopted in place; the setup removes only the legacy Uninstall Mineradio.exe single file and installs to a safe Mineradio folder.
    - The setup never runs legacy unsafe uninstallers.
    - The new uninstaller no longer recursively deletes the installation root.
    - No quick patch JSON is provided for this issue.
