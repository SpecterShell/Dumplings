- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Changes:
    - Add reified regular constraint decompositions. Rewrite to direct decomposition if non-reified regular is also a decomposition, or to an augmented automaton if a native regular constraint is available.
    - Add an experimental assumption interface. The new assume predicate (in experimental/assume.mzn) records a set of Boolean assumptions and lowers them to a solver-overridable fzn_assume. Solvers that support solving under assumptions can report an unsatisfiable core, which is translated back into the original MiniZinc expressions and printed as a %%%mzn-core comment (or a core message in the --json-stream output). Solvers without native support post the assumptions as hard constraints and issue a warning.
    - The SCIP interface is now only compatible with SCIP 10 and later.
    - Some performance improvements through better inlining and reducing allocation in hot paths of the compiler.
    - Compile root forall constraints with variable generators or where clauses in root context instead of reified context.
    - Improve compilation of comprehensions with complex variable generators by moving the generator expression into a generator alias.
    - Add an experimental black-box propagator interface. A bodyless predicate or function annotated with ::minizinc_value_propagator or ::minizinc_bounds_propagator (in experimental/blackbox.mzn) together with a source annotation (::blackbox_exec for an external executable or ::blackbox_dll for a dynamically loaded library) has its body generated by the compiler as a call to a solver-overridable blackbox / blackbox_bounds constraint. Supporting solvers invoke the external code during search to propagate values or bounds; solvers without support abort with a clear message.
    - Add support for interactive FlatZinc solvers. These can read commands from standard input while running, and output both solutions and messages.
    - Add support for warm starts to HiGHS and SCIP interfaces.
    - It is now a type error to declare two overloads of a function or predicate that a call supplying all of its arguments by name could not tell apart, i.e. two overloads that give the same name and type to every parameter that has to be supplied. Previously such a call silently resolved to whichever overload was declared first. Parameter order is irrelevant here, and parameters with a default value are exempt, since a call need not supply them.
    - The parameter names of the global constraints in the standard library have been revised so that they read well as named arguments (now that named arguments make them part of the public interface). As part of this, all_different gains an optional except set parameter (defaulting to the empty set), unifying it with all_different_except and all_different_except_0, which are now deprecated.
    Language changes:
    - Add support for named arguments. Function calls can now refer to arguments by name, in addition to the usual positional arguments. The parameter names of the global constraints in the standard library have been revised so that they read well as named arguments (now that named arguments make them part of the public interface). It is now a type error to declare two overloads of a function or predicate that a call supplying all of its arguments by name could not tell apart, i.e. two overloads that give the same name and type to every parameter that has to be supplied. Named arguments are available for user-defined and library operations. The low-level operations a solver supports natively (those declared without a body) remain positional-only for now, until solver libraries have converged on a common set of parameter names; calling one by name is an error. The new --warn-non-authoritative-names option helps solver implementers audit their libraries against the standard-library names ahead of that change.
    - Add support for default values for function and parameter arguments.
    - Add support for set cardinality declarations using the syntax set(e) of T: s;. When e has type int or var int, this desugars to an additional card(s) = e constraint; when e has type set of int or var set of int, it desugars to card(s) in e. The syntax works for tuple- and record-typed sets as well as arrays (and arrays of arrays) of sets.
    - Add support for index-dependent array declarations, where an index list entry of the form c in S binds the name c in the element type’s domain expression — for example array[c in 1..n] of var 1..f(c): x;. The per-element domain is desugared into an additional constraint and works for tuple- and record-typed elements as well as arrays of arrays; it also composes with the set(e) of T cardinality syntax.
    - Make the list type behave like a real 1-based array type. It is now syntactic sugar for array [1..infinity] of T. Checks ensure that only 1-based arrays match the list type.
    - Allow par tuples and records to be optional. opt makes the tuple or record optional as a whole (it is either a complete value or <>); it does not distribute into the fields, so opt record(int: a) remains a different type from record(opt int: a). Accessing a field of an optional tuple or record yields an optional value. var opt tuples and records remain type errors, including when the var comes from a field, since a tuple or record with any var field is itself var.
    Bug fixes:
    - Fix a crash (segmentation fault) when a non-optional variable is constrained to be equal to an absent optional value. The model is now correctly detected as unsatisfiable (issue 1023).
    - Fix a crash when finalising FlatZinc for models containing chains of equality constraints between output variables. Depending on the order, the alias chain could collapse into a cyclic right-hand side (issue 1022).
    - Fix x=infinity and x=-infinity being incorrectly translated when used in reified positions.
    - Fix a bug in type specialisation that could produce incorrect internal type representations for tuples.
    - Fix spurious UNSATISFIABLE results under -O1 for half-reified constraints whose right-hand side uses a pinned var float as a coefficient operand. The LE chain compressor was incorrectly adding the folded-in constant offset to the RHS instead of subtracting it (issue 1020).
    - Fix parsing of JSON data files with enumerated or record types where the model contains a type alias for the type of the parameter.
    - Fix the type signature of set_search to allow sets of enums without warning about enum2int conversion (issue 1024).
    - Fix flattening of annotated array declarations that have a right-hand side, which could previously crash.
    - Make list of list of T work correctly (was previously rejected with a type error).
    - Fix eval_par abort when projecting a par field of a polymorphic any $T result instantiated at a record/tuple with mixed par and var fields.
    - Add missing defines_var/is_defined_var annotations for mod.
    - Fix SCIP interface to be compatible with SCIP 10, which is not binary compatible with previous releases due to changed enum values in the C API.
    - Fix freelist allocation in garbage collector to use proper alignment. This fixes an issue on 32-bit platforms where freelist entries were not being reused.
    - Fix garbage collector handling of free pages. Release them when they only contain freelist entries.
    - Fix memory leaks in SolverConfig and the flattener, which leaked model objects in every run.
    - Fixed some flattening non-determinism. Several sorting and comparison operations still relied on pointer comparisons and have been replaced with deterministic alternatives.
    - Fix incorrect double-negation of certain operators in negative contexts.
    - Fix a bug in the handling of set variables assigned to set constants, which would ignore the variable’s domain under certain conditions.
    - Fix false positive index set mismatch when passing a tuple/record containing and array as an argument to a function and calling it multiple times with different array index sets.
    - Fix boolean context for call arguments and local declaration right-hand sides of type array [_] of var bool.
    - Add missing GC lock to EnvI::fail().
    - Fix index-set checking for arrays nested inside other arrays, where an outer array does not have a declared index set but the inner array does.
    - Fix default operator for var opt LHS expressions which end up being fixed to <> (issue 1030).
