- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Changes:
    - Xpress solver migration from BCL to C API with support for Xpress 9.8 parameters. Add support for indicator constraints, warm start, and convex quadratic inequalities.
    - The compiler now removes all non-array right-hand sides from variable declarations in FlatZinc. This minimizes the effort required when parsing .fzn or FlatZinc JSON files.
    - Add support for SCIP 10, and remove support for SCIP 7 and earlier (issue 999).
    - Add versions of count_* constraints for booleans, floats and sets of integers to allow solvers to support them natively (issue 1005).
    - Add the --cleanup-time-limit option for configuring the grace period for solver cleanup before forced termination (issue 994).
    Bug fixes:
    - Fix a bug where expressions generated by regular(var int, string) might be incorrectly unified when paths are enabled.
    - Fix type checking of functions with enum type identifiers (like $$E) when called with bool arguments (issue 991).
    - Fix a potential crash during type specialisation of calls where a matching specialisation already existed.
    - Fix missed type mismatches of enum types in record and tuple types during type specialisation. (issue 998)
    - Fix syntax for predicate-item in the FlatZinc grammar specification.
    - Add missing type checking that ensure concatenation of tuples and records is only allowed for basic tuple and record types.
    - Fix a crash when using --input-from-stdin together with optimisation passes such as -O2, caused by in-memory model fragments being treated as file-backed includes during library rewriting.
    - Fix the definitions of maximum_arg and minimum_arg to allow them to be used in reified contexts when only the non-reified version is natively supported by the solver (issue 997).
    - Fix array literal compression bug causing incorrect implicit enum coercion warnings (issue 1008).
    - Fix bug in output processing which caused shadowed nested identifiers to be mapped to top-level declarations.
    - Add filtering of mzn_path annotations for the arguments of constraints in the FlatZinc output (issue 1011).
    - Fix internal error when equating tuples of optional values to absent using multipass compilation (issue 1012).
    - Fix various documentation typos and formatting issues (issue 995 and issue 1000).
    - Fix solver executable resolution to match the behaviour described in the specification (issue 979).
    Changes in the IDE:
    - Fix highlighting of the list keyword (issue 227).
