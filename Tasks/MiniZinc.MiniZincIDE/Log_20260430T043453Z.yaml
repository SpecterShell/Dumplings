- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Bug fixes:
    - Fix invalid FlatZinc output caused by inlining non-literal variable right-hand sides that were incorrectly marked as par (issue 1015).
    - Fix generation of par versions of functions referencing top-level model variables for use in the output model (issue 1016).
    - Fix crash during type checking of enum constructors (issue 1017).
    - Fix incorrect typing of record literals containing both decision variables and parameter values, affecting the automatic generation of table constraints. (issue 1014).
    - Fix output aliasing during multipass compilation when multiple output variables map to the same FlatZinc variable, which could produce invalid .ozn output under optimisation (issue 1018).
