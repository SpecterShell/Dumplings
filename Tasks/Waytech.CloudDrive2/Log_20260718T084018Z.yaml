  Key: ReleaseNotes
  Value: |-
    1. 修复 fuse 挂载后内存增长的问题：Emby 等媒体服务器扫描百万级文件时，内存不再无限增长
    2. 修复 S3 同端点多账号相互覆盖的问题
    3. 改进通过 http 访问文件时的性能，降低 cpu 和内存使用率
    4. WebUI 移动端进入多选模式后，增加全选和取消全选选项
    5. 修复只读文件夹（光鸭云盘）不能作为挂载盘源目录和备份源目录的问题
    6. 其它性能改进和 bug 修复
