- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 新增飞牛 fnOS 安装包下载，飞牛官方应用中心上架正在审核中，目前可下载对应架构的 fpk 包手动安装
    2. Web 文件浏览器支持媒体刮削文件(.nfo)，识别文件夹内 NFO 文件与海报（Kodi/Emby/Jellyfin/Plex 兼容），在文件属性面板展示影片信息。该功能只是展示已经刮削的目录，不会主动联网刮削
    3. 打开 2FA 双因素验证后，如丢失恢复码和手机 app 而无法登录时，可以通过向帐号邮箱发送重置码禁止双因素验证，直接用帐号密码登录
    4. 合作伙伴设备自动注册的帐号修改邮箱密码后，可以与原设备解绑，绑定设备丢失或者出售后可以通过解绑避免帐号泄露
    5. 在云存储帐号配置中增加复制时使用多线程下载选项，打开后在跨网盘传输和备份时，恢复旧版本的多线程下载
    6. 对已解密的文件夹执行锁定操作时增加二次确认弹窗，避免误操作导致文件失效
    7. 修复 macos 在有多个挂载点时，个边情况下列目录失败，需要重新挂载的问题
    8. 修复复制文件到加密目录速度慢的问题
    9. 修复 windows 下用 visual studio code 等编辑器在加密文件夹内直接编辑文件时可能上传文件失败的问题
    10. 修复 115 网盘的加密目录上直接用 Word 编辑 docx 文件可能会遗留一些临时文件的问题
    11. 修复 32 位 armv7 通过 http 直接访问大文件时可能会下载失败的问题
    12. 其它性能改进、bug 修复
