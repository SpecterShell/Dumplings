  Key: ReleaseNotes
  Value: |-
    1. 修复以点开头的文件（如 .DS_Store）无法匹配上传和备份忽略扩展名规则的问题
    2. 修复云存储代理服务器不可用时 FUSE statfs 长时间阻塞的问题，新增 15 秒超时，超时的云盘暂不计入磁盘空间统计，待恢复后会自动更新
    3. 移动复制时冲突解决对话框中显示冲突文件列表
    4. 修复备份文件过滤规则页面"添加规则"下拉菜单被裁剪的问题
    5. 修复面包屑编辑器在有自动补全候选项时按回车无法导航的问题
    6. 修复日志页面下载链接失效的问题
    7. 修复 Shift 点击范围选择未考虑当前文件过滤器的问题
    8. 其它 bug 修复和性能改进
