  Key: ReleaseNotes
  Value: |-
    1. 新增支持添加 SFTP/FTP(FTPS)/SMB 三种网络文件系统，支持自动发现 SMB 服务器、自动发现 SMB 共享目录
    2. 添加备份时可选不立即执行全量扫描，默认值为添加备份后立即执行全量扫描
    3. 修复 1.0.5 在某些系统下运行过程中有可能挂起的问题
    4. 在文件浏览器根目录中移除云存储可选择是否永久移除，如不永久删除，该云存储只在当前运行中被移除，重启后还会恢复
    5. 其它性能优化和 bug 修复
