  Key: ReleaseNotes
  Value: |-
    - Improvement: Much faster results filling when comparing directories with a very large number of files in list mode
    - Improvement: Much faster background full content comparison when comparing a very large number of files
    - Improvement: Faster, more responsive text selection when dragging the mouse in large or complex files
    - Fix: Statistics chart's title, legend, and labels could crowd out the pie chart itself on displays with Windows scaling above 100%
    - Fix: In tree mode of directory comparison, expanding or collapsing an item while background content comparison was running could crash the application
    - Fix: In tree mode of directory comparison, clicking or scrolling while background content comparison was running could significantly slow down both the UI and the comparison itself
    - Fix: Moving the cursor with the Up, Down, Page Up, or Page Down keys did not update the Line Inspector
    - Fix: Clicking inside an existing text selection, then extending it with Shift and an arrow key, could extend from the wrong starting point
