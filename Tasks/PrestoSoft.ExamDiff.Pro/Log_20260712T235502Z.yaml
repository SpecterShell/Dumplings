Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Improvement: Updated 7-Zip plug-in to the latest version 26.02
    - Fix: In directory comparison, line counts for added and deleted files included ignored lines, inconsistent with counts for changed files
    - Fix: Generating an HTML report from the command line could hang indefinitely or consume excessive memory on large or complex files, since syntax highlighting had no time limit outside the interactive UI
    - Fix: In directory comparison, files could incorrectly show as identical when full/parallel content comparison ran out of memory
    - Fix: Canceling a directory comparison's background content comparison (Esc) could hang or fail to stop it
    - Fix: Some binary files (e.g. compressed media) were misidentified as text, causing slow or excessive-memory comparisons
    - Fix: HTML diff reports (including directory comparison) used a much larger font and row/column sizing than the app itself on displays with Windows scaling above 100%
    - Fix: In tree mode of directory comparison, the diff bar could fail to show a difference block when it started on an item hidden under a collapsed parent folder
ReleaseTime: 2026-07-12
