  Key: ReleaseNotes
  Value: |-
    - Added: Customisable tray icon style with three options: colour, white, and black.
    - Improved: Refined UI with auto-fitting columns and speed display in status bar.
    - Improved: Internal architecture restructured towards cross-platform support. This release is Windows only; future releases will support Windows, macOS and Linux.
    - Improved: Driver robustness.
    - Changed: Configuration import and export now uses JSON instead of XML.
    - Changed: Volume types simplified by merging logon and boot types into one.
    - Changed: Licensing and user access control moved to the kernel driver for improved security.
    - Removed: Drive letter namespace option, as drive letters are now system-managed.
    - Removed: Auto-run applications feature, as OS startup mechanisms should be used instead.
