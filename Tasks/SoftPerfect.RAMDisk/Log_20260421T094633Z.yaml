  Key: ReleaseNotes
  Value: |-
    - Added: Selectable tray icon style with three options: colour, white, and black.
    - Improved: Refreshed UI with auto-fitting columns and improved status bar speed display.
    - Improved: Internal architecture restructured towards cross-platform driver support.
    - Improved: Numerous driver hardening and robustness improvements.
    - Changed: Configuration import and export now uses JSON instead of XML.
    - Changed: Volume types simplified by merging logon and boot into a single unified type.
    - Changed: Licensing and user access control moved to the kernel driver for improved security.
    - Removed: Drive letters namespace option as drive letters are now always system-managed.
    - Removed: Auto-run applications feature as OS startup mechanisms should be used instead.
