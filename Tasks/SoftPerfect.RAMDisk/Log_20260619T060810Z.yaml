  Key: ReleaseNotes
  Value: |-
    - Added: macOS support for both Intel and Apple Silicon Macs, backed by a kernel extension (KEXT) driver and mirroring the full Windows feature set.
    - Added: Linux support backed by a loadable kernel module (KO), mirroring the full Windows feature set, with DKMS and Secure Boot support.
    - Added: ramdiskctl, a new cross-platform command-line tool for scripted disk management on Windows, macOS and Linux.
    - Improved: Faster I/O on dynamically allocated disks through optimised hot-path locking and lookup.
    - Removed: Command-line control of the application; use import/export or ramdiskctl instead.
    - Removed: The legacy ramdiskc.exe console tool, superseded by ramdiskctl.
