- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Overview
    This version improves some details.
    Changelogs
    Below are the detailed changes in this version.
    Enhancement
    - Add a Copy full document option to the document block menu
    - The list in the backlink panel no longer collapses automatically after pasting
    - Improve pasting link
    - Improve block icon render when list items contain blockquotes or callouts
    - Improve pasting of inline code containing backticks and ampersands
    - Improve button box-shadow
    - Improve marketplace list cards
    - Improve block ref exporting
    - Optimize typography ignores full-width characters
    - Move pagination and navigation buttons to the top-left of the Flashcard Management window
    - Support displaying full Dock panel titles and action buttons
    - Improve the display position of block gutter
    - The loading icon no longer covers the entire cloud configuration page
    - Improve split-screen layout
    - Downloaded marketplace packages no longer fall back to fetching the online README
    Bugfix
    - Default workspace data will be lost on macOS
    - Dragging a block to the Backlinks panel causes an error
    - Fix some security vulnerabilities
    - Markdown.zip import error on Android
    - The entire block disappears after dragging a block within the callout block
    Development
    - Task lists support the data-task status attribute
    - Add a type parameter to the plugin API getAllTabs
    - Add kernel API /api/file/workspaceCopyFiles
    - Add kernel API /api/block/updateTaskListItemMarker
    - Add kernel API /api/block/batchUpdateTaskListItemMarker
- Key: ReleaseNotesUrl
  Value: https://github.com/siyuan-note/siyuan/releases/tag/v3.6.4
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    概述
    此版本改进了一些细节。
    变更记录
    以下是此版本中的详细变更。
    改进功能
    - 在文档块菜单中添加 复制全文 选项
    - 反向链接面板中的列表在粘贴后不再自动折叠
    - 改进粘贴链接
    - 改进当列表项包含块引用或提示块时的块标渲染
    - 改进包含反引号和与号的行级代码的粘贴
    - 改进按钮阴影效果
    - 改进集市列表卡片
    - 改进块引用导出
    - 优化排版 忽略全角字符
    - 将闪卡管理窗口中的分页和导航按钮移动到左上角
    - 支持显示完整的停靠栏面板标题和操作按钮
    - 改进块标的显示位置
    - 加载图标不再覆盖整个云端配置界面
    - 改进分屏布局
    - 已下载的集市包不再回退获取在线 README
    修复缺陷
    - macOS 上默认工作空间数据会丢失
    - 将块拖动到反向链接面板时会导致报错
    - 修复一些安全漏洞
    - Android 上导入 Markdown.zip 出错
    - 在提示块内部拖动块后整个块会消失
    开发者
    - 任务列表支持 data-task 状态属性
    - 为插件 API getAllTabs 添加 type 参数
    - 新增内核 API /api/file/workspaceCopyFiles
    - 新增内核 API /api/block/updateTaskListItemMarker
    - 新增内核 API /api/block/batchUpdateTaskListItemMarker
