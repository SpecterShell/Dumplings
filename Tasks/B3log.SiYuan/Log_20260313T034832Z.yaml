  Key: ReleaseNotes
  Value: |-
    Overview
    We can now set document-level access permissions for the publishing service: Doc Tree panel - More - Publish Access Control.
    Changelogs
    Below are the detailed changes in this version.
    Feature
    - Publish service supports document-level access control
    Enhancement
    - Improve pasting in code block
    - Clear container content when initializing mobile plugin sidebar
    - Support drag-and-drop file upload to database asset field cells in browser
    - Support setting document title to empty
    - Improve interaction with the ↓ key at the end of the document
    - Improve the display of the sub-level menu
    Bugfix
    - forwardProxy interface SSRF vulnerability
    Refactor
    - Upgrade to Electron v40.8.1
    Development
    - Manage window state styles using CSS classes
