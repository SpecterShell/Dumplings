  Key: ReleaseNotes
  Value: |-
    Overview
    This version improves some details.
    Changelogs
    Below are the detailed changes in this version.
    Enhancement
    - The browser clipping extension supports setting keyboard shortcuts
    - Improve layout selection menu
    - The menu no longer extends beyond the window
    - Hover to reveal tooltip after a moment
    - Improve line number rendering by copying font styles
    - Improve the database assets field file opening
    - Improve cleaning up unreferenced databases
    - Remove the colspan and rowspan attributes from cell elements after splitting cells
    - Improve HTML clipping
    - Improve Linux Wayland compatibility
    - Improve /template and /widget search
    - Improve exit on the pad device
    - Improve HTML formula clipping
    Bugfix
    - getDynamicIcon interface XSS vulnerability
    Development
    - Supports calling the Emoji search dialog box
    - Support sending notifications on iOS
    - Support sending notifications on HarmonyOS
    - Add plugin function getAllTabs
    - The API insertBlock was not inserting completely via nextID
    - Update plugin util platformUtils
    - Support sending notifications on Desktop
