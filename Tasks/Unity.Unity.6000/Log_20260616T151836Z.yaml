    - HDRP: Added additional options for Contact Shadows to adjust for performance.
    - HDRP: Added the in keyword to RenderGraph TextureHandle and BufferHandle function parameters in HDRP, as they are now readonly structs.
    - HDRP: Added warning message for DepthOfField inspector on certain platforms.
    - HDRP: Improved inspector messaging when advanced water features can have a perfomance impact in a given platform.
