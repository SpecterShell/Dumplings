    - Netcode for Entities: Extraordinarily rare correctness bug introduced with the static ghost early-out optimisation, where the early-out would be applied even when new snapshot data arrived, but only if said snapshot arrived so late that it was older than the lastInterpolationTick.
    - Netcode for Entities: Fixed an issue in the Netcode Profiler where an incorrect prediction tick value was displayed in the Prediction and Interpolation Tab.
    - Netcode for Entities: Fixed an issue in the netcode profiler where tick navigation was inconsistent when capturing more than two sessions without clearing the profiler.
    - Netcode for Entities: Fixed issue where prediction switching a static, unchanging ghost (to predicted) would cause massive 64-tick rollbacks.
    - Netcode for Entities: Fixed issue where the GhostUpdateSystem's predicted ghost history backup lookups were failing whenever other entities within the chunk were deleted (which caused the cached entityIndexInChunk to be incorrect).
    - Netcode for Entities: Fixed missing profiler marker for GhostReceiveSystem.
    - Netcode for Entities: Interpolated static ghosts will now wait until the interpolation timeline reaches new snapshot data before applying any new snapshot after updates have been paused.
    - Netcode for Entities: Switched usage of 'PlayMode' to 'Play Mode' to be more consistent with other areas of the menu. (UUM-131598)
    - Netcode for Entities: The GhostUpdateSystem's snapshot rollback is now constrained below 64 ticks typically, massively reducing the severity of rollbacks in some esoteric cases, at the cost of minor misprediction issues (which will get resolved by eventual consistency).
    - Netcode for Entities: GhostRelevancyMode.SetIsIrrelevant now respects false values being written to PrioChunk.isRelevant from the batched importance function, which enables use of this relevancy fast-path when in this mode.
    - Netcode for Entities: NetworkProtocolVersion.k_NetCodeVersion is now private, use NetworkProtocolVersion.DefaultNetCodeVersion instead to get the builtin netcode version.
    - Networking: Added back some missing Mono configuration files in Linux player builds, which would result in exceptions being thrown when trying to use certain .NET networking APIs (notably WebRequest). (UUM-135731)
    - Networking: Bump libcurl artifactory that utilizes updated nghttp2 that mitigates CVE-2026-27135. (UUM-140912)
    - Networking: Expose the httpForcedVersion property on UnityWebRequest, so that the network communication can be forced to use a specific http protocol version, if needed. (UUM-131759)
    - Networking: Fixed a regression in MbedTLS that would result in TLS handshake errors when trying to download assets from the Asset Store from the package manager. Potentially other HTTPS endpoints could have been impacted by this regression. (UUM-141298)
    - Networking: Fixed an issue that caused PROTOCOL_ERROR with UnityWebRequest when doing HTTP/2 POST operations of more than 600kb. (UUM-130882)
    - Networking: Fixed UUM-135025 by supporting multiple auto proxies. (UUM-135025)
    - Networking: Updated MbedTLS to version 3.6.6 to address some (minor and likely unexploitable) security vulnerabilities. (UUM-140908)
