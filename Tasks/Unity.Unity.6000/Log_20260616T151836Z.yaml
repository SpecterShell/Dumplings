    - Particles: Added missing Icons for the Particle System Renderer in the Animation window. (UUM-130114)
    - Particles: Fixed an issue where particles were respawned when selecting a different child GameObject. (UUM-134008)
    - Particles: Fixed crash when particles component does not have a material. (UUM-127537)
    - Particles: Fixed inverted particle geometry in cubemap reflections in some configurations. (UUM-128604)
    - Particles: Fixed texture scale X value not being applied to trails when Mode is set to "Ribbon". (UUM-126854)
    - Particles: Particles: Implemented a two-stage outlier detection in StoreLineData() to resolve ribbon trail meshes from collapsing. (UUM-136148)
    - Physics: Added the overflow: hidden property to the collision layer matrix container in order to no longer generate scroll bars when scaling down the project settings window. (UUM-111251)
    - Physics: Articulation Body joint limits are now clamped to the ranges defined by the Physics SDK. (UUM-91742)
    - Physics: Fixed a crash inside Rigidbody.Move which could occur when calling the method on a fully disabled body. (UUM-126746)
    - Physics: Fixed a crash that occurred when calling Collider.GetGeometry<T>() on a disabled Collider. (UUM-134161)
    - Physics: Fixed a crash that would occur when adding a Cloth component to a GameObject with an existing TextMesh component. By default both Cloth and TextMesh components can't share the same GameObject due to the fact that they require different renderers to work, MeshRenderer and SkinnedMeshRenderer respectively. (UUM-125416)
    - Physics: Fixed a crash when authoring Cloth components with scene reloading disabled. Entering Playmode right after authoring would still keep the Cloth instance in a "authoring only" state which means the underlying simulation object wasn't being created. (UUM-110845)
    - Physics: Fixed a layouting issue with the Cloth component's inter collision tool. The issue caused the "Erase" button to be partially clipped. (UUM-127745)
    - Physics: Fixed a long standing issue with CharacterController authoring where an validation check was incorrect, in previous versions it was more complicated to hit this issue due to specific values needing to be input rather than just 0 for 'Step Offset'. (UUM-129924)
    - Physics: Fixed a memory corruption due to NvCloth internals over-allocating when solving inter cloth collisions. (UUM-64185)
    - Physics: Fixed a number of issues where Rigidbody component API was not completely secured when being executed from a prefab context. (UUM-137716)
    - Physics: Fixed a typo on "Clear Locked Objects" button inside the Physics Debugger. (UUM-124744)
    - Physics: Fixed an issue where ConfigurableJoint anchor/connected anchor gizmos would display incorrectly when the "Swap Bodies" property would be enabled. (UUM-107289)
    - Physics: Fixed an issue where ConfigurableJoint with projection mode enabled could cause a crash due to it's connected body being turned dynamic from kinematic. (UUM-135394)
    - Physics: Fixed an issue where inspectors could set Collider component data such as Center/Radius/Height/Size to +/-Infinity, which was not valid and would result in incorrect simulation behavior. (UUM-136447)
    - Physics: Fixed an issue where MeshCollider components receiving a non-uniform scale would handle it incorrectly. (UUM-139681)
    - Physics: Fixed an issue where MeshCollider would no longer work when overriding the file of the mesh asset it references. (UUM-141284)
    - Physics: Fixed an issue where Rigidbody components on prefabs would still get their internal physics objects created. This was not intended and surfaced by recent safety changes, which incidentally are the same changes that caused this crash to reproduce. (UUM-135381)
    - Physics: Fixed an issue where Rigidbody.centerOfMass wouldn't serialize the value set to it. (UUM-137716)
    - Physics: Fixed an issue where Rigidbody.constraints wouldn't serialize the values set to it, when called on prefab asset. (UUM-137716)
    - Physics: Fixed an issue where some logs messages coming from the PhysX integration would be ignored. (PHYS-681)
    - Physics: Fixed an issue where the underlying physics height field representation wouldn't be updated when undoing changes to terrain geometry. This issue would occur specifically when using the Terrain component tools. (UUM-134053)
    - Physics: Fixed an issue where transform sync would in some instances incorrectly change the CharacterController component's internal shape rotation. In the case of PhysX this manifested by bodies being flung out when hit from the "right side" which meant that the internal capsule was reverted to it's default orientation (x-axis aligned in PhysX). (UUM-128624)
    - Physics: Fixed an issue where Collision.transform returned an incorrect Transform when colliding with a ArticulationBody component if the body and Collider component are on different GameObjects. (UUM-140799)
    - Physics: Fixed an issue with physics Joint component gizmos, where auto configured connected anchors would follow the joint in the case where the joint was connected to a fixed point in world space. (UUM-134423)
    - Physics: Fixed an issue with pinning particles of a Cloth component at runtime from script or using authoring tools during playmode. (PHYS-669)
    - Physics: Fixed an issue with Rigidbody.SweepTest and Rigidbody.SweepTestAll, where the collision layer settings on the rigidbody's Collider components in cases where they would be located on child GameObjects. (UUM-91192)
    - Physics: Fixed an issue with static collider creation where repeated disable/enable operations would accumulate PhysX SDK helper structures eventually causing the application to run out of memory. (UUM-112248)
    - Physics: Fixed an issue with the Cloth inspectors paint tools, where the brush wouldn't display due to no raycast being fired at the internal collision mesh. (UUM-61756)
    - Physics: Fixed debug visualization for capsule colliders, ensuring capsule caps retain curvature when scale is applied. (UUM-142483)
    - Physics: Fixed issue causing cloth to stretch significantly, especially with higher cloth resolutions. (UUM-116109)
    - Physics: Fixed NaN values that could be introduced in some cases where a Rigidbody would have acceleration applied via ForceMode.Acceleration, while having it's rotation constrained. The issue would most often occur in conjunction with manually calling Physics.Simulate. (UUM-103515)
    - Physics: Fixed several instances of SIMD operations leading to NaN values within the NvCloth solver kernel. (UUM-64185)
    - Physics: Fixed the padding for all the buttons in the Physics Debugger window, most of the buttons on the right side of the window had no padding. (UUM-124744)
    - Physics: Greyout Auto-Fill button when animator is null within Ragdoll Builder window. (UUM-142958)
    - Physics: Improved performance of heightfield creation for terrain collider while async loading. (UUM-120104)
    - Physics: Prevent stack overflow when raycasting on MeshCollider with Use Fast Midphase cooking option. (UUM-110564)
    - Physics 2D: "PhysicsAABB.Normalized()" is now "PhysicsAABB.Normalize()". (UUM-143279)
