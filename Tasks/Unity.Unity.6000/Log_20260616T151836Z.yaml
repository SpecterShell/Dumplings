    - Editor: Changed: Renamed AdvancedDropdownItem.children to AdvancedDropdownItem.childList, so it can return IReadOnlyList.
    - Editor: Changed: [Android] Modify Build Settings - indented sub-settings under the Development Build checkbox and show or hide relevant settings depending on build type on Unity 6.5 for all platforms.
