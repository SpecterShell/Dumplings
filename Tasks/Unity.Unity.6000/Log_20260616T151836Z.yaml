    Final 6000.5.0f1 Release Notes
    Features
    - 2D: Added a 2D Profiler that displays real-time visualization of texture atlas usage which offers clear insights into sprite and atlas efficiency during gameplay.
    - 2D: Added extensibility support for Light2D and ShadowCaster2D components. You can now implement custom provider classes to modify or extend their behavior.
    - Adaptive Performance: Activated Adaptive Performance Basic Provider for additional platforms.
    - Adaptive Performance: The new Apple provider for Adaptive Performance enables thermal warnings for iOS, tvOS, and visionOS and includes a wide range of scalers usable with those warnings.
    - Android: Insets visibility can now be controlled via Editor API/UI and Runtime API. Refer to PlayerSettings.Android.requestedVisibleWindowInsets, PlayerSettings.Android.systemBarsBehavior, AndroidApplication.currentWindowInsets, AndroidApplication.onWindowInsetsChanged to learn more.
    - Asset Pipeline: Import result caching in the Accelerator is now disabled by default for new projects. Projects upgrading to Unity 6.5 can continue to cache import results if cache configuration is already enabled.
    - Audio: You can now use AudioClip as a Scriptable Generator.
    - Build Pipeline: Added the ability to extract type tree data from asset bundles to reduce their size. This data can be loaded at runtime and shared between all bundles.
    - Editor: Added a new Expression node to simplify inlining mathematical statements.
    - Editor: Added a slider to the CanvasGroup Editor for adjusting the alpha value.
    - Editor: Added support for custom actions in the Build Profiles window footer.
    - Editor: Added support for custom styling for lists and arrays from the DataTypeStyleMapper.
    - Editor: Added the Swift project type (experimental) to the iOS Player settings.
    - Editor: Added tracking for UGUI usage.
    - Editor: Changed the Texture Inspector's color channel previews to default to grayscale, and added a button to toggle between grayscale and colorized views.
    - Editor: Code analyzer now catches many serialization issues at compile time in addition to runtime, which gives you an early warning about potential issues around serialization.
    - Editor: GTK : Added list support for variables in the Blackboard and Inspector.
    - Editor: Project Auditor: Added a module/analyzer to inspect every GameObject in a project and flags issues about incorrect Read/Write Texture import settings, if used by Particle System Components.
    - Editor: Project Auditor: Added asynchronous analysis.
    - Editor: The macOS Editor is now signed and notarized by Apple for added security. It is no longer necessary to override the system security policy to start the Editor application.
    - Editor: The Project Auditor now detects use of API that will become obsolete in a future Unity version.
    - Editor: Updated Project Auditor to report the use of obsolete APIs.
    - Editor: Updated the Build Profile window to automatically display a Restart Unity Editor option after a platform module is installed through the Unity Hub.
    - EmbeddedLinux: Added an option to select the Full or Thin Link Time Optimization (LTO) mode.
    - EmbeddedLinux: Added IBUS Input Method Editor (IME) support for Embedded Linux platform.
    - Entities: Added a setting in Preferences > Entities to display hidden entities in the Hierarchy window.
    - Entities: Added a way to filter systems by namespaces in the Systems window.
    - Entities: Replaced the search bar in the Systems window with a quick search bar that provides additional filtering options.
    - Entities: DisableAutoTypeRegistration now is allowed assembly-wide.
    - GI: Added a new LightingSearch window foundation with lightmap browsing and preview capabilities.
    - GI: Added query tree organization and built-in queries for the LightingSearch window.
    - GI: Added render pipeline-specific selectors for the LightingSearch window.
    - GI: Added selectors for editing lighting properties in the Lighting Search window.
    - Graph Toolkit: Added support for creating Untyped variable nodes in a graph.
    - Graph Toolkit: Added support for the TextArea attribute to create multi-line text fields for ports and options.
    - Graph Toolkit: Added the ability to create custom classes that inherit from DataTypeStyleMapper to associate icons and colors with custom data types. Custom DataTypeStyleMapper classes can be decorated with DataTypeStyleMapperAttribute to specify compatible graph types.
    - Graph Toolkit: Updated the Constant node to support collections, such as lists and arrays. These collections can grow up to 50 elements and each element is editable directly from the node view.
    - Graphics: Added an opt-in On-Tile Validation check on UniversalRenderer. Enabling it will enforce On-Tile optimization by issuing a warning and removing non-compatible features.
    - iOS: Added a system that adjusts the frame rate based on the thermal state. When the device overheats, iOS enters Serious and then Critical thermal states. In the Critical state, iOS reduces system-wide performance to lower device temperature. With this new system Unity proactively lowers the frame rate to 30 FPS in Serious state and 15 FPS in Critical state, which helps prevent the device from becoming too hot, improves responsiveness under overheating conditions, and reduces the likelihood of GPU timeouts or rendering freezes. This feature is enabled by default and it can be toggled in the iOS Player Settings using the Adjust iOS FPS based on thermal state checkbox. In addition, the frame rate in the Serious state can be configured using Serious Thermal State FPS, and in the Critical state using Critical Thermal State FPS.
    - iOS: Added support for gRPC through UnityWebRequest.
    - License: Added support for Kerberos proxy authentication.
    - Linux: Added an option to select the Full or Thin Link Time Optimization (LTO) mode.
    - Linux: Added IBUS and FCITX5 Input Method Editor (IME) support for Desktop Linux platform.
    - macOS: Added support for CAMetalDisplayLink on the Mac Player.
      It is disabled by default and can be enabled in Player Settings by toggling "Use MetalDisplayLink (Mac Player only)" or by using the environment variable UNITY_USE_METAL_DISPLAY_LINK=1.
      Using CAMetalDisplayLink decreases stuttering, improves frame pacing, and makes Time.deltaTime more stable.
    - Netcode for Entities: Moved the Netcode for Entities package from the DOTS repository into the Unity Engine as a built-in package.
    - Netcode for Entities: Netcode for Entities package now includes all the changes from 1.12.0 version. This aligns the package state between the standalone and built-in versions.
    - Package: Moved the Transport package from a separate repository into the Unity Engine as a built-in package.
    - Package Manager: Added a View More Samples button to the Samples details tab in the Package Manager window.
    - Package Manager: Added a dedicated Samples view in the Package Manager window.
    - Package Manager: Added a Locate button in the Package Manager to locate imported samples in the Project window.
    - Package Manager: Added an images field to the package Sample class to allow displaying images in the Samples details tab.
    - Package Manager: Added publish date as a sorting option on the Samples page.
    - Package Manager: Enabled full modification of the technical names through the Inspector for packages in development.
    - Package Manager: Reduced information in the header and displayed them in cards in the Details and Overview tab.
    - Physics 2D: Added a worldDrawing flag to PhysicsBody, PhysicsShape, PhysicsChain, all PhysicsJoint types, and their respective definitions. This flag controls whether the object automatically draws when the world debug renderer draws.
    - Physics 2D: Added new Physics Core 2D features including a dedicated settings Editor, per-world custom transform writing/tweening with callbacks and events, custom transform planes, global transform read modes, contact filter mode, rendering availability in non-development builds, control of maximum worlds to reduce static memory overhead, and always-draw options.
    - Physics 2D: Added support in PhysicsMath for transform setting with PhysicsTransform.
    - Physics 2D: Improved debug rendering for multiple cameras to ensure accurate custom draw element lifetimes. Custom drawing is now always drawn after any automatic scene drawing.
    - Physics 2D: Optimized Debug Rendering with more efficient SDF shaders. Fixed drawThickness and drawPointScale properties so they correctly render in pixel scales. It is recommended to reset the PhysicsWorldDefinition to its defaults or use the default values of 1 for drawThickness and 0.5 for drawPointScale.
    - Physics 2D: Renamed the low-level 2D physics to Physics Core 2D and moved it into a standalone Physics Core 2D module that doesn't depend on the older Physics 2D module. Updated the namespace from UnityEngine.LowLevelPhysics2D to Unity.U2D.Physics. The API Updater will update your scripts automatically.
    - Physics 2D: When using PhysicsBody transform writing of interpolation, you can now perform a final interpolation sync before the next simulation. This synchronizes the Transform with the current body pose using the PhysicsWorld.syncInterpolation or PhysicsWorldDefinition.syncInterpolation options.
    - Physics 2D: PhysicsRotate can now create rotations using either radians or degrees. Deprecated the constructor that accepted a radian angle due to the Burst compiler incompatibility. In addition, simplified its property drawer to display only its rotation without the resultant direction.
    - Scripting: Added code coverage support for development builds on standalone platforms (Windows, macOS, and Linux) that use the Mono scripting backend.
    - Serialization: Added a log message on Editor shutdown that displays the version of the oldest serialized file loaded during the session.
    - Shadergraph: Added a menu item to create a new shader graph using a template from the URP Decal Projectors and URP Fullscreen Renderer Feature.
    - Shadergraph: Added a new switch node, allowing multiple branching cases to be expressed in a single node. The node automatically matches cases for connected float inputs in enum mode.
    - Shadergraph: Added an option to disable the connector on subgraph inputs for select types, forcing them to be statically compiled.
    - Shadergraph: Added initial support for reflected functions.
    - Shadergraph: Added support for float mode in subgraphs, allowing for additional UX options for inputs on corresponding subgraph nodes.
    - Shaders: Added the UNITY_PLATFORM_META_QUEST preprocessor directive for shader compilation when targeting Meta Quest. This can be used to create platform-specific shader optimizations.
    - uGUI: Added the RaycastReceiver component.
    - uGUI: Made the Selectable methods IsPressed and IsHighlighted public.
    - UI Toolkit: Added a UXML upgrade framework for applying automated UXML upgrades to fix common issues and deprecated patterns. It can be accessed from the VisualTreeAsset Inspector or through UnityEditor.UIElements.UxmlUpgradeService.
    - UI Toolkit: Added a PanelRenderer component to UI Toolkit.
    - UI Toolkit: Added an experimental USS Stats window.
    - UI Toolkit: Added drag and drop support for the StyleSheets window.
    - UI Toolkit: Added Editor support for VisualElementReference<T>.
    - UI Toolkit: Added support for animating PanelRenderer UIToolkit content using the Animator of the legacy Animation component.
    - UI Toolkit: Added support for PanelRenderer to display its elements in the new Hierarchy window.
    - UI Toolkit: Added support for simulate.Click on world-space content in the UIToolkit Test Framework.
    - UI Toolkit: Integrated override bars and affordances for attributes in the Visual Element Inspector.
    - UI Toolkit: Synchronized the stylesheets window to the staging context.
    - Unity Physics: Added a new sample Advanced Game Physics Sample - Chain and Gears to the Unity Physics package. Import the sample into your project from the Samples tab of the Unity Physics package in the Package Manager window. This sample demonstrates how to use the new Direct Solver to produce an advanced game physics scenario. It uses Unity Physics' novel solver technology to simulate a complex mechanism involving gears interacting with a chain. It combines the new Direct Solver for accurate simulation of the stiff chain links and the gears with the Iterative Solver for efficient simulation of all the collisions in the scene. Unity Physics automatically couples the results of both solvers for lifelike, stable, and efficient simulation results. This setup demonstrates how both solvers combined can capture emerging physical behaviors at real-time simulation rates, such as the jamming of the gears caused by the chain getting stuck between the gears' teeth.
    - URP: Added On-Tile Post Processing to optimize GPU bandwidth for tile-based GPUs on platforms such as Android and iOS.
    - URP: Enabled the Extensible On-Tile Renderer using the Tile-Only Mode setting.
    - Version Control: Added Add to Source Control and Undo Changes actions for folders from the Project browser and Inspector.
    - Version Control: Added a cset by cset diff panel in the branches view.
    - Version Control: Added a new Branch Explorer to visualize and navigate branches.
    - Version Control: Added a properties panel for the selected changeset/shelveset.
    - Version Control: Added an empty state in the history view.
    - Version Control: Added branch names to the branch deletion dialog.
    - Version Control: Added persistence for all splitter positions across window reloads and sessions.
    - Version Control: Added specific empty states for Pending/Incoming Changes with filters.
    - Version Control: Added support to partially apply a shelve in the merge view.
    - Version Control: Added the F2 keyboard shortcut to rename branches and labels.
    - VFX Graph: Added an option to release the VFX batch instance when the VisualEffect is disabled.
    - VFX Graph: Added the ability to search and filter in the template window (also available for ShaderGraph).
    - VisionOS: Added support for gRPC through UnityWebRequest.
    - VisionOS: Exposed "Target minimum visionOS Version" to visionOS Player settings.
    - Web: Added a submodule for the Clipper external library.
    - Web: Added a submodule for the external double-conversion library.
    - Web: Added a submodule for the libtess2 external library.
    - Web: Added submodule for the external library zlib.
    - Web: Added submodules for PhysX libraries.
    - Web: Added submodules for the Animation module.
    - Web: Added submodules for the Box2D external libraries.
    - Web: Added submodules for the HierarchyCore module.
    - Web: Added submodules for the Physics2D and PhysicsCore2D built-in modules.
    - Web: Added submodules for the Tilemap module.
    - Web: Added submodules for libpng and libjpeg libraries that enable stripping these third-party libraries if no PNG or JPEG images are loaded during runtime.
    - Web: Enabled the Player setting WebAssembly 2023 by default.
    - Web: Updated Emscripten SDK compiler toolchain used by Unity's Web platform from earlier Emscripten 3.1.38 to version 4.0.19.
    - Windows: Added DirectStorage support for asset loading in Windows Standalone builds. You can use this feature by using Enable Direct Storage in Player Settings.
