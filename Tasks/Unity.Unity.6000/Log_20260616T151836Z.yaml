    - Physics 2D: Fixed "PolygonGeometry.ClosestPoint()" not returning perimeter point when overlapped. (UUM-134804)
    - Physics 2D: Fixed a crash when tessellating outline paths into Polygons. Potentially affects PolygonCollider2D, TilemapCollider2D and PhysicsComposer. (UUM-142017)
    - Physics 2D: Fixed a crash when using PhysicsWorld Transform Tweening. (UUM-126195)
    - Physics 2D: Fixed a Physics 2D crash on exiting Play mode that was caused by an invalid read/write lock. (UUM-133493)
    - Physics 2D: Fixed an issue in PhysicsComposer where the tesselator could leak if tesselation were to fail. (UUM-126427)
    - Physics 2D: Fixed an issue in the Editor when paused and single-stepping, a "PhysicsBody" using Interpolation mode will not stay in-sync with any Transform Writes resulting in renderers being visually out-of-sync. (UUM-134580)
    - Physics 2D: Fixed an issue where "PhysicsComposer.CreateChainGeometry()" was incorrectly returning a reference to a stale internal buffer resulting in corrupted chain vertices. (UUM-139048)
    - Physics 2D: Fixed an issue where "PhysicsShape.ManifoldPoint.totalNormalImpulse" was incorrect. (UUM-131384)
    - Physics 2D: Fixed an issue where "PhysicsUserData.objectValue" cannot be assigned NULL. (UUM-125383)
    - Physics 2D: Fixed an issue where an "InvalidOperationException" was thrown when calling "PhysicsBody.SetAndWriteTransform" when the "PhysicsWorld.TransformWriteMode" was "PhysicsWorld.TransformWriteMode.Slow3D". (UUM-129537)
    - Physics 2D: Fixed an issue where creating a PhysicsShape using a CapsuleGeometry with a near-zero length resulted in a Circle shape type being created. Now a Capsule shape type is always created and the length is clamped to a minimum internally. (UUM-124692)
    - Physics 2D: Fixed an issue where SegmentGeometry.forward was inverted. (UUM-131683)
    - Physics 2D: Fixed an issue where the "PhysicsDistanceJoint" motor limit was processed before the motor itself resulting in a temporary out-of-limit condition. The motor is now processed before the motor limit constraint. (UUM-131384)
    - Physics 2D: Fixed an issue where the "PhysicsUserData.int64Value" property does not show in the Editor Inspector. (UUM-125627)
    - Physics 2D: Fixed an issue where the creation of 3 vertex ChainGeometry (triangle) was not allowed as previously the limit was 4 vertices. (UUM-139044)
    - Physics 2D: Fixed an issue where the physics debug renderer was incorrectly using depth-testing. (UUM-135992)
    - Physics 2D: Fixed an issue where there is no way to return simple convex hulls using the PhysicsComposer. This can now be done with "PhysicsComposer.CreateConvexHull". (UUM-124838)
    - Physics 2D: Fixed an issue with "PhysicsComposer.GetGeometryIslands()" where it was not read-locked leading to potential concurrency issues. (UUM-135939)
    - Physics 2D: Fixed an issue with Rigidbody2D linear/angular drag to damping rename when used in prefab variants. (UUM-122242)
    - Physics 2D: Fixed and issue with the HingeJoint2D tool handle drawing when deleting the component being edited. (UUM-134276)
    - Physics 2D: Fixed default "PolygonGeometry" constructor generating invalid edge normal. (UUM-134804)
    - Physics 2D: Fixed to stop the PhysicsCore2D renderer from rendering on overlay cameras. (UUM-142142)
    - Physics 2D: Fixed various issues with PhysicsMask including IsBitSet, AreBitsSet and both ResetBitIterator and SetBitIterator. (UUM-131683)
    - Physics 2D: Improved the stability of the PhysicsCore2D system when it is used from multiple threads, fixing rare race conditions that could potentially cause crashes during world or object destruction. (UUM-143564)
    - Physics 2D: PhysicsHingeJoint can now be "unpinned" which provides rotational constraining only with the point-to-point constraint, effectively allowing the PhysicsBody to move while having rotational-only constraints applied. (UUM-137810)
    - Physics 2D: PhysicsShape.definition now includes reading "PhysicsShapeDefinition.startMassUpdate" and "PhysicsShapeDefinition.startStaticContacts" properties. (UUM-133265)
    - Physics 2D: PhysicsWorld.TestOverlapShape, PhysicsWorld.OverlapShape, PhysicsWorld.CastShape and PhysicsShape.CastShape now correctly return results in world-space and ignore the originating shape as expected. (UUM-136473)
    - Physics 2D: The deprecated "ContactFilter2D.NoFilter()" instance method now correctly modifies the instance of ContactFilter2D from which it was called, essentially restoring previous functionality. This method is still deprecated however. (UUM-139052)
    - Physics 2D: Updated Box2D to include various bug-fixes and improvements, most notably being contact recycling to improve contact performance during simulation. (UUM-137810)
    - Physics 2D: When adding PhysicsShape with a disabled "PhysicsShapeDefinition.startMassUpdate", ensure that calling either "PhysicsBody.ApplyMassFromShapes" or "PhysicsBody.massConfiguration" correctly configures the PhysicsBody collision detection. (UUM-137414)
