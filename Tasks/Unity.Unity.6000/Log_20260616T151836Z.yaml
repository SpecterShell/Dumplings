    - Unity Physics: Added: Added new ScheduleParallel() methods for multi-threaded execution of event processing jobs (ICollisionEventsJob, ITriggerEventsJob, IImpulseEventsJob) and callback jobs (IContactsJob, IJacobiansJob, IBodyPairsJob). The previously existing Schedule() method runs such jobs only on a single thread. However, for processing of large data sets (for example, many events), or if a job has a high computational cost, it can be beneficial for performance to schedule the job to run on multiple threads for parallel processing instead by using the newly provided ScheduleParallel() method.
