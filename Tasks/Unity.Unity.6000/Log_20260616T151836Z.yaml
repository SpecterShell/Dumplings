    - IL2CPP: Improved de-virtualization of boxed virtual calls in generic code that are guarded by an is check.
    - IL2CPP: Made a minor reduction in IL2CPP player build times by optimizing managed symbol file handling by UnityLinker and IL2CPP.
    - IL2CPP: Optimized calls to typeof(T).IsEnum, typeof(T).IsByRefLike, typeof(T).IsValueType, typeof(T).IsPrimitive in generic code.
    - IL2CPP: Optimized type equality checks in generic code.
    - IL2CPP: Reduced code size by reducing the number of method invoker variations generated.
    - IL2CPP: Removed boxing in generic code when the box is done for an isinst call.
    - IL2CPP: Removed collection of generic instances for method that are replaced by intrinsics.
    - IL2CPP: Small performance improvement in generic variance type checks.
    - IMGUI: IMGUI now uses Advanced Text Generator to generate its Text.
    - Installer: Installers on Windows can now take up to 60% less time due to an optimization in the compression strategy.
    - Installer: Removed the activation of .NET 3.5 on Windows systems to greatly reduce the installation time when using the installers directly.
    - iOS: Improved TouchScreenKeyboard with visible input to support liquid glass on iOS 26 and later.
    - iOS: Switch to ca display link on serious/critical thermal state.
    - Multiplayer: Fixed a write access error with VirtualProjectSettings.json when creating a MPPM Player Tag with Perforce connected. (UUM-144074)
    - Netcode for Entities: Improved the readability of byte values in the Ghost Snapshot Tab of the Netcode Profiler.
    - Netcode for Entities: MaxSendRate is now bypassed when ArchetypeChunk structural changes (i.e. order changes) occur, so that ghost spawns and deletions are not delayed or rate-limited. Note that bandwidth consumption may increase marginally.
    - Package Manager: Action button text in trust warnings and error window matches the action made by the user.
    - Package Manager: Aligned active trust messages with passive trust.
    - Package Manager: Improved active trust handling in the Package Manager.
    - Particles: Renamed Effects to Visual Effects in the GameObjects menu.
    - Physics: Added the ability to specify if internal collision, trigger, and joint event buffers should be de-allocated with a specific time interval. Effectively allowing memory pressure to be reduced when a physics scene's preparation stage runs. These settings can be found in Project Settings > Physics > Settings > GameObjects tab, under the "Frame Maintenance" foldout.
    - Physics: Changed the default broad-phase type for new projects to Automatic-Box Pruning. This improves performance for dynamic setups. You can find the broad-phase type for the physics system at Project Settings > Physics > Settings under the GameObject tab.
    - Physics: Exposed incremental static broadphase toggle within the Project Settings -> Physics -> Settings pane. Historically incremental static broadphase has always been on, this does carry a performance cost for cases where all static Colliders never move/change. The default of this toggle is always ON.
    - Physics: Exposed log verbosity as a option within the Physics pane to allow users to suppress some warnings and logs coming out of the PhysX integration. The new setting can be found under Edit > Project Settings > Physics > Settings under the GameObject tab.
    - Physics 2D: PhysicsComposer can now convert both "CircleGeometry" and"CapsuleGeometry" to "PolygonGeometry" using a static method of "PhysicsComposer.ToPolygons()".
    - Physics 2D: PhysicsComposer now implements the IDisposable interface where the public IDisposable.Dispose method simply calls "PhysicsComposer.Destroy()".
    - Player: Added a selection of key profiler markers available in release builds to the runtime metrics gathering system.
    - Plugins: Upgraded DLSS SDK from v310.4.0 to v310.5.0, including adding Preset L and M to DLSS Super Resolution.
    - Profiler: Editor: Migrated Profiler charts from IMGUI to UITK.
    - QNX: Added QNX Memory Profiler support.
    - Scripting: Added an overload to GameObjectUtility.DuplicateGameObjects that allows not recording the Undo.
    - Search: Improved performance when merging Search Index artifacts of large projects with "Deep Indexing" enabled.
    - Search: Improved the Search window fluidity and responsiveness when fetching search results.
    - Shadergraph: Fixed an issue where the swizzle node's input slot could end up in a bad state. Changed its behavior so that the node's input and output slot always reflect the swizzle mask.
    - Shadergraph: Improved appearance of channel dropdown on UV node when node is collapsed.
    - Shadergraph: Improved contrast of category names.
    - Shadergraph: Improved some cases where swapping pipeline assets could cause disruptions.
    - Shadergraph: Improved the alignment of the help box in the Project Settings window.
    - Shadergraph: Improved the formatting of the help box in the Project Settings window.
    - Shadergraph: Improved UGUI Shaders sample to take advantage of promoted properties and subgraph improvements, by replacing former custom nodes with subgraphs.
    - Shadergraph: More reflected information is now presented in the node inspector for reflected functions.
    - Shadergraph: Updated the grouping shortcut to match the context menu behavior.
    - Shadergraph: Updated the help button for heatmap values to redirect to the Shader Graph package documentation.
    - Shadergraph: Updated the Node Reference sample to include new nodes (Append, Switch, Expression and Reflected Functions).
    - Shaders: Added an "Unapplied Changes" dialog that appears when navigating away from the Shader Build Settings UI with pending modifications.
    - Shaders: Added keyword type information in the X_KEYWORD_DECLARED macros. This allows the shader code to make preprocessing time decisions based on whether specialized variants are being generated or if dynamic branching is used instead. X_KEYWORD_DECLARED will have KEYWORD_TYPE_FLAG_SPECIALIZED_VARIANTS set if shader_feature or multi_compile is in use. Correspondingly dynamic_branch keywords will have KEYWORD_TYPE_FLAG_RUNTIME_BRANCHING set.
    - Shaders: Improved errors reported when a shader compiler process crashes.
    - Shaders: Improved GPU performance on Meta Quest devices by avoiding shadow map sampling for geometry that is back facing in relations to the shadow casting light.
    - SRP Core: Added filtering for converter items in the Render Pipeline Converter. Improved the UI and the list view handling.
    - SRP Core: Added Material Variants handling to the Render Pipeline Converter's Shader Upgrade.
    - SRP Core: Added Search filter for Rendering Debugger.
    - SRP Core: Avoid Render Pipeline Converter to output unnecessary information upon conversion.
    - SRP Core: Fixed Motion Vector tests in Terrain project.
    - SRP Core: Fixed the error "Cannot return local actualPasses by reference because it is not a ref local" in RenderGraph PassesData.
    - SRP Core: Improved render pipeline creation performance by avoiding debug UI initialization.
    - SRP Core: Improved the Render Pipeline Converter console report to display conversion results.
    - SRP Core: Improved the way VolumeManager collects VolumeComponent types to avoid slow reflection overhead on Player startup.
    - SRP Core: Optimized Render Graph through several small improvements, with no changes in logic. Render Graph recording step is 2% to 4% faster on the main CPU thread in several scenarios.
    - SRP Core: Reenabled Swapbuffer Depth test.
    - SRP Core: Removing Finalizers from RenderGraph --native-leak-detection EnabledWithStackTrace.
    - SRP Core: Render Pipeline Converter - Disabled Scan and Convert actions during Play Mode to prevent errors.
    - SRP Core: Render Pipeline Converter: Scan and Convert now only handles the visible converters.
    - SRP Core: Volumes - Fixed Open In Rendering Debugger. Now it selects the given Volume Component to inspect.
    - Terrain: Added warning for unsupported behaviour when rotation or scale is modified on a terrain object or one of its parents.
    - Test Framework: Improved Test Data ToString Representation.
    - TextMeshPro: * Added OnFontMaterialRequest callback to complement the existing OnFontAssetRequest callback that allows custom loading of font related resources that are not contained in a Resources folder when using the <font> and <material> markup tag variants.
      - Added new variant to the <font> markup tag to allow referencing a font asset by the source font's family and style name. Example: <font familyName="Roboto" styleName="Bold">. This new variant assumes the referenced font asset has already been loaded.
      - Added missing OnColorGradientRequest callback to provide the same custom loading functionality that is available with the <font> and <material> markup tags.
      - Added OnCharacterRequest callback to allow loading font asset resources based on the requested character.
    - UI Toolkit: Added a GameObject menu item to add a Panel Renderer.
    - UI Toolkit: Added an option in the UI Builder to export the UXML Attributes of elements in alphabetical order.
    - UI Toolkit: Added live reload support to PanelRenderer.
    - UI Toolkit: Added schema support for "authoring-id".
    - UI Toolkit: Added UI Toolkit profiler module.
    - UI Toolkit: Converted Font and FontDefinition computed style properties to unmanaged.
    - UI Toolkit: Converted MaterialDefinition computed style property to unmanaged.
    - UI Toolkit: Improved consistency between computed style length encoding and corresponding layout node style.
    - UI Toolkit: Improved consistency between computed style units and corresponding layout node style data.
    - UI Toolkit: Improved GPU performance by reducing the area where edge antialiasing is applied on default meshes.
    - UI Toolkit: Improved inspector support for elements so they use driven properties when displaying live attribute values.
    - UI Toolkit: Improved memory usage of Visual Element layout border data and simplified preprocessing step for border style data.
    - UI Toolkit: Improved mesh update performance on WebGL.
    - UI Toolkit: Improved mesh update performance on WebGPU.
    - UI Toolkit: Improved mesh update performance.
    - UI Toolkit: Improved performance of layout calculation by removing various pre-layout data conversions.
    - UI Toolkit: Improved UXML importer performance.
    - UI Toolkit: Improved Visual Element Reference picker to include a type and name filter. The full path is now also considered in the search.
    - UI Toolkit: Moved data used for native layout into computed style structure and removed data redundancy from LayoutManager.
    - UI Toolkit: The UI Debugger now shows the Authoring Id for elements.
    - Unity Physics: Only perform direct solver related processing when required, that is, when either joints or contacts require use of the direct solver.
    - Universal RP: Added the in keyword for RenderGraph TextureHandle and BufferHandle function parameters in URP, as they are now readonly structs.
    - Universal RP: Changed DepthCopyPass to ignore copyToDepth and copyResolvedDepth constructor parameters. These are now derived from the source and destination TextureHandles to ensure functional correctness.
    - URP: Added an "Open Project Settings > Graphics" button below the warning "BatchRendererGroup Variants must be set to Keep All" that appears in the Inspector when enabling GPU Resident Drawer on a URP asset.
    - URP: Improved shader performance by removing a dynamic branch in URP shaders that was used to test whether a surface is opaque or transparent.
    - URP: Preview of a visible GameView camera would discard history and effectively disable TAA in the GameView. Previews are treated as redraws to avoid discarding the history of the GameView.
    - URP: Render Pipeline Converter - BiRP to URP 2D : Added settings converter workflow.
    - VFX Graph: Reduced the number of shader variants produced by VFX Graph outputs in builds.
    - Web: Added submodules for "TextCoreFontEngine".
    - Windows: Improved performance of opening files on Windows with DirectStorage enabled.
    - XR: Added support for transparent and UI elements for SpaceWarp (UGUI & TMP).
    - XR: Implemented a GPU performance improvement on the Meta Quest platform by optimizing the function that queries for whether the active camera uses perspective or orthographic projection.
    - XR: Improved GPU performance on Meta Quest devices when a render batch is not affected by spotlights.
    - XR: Improved GPU performance on Meta Quest on Forward. Added a loop unroll keyword if there is only one additional light per object selected on the URP Asset.
    - XR: Improved GPU performance on Meta Quest on the Forward and Forward+ renderer. If the light distanceAttenuation <=0, the renderer avoids calculating light contribution to the pixel.
    - XR: Updated the default settings for the Meta Quest Build Profile's custom Quality Setting.
    API Changes
    - 2D: Added: Added BlendShape API to SpriteRenderer to enable blend shape animations on 2D sprites.
    - 2D: Added: Added new SetTiles APIs for the Tilemap using native buffers.
    - 2D: Added: Added overloads for RenderSpriteInstanced to support List, NativeArray, and ReadOnlySpan.
    - 2D: Added: Added RenderSprite and RenderSpriteInstanced scripting APIs.
    - 2D: Added: Expose texture resources in Universal2DResourceData.
    - AI: Added: Added new structs in the Unity.AI.Navigation.LowLevel namespace with methods that you can call in jobs. To help you debug race conditions, the added queries can throw safety exceptions when ENABLE_UNITY_COLLECTIONS_CHECKS is defined. The new structs are: NavWorld, NavNode, NavLocation and NavQueryBuffer. Two new enums, NavQueryStatus and NavNodeType, help in various operations.
    - Android: Added: Added AndroidApplication.isInMultiWindowMode.
    - Android: Added: Added AndroidApplication.onMultiWindowModeChanged.
    - Android: Added: Added AndroidBuild.Version class.
    - Android: Added: Added AndroidAssetPacks.ShowConfirmationDialogAsync method that wraps Android's AssetPackManager.showConfirmationDialog for displaying user confirmation dialogs to download Android asset packs.
    - Android: Added: Android FoldingFeature API (https://developer.android.com/reference/androidx/window/layout/FoldingFeature\) is exposed to C#.
    - Android: Added: AndroidWindowInsets, controls system bars behavior and queries insets at runtime.
    - Android: Added: Introduce AndroidJNI.DumpReferenceTables() which can dump JNI references to logcat, enabling you to fix JNI leaks more easily.
    - Android: Added: Listen and control insets at runtime - AndroidApplication.onWindowInsetsChanged, AndroidApplication.currentWindowInsets.
    - Android: Added: PlayerSettings.Android.requestedVisibleWindowInsets, controls which insets should be visible on application start.
    - Android: Added: PlayerSettings.Android.systemBarsBehavior, controls how system bars should behave when swiping from bottom or top of the screen.
    - Android: Changed: PlayerSettings.Android.renderOutsideSafeArea will only control cutout rendering mode, it will not affect status bar visibility, if you want to show/hide status bar use PlayerSettings.Android.requestedVisibleWindowInsets or AndroidApplication.currentWindowInsets.Show/Hide functions.
    - Android: Changed: Screen.fullscreen no longer does anything on Android, if you want to control navigation bars visibility, use AndroidApplication.currentWindowInsets.Show/Hide functions.
    - Android: Deprecated: Android: AGP 9.0.0 - Removed deprecated attributes including targetSdkVersion, minSdkVersion, lintOptions, aaptOptions, and packagingOptions.
    - Asset Pipeline: Changed: Deprecated AssetImportContext.GetArtifactFilePath in favour of AssetImportContext.GetArtifactData.
    - Asset Pipeline: Deprecated: AssetImportContext.GetOutputArtifactFilePath has been deprecated in favour of SetOutputArtifactData and SetOutputArtifactFile.
    - Asset Pipeline: Deprecated: Deprecated TryGetObjectIdentifier(int, out ObjectIdentifier), use TryGetObjectIdentifier(EntityId, out ObjectIdentifier) instead.
    - Audio: Added: Added API to ScriptableAudioPipeline ControlContext to ease discovery of when the system is configuring. (UUM-133107)
    - Audio: Added: Added GeneratorInstance.Result.isFinished and Finished() to determine whether a nested generator finished producing samples.
    - Core: Added: Added Unity.Collections.NativeList<T>.Count property, which is the same as Unity.Collections.NativeList<T>.Length, to make it easier to go to/from System.Collections.Generic.List<T>.
    - Core: Deprecated: Deprecated EntityId.Equals(int). EntityId mixing with int is no longer supported.
    - Editor: Added: Added a way to define the default background color and dynamic panel behavior of overlays for a specific window.
    - Editor: Added: Added an API to add and remove variables in GTK graphs.
    - Editor: Added: Added APIs and UI to control the SceneView camera acceleration, easing and speed modifier.
    - Editor: Added: Added cacheMissCollection and additional GraphicsStateCollection methods.
      cacheMissCollection is an optional child object that becomes created and populated upon calling Warmup with the parameter 'traceCacheMisses = true'. It can be used to collect PSOs that are loaded when the current GraphicsStateCollection has been warmed up and aren't contained in it.
    - Editor: Added: Added Global Editor log preference.
    - Editor: Added: Added the ability to add additional previousBuildMetadataLocations to build options from within the PrepareForBuild callback using the newly added BuildPlayerContext.AddAdditionalMetadataPathToPlayerOptions API.
    - Editor: Added: Added BuildProfile.CreateBuildProfile API for creating build profiles for specified platforms and automatically installs required platform packages if not already installed.
    - Editor: Added: Animation: Added AnimationEventInfo ref struct as a non-allocating alternative parameter for animation event callbacks. This new stack-allocated struct eliminates garbage collection overhead when handling animation events, providing significant performance benefits for animation-heavy scenes. AnimationEventInfo provides read-only access to all animation event parameters and state information from both Animator and legacy Animation components. Existing AnimationEvent callbacks remain fully backwards compatible.
    - Editor: Added: EntityId.ToULong and EntityId.FromULong for low-level access to underlying data in the EntityId. Useful for custom serialisation.
    - Editor: Added: GTK : Added public API to add/remove node from graph.
    - Editor: Added: GTK : Api to connect/disconnect wires
      Added public APIs to connect and disconnect wires in Graph Toolkit. The new APIs are bool Connect(IPort output, IPort input) and bool Disconnect(IPort output, IPort input).
    - Editor: Added: Introduce build profile helper APIs for: OnActiveProfileChanged, GetAllBuildProfiles, GetBuildProfileAtPath, and GetInstalledPlatforms.
    - Editor: Changed: Expose JobHandle.GetHashCode and Equals and ==/!= operators when ENABLE_UNITY_COLLECTIONS_CHECKS is not defined.
    - Editor: Changed: Improved Project Auditor auto-fixing API.
