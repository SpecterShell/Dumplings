    - Entities: Improved determinism of Runtime Content Management archive folder across builds. (UUM-129944)
    - Entities: Improved the performance of entities in the new Hierarchy.
    - Entities: Moved the new recently added scripts to support entities in the new Hierarchy from Packages/com.unity.entities/Unity.Entities.Editor/Hierarchy/Utility to Packages/com.unity.entities/Unity.Entities.Editor/Hierarchy.
    - Entities: Removed the setting to enable/disable Entities in the Hierarchy window. Entities are now always shown in the hierarchy when hierarchy v2 is enabled and the Entities package is installed.
    - Entities: Selecting a GameObject inside a subscene in the new Hierarchy will only show its GameObject authoring representation not its runtime ECS representation if there is an entity associated to it.
    - Entities: System inspection information is moved from the inspector window into its own panel in the Systems window.
    - Entities: The DataMode picker (the orange dropdown button) has been removed from the inspector. To see e.g. Entities data, simply select the Entity you wish to inspect and the data will be visible in the inspector. The DataMode picker is still available in the Entities Hierarchy window.
    - Entities: The Journaling window is marked as deprecated. This window will be removed in a future version of Unity.
    - Graphics: GPUResidentDrawer and EntitiesGraphics Unification Part 1 : Extend GRD
      - Introduced the foundations for a RenderWorld.
      - Added support for custom instance injection in GPUResidentDrawer. Needed to inject Entities from the outside.
      - Added support for generalized GPU archetypes and instanced material properties. Needed to support EntitiesGraphics MaterialsProperty override.
      - Added support for Lightmap TextureArray. Needed for Entities support.
    - Graphics: Marked Dynamic Batching as deprecated.
    - Graphics: Texture importing now strictly adheres to the supported formats in https://docs.unity3d.com/Documentation/Manual/ImportingTextures.html. Circumventing this by changing an image file's extension will no longer work. If a image file format is necessary, please file a feature request so we can look into properly supporting it.
    - Graphics Tests: Disabled Swapbuffer test on XR.
    - HDRP: Added optimization warning for Graphics Compositor for certain platforms.
    - HDRP: Added optimization warning for High Quality Line Rendering for certain platforms.
    - HDRP: Moved Look Dev to the HDRP package.
    - HDRP: Renamed "Convert All Built-In Materials to HDRP" and "Convert Selected Built-In Materials to HDRP" to "Convert All Built-In Materials to Current SRP" and "Convert Selected Built-In Materials to Current SRP". (UUM-137874)
    - IL2CPP: Changed the serialized form of GenericParameterIndex in the global metadata file to use the smallest possible numeric representation and changed Il2CppGenericContainer's TypeArgc to ushort, reducing the metadata size for most programs.
    - IL2CPP: Changed the serialized form of MethodIndex in the global metadata file to use the smallest possible numeric representation, reducing the metadata size for most programs.
    - iOS: Implemented UIScene lifecycle events for iOS/tvOS/VisionOS.
    - iOS: Removed note about UnityWebRequest exemption from App Store export regulations due to switch to libcurl from NSURLSession.
    - Netcode for Entities: The GhostUpdateSystem's predicted ghost history backup lookup failure case now only attempts to rollback to the snapshot if said rollback isn't too severe. This change marginally worsens correctness in exceptional cases, but prevents egregiously large rollbacks.
    - Package: Deprecated the WebRTC package in Unity 6.4.
    - Package Manager: Grouped and renamed export functions in the Editor's right-click menu.
    - Package Manager: The selection of the Package Manager window no longer affects the inspector. Editing the package manifest remains available.
    - Package Manager: UPM logs now default to <ProjectPath>/Logs/upm.log, while still honoring explicit -upmLogFile overrides.
    - Scripting: Disabled the Code Coverage Support option for 32-bit architecture build targets.
    - Shadergraph: Changed the Scene Depth Difference Node to default to using View Position instead of World Position.
    - Shadergraph: Disabled profiling during Shader Graph code generation to fix errors that occurred in some circumstances.
    - SRP Core: Added material upgrade menu items for all SRP: "Convert All Built-In Materials to Current SRP" and "Convert Selected Built-In Materials to Current SRP". (UUM-137874)
    - SRP Core: Converted Rendering Debugger Editor and Runtime UI to use UI Toolkit.
    - SRP Core: Migrate from UIDocument to PanelRenderer at Rendering Debugger Runtime UI.
    - SRP Core: Removed package dependency to com.unity.ugui.
    - uGUI: Changed uGUI and TMP elements to always instantiate at the origin of their canvas upon creation via the editor.
    - uGUI: Renamed uGUI's profiler modules (UI and UI Details) to "UI (Canvas)" and "UI Details (Canvas)".
    - uGUI: Updated Profiler icons for UI Canvas modules.
    - UI Toolkit: Enabled multiple documentation versions for UI Test Framework by syncing the package version to the Unity Editor version.
    - UI Toolkit: PanelRenderer now releases its root visual element to help reclaim memory and diagnose usage of stale element references.
    - UI Toolkit: UI Toolkit Test Framework: Internalized some IMGUI-related properties.
    - URP: Improved the warning message shown when running render pipeline converters in batch mode to better explain potential limitations and recommend the dedicated conversion UI for reliable results.
    - Version Control: Added changeset and label icons to the status bar.
    - Version Control: Delayed workspace creation when opening projects from the Unity Hub.
    - Version Control: Displayed progress indicator overlaying the view.
    - Version Control: Implemented a "clever" truncation of paths.
    - Version Control: Improved text field focus behavior across dialogs for more consistent keyboard workflows.
    - Version Control: Improved the empty state in the Pending Changes view.
    - Version Control: Moved incoming and shelves notifications to the top bar.
    - Version Control: Prevented connecting a project to a different organization by mistake.
    - Version Control: Redesigned all the views and dialogs.
    - Version Control: Redesigned the main panel to include a top breadcrumb.
    - Version Control: Renamed toolbar dropdown to comply with a 120px max width limit in 6.5.
    - Version Control: Show real indeterminate progress bar.
    - Version Control: Updated deleted and moved overlay icons.
    - Version Control: Updated new project initialization to perform a full initial checkin.
    - Version Control: Updated the macOS hide shortcut to Cmd+Shift+H.
    - Windows: AsyncReadManager now supports DirectStorage when enabled.
    - XR: Removed all com.unity.modules.vr dependency .json files and deprecated the module in Unity 6.5 and above.
    - XR: Removed the VR Editor and VR Module along with their API references.
