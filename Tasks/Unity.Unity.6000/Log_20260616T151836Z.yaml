    - Entities: Changed: HierarchySubSceneHandler has been renamed to HierarchySubSceneAuthoringHandler, to better describe its purpose. If you are making use of the HierarchySubSceneHandler class, please update your code to HierarchySubSceneAuthoringHandler instead.
