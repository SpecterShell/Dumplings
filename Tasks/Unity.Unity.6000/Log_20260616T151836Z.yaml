    - Windows: Moved the Enable DirectStorage setting to Project Settings so it can be tracked by version control and accessible via C# scripting. All upgraded projects using the previous setting are set to disabled. (UUM-133978)
    - Windows: Updating gameloop when the user right-clicks on the window title bar on a Run In Background application. (UUM-124735)
    - XR: Fixed an issue when building and running Meta Quest applications with texture compression targeting enabled. (UUM-131974)
    - XR: Fixed built-in shader constant unity_StereoEyeIndex not being properly set when using multi-pass XR rendering mode in URP, affecting shaders such as Skybox/Panoramic which would fail to display as stereoscopic even when using the 3D Layout option. (UUM-120719)
    - XR: Fixed foveation when used with MSAA on PC or linked XR. (UUM-113364)
    - XR: Fixed incorrect resolve attachment being selected when MSAA camera color attachment is copied using frame buffer fetch. (UUM-132450)
    - XR: Fixed occasional editor crash when audio configuration changed. (UUM-126803)
    - XR: Quad Views post-processing effects now render correctly without visible seams between inner and peripheral views. (UUM-133972)
