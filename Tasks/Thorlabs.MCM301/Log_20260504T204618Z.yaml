- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Updates in SDK:
    - Remove the SetSoftLimitValue function.
    - Rename SetVelocity to MoveVelocity.
    - Update slot values from (4, 5, 6) to (1, 2, 3).
    2. Add stage moving state detection.
    3. Recognize linear and rotary stages.
    4. Upgraded Telerik controls to version 2024.4.1213 to resolve an RCE security vulnerability identified in older Telerik dependencies.
    5. Fixed the issue in the get_EFSHW_info function where the returned remaining pages attribute was incorrect.
