  Key: ReleaseNotes
  Value: |-
    本次更新带来多项新功能与体验优化：

    【新功能】
    - 文件夹拖拽排序：树形结构随手拖，笔记按你的习惯整理（排序仅本地生效，暂不同步云端）
    - AI 规整 & AI 总结等：一键把录音、笔记智能整理成清晰内容
    - 网页剪藏：浏览的网页信息，随手一键存为个人笔记
    - 内置音频播放器，普通笔记的语音录入也能导出音频

    【更准更顺】
    - 语音输入升级高精转写，识别更准
    - 长时间录音更稳定，修复崩溃问题
    - 优化录音播放与编解码性能，操作更流畅

    - 修复若干已知问题，提升整体稳定性
