  Key: ReleaseNotes
  Value: |-
    🚀 新增文档预览、EPUB 电子书与模型休眠，全新上手引导与账户登录💡 Tips：
    - Linkly AI CLI 建议升级到 v0.5.1（新增 EPUB 支持）
    - linkly-ai-skills 建议更新到最新
    - MCP 工具描述有更新（新增 EPUB、云端库归属标记），接入的 AI 工具可重载 MCP 服务
    🚀 新功能：
    - 新增账户登录：通过浏览器一键登录 Linkly 云账户（OAuth 授权），无需再手动填写 API Key
    - 新增 EPUB 电子书支持：.epub 纳入全文检索与语义检索，AI 可通过 MCP/CLI 检索阅读；升级后已索引目录中的电子书会自动入库，无需手动操作
    - 新增文档预览：在 Launcher 与 Chatbot 工作区可直接预览文档内容，Markdown / HTML 支持「源码 / 渲染」一键切换
    - 全新上手引导：首次启动引导界面进行了重构，简化了流程，并自动准备多语言示例知识库
    - 新增模型空闲休眠：嵌入模型在空闲一段时间后自动卸载以释放内存，需要时自动唤醒，可在设置中开关
    ⚡ 改进：
    - 云端知识库在 MCP list_libraries / explore 中标注归属（[yours] 我的 / [shared] 共享），AI 区分库来源更清晰
    - Launcher 显示时预取嵌入模型，加快首次检索响应
    - Chatbot 错误提示按类型区分（登录 / 权限 / 模型），并修正回退模型的选择；登录后自动刷新可用模型列表
    🐛 Bug 修复：
    - 修复云同步目录（如 Synology、Dropbox 的临时文件）导致文件监听反复触发删除事件、刷出大量无用日志的问题
    - 修复部分情况下通过命令行集成 MCP 时，因环境变量（PATH）被截断而无法连接的问题
    - 修复设置页中索引数据占用大小显示不准确的问题
    - 修复在设置中手动重试索引后未重新开始的问题
