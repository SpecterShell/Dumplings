- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    🚀 扫描版 PDF、图片里的文字，现在也能搜、也能被 AI 读了💡 Tips：Linkly AI 升级了文字识别（OCR）引擎，扫描版 PDF 和图片会被逐页识别，并还原成 Markdown 格式。历史以及存在的扫描版 PDF 会自动重新解析。🚀 新功能：
    - 新增 扫描版 PDF / 图片文字识别（OCR）：升级到全新 PP-OCRv6 引擎，中文 / 日文 / 英文识别精度大幅提升；扫描件会被还原成带标题、表格的结构化内容，可导出为 Markdown。
    - Linkly AI 自带 Chatbot 已支持 引用云端知识库：可直接 @ 已链接的云端知识库，与本地库一样检索。
    - 新增 知识库标题：知识库可设置真实的标题与简介，并在设置、启动器、Chatbot 各处统一显示。
    - 启动器新增 按时间排序：搜索结果可在原有筛选之外，按时间排序查看。
    - 首次引导完成后 自动创建桌面快捷方式（Windows 卸载时会一并移除）。
    - 增加数据体积压缩功能，升级后会自动压缩索引体积，减少磁盘占用，最高减少索引体积 80%。
    ⚡ 改进：
    - 优化 OCR、语音转写、向量嵌入等重计算任务对资源的使用，避免并行导致的卡顿与内存溢出。
    - 优化图片与 PDF 的提取，解析更加稳定。
    - 「重建索引」仅在后台长任务空闲时允许，避免相互干扰。
    🐛 Bug 修复：
    - 修复个别模型（如 Kimi）在 Chatbot 中可能出现的 重复回答、丢失上一轮内容、工具被重复调用 的问题；对话被中断时会明确提示中断原因。
    - 修复扫描版 PDF、图片在部分场景下未被识别、或识别结果不完整的若干问题。
    - 提升了索引升级与数据库迁移过程的稳定性，修复特定升级路径下新功能所需字段可能缺失的问题。
