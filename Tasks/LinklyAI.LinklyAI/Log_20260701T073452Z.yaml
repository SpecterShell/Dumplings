  Value: |-
    🚀 云端知识库支持公开发布、筛选与收藏🚀 新功能：
    - 云端知识库支持发布为「公开」与「Showcase」两种可见性，方便对外分享与展示
    - 「我的知识库」筛选：可按来源筛选（全部 / 已连接 / 我的 / 共享 / 收藏），快速定位需要的知识库
    - 知识库支持收藏：一键将常用知识库标记为收藏，便于快速访问
    ⚡ 改进：
    - 接受云端知识库邀请后，页面就地引导一键绑定，无需再跳转到知识库页面
    - 改进账户登录流程的稳定性，修复偶发的登录无法完成的问题
