- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    📊 新增 PowerPoint 文档支持；Chatbot 新增 @ 上下文与工作区💡 Tips：
    - Linkly AI CLI 需升级到 v0.5.0（旧版 --type pptx 会被拒绝）
    - linkly-ai-skills 建议更新到最新
    - MCP 工具描述有更新，接入的 AI 工具可重载 MCP 服务
    🚀 新功能：
    - 新增 PowerPoint 文档支持：.pptx 进入全文检索与语义检索，并生成特制大纲索引，AI 可通过 MCP/CLI 检索阅读；升级后已索引目录中的 PPT 会自动入库，无需手动操作
    - Chatbot 新增**@ 上下文** 功能：输入 @ 指定知识库/文件夹/文件，把 AI 的回答范围圈定到所选内容
    - Chatbot 新增工作区：自动聚合会话中引用过的文件，并支持文件预览、浏览知识库索引中的文件等
    - 新增统一的「云服务」设置页：统一管理客户端使用 LinklyAI 云服务的凭证
    - 修改 Chatbot 成为默认启动窗口
    ⚡ 改进：
    - MCP search 工具的 path_glob 改为子串匹配：@文件夹、完整路径可直接命中，Agent 检索文件夹更准确
    - MCP find_paths 直接返回可复用的 path_glob，Agent 搜索文件夹更方便
    - 长会话标题截断显示，并在 Chatbot 中展示 Launcher 快捷键
    - 快捷键设置页补充新增快捷键
    - Chatbot 界面多处细节打磨（会话列表滚动、来源列表样式、@ 选择器外观等）
    - 应用更新下载失败时自动重试，失败提示更友好
    - 新增文件夹授权失效检测（macOS）：应用更新后系统可能收回文件夹访问权限，导致新文件无法被索引；现在启动时会自动检测并弹窗引导，在系统窗口中确认一次即可恢复，无需删除重加文件夹；设置-文件夹中失权目录会显示 ⚠️ 标记
    🐛 Bug 修复：
    - 修复重建索引后 PDF 书签大纲可能丢失的问题
    - 修复偶发的云端知识库 MCP 隧道每两分钟断连重连的问题
    - 修复 macOS 上文件夹权限导致云端库推送失败的问题
    - 修复云端知识库索引大文档时内存溢出的问题
    - 修复 Chatbot 消息发送失败时输入内容丢失、错误不提示的问题
    - 修复部分文件预览无法打开、空文件预览无占位提示的问题
    - 修复旧版本聊天数据导致模型选择异常的问题（启动时自动修复）
    - 修复通知弹层挤压侧栏、分栏拖拽线偶发卡住等布局问题
    - 修复更新失败后「检查更新」按钮无响应、需重启应用才能恢复的问题
    - 修复个别文档含特殊字符时语义索引反复重试、空耗资源的问题
