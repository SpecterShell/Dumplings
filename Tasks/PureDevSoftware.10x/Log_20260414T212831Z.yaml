  Key: ReleaseNotes
  Value: |-
    Summary

    Important fixes to auto error underlining. Fixes to terminals. Fixed workspace reloading whenever any file changes

    General Fixes

    - Fixed error underlining causing large performance spikes with Unreal

    - Fixed auto error underlining causing stall on save and builds to fail

    - Fixed error underlining for files with pre-compiled headers

    - Stopped error underlining locking the pdb file causing builds to fail

    - Stopped error underlining running on non C++ files

    - Fixed auto error underlining not working if there are unsaved non-source files

    - Fixed error underlining compile running twice

    - Fixed mouse back/forward buttons missing double clicks

    - Fixed pulling tabs out not working after tab order changed

    - Fixed Terminal "The handle is invalid." error

    - Fixed pulled out windows disappearing after update, with the Close Command and Exit menu item

    - Fixed the terminal scrollback lines not clearing after a cls

    - Fixed VS environment setup sometimes failing for VS2026

    - Fixed workspace reloading whenever a source file changes externally

    Misc

    - Added .filters to xml syntax highlighting

    - Added .10x to Search.Extensions setting

    - Added "Build completed at ..." time to build log

    - Changed the terminal folder for Unreal to be the root folder
ReleaseTime: 2026-04-14
