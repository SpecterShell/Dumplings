  Key: ReleaseNotes
  Value: |-
    Summary

    General fixes and error underlining improvements

    General Fixes

    - Fixed goto-error going to wrong place when building with ExecuteBuildCommand python function

    - Stopped error underlining hover box hiding symbol hover box

    - Fixed auto error underlining for VS NMake projects with relative build command (as can happen with Unreal)

    - Fixed double clicking on a build output line that isn't an error going to previous error

    - Fixed AutoCloseFloatingToolWindows not working for FindFunction panel

    - Fixed files not being editable in source preview panel

    - Fixed ShowTerminal comand not cycling through terminal panels

    - Fixed new Search tabs being called "Hidden"

    - Stopped tabs being pulled out while reordering in the horizontal layout

    - Fixed potential crash in python bindings

    Misc

    - Added verbose logging for Unreal auto error underlining

    - Update license agreement (minor changes for direct invoice payments and changed "user" to "customer")
