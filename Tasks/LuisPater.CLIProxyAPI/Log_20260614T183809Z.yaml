  Key: ReleaseNotes
  Value: |-
    Linux release assets
    - CLIProxyAPI_<version>_linux_<arch>.tar.gz is the default Linux build. It supports dynamic library plugins and is built against a GLIBC 2.17 baseline.
    - CLIProxyAPI_<version>_linux_<arch>_no-plugin.tar.gz is the portable Linux build for musl-based or older systems such as OpenWrt. It does not support dynamic library plugins.
    FreeBSD release assets
    - CLIProxyAPI_<version>_freebsd_aarch64_no-plugin.tar.gz is the FreeBSD arm64 build. It is built without CGO and does not support dynamic library plugins.
    Changelog
    - feat(executor): add support for compact response handling in XAIExecutor (529d9e92)
    - feat(pluginstore): add support for third-party plugin store sources and enhance plugin management (303c0f2f)
    - feat(pluginstore): refactor plugin store source handling to use string URLs (239d7ee0)
    - feat(websockets): handle terminal events and improve error propagation (3b961190)
    - feat(pluginstore): improve nil checks in pluginStoreSnapshot function (6f3bd764)
    - Merge pull request #3848 from router-for-me/feat/Community_Plugins (ea4e978c)
    - feat: add OpenAI video support with improved error handling and response normalization (7de9757c)
