- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Linux release assets
    - CLIProxyAPI_<version>_linux_<arch>.tar.gz is the default Linux build. It supports dynamic library plugins and is built against a GLIBC 2.17 baseline.
    - CLIProxyAPI_<version>_linux_<arch>_no-plugin.tar.gz is the portable Linux build for musl-based or older systems such as OpenWrt. It does not support dynamic library plugins.
    FreeBSD release assets
    - CLIProxyAPI_<version>_freebsd_aarch64_no-plugin.tar.gz is the FreeBSD arm64 build. It is built without CGO and does not support dynamic library plugins.
    Changelog
    - fix(registry): Conform Claude models listing to Anthropic API schema (f5484b09)
    - fix(registry): Emit Claude model created_at as RFC 3339 string (e3301ecc)
    - feat(api): Route Anthropic /v1/models requests to the Claude format (c354f88f)
    - Merge branch 'dev' into main (1ed1f7b3)
    - feat(executor): normalize parallel_tool_calls based on tools presence (75fa6265)
    - feat(translator): add support for text.format conversion in OpenAI to Gemini requests (bc652c7b)
    - feat(executor): add session isolation for grok-composer models (28e2f979)
    - feat(translator): add benchmarking for convertSystemRoleToDeveloper with large inputs (379167c9)
    - feat(auth): add per-auth OAuth model alias support (f66376f0)
    - feat(config): add support for rebuild_mid_system_message configuration (790ec307)
    - Merge pull request #3834 from dcrdev/main (b0ca3794)
    - feat(registry): improve model fallback logic and refactor Claude model handling (a79ae80f)
    - feat(translator): sanitize parametersJsonSchema in OpenAI to Gemini request handling (b4bec344)
    - feat(management): add ResetQuota endpoint and auth manager quota reset functionality (5771abbc)
    - feat(translator): enforce FIFO order in tool call ID consumption for Gemini requests (011ffe1d)
    - feat(translator): ensure preservation of tool and call IDs in Gemini request and response translations (57e1bf97)
    - feat(registry): add "max" level and remove deprecated Gemini models (09179a70)
    - feat(translator): add support for handling video URLs in Gemini requests (35c3d80a)
    What's Changed
    - Conform Claude models listing to Anthropic API schema by @dcrdev in https://github.com/router-for-me/CLIProxyAPI/pull/3834
