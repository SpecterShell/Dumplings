  Key: ReleaseNotes
  Value: |-
    Linux release assets
    - CLIProxyAPI_<version>_linux_<arch>.tar.gz is the default Linux build. It supports dynamic library plugins and is built against a GLIBC 2.17 baseline.
    - CLIProxyAPI_<version>_linux_<arch>_no-plugin.tar.gz is the portable Linux build for musl-based or older systems such as OpenWrt. It does not support dynamic library plugins.
    FreeBSD release assets
    - CLIProxyAPI_<version>_freebsd_aarch64_no-plugin.tar.gz is the FreeBSD arm64 build. It is built without CGO and does not support dynamic library plugins.
    Changelog
    - fix(pluginhost): avoid holding host lock during plugin lifecycle (13f51d96)
    - fix(management): reload plugins asynchronously after changes (a65ced4a)
    - Add runtime config clone (7f026e1a)
    - Use config snapshots for management reload (a4756ab7)
    - Stabilize management reload race tests (7b16321e)
    - Fix management reload snapshot ordering (a3c87cee)
    - Treat loading plugins as busy (09596d2f)
    - Merge pull request #3872 from router-for-me/codex/pluginhost-async-reload (125c0928)
    - feat(plugin-config): update default plugin Enabled behavior to false and expand test coverage (8d2c00c1)
    What's Changed
    - Fix async plugin reload races by @LTbinglingfeng in https://github.com/router-for-me/CLIProxyAPI/pull/3872
