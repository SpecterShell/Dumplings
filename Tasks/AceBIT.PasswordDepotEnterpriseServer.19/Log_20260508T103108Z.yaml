  Key: ReleaseNotes
  Value: |-
    - The server provides a new REST API v2.0 with numerous new functions and improvements.
    - Generation of long-lived API tokens for the use of the REST API.
    - Optimized synchronization with Active Directory.
    - Improved handling of users from foreign AD forests; users from trusted domains can now be synchronized and authenticated.
    - Fixed an error when creating certificates under older Windows server versions.
    - Azure AD/Entra ID authentication now exclusively uses an Edge-based WebView; if the Edge runtime environment is missing, the user is prompted to download and install.
