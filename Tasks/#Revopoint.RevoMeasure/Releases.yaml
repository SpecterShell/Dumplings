1.1.0.0325:
  ReleaseNotes: |-
    1. Adds template measurement for batch measuring a single model, allowing users to create custom templates.
    2. Adds cone feature support.
    3. Adds batch feature creation from CAD models.
    4. Adds distance measurement along the X, Y, and Z axes.
    5. Adds point deviation measurement at specified locations.
    6. Adds feature creation from a reference mesh model.
    7. Adds model unit settings, supporting millimeters, centimeters, meters, inches, and feet.
    8. Adds decimal precision settings for model data.
    9. Adds a lasso selector.
    10. Fixes some bugs.
    11. Optimizes user experience for certain features.
  ReleaseNotesCN: |-
    1. 新增模板测量功能，适用于批量测量单一模型的场景，支持用户自行创建模板
    2. 新增圆锥特征
    3. 新增从 CAD 批量创建特征的方式
    4. 新增 X,Y, Z 轴方向的距离测量
    5. 新增支持指定位置的点偏差测量
    6. 新增从参考网格模型创建特征的方式
    7. 新增模型单位设置，支持毫米、厘米、米、英寸、英尺
    8. 新增模型数据的小数点位数设置
    9. 新增套索选择器
    10. 修复了一些已知 bug
    11. 优化了部分功能的用户体验
1.1.1.0509:
  ReleaseNotes: |-
    1. Adds a self-service activation code redemption link.
    2. Fixes some bugs.
  ReleaseNotesCN: |-
    1. 新增自助兑换激活码的链接
    2. 修复了一些已知 bug
2026.0.1:
  ReleaseNotes: |-
    1. Adds section measurement function.
    2. Adds 3-2-1 Plane-Axis-Point alignment function.
    3. Adds create coordinate system function.
    4. Adds screenshot function, allowing to save locally or export to reports.
    5. Adds issue feedback function.
    6. Integrates HOOPS parsing library, supporting import of 15 types of CAD files.
    7. Optimizes template measurement stop logic.
    8. Enables template measurement to support automatic measurement using reference mesh files.
    9. Enables template measurement to support switching between measurement results from different files.
    10. Optimizes report content display method.
    11. Optimizes display of software startup page, icons, point deviation, features, GD&T, and other visual elements.
    12. Optimizes automatic alignment algorithms for thin-walled parts, incomplete parts, and symmetrical parts.
    13. Displays additional attributes for distance, feature, and other labels.
    14. Supports free switching between alignment results with automatic data updates.
    15. Supports undo and redo for brush selection, rectangular selection, and lasso selection.
    16. Provides report customization interface, allowing users to perform secondary development using raw data.
    17. Fixes some bugs.
  ReleaseNotesCN: |-
    1. 新增截面测量功能
    2. 新增 3-2-1 面-轴-点对齐功能
    3. 新增创建坐标系功能
    4. 新增软件内截图功能，可以保存到本地或导出报告
    5. 新增问题反馈功能
    6. 集成 HOOPS 解析库，支持导入 15 种类型的 CAD 文件
    7. 模板测量优化了停止测量逻辑
    8. 模板测量支持了参考网格文件的自动测量
    9. 模板测量支持切换查看不同文件的测量结果
    10. 优化了报告内容的显示方式
    11. 优化了软件启动页、图标、点偏差、特征、GD&T 等显示效果
    12. 优化了针对薄壁件、残缺件、对称件的自动对齐算法
    13. 距离、特征等标签显示了更多的属性
    14. 支持自由切换对齐结果，自动更新数据
    15. 支持涂抹、框选、套索的撤销与重做
    16. 提供报告自定义接口，支持用户使用原始数据进行二次开发
    17. 修复了一些已知 bug
