  Key: ReleaseNotes
  Value: |-
    Highlights
    - Desktop self-update is back to a blocking flow, with more reliable Windows service shutdown before updating.
    - Desktop exit now cleans up gateway, profile MCP, and related child processes more completely.
    - Desktop MCP injection and Coding Agent MCP launch paths are more stable.
    - Petdex pets now support web pets, a standalone desktop pet window, immediate display after adoption, a top-right close control, and a more visible initial desktop size.
    - MCU and global voice handling now include audio prompts, OTA safeguards, segmented streaming TTS, speech cleanup, and abort handling for unfinished TTS generation.
    - Settings and workflow polish includes profile config editing, chat input height settings, login JWT expiry configuration, Skill editing, preserved local archive state in History, clearer new-chat drawer wording, safer built-in Provider danger text, MCU battery voltage reporting, MCP session delegation guidance, and the official X link on the website.
    Included PRs
    - #1878 Add official X link to website
    - #1877 Add MCU battery voltage reporting
    - #1876 Constrain Hermes MCP session delegation
    - #1875 Bump Web UI to 0.6.23
    - #1874 Add pet close control
    - #1873 Stream global agent TTS segments
    - #1871 Fix desktop MCP shutdown
    - #1870 Restore blocking self update
    Desktop artifacts are built by the separate desktop release workflow and will be attached to this release when that workflow completes.
