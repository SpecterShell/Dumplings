  Key: ReleaseNotes
  Value: |-
    GoLand 2026.1 is now available!
    This release helps you keep your Go code modern and your workflow efficient. You will find guided Go 1.26 syntax updates, expanded AI capabilities with support for more agents, improvements for Terraform workflows, and updates that make everyday development smoother and faster.
    The most prominent highlights of this release are:
    - Guided syntax updates for Go 1.26 with editor alerts and quick-fixes
    - Project-wide code modernization with bulk updates and diff preview
    - Terraform Stacks support for managing infrastructure in the IDE
    - Support for multiple AI agents, including Codex and ACP-compatible agents
    - Git worktrees support for working with multiple branches at the same time
    - Native Wayland support for improved Linux experience
    - Smoother editing with updated caret animation and selection behavior
    For a complete rundown of the new features, visit our What's New page.
