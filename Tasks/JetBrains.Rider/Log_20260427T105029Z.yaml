  Key: ReleaseNotes
  Value: |-
    Rider 2026.1.1 is now available.
    Here are some notable fixes included in this update:
    - The Rider MCP get_file_problems tool now returns file problems correctly. [RIDER-136651]
    - Syntax highlighting in source-generated *_g.cs files now works correctly. [RIDER-137702]
    - Suppressed warnings no longer appear in Solution-Wide Analysis results. [RIDER-130314]
    For the complete list of issues resolved, please see our release notes.
