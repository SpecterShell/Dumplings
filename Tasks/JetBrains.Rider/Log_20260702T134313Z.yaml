  Key: ReleaseNotes
  Value: |-
    Rider 2026.1.4 comes with the following updates:
    GitHub Copilot as an integrated agent
    Rider 2026.1.4 adds support for GitHub Copilot as an integrated agent in AI Chat. Copilot is now available directly from the agent picker, with no ACP Registry setup required.
    To use it, open AI Chat, select GitHub Copilot from the agent picker, and follow the OAuth login flow to connect your GitHub account. A separate GitHub Copilot subscription is required. The integration also includes a dedicated model picker and support for Copilot CLI slash commands in AI Chat.
    Learn more from this blog post.
    For the complete list of changes included in this update, please see our release notes.
