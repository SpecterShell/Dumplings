  Key: ReleaseNotes
  Value: |-
    What's New
    - cache: wire two-tier response cache, multi-provider token tracking, and cache analytics
    - channels: add X/Twitter and Mochat channel integrations
    - config: support initial_prompt in transcription config for proper noun recognition
    - heartbeat: add health metrics, adaptive intervals, and task history
    - observability: add Hands dashboard metrics and events
    - providers: add VOLCENGINE_API_KEY env var for VolcEngine/ByteDance gateway
    - providers: close AiHubMix, SiliconFlow, and Codex OAuth provider gaps
    - security: add Merkle hash-chain audit trail
    - sessions: add SQLite backend with FTS5, trait abstraction, and migration
    - tools: add browser delegation tool
    - whatsapp-web: add voice message transcription support
