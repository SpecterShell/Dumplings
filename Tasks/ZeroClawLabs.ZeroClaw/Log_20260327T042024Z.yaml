    What's New
    - agent: add context overflow recovery in interactive daemon loop
    - agent: add context overflow recovery in tool call loop
    - agent: add fast-path tool result trimming in context compressor
    - agent: add preemptive context check before provider calls
    - agent: add shared iteration budget for parent/subagent coordination
    - agent: add tool result truncation to prevent context blowout
    - agent: graceful shutdown when max tool iterations reached
    - channels: add inbound message debouncing for rapid senders
    - ci: add marketplace templates for Coolify, Dokploy, and EasyPanel
    - gateway: add auth rate limiting for brute-force protection
    - gateway: add per-session actor queue for concurrent turn serialization
    - locale: implement locale storage functionality
    - matrix: automatic E2EE recovery, multi-room listening, and masked secrets
    - memory: ensure memory continuity across all execution paths
    - session: add session state machine with idle/running/error tracking
    - slack: resolve Slack permalinks via its API
    - web: persist Agent Chat history across navigation and refresh
