  Value: |-
    What's New
    - add crates.io publish workflow and package config
    - agent: add tool_filter_groups for per-turn MCP tool schema filtering
    - agent: 支持交互会话状态持久化与恢复
    - auto-sync crates.io on version bump
    - channel: add WeCom (WeChat Enterprise) Bot Webhook channel
    - channels: add ack_reactions config to disable channel reactions
    - channels: add show_tool_calls config to suppress tool notifications
    - docker: add Debian-based container variant with shell tools
    - gateway: add cron run history API and dashboard panel
    - gateway: add dynamic node discovery and capability advertisement
    - gateway: enable multi-turn chat for WebSocket connections
    - install: branded one-click installer with secure pairing flow
    - matrix: add read markers and typing notifications
    - provider: support custom API path suffix for custom: endpoints
    - providers: add 17 providers, total now 61 — most in any AI agent
    - providers: support custom HTTP headers for LLM API requests
    - release+providers: fix release race condition, add 3 providers
    - release: bump to v0.2.0 with auto-tweet and contributor notes
    - tool: on-demand MCP tool loading via tool_search
    - tools/mcp: add MCP subsystem tools layer with multi-transport client
    - tools: add Windows support for shell tool_call execution
    - web: electric blue dashboard restyle with animations and logo
    - web: preserve message draft in agent chat across view switches
