  Key: ReleaseNotes
  Value: |-
    Important information for the futur releases
    This is one of the latest automatic live update based on the current mechanism. Since the next official release will be only distributed via a Microsoft MSIX installer, you will soon have to manually uninstall your Screenpresso then install the new one to upgrade your version.
    Improvements
    Improved ScreenpressoCloud uploads performances.
    Improved HDR screens support.
    Bug fixes
    Fixed an issue for Linear sharing.
    Fixed the "Close" tooltip for the close button at the upper-right of all windows that was sometimes not hidden when it should.
