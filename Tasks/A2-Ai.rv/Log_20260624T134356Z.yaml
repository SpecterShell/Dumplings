  Key: ReleaseNotes
  Value: |-
    Welcome to this new release of rv v0.22.0!
    All artifacts are signed with this repos identity using Sigstore.
    You can verify the signatures using the GitHub CLI.
    gh attestation verify --owner A2-ai <my-artifact>
    What's Changed
    - support non-semantic version for debian and ubuntu by @weswc in https://github.com/A2-ai/rv/pull/456
    - Better message for add/remove when syncing fails by @Keats in https://github.com/A2-ai/rv/pull/453
    - Use os_info from crates.io by @Keats in https://github.com/A2-ai/rv/pull/458
    - Add --locked by @Keats in https://github.com/A2-ai/rv/pull/454
    - Handle symlinks when copying folder by @Keats in https://github.com/A2-ai/rv/pull/452
    - Feat: add simpler interface to install from Github repo with rv add owner/repo by @JosephBARBIERDARNAL in https://github.com/A2-ai/rv/pull/414
    - Template library config option by @Keats in https://github.com/A2-ai/rv/pull/460
    - Config/Needs Package parser by @weswc in https://github.com/A2-ai/rv/pull/463
    - Package Description Fetch by @weswc in https://github.com/A2-ai/rv/pull/465
    - Sync by default for rv run + --no-sync flag by @Keats in https://github.com/A2-ai/rv/pull/464
    - transitive suggests test examples by @weswc in https://github.com/A2-ai/rv/pull/466
    - Fixes by @Keats in https://github.com/A2-ai/rv/pull/481
    - Events by @Keats in https://github.com/A2-ai/rv/pull/462
    - No partial success for rv add by @Keats in https://github.com/A2-ai/rv/pull/485
    New Contributors
    - @JosephBARBIERDARNAL made their first contribution in https://github.com/A2-ai/rv/pull/414
