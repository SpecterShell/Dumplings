  Value: |-
    ProxyBridge v4.0.0
    Platform Notice: v4.0.0 is currently available for Windows only. Linux and macOS builds are in pre-development and will be released in a future update.

    ✨ New Features
    🌐 IPv6 Support https://github.com/InterceptSuite/ProxyBridge/issues/78
    Full IPv6 support across logging, routing, and proxy - ProxyBridge now handles IPv6 end-to-end.
    🔀 Multiple Proxy Configurations https://github.com/InterceptSuite/ProxyBridge/issues/44
    Save multiple proxy configurations and assign different proxies to different rules simultaneously. No more swapping configs manually.
    👤 Profiles https://github.com/InterceptSuite/ProxyBridge/issues/98
    Create, switch, import, and export profiles - each profile bundles your full ProxyBridge configuration into a single portable file, making it easy to manage separate setups for different use cases.
    🌍 Domain Name Forwarding https://github.com/InterceptSuite/ProxyBridge/issues/138
    ProxyBridge now sends domain names directly to the proxy server instead of resolving them locally first, enabling proper remote DNS resolution. Closes #138.
    🔍 Log Filters https://github.com/InterceptSuite/ProxyBridge/issues/97 https://github.com/InterceptSuite/ProxyBridge/issues/150
    Filter connection logs by process, IP, port, protocol, and action using include/exclude rules with wildcard support.
    ⚡ Toolbar Quick Actions https://github.com/InterceptSuite/ProxyBridge/issues/102
    Proxy rules and config are now accessible directly from the main toolbar.
    🧹 Auto-Clear Connection Logs
    Optionally auto-trim connection logs when they exceed the configured limit.
    🖥️ CLI Rewritten in C
    The CLI has been rewritten from scratch - migrated from C# to C for improved performance and portability.

    🐛 Bug Fixes
    - Relay sockets loopback fix - Relay sockets were bound to loopback only; now binds to INADDR_ANY so real traffic reaches the relay correctly (TCP + UDP)
    - SOCKS5 UDP ASSOCIATE 0.0.0.0 fix - Now substitutes the proxy's resolved IP, resolving Winsock error 10049
    - Disabled proxy rules not persisting - Disabled rule state is now correctly saved and restored on startup and profile switch https://github.com/InterceptSuite/ProxyBridge/issues/107
    - ++ in process names - Processes like notepad++.exe were rejected by the rule validator; now handled correctly. Closes #157
    - Log filter Save clearing entries - Saving a log filter no longer clears existing log entries; it now re-filters in place
    - UDP - Multiple UDP bugs fixed; real-time UDP communication now fully supported https://github.com/InterceptSuite/ProxyBridge/issues/172 https://github.com/InterceptSuite/ProxyBridge/issues/89
    - UDP Session Termination - UDP sessions are now properly terminated https://github.com/InterceptSuite/ProxyBridge/issues/133
    - ICMP - ICMP handling issues resolved
    - Loopback address - Loopback address routing issues fixed
    - Proxy rule wildcard - Wildcard matching errors in proxy rules fixed https://github.com/InterceptSuite/ProxyBridge/issues/93
    - Rule disabled state - Fixed rules not staying disabled after restart https://github.com/InterceptSuite/ProxyBridge/issues/107
    - Memory leak - Fixed memory leak caused by timed-out sessions not being cleaned up
    - ESC key - ESC now closes popup windows. Closes #152
    - UI/UX - Multiple UI fixes including proxy config and rule shortcuts on the home screen https://github.com/InterceptSuite/ProxyBridge/issues/101
    - Binary optimizations - Reduced binary size and improved startup performance
    - Proxy rule engine - Internal rule matching optimized
    - Minimize - Fixed Windows Minimize isses https://github.com/InterceptSuite/ProxyBridge/issues/142

    🗑️ Removed
    - DNS via Proxy - Removed the DNS via Proxy feature along with all associated UI, settings, and C-layer code. Use Domain Name Forwarding instead for remote DNS resolution.
