  Value: |-
    oc-claw v1.8.5
    Windows
    - Cursor integration: only show the completion popup when the Cursor window is not focused (per-window focus via the extension)
    - Gemini/Codex/VS Code completion popups respect the foreground app
    - Close the auto-expanded session popup when clicking outside the window
    - Fix the expanded panel being truncated / showing a grey gap under >100% display scaling
    - Gemini completion popup no longer attempts to jump to the terminal
    Hermes
    - Remote plugin install + plugin/gateway status over SSH; install to all profiles
    - Multi-agent / recent-activity tracking from the ooclaw status file
    - Stable session titles and reliable removal of remote sessions
    - Explicit confirmation before installing/updating the plugin (restarts the gateway)
    - Auto-enable Hermes by connection
    Stability
    - Char-safe truncation so multibyte (Chinese/Japanese) text in diagnostics/conversation no longer panics
    - Fix SSH backoff integer-overflow panic
    - Better handling of stale/compaction sessions
    i18n
    - Fill missing stats titles and completion strings across all 6 locales
