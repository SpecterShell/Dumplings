  Value: |-
    RubyMine 2026.2 EAP 1 Is Out!
    Fixes and improvements:
    - Fixed an issue where commenting and uncommenting code removed empty lines in .html.erb files: RUBY-35351
    - Fixed incorrect warnings for interpolated symbols used as keys in I18n.t: RUBY-34962
    - Fixed the debugger failing to start in Docker Compose environments: RUBY-35069
    - Fixed the debugger stepping into non-project sources despite the corresponding setting: RUBY-34020
    - Fixed Ruby installation with RVM on macOS: RUBY-35496
    - Fixed the New Project dialog to ensure newly added Ruby intreperets are available: RUBY-35255
    - Implemented ranking for plugin search in settings: IJPL-7519
    - Implemented suggestions for mentions in GitHub pull request comments: IJPL-74258
    For the full list of closed issues, refer to the release notes.
