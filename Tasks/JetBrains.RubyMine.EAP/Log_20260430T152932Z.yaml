  Value: |-
    RubyMine 2026.1.2 Preview Is Out!
    Fixes and improvements:
    - Fixed incorrect behavior of groovyScript() in Live Templates: IJPL-241581
    - Fixed an issue where the IDE could generate excessive thread dumps: IJPL-241850
    - Fixed an issue where drag-and-drop in the editor could cause code to disappear: IJPL-235895
    - Fixed an issue where external diff tools could not be opened when double-clicking files in the Commit tool window: IJPL-241256
    - Restored proper behavior of Alt-based shortcuts: IJPL-238972
    For the full list of closed issues, refer to the release notes.
