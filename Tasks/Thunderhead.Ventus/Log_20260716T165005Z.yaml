  Key: ReleaseNotes
  Value: |-
    This release of Ventus has some powerful new features that all users will appreciate. Download the new version to work faster in 3D with multi-height Zones and Section Boxes.
    Zone Height Property Independence
    For this release, we have made the Zone height properties independent of Level assignment, allowing users to create multi-height Zones on each Level and multi-Level Zones. This change provides greater flexibility in modeling complex building geometries and allows for more accurate representation of real-world scenarios where different parts of a Level may have varying heights.

    Figure 1. An example model with multi-height Zones
    This change matters because it expands the flexibility of using Ventus to model vertical airflow. For example, use a multi-hieght Zone to model an atrium in the updated example:

    Figure 2. Using a multi-level (tall) Zone to model an atrium
    There are also updates to the 3D tools for drawing Flow Paths to accommodate multi-height Zones, ensuring that users can easily create and visualize models with more complex geometries. For example, when Level visibility changes, objects are now shown/hidden as whole objects. Read the 2026.2 Changelog for more details.
    Section Boxes
    We added support for Section Boxes for the 3D Workspace. The feature provides a flexible tool to limit the visibility of geometry to a user-defined region.

    Figure 3. Section Boxes
    CAD Quality Adjustment
    For years, Ventus has supported importing CAD geometry. However, users do not always have access to concise models with relevant geometry. Often, there are many CAD objects that complicate and slow down Ventus.
    Enjoy new options to optimize performance with imported geometry and keep certain CAD details higher-quality.
    - On import, you can specify Object Quality (See the Creating Geometry from CAD page). This reduces the number of triangles used to represent imported geometry.
    - After import, you can perform a similar operation upon any selected imported geometry. The new context-menu action allows users to Simplify Imported Geometry.

      Figure 4. Simplifying Imported Geometry
    HVAC Results Support
    Ventus 2026.2 continues support for modeling complex HVAC duct systems. Duct Junction and Duct Segment results can now be inspected in the Results panel.

    Figure 5. An example model using ducts in Ventus.
    Also, HVAC results over time can be plotted with the 2D Plots tools. Read more in the Ducts section of the Ventus Documentation.

    Figure 6. Plotting HVAC results over time
    Documentation Improvements
    The 2026.2 release includes extensive revisions to product documentation, focused on adjusting existing content to reflect the new multi-height Zone capabilities and the full suite of tools. More details can be found in the 2026.2 Changelog, including a roadmap for new users to learn Ventus 2026.2.
