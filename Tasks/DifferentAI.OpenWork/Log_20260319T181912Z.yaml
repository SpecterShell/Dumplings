  Key: ReleaseNotes
  Value: |-
    Highlights
    - Tailor the hosted web app flow for OpenWork Cloud with a smoother Den onboarding and checkout path.
    - Keep remote connections steadier by persisting worker share tokens across restarts and restoring repeated shared-skill deeplinks.
    Fixes & polish
    - Expose OpenAI headless auth in the provider modal and make Cloud settings more self-serve.
    - Keep open-in-web auto-connect working across sessions, including the worker overlay during connect.
    - Improve desktop behavior with tray-on-close support and shared worker polling refinements.
    Packaging / ops
    - Expose local dev stacks on LAN and Tailscale for easier team testing.
    - Publish refreshed desktop builds plus updated npm packages and openwork-orchestrator sidecars.
