    Fixes & polish
    - Sidebar now correctly nests subagent sessions under their parent tasks.
    - AUR packaging fixes preserve SSH private key newline handling and include updated package metadata.
    - Workflow migration to Blacksmith landed, with corresponding CI/release workflow updates.
    Packaging / ops
    - Version bump to v0.11.160 across app, desktop, orchestrator, server, and opencode-router packages.
