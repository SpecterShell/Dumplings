Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.3 is a Sets, timeline grouping, and memory/performance release.
    - New Sets: group conversations with a dedicated sidebar tab, dialogs, and a right-click "move into set"; sidebar search now hits a full backend index, so it finds older conversations outside the recent list.
    - Chat timeline: thinking + tool calls collapse into Codex-style groups split by prose, with per-tool-type icons, natural-action summaries, and a breathing-dot generating indicator.
    - Memory & performance: Pyodide runs in a Web Worker that unloads when idle, the macOS Lens overlay is destroyed on close, and conversation command outputs strip model/transcript data so the frontend no longer keeps full history resident.
    - Providers: a per-provider gzip request-body compression toggle to slip past WAF gateways.
    - Translation: an adjustable quick-translate result-card width, with both translate cards unified.
    - Fixes: Lens UI narrowing with auto network-search, Dock icon transparent padding, run_python chart-text charset limits, and Kivio Code single-file grep.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.3 是一次面向「集」、时间线折叠与内存/性能的版本。
    - 新增集（Set）：用独立侧栏标签页、弹窗与右键「移入集」对对话分组；侧栏搜索改走后端全量索引，能搜到最近列表之外的老对话。
    - Chat 时间线：思考 + 工具调用按正文分隔折叠为 Codex 风格的可折叠组，带按工具类别区分的图标、自然动作短语摘要与呼吸光点生成指示。
    - 内存与性能：Pyodide 移入 Web Worker 并在空闲时卸载、macOS Lens 浮层关闭即销毁、对话命令出口剥离 model/转录数据，前端不再常驻完整历史。
    - 供应商：新增按供应商的 gzip 压缩请求体开关，绕过个别网关 WAF 误拦。
    - 翻译：快速翻译结果卡宽度可调，两种翻译卡统一。
    - 修复：Lens 界面收窄与网络搜索自动开启、Dock 图标透明边距、run_python 图表文字字符集限制、Kivio Code 单文件 grep。
