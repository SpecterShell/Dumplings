- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.4 adds connector expansion and Chat performance improvements.
    - Connectors: new Obsidian and Email (Himalaya) in Settings — Obsidian injects your vault path for Agent note reading; Email supports multi-account IMAP/SMTP, manual Himalaya install, sync to ~/.config/himalaya/config.toml, bundled himalaya skill, and Agent run_command PATH wiring for the Kivio-managed binary.
    - Chat performance: virtualized long message lists; lazy-rendered collapsed tool timelines; Shadow DOM–isolated KaTeX (no red flash on incomplete streaming formulas); more compact context panel; unified markdown rendering.
    - Agent: refined plan execution flow; context panel aligned with main chat markdown rendering.
    - Release: Apple Silicon DMG built locally; Windows NSIS .exe built by GitHub Actions.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.4 是一次连接器扩展与 Chat 性能优化版本。
    - 连接器：设置页新增 Obsidian 与 Email（Himalaya）——Obsidian 注入笔记库路径供 Agent 读取 .md；Email 支持 IMAP/SMTP 多账户、手动 Install Himalaya、同步 ~/.config/himalaya/config.toml，并内置 himalaya skill；Agent 的 run_command 会自动 prepend Kivio 安装的 Himalaya 路径。
    - Chat 性能：长对话消息列表虚拟化；折叠工具时间线懒渲染；KaTeX 改用 Shadow DOM 隔离，流式不完整公式不再闪红字；上下文面板更紧凑；Markdown 渲染统一。
    - Agent：计划执行流优化；上下文面板与主对话 Markdown 渲染对齐。
    - 发布：macOS Apple Silicon DMG 本地构建；Windows NSIS .exe 由 GitHub Actions 自动构建。
