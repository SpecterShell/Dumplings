    Kivio Desktop v2.8.1
    桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
    下载 / Downloads
    - Windows — Kivio.Desktop_2.8.1_x64-setup.exe（NSIS 安装包 / installer）
    - macOS — Kivio.Desktop_2.8.1_aarch64.dmg（Apple Silicon，未签名 / unsigned）
      - 首次启动：右键 → 打开，或运行 xattr -cr "/Applications/Kivio Desktop.app"
      - First launch: right-click → Open, or run xattr -cr "/Applications/Kivio Desktop.app"
    新版本亮点 / What's New
    - 扩展中心：MCP 与技能市场 / Extension center: MCP & Skill marketplaces — 新增 MCP 注册表市场（Official/Smithery/Glama）和技能商店（ClawHub 目录 + URL 安装），知识库也整合进扩展中心，可直接在应用内浏览、安装、卸载扩展。New MCP registry market (Official/Smithery/Glama) and a Skill store (ClawHub catalog + URL install); the knowledge base is folded into the extension center, so you browse, install, and uninstall extensions in-app.
    - 知识库检索升级 / Upgraded knowledge retrieval — 检索改为可度量的混合管线（向量 + 关键词 RRF 融合、可选重排、相关度阈值），并重做 RAG 设置页。Retrieval moves to a measurable hybrid pipeline (vector + keyword RRF fusion, optional rerank, relevance thresholds), with a redesigned RAG settings page.
    - 聊天界面动效打磨 / Chat UI motion polish — 扩展中心页面重构并统一动效令牌，视图切换、标签切换、右键菜单与弹窗都有入场/退场动画；macOS 交通灯对齐顶栏，拖动窗口时不再跳动。Extension center pages were rebuilt on unified motion tokens with view-switch, tab, context-menu, and modal enter/exit animations; macOS traffic lights align to the title bar and no longer jump while dragging.
    - 外部 Agent 增强 / Stronger external agents — 新增 Grok CLI（xAI Grok Build）；Codex 走真实压缩 RPC 与真实上下文窗口；为 Anthropic 补齐悬空 tool_use 的合成 tool_result。Added Grok CLI (xAI Grok Build); Codex uses real compaction RPC and real context windows; dangling tool_use is paired with a synthetic tool_result for Anthropic.
    - 更快更省内存 / Faster and leaner — 插件页秒开（消除打开时的 shell 探测开销），长时运行的运行时资源会被主动回收。Plugin pages open instantly (the open-time shell probe cost is gone), and long-lived runtime resources are reclaimed.
    - 体验细节 / Quality-of-life fixes — 热键布局更紧凑；可禁用 WebView 原生右键菜单；Lens 提示词移出截图选区；Tavily/Exa/Ollama 支持自定义 API 地址；更新下载不再走 GitHub API。Compact hotkey layout; the native WebView context menu can be disabled; the Lens prompt moved outside the capture selection; editable API base URL for Tavily/Exa/Ollama; update downloads no longer route through the GitHub API.

    完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.8.0...v2.8.1
