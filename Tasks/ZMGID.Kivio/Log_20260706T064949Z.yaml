    Kivio v2.7.6
    桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
    下载 / Downloads
    - Windows — Kivio_2.7.6_x64-setup.exe(NSIS 安装包 / installer)
    - macOS — Kivio_2.7.6_aarch64.dmg(Apple Silicon,未签名 / unsigned)
      - 首次启动：右键 → 打开，或运行 xattr -cr /Applications/Kivio.app
      - First launch: right-click → Open, or run xattr -cr /Applications/Kivio.app
    新版本亮点 / What's New
    - 对话分支 / Conversation branching — 从任意消息分叉出新对话，源对话保持不变，附件自动拷贝。Fork a new conversation from any message; the source stays untouched and attachments are copied.
    - 上下文计量校准 / Accurate context metering — 用量以服务商返回的真实 token 为锚点，设保守下限，绝不少报。Context usage is anchored to real provider‑reported token counts, with a conservative floor.
    - 模型收藏 / Model favorites — 收藏模型置顶到选择器最上方。Star models to pin them at the top of the selector.
    - Windows:fnm / nvm 的 node / fnm & nvm node support — 启动时读取 PowerShell profile 的 PATH,fnm/nvm 安装的 node 与 CLI 无需手动注入环境即可识别。Kivio loads your PowerShell profile PATH at startup, so node and CLIs installed via fnm or nvm are found without manual env injection.
    - Windows:run_command 走 PowerShell / via PowerShell — 命令经 PowerShell(pwsh → powershell)执行，引用正确、UTF‑8 输出。Shell commands run through PowerShell with correct quoting and UTF‑8 output.
    - Obsidian 连接器 / connector — 内置 Obsidian 技能(markdown / bases / canvas / CLI),配置 vault 后才对模型开放。Built‑in Obsidian skills, gated until you configure a vault.
    - 系统提示词精简 / Leaner system prompt — 更精简、工作纪律更清晰，作用于 Chat 与子代理。More concise with clearer work discipline, across chat and sub‑agents.
    - 稳定性 / Reliability — 对话索引自愈(新建对话不再丢历史)、图片预览后输入框附件不丢、流式工具调用 id 修复(商汤)、端点拒绝缓存键时自动重试、GitHub 更新检查回退。Conversation‑index self‑heal (no more lost history), image preview keeps composer attachments, streaming tool‑call id fix (SenseNova), cache‑key auto‑retry, and a GitHub update‑check fallback.

    完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.7.5...v2.7.6
