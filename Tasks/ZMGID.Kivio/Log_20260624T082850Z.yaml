Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.2 is a memory/performance and Connectors release.
    - Lower memory: a system font stack instead of the embedded one, plus webview/overlay memory reclaim on Windows and slimmer chat message storage.
    - New Connectors: an OAuth connector framework with per-tool toggles — GitHub/Composio/custom (token), Notion (PKCE+DCR), and Linear/Sentry/Atlassian.
    - Settings: export/import all settings as a backup, an API-key show/hide toggle, model brand icons, and custom nav icons.
    - Chat: per-type icons on tool calls and native tools enabled by default with auto-approval.
    - Translation: input target-language lock, and screenshot/selection prompts split into independently editable pieces with preserved Markdown.
    - Fixes: Lens cold-rebuild/post-screenshot issues, Windows hotkey/PATH/terminal-popup fixes, macOS local-CLI PATH, the GPL-3.0 license, and dead-code cleanup.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    Kivio v2.7.2 是一次面向内存/性能与连接器的版本。
    - 降低内存：系统字体栈替代内嵌字体，并在 Windows 上回收 webview/浮层内存、精简聊天消息存储。
    - 新增连接器（Connectors）：OAuth 连接器框架 + 逐工具开关 —— GitHub/Composio/自定义（token）、Notion（PKCE+DCR）、Linear/Sentry/Atlassian。
    - 设置：一键导出/导入全部设置做备份、API Key 显示/隐藏切换、模型品牌图标、自定义导航图标。
    - Chat：工具调用按类型显示图标，原生工具默认启用 + approval 默认 auto。
    - 翻译：输入翻译目标语种锁定，截图/选中翻译提示词拆分为可独立编辑并保留 Markdown 结构。
    - 修复：Lens 冷重建/截图后异常、Windows 热键/PATH/终端弹窗、macOS 本地 CLI PATH、采用 GPL-3.0、死代码清理。
