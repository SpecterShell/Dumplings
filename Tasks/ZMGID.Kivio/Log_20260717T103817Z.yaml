  Value: |-
    Kivio Desktop v2.8.0
    桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
    下载 / Downloads
    - Windows — Kivio.Desktop_2.8.0_x64-setup.exe（NSIS 安装包 / installer）
    - macOS — Kivio.Desktop_2.8.0_aarch64.dmg（Apple Silicon，未签名 / unsigned）
      - 首次启动：右键 → 打开，或运行 xattr -cr "/Applications/Kivio Desktop.app"
      - First launch: right-click → Open, or run xattr -cr "/Applications/Kivio Desktop.app"
    新版本亮点 / What's New
    - 更智能的模型参数控制 / Smarter model controls — temperature 改为可选且按模型生效，服务商请求会遵循模型元数据，模型详情页展示更新后的能力与参数信息。Temperature is now optional and model-scoped, provider requests respect model metadata, and the model detail view exposes refreshed capability and parameter information.
    - 长对话滚动更顺滑 / Smoother long conversations — 底部跟随行为更稳定，虚拟列表重新挂载历史消息时不再重复播放入场动画。Bottom-follow behavior is more stable, and virtualized historical messages no longer replay entrance motion when scrolling remounts them.
    - OCR 与图片替换更省内存 / Leaner OCR and image replacement — RapidOCR 和修复模型在每次操作后释放内存，连续使用 Lens/翻译时减少驻留内存。RapidOCR and inpainting model memory is released after each operation, reducing retained memory during repeated Lens and translation workflows.
    - 本地 Agent 更可靠 / More reliable local Agents — Pi 正常结束不再触发收尾阶段 EPIPE；OpenCode 可从全局和项目 opencode.jsonc 中发现自定义渠道模型。Pi can finish without a shutdown-stage EPIPE, and OpenCode custom provider models are discovered from global and project opencode.jsonc configuration.
    - 回归覆盖进一步完善 / Regression coverage expanded — 模型参数、聊天滚动、OCR 生命周期、Pi 收尾和 OpenCode 项目级探测均有自动化测试保护。Model parameters, chat scrolling, OCR lifecycle, Pi shutdown, and project-scoped OpenCode discovery are covered by automated regressions.

    完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.7.9...v2.8.0
