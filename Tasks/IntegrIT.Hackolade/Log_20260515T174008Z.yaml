Version: 8.11.2
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.11.2/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.5.1), NodeJS (v24.15.0), Chromium (v146.0.7680.216), V8 engine (v14.6.202.34), and related modules
    - Tech refresh: updated simple-git and git auth for security alerts (CVEs)
    - Browser deployment: enabled OAuth for github.com repos with PKCE for seamless authentication, featuring automatic renegotiation of OAuth access token after expiration
    - DataHub: added publishing of Snowflake tags
    - DataHub: added support for forward-engineering into an existing DataHub domain
    - dbt: added “additional data tests“ to the dbt file header “Custom content injected” if one or more additional data tests are manually entered at the column level for any column in the file
    - dbt: added “Custom content injected: none“ in dbt file header if no custom content was included
    - PowerDesigner: added reverse-engineering of deeply nested Packages in FIBO (Finance Industry Business Ontology)
    - Workgroup Open From: added support for opening larger Azure DevOps Repos, Bitbucket, and GitLab files
    - Cassandra, DocumentDB, EventBridge, Glue, Neptune-Gremlin, OpenAPI, Redshift, Snowflake: updated  fast-xml-parser, fast-uri, and aws-sdk libraries
    - DeltaLake/Databricks: enhanced parsing of views and materialized views during reverse-engineering
    - ElasticsearchV7plus: upgraded to latest SDK
    - ElasticsearchV7plus: added Routing Partition Size and “required“ setting in Properties Pane, forward- and reverse-engineering
    - ElasticsearchV7plus: added support for slow logs index-level settings, including for default data
    - Snowflake: added publishing of tags to DataHub
    - SQLServer: added encryption algorithm dependency handling in DDL and ALTER script generation
ReleaseTime: 2026-05-15
