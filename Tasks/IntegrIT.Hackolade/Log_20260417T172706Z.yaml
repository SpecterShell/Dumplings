Version: 8.10.3
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.10.3/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Governance Platforms: added forward-engineering to DataHub platform for Snowflake data models
    - Tech refresh: activated new @hackolade/storage APIs with old storage file
    - Plugin Manager: made install button more noticeable to avoid confusion
    - Polyglot: added support for excluding specific modeling objects from being converted to Polyglot via reverse-engineering from Excel
    - PowerDesigner: enhanced reverse-engineering to import diagram-level comments into corresponding ERDV comments
    - PowerDesigner: enhanced reverse-engineering of indexes to handle unique key options
    - PowerDesigner: improved data type mapping by converting "long varchar" to "varchar(max)" for SQL Server compatibility
    - MariaDB, MySQL: improved handling of default values and data type mapping for nullable timestamps
    - Oracle: added support for advanced index compression clauses
    - Oracle: enhanced display of Logging property in Properties Pane
ReleaseTime: 2026-04-17
