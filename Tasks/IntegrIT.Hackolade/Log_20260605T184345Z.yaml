Version: 8.11.5
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.11.5/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v42.3.3), NodeJS (v24.15.0), Chromium (v148.0.7778.218), V8 engine (v14.8.178.28), and related modules
    - External references: enabled inheritance of standard and custom properties
    - Glossary: added support for assigned glossaries and bound terms in compare and merge models
    - Rectangle: added position independence between ERD, Graph View, and ERDVs
    - PowerDesigner: added support for reverse-engineering of external shortcuts from Logical Data Model files
    - XSD: enhanced reverse-engineering of cardinalities
    - Collibra: added support for client credentials (M2M OAuth) authentication for connections (CLI only)
    - DataHub: added created and lastModified timestamps to all assets
    - DataHub: added support for forward-engineering of Foreign Key relationships
    - ElasticSearchV7plus: added a comment in the alter script of delta models to indicate when index recreation is required for index changes
    - Redshift: added support for Spectrum external tables linked to AWS Glue catalog, including forward- and reverse-engineering
    - Snowflake: updated axios library
ReleaseTime: 2026-06-05
