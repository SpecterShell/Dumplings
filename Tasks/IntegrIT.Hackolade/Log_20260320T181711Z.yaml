  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v40.8.3), NodeJS (v24.14.0), Chromium (v144.0.7559.236), V8 engine (v14.4.258.32), and related modules
    - DDL: enhanced support for reverse-engineering of arrays
    - Excel export: added shared model link URL to easily open models in Browser
    - PowerDesigner: updated reverse-engineering of Oracle timezone and character length semantics
    - Cassandra, DocumentDB, EventBridge, Glue, Neptune, Redshift, Snowflake: updated dependent modules
    - DeltaLake/Databricks: improved robustness in JSON parsing during reverse-engineering
    - Teradata: added support for reverse-engineering of constraints in separate statements
