Version: 8.10.0
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.10.0/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh: replaced electron-store to leverage safeStorage API with Credential Manager (Windows), KeyChain (Mac), and Gnome Keyring or KWallet (Linux)
    - PowerDesigner: added support for reverse-engineering Oracle check constraints
    - Plugin Manager: streamlined plugin update process to reduce risks of anti-virus interference
    - Cassandra: allowed addition or removal of keys as deviations on partition key of a derived entity
    - DeltaLake/Databricks: created hardened fallback for reverse-engineering discovery of large tables
    - SQLServer: added support for procedures in properties, forward- and reverse-engineering from DDL and instance
ReleaseTime: 2026-03-27
