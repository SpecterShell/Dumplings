Version: 8.12.2
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.12.2/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v42.5.2), NodeJS (v24.17.0), Chromium (v148.0.7778.271), V8 engine (v14.8.178.33), and related modules
    - Grid View: added ability to download the grid content as an Excel report
    - Grid View: added per-column filters to narrow down grid content by specific column values
    - Grid View: added a hierarchical view for the model-level grid, representing the nested structure of the data model or Diagram View
    - Grid View: added possibility to expand all / collapse all when hierarchical view
    - Grid View: added the model grid at ERDV Diagram View level
    - Licensing: enabled sync of obfuscated license key in browser from desktop
    - DDL reverse-engineering: enhanced parser grammar to support advanced constraint clauses
    - ERD: fixed issue where relationship lines became disconnected from entity boxes after undoing changes and playing with display options
    - Workgroup: added full path location of locally-cloned repo to log file
    - Lineage Capture: added clear lineage button in Tools > Options > General to remove all lineage data from the current model
    - Avro: added feature flag to ensure appropriate resolution of references during forward-engineering with no impact on other targets
    - DeltaLake/Databricks: enhanced reverse-engineering to include comments and content of struct
    - Snowflake: enhanced added handling of constraints and comments declared as separate ALTER statements in reverse-engineering
    - SQLServer/Azure SQL: added handling of views when underlying tables are missing during reverse-engineering
    - SQLServer/Azure SQL: added support for reverse-engineering of system-versioned temporal tables without period columns specified
ReleaseTime: 2026-07-03
