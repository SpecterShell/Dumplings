Version: 8.10.4
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.10.4/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.2.2), NodeJS (v24.14.1), Chromium (v146.0.7680.188), V8 engine (v14.6.202.33), and related modules
    - dbt: added support for dbt-specific model-level properties and column-level properties
    - dbt: added possibility to define custom properties to be included in dbt meta -- see more details in doc page https://hackolade.com/help/dbtschemamodels.html
    - dbt: added automatic schema and database properties depending on the target
    - Definitions: improved error handling for undefined properties in the Internal Definitions Tree Diagram
    - External references: limited data type changes of an attribute in case of multiple references to a definition
    - JSON Schema: removed unnecessary subschema wrapper for choices
    - Polyglot: added support for excluding specific modeling objects from being converted to Polyglot in Compare & Merge
    - Collibra: enabled listing of connections from the Welcome Page
    - Avro: added display of ENUM values in the JSON sample of the JSON/YAML Preview tab
    - BigQuery, DeltaLake/Databricks, Glue, Hive, MySQL, Oracle, PostgreSQL, Redshift, SQL Server/AzureSQL,Snowflake, Synapse, Teradata: enabled dbt model- and column-level properties, custom properties, and automatic schema-level properties
    - DeltaLake/Databricks: added support for reverse-engineering columns named year, month, or day
    - MySQL: added support for ON DELETE and ON UPDATE properties of foreign key constraints
    - MySQL: added support for combined DEFAULT and ON UPDATE for timestamp fields
    - MySQL: enhanced reverse-engineering to automatically include collation in column definitions when missing
    - Teradata: updated default value for order keys property to ensure models can be compared
ReleaseTime: 2026-04-24
