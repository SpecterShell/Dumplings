Version: 8.12.4
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.12.4/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Composite primary and unique keys: adjusted deletion when tables are external references on tables in another model
    - ERD: added multi-selection of internal and model definitions that belong to a derived entity
    - ERD: fixed creation of multiple external references when the referencing model has lineage capture enabled
    - ERD: fixed buttons visibility for modal dialogs on Windows displays with high scale
    - Excel export options: updated structure of custom tabs' properties
    - Grid View: added possibility to save and apply named grid view configurations
    - Grid View: added ability to copy one cell and paste it into multiple grid cells
    - Logging: enhanced behavior when encountering broken project settings file, plus provided fallback to default settings
    - Object Browser: added logic to respect enableForReference flag
    - PowerDesigner: added mapping of Generated property to our Activated property
    - Db2, Oracle, PostgreSQL: added support for Unicode language-specific letters in identifiers
    - Snowflake: enhanced grammar parsing of DDLs with COLUMN keyword in ADD COLUMN statements
    - Snowflake: enhanced grammar parsing of DDLs with doubled single quotes ('') in comments and column descriptions
    - Snowflake: enhanced grammar parsing of DDLs with semicolons inside string literals so they are not interpreted as statement terminators
    - SQLServer/Azure SQL: allowed changing subtype property in reference by adding enableForReference flag in config
ReleaseTime: 2026-07-17
