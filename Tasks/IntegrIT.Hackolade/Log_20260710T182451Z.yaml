Version: 8.12.3
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.12.3/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Command-Line Interface: fixed empty ERD image in Windows when rendering stopped
    - Composite primary and unique keys: arranged display, modification, and forward-engineering when tables are external references on tables in another model
    - ERD: allowed multi-select of external ref attributes added in a derived entity
    - Grid View: added relationship objects
    - Grid View: added ability to edit checkboxes
    - Grid View: added <empty> option to column filter
    - Grid Vies: added color previews to column color filter
    - Grid View: added highlighting of search matches
    - Grid View: added properties pane tab names (if other than Details)  to column titles in Excel report
    - Forward-engineering: filtered check constraints if expression is empty
    - PowerDesigner; added warning and log message when imported model contains check constraints with no expression
    - Properties Pane: added validation badge when check constraints have an empty expression
    - Relationships: created adapter to clear relationships for cases when user had replaced a table with a reference
    - CockroachDB, Db2, DeltaLake/Databricks, Hive, MariaDB, MySQL, Oracle, PostgreSQL, SQLServer/Azure SQL, Teradata, YugabyteDB: added validation badge in PP, ERD and OB when check constraints have an empty expression, plus filtered check constraints if expression is empty
ReleaseTime: 2026-07-10
