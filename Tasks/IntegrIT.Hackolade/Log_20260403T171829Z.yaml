  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.1.0), NodeJS (v24.14.0), Chromium (v146.0.7680.166), V8 engine (v14.6.202.26), and related modules
    - Tech refresh: updated to React v18
    - Excel: added support for editing column view descriptions
    - PowerDesigner: added support for reverse-engineering SQL Server procedures from PDM files
    - PowerDesigner: added support for reverse-engineering of Oracle function-based indexes from PDM files
    - Oracle: added support for function-based index in properties, forward- and reverse-engineering from DDL and instance
    - Synapse: added support for procedures in properties, forward- and reverse-engineering from DDL and instance
