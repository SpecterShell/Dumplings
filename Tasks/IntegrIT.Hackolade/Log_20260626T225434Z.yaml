Version: 8.12.1
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.12.1/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Licensing: added ability for admin to hide in browser deployment last segment of a license key in the License Status screen and log files -- for license sync between desktop and browser, one more delivery is needed
    - Grid View: added search in column picker, column filter, and group by
    - Grid View: added support for inline editing of color property
    - Grid View: enabled insertion of line breaks in textarea cells during inline editing using Alt+Enter (Windows) or Option or Shift+Enter (macOS)
    - Grid View: adapted layout to offer a user experience closer to Excel
    - ERD: ensured appropriate coordinates of containers when adding Views to ER Diagram Views
    - ERD: fixed issue where relationship lines became disconnected from entity boxes after undoing changes and playing with display options
    - Lineage capture: removed the modal prompting users to enable during reverse-engineering DDL
    - DeltaLake/Databricks: disabled Properties Pane ability to pick OR REPLACE and IF NOT EXISTS if user checked Temporary property for both Tables and Views
    - MySQL: enhanced reverse-engineering to retain all columns in composite UNIQUE keys, even when overlapping with single-column UNIQUE constraints
    - Oracle: added support for local and global indexes
    - Oracle: added support for indexes, inclusive of cross-schema indexes, on Materialized Views
    - Oracle: removed misleading warning icon next to folder selection of Oracle client folder
ReleaseTime: 2026-06-26
