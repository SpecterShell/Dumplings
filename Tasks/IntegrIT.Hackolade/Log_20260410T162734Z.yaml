Version: 8.10.2
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.10.2/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.2.0), NodeJS (v24.14.0), Chromium (v146.0.7680.179), V8 engine (v14.6.202.31), and related modules
    - Tech refresh: replaced outdated react-bootstrap-table library with @tanstack/react-table for improved performance and compatibility with React 18+
    - Tech refresh: upgraded react-select to replace deprecated findDOMNode usage for improved performance
    - Polyglot: added support for excluding specific modeling objects from being converted to Polyglot (a.k.a. "physical only")
    - Contextual menu: replaced deprecated react-native-listener to ensure compatibility with REACT 18+
    - Compare & Merge: added support for merging objects with distinct IDs and technical names on one side only.
    - ERD: improved robustness when editing relationships in ERD Views
    - Verify Data Model: added support for verifying external references
    - Views: ensured accurate $ref when creating column view manually on ERD
    - CosmosDB-with-Gremlin-API, CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, Snowflake: updated axios library
    - DeltaLake/Databricks: added support for comments on view columns
    - SQLServer: added support for comments on view columns
ReleaseTime: 2026-04-10
