Version: 8.11.4
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.11.4/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.7.1), NodeJS (v24.15.0), Chromium (v146.0.7680.216), V8 engine (v14.6.202.34), and related modules
    - DataHub: added support for publishing Hackolade custom properties as structured properties in DataHub
    - DataHub: added fallback to container name for database asset creation when database property is empty
    - ERD: improved reordering of non-FK attributes within the entity box when referencing external definitions
    - Glossary: improved reverse-engineering of Excel with bound glossary terms in new and unsaved models
    - Glossary: added bound terms to documentation
    - PowerDesigner: improved performance of reverse-engineering of large models with numerous diagrams
    - PowerDesigner: enhanced resilience for missing tags in Logical Data Models
    - CosmosDB-with-Gremlin-API, CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, MarkLogic, SQLServer: updated qs and tmp libraries
    - ElasticSearch: added support, in alter script of delta model, for updating supported mapping parameters, for adding indexes, for updating existing index settings, for adding fields in existing indexes, for adding properties to existing field
    - ElasticSearch: added support for applying alter script of delta model to instance
    - Oracle: added support for connecting to Autonomous Oracle Database 26ai without wallet when mutual TLS is disabled
    - Snowflake when publishing to DataHub: added fallback to container name for database asset creation when database property is empty
ReleaseTime: 2026-05-29
