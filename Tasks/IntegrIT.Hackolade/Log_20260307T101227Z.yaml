Version: 8.9.6
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.9.6/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - ERD, ERDVs: enabled highlighting of relationships when selecting foreign keys in the entity box
    - Graph Diagram: improved robustness to handle missing visual properties
    - PowerDesigner: enabled reverse-engineering of relationship colors and shortcuts for each package/ERDV
    - PowerDesigner: enabled reverse-engineering of architecture areas and inner symbols into containers with annotations
    - PowerDesigner: added model annotations in Object Browser
    - PowerDesigner: added mapping for decimal PostgreSQL data type during reverse-engineering
    - Oracle: added handling of lower version when annotations are not supported
    - PostgreSQL: enabled configurable SQL script hooks for injecting snippets in ALTER statements of delta model
    - Teradata: allowed forward-engineering of separate DDL script files per table
    - Teradata: upgraded JDBC Driver to the latest 20.x version
ReleaseTime: 2026-03-06
