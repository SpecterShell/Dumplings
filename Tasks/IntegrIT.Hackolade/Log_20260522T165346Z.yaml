Version: 8.11.3
Installer:
- Architecture: x64
  InstallerUrl: https://s3-eu-west-1.amazonaws.com/hackolade/previous/v8.11.3/Hackolade-win64-setup-signed.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Tech refresh of ElectronJS (v41.7.0), NodeJS (v24.15.0), Chromium (v146.0.7680.216), V8 engine (v14.6.202.34), and related modules
    - Tech refresh: migrated storage from Storage.json to hck.dat
    - ERDV: ensured appropriate coordinates for restored relationships
    - Object Browser: added safeguard for a potential exception in rendering
    - Polyglot: prioritized reference descriptions, if present, over definition descriptions in derived models
    - Properties Pane validation: avoided false alert badges for enums and samples
    - Workgroup: avoided infinite spinner when pulling remote changes while having unsaved changed on a model opened from remote
    - BigQuery, CosmosDB-with-Gremlin-API, CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, JanusGraph, Neptune-Gremlin,Tinkerpop: updated brace-expansion and ws libraries
    - DeltaLake/Databricks: added support for reverse-engineering of columns with reserved names hour, minute, and second
    - Snowflake: added support for Hybrid tables
    - SQLServer: added support for reverse-engineering the ENCRYPTED WITH clause on table columns
ReleaseTime: 2026-05-22
