  Key: ReleaseNotes
  Value: |-
    DataGrip 2026.1.3 is Out!
    Arrays in the Value editor
    The data editor now offers a better way to view and edit values stored in ARRAY columns. Now, the Value editor displays them in a grid where you can edit array elements separately. To do this, open the array in the Value editor by double-clicking the cell that contains it.

    In this separate grid, you can edit elements, add and delete them, and revert your changes. Each change is highlighted the same way as in the main grid. If you don't need to see deleted values, click the Value editor's settings button in the top right corner and select Hide Deleted Elements.

    The Value editor stores the changes you make to the array until you revert them, revert all the main grid changes, or close the main grid. To submit the changes to your database, click Submit on the main grid's toolbar. The changes will be submitted along with any changes you made to the main grid.
    To disable this feature and instead view and edit arrays as text in the Value editor, go to the Settings dialog, navigate to Database | Data Editor and Viewer, and select Edit array values as text.

    This feature does not support multidimensional arrays.
