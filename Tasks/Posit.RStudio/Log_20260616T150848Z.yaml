  Key: ReleaseNotes
  Value: |-
    New
    Fixed
    - (#17737): Restore the “Show .Last.value in environment listing” preference, which had stopped surfacing .Last.value in the Environment pane.
    - (#17777): Fix “Import Dataset” from the Environment pane failing with “could not find function ‘.rs.digest’” when previewing a CSV (or other readr/readxl/haven source).
    - (#17807): Fix 60 second startup delay on Posit Package Manager vulnerability check.
    - (#17278): Fix a data.table returned invisibly from a := update (e.g. dt[, x := y]) being auto-printed in notebook chunks, when its output should be suppressed as it is in the console.
    - (#17822): Fix Posit Package Manager vulnerability badges no longer appearing in the Packages pane for sessions that point options(repos) at a PPM instance without Workbench PPM integration configured.
