  Key: ReleaseNotes
  Value: |-
    Fixed
    RStudio
    - (#18230): Fixed an error printed to the console after evaluating an expression containing a [ subset with an empty argument (e.g. mtcars[, 1:3]).
    - (#18221): Fixed an issue on Windows where scrolling the Data Viewer with the mouse wheel could get stuck when the pointer was over the table body.
    - (#18215): Fixed an issue where the Data Viewer could lose its scroll position, or render an empty grid, after switching to another tab and back.
    Posit Workbench
    - (rstudio-pro#11381): Fixed an authorization error when removing a project on the homepage when using a Basic-tier license.
    - (rstudio-pro#11333): Fixed an issue when using database session metadata (session-use-file-storage=0) where use of VS Code/Positron would cause invalid RStudio sessions to be migrated into the homepage the first login after a restart.
    Dependencies
    - Ace 1.43.5
    - Copilot Language Server 1.509.1
    - Electron 41.9.0
    - Node.js 22.22.2 (copilot, Posit Assistant)
    - Quarto 1.9.38
    - xterm.js 6.0.0
