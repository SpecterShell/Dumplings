    - 移除「猫咪设置 > 模型设置 > 单键模式」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/909 (20479)
    - 新增「通用设置 > 应用设置 > 显示托盘图标」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/910 (cdfd0)
