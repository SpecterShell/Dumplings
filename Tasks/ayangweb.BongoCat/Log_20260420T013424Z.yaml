    - 支持「猫咪设置 > 窗口设置 > 鼠标移入隐藏」延迟设置 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/935 (fe41f)
    - 新增「猫咪设置 > 模型设置 > 忽略鼠标事件」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/936 (d94ca)
    🐞 Bug Fixes
    - 隐藏 ubuntu 任务栏图标，避免安装后显示齿轮图标 - by @QingFengpoor in https://github.com/ayangweb/BongoCat/issues/836 (ae34b)
    - 修复模型动作播放不完整的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/892 (8592b)
    - 修复部分场景下窗口超出显示器边界的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/903 (f0c12)
    - 修复切换模型时按键图片显示异常的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/916 (db1e8)
    - 修复高鼠标回报率导致模型抖动的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/926 (1e241)
    - 修复 Windows 平台窗口被任务栏遮挡的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/930 (6b46e)
