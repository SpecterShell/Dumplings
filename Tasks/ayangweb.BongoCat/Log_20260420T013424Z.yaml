  Value: |-
    🚀 Features
    - 新增「猫咪设置 > 模型设置 > 动作音效」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/893 (dacbe)
    - 移除「猫咪设置 > 窗口设置 > 窗口位置」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/902 (844b1)
    - 新增「猫咪设置 > 窗口设置 > 保持在屏幕内」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/904 (48e00)
