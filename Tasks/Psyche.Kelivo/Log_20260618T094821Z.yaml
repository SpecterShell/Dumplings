  Key: ReleaseNotes
  Value: |-
    What's Changed
    - feat: Add support for Claude Opus 4.8, Fable 5, Kimi K2.7, GLM 5.2, and Agnes image models.
    - feat: Add "Maximum Reasoning" budget level for Claude 4.7+ and Fable models.
    - feat: Add "Enable Thinking" toggle for title generation.
    - feat: Add reasoning/thought extraction support for Google Gemini models.
    - feat: Add provider avatar icon selection with Metaso icon support.
    - feat: Add customizable chat input background opacity.
    - feat: Add option to batch delete models that failed detection.
    - feat: Add mobile message navigation buttons with three display modes.
    - feat: Add User-Agent header support for WebDAV and S3 backup settings.
    - feat: Add calculator local tool for MCP.
    - feat: Add cross-platform stdio command resolution and Windows batch support for MCP.
    - feat: Add initial model selection support in model selector.
    - fix: Fix markdown parser misinterpreting HTML tags inside fenced code blocks.
    - fix: Fix TeX rendering escaping # in hex color arguments.
    - fix: Fix desktop text selection lost on scroll.
    - fix: Fix loaded chat window not containing visible messages.
    - fix: Fix UI display issue when no session is present.
    - fix: Improve reasoning content handling and drag-to-dismiss gesture physics.
    - fix: Fix several other known bugs.
    Full Changelog: https://github.com/Chevey339/kelivo/compare/v1.1.16...v1.1.17
