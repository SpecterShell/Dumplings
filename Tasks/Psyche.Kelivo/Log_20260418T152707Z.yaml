  Key: ReleaseNotes
  Value: |-
    What's Changed
    - feat: Add manual approval mode for MCP tool execution, along with updated approval settings UI.
    - feat: Add timeline-based rendering for reasoning and tool calls, with support for <thought> tags and dynamic reasoning budget icons.
    - feat: Add delete-all-versions action for multi-version messages.
    - feat: Add detailed token statistics popup with enhanced tracking, adaptive positioning, and animations.
    - feat: Add separate display toggles for user/model names and timestamps.
    - feat: Add MiMo TTS service support.
    - feat: Add X-Conversation-Id header support for API requests.
    - fix: Fix stuck streaming and reasoning states, with improved crash recovery and pending-send handling.
    - fix: Fix Claude thinking requests by correctly handling missing budget_tokens in translation and OCR flows.
    - fix: Preserve trailing messages when regenerating from earlier messages.
    - fix: Fix desktop window restore position after display changes.
    - fix: Fix several other known bugs and UI issues.
    Full Changelog: https://github.com/Chevey339/kelivo/compare/v1.1.10...v1.1.11
