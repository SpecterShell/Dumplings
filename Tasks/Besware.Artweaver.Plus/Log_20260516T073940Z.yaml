  Key: ReleaseNotes
  Value: |-
    This version includes the following improvements and fixes
    - Improved update installation
    - Fixed occasional horizontal line artifacts
    - Fixed incorrect colors in 8bf filter results
    - Fixed scale to fit media enabled by default in print preview
    - Fixed layer merge errors with certain blend modes
    - Fixed navigator preview not updating after applying the crop tool
    - Fixed an opacity issue when moving selected image data
    - Fixed document not being marked as modified after applying a tool
    - Fixed navigator preview issues with transparency and low zoom levels
    - Fixed a crash when opening documents containing EXIF data
