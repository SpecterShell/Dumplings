- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    This new release of rustup comes with significant changes.
    The headline feature is better concurrency for certain operations, implemented by @FranciscoTGouveia with the help from the team as a part of the GSoC 2025 event:
    - Improved the UX for the rustup update and rustup toolchain subcommands by downloading components concurrently and unpacking during downloads, which should speed up the toolchain installation process. Meanwhile, progress bars have been updated accordingly to and provide better feedback about where time is being spent. pr#4426 pr#4436 pr#4471 pr#4605
      - You can use the RUSTUP_CONCURRENT_DOWNLOADS environment variable to adjust the number of concurrent downloads to better reflect the needs of your specific environment (the current default is 2). Particularly, you may set the value to 1 to restore the sequential downloading behavior. pr#4455
    - Improved the UX for the rustup check subcommand by checking for toolchain updates concurrently and updating the progress reporting UI. pr#4388
    rustup now officially supports the following host platforms:
    - sparcv9-sun-solaris pr#4380
    - x86_64-pc-solaris pr#4380
    In addition, basic support for more shells has been added, including:
    - tcsh pr#4459
    - xonsh pr#4626
    This release also comes with other quality-of-life improvements, to name a few:
    - When running rust-analyzer via a proxy, rustup will consider the rust-analyzer binary from PATH when the rustup-managed one is not found. pr#4324
    - Empty environment variables are now treated as unset. This should help with resetting configuration values to default when an override is present. pr#4422
    - rustup check will use different exit codes based on whether new updates have been found: it will exit with 100 on any updates or 0 for no updates. pr#4694
    Furthermore, @FranciscoTGouveia has joined the team. He has shown his talent, enthusiasm and commitment to the project since the first interactions with rustup, so we are thrilled to have him on board and are actively looking forward to what we can achieve together.
