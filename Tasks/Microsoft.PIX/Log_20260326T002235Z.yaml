- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Today we released PIX 2603.25 which can be downloaded here. These releases include everything in the previous 2602.25 release, plus the following bug fixes:
    - Fix capture layer issue corrupting tiled resources in some scenarios
    - Fix debug layer error during capture in query heaps
    - Fix race condition in UpdateTileMappings() that could cause random crashes
    - Fix Programmable Sample Position capture on AMD hardware
    - Export-to-C++: fix compilation issue with newer D3D features
    - Attach to Process: fix potential crash when connecting to remote machines
    - System Monitor: show counter description (instead of name) in the tooltip
    - Shader Debugger: Fix copy (ctrl+c) of all data columns in shader debug watch view
    - Misc: respect global Windows settings for popup menu animation behaviors
    Thank you to everyone who reported issues and suggestions to us. Please keep them coming! The best ways to contact us are via the DirectX Discord and via the Send Feedback buttons in PIX.
