  Key: ReleaseNotes
  Value: |-
    PyCharm 2025.3.4 focuses on critical stability for legacy projects, interface clarity for Jupyter workflows, and reliability in update settings.
    Core Stability and IDE Reliability
    - Project Indexing: PyCharm now handles project indexing reliably even for older Python versions like 2.7, ensuring a stable experience without recursion-related crashes - PY-87549.
    - Update Preferences: Users can now correctly manage their update settings as the "Show Early Releases" option properly respects user choices in the interpreter settings - PY-86346.
    Jupyter and Interface Refinements
    - Toolbar Visibility: The Jupyter Editor Toolbar now displays correctly without blending into the Main Toolbar, ensuring buttons and icons are distinct and easy to use - PY-87430.
    - Notebook Editing: Drag-and-drop operations within Jupyter notebooks now render correctly, preventing cells from appearing duplicated at the bottom of the file - PY-86709.

    Full release notes.
