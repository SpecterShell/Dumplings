  Value: |-
    Code insight and type checking
    - Evaluate fields marked with @property inside generic objects accurately, as an issue causing the type inference engine to incorrectly expect a raw property type has been resolved - PY-76219.
    Refactoring tools
    - Rename Python modules via the Shift+F6 refactoring action and expect all corresponding project references and imports to update properly across your workspace directories - PY-53274.

