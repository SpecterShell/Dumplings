  Key: ReleaseNotes
  Value: |-
    The new EAP build for CLion 2026.1 brings several improvements to complement the features introduced earlier. Here are the most important ones:
    - We’ve added support for TCP connections with DAP debuggers. You can also choose between two modes: Launch and Attach, depending on which one your DAP debugger requires. Learn how to configure DAP debuggers in the documentation.
    - When examining the suspended program, you can now change the number format for individual numeric variables, switching between decimal, hexadecimal, octal, or binary.
    - You can now specify command-line options for CMake profiles faster, thanks to code completion in the CMake options and Build options fields.
    - CMake preset names that you see in the IDE’s UI are now based on the displayName value specified in CMakePresets.json – instead of the name value as before. This allows you to use more human-friendly, descriptive names for your CMake presets.
    Try this build, share your feedback, and report any issues to our issue tracker.
