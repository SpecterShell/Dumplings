  Key: ReleaseNotes
  Value: |-
    Third time lucky?!
    This build fixes a critical signal issue in 1.13.0.1, and additionally adds some improvements to the BVE5 parsing library.
    Significant Changes:
    - Fix: BVE4 X format signals not working.
    - Fix: Handle the case where a proxied Win32 ATS plugin crashes on jump.
    - Fix: Issue when GL1.2 renderer not available.
    - Fix: Handle BVE5 routes with a null comment.
    - Change: Implement the BVE5 black clear color- Helps with some routes which use this to hide things.
    - Change: Improvements to Bve5_Parsing library.
    - Change: Bump SharpCompress version
