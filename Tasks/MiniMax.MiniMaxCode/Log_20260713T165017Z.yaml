  Key: ReleaseNotes
  Value: |-
    ​

    MiniMax Code 2.0 正式上线
    我们对 MiniMax Code 底层进行了全面重构。无论是日常对活、办公协 作，还是长程复杂任务，都将有更流畅、更稳定的体验。
    ​

    体验优化
    - 缩短新建会话到首次输出的等待时间，首 Token 的 P95/P99 尾延迟降低 90% 以上。
    - 减少对话过程中的异常中断和静默卡死；发生错误时提供更明确的状态反馈。
    - 优化会话状态和工具调用信息的保存与传递，降低会话意外丢失或执行上下文中断的情况。
    - 精简运行时依赖，改善低内存设备上的运行体验。
    - 优化 Windows 安装流程，缩短安装等待时间。
