  Key: ReleaseNotes
  Value: |-
    - Fixed a vulnerability that occurs when creating hard-linked files (KVE-2026-0606, Thanks to CubicPopCorn)
    - Fixed a vulnerability that occurs when handling file names in the TAR format (Thanks to storm).
    - Fixed a vulnerability related to MoTW
    - Improved detection accuracy of the codepage auto-detection
    - Fixed a bug with the Password Recovery
    - Fixed a bug related to the right-click menu
    - Corrected an error message related to hard link creation
    - Modified the d command in the CLI to operate not recursively
    - Fixed a bug that antimalware scanning by AMSI does not work correctly for some archive formats
    - Fixed a bug related to handling of NFD filenames in some ZIP archives
    - Fixed a bug related to drag-n-drop handling
    - Improved BandiView association for archived image files
    - Fixed a bug that some file paths are processed incorrectly when archiving files
    - Other modifications
