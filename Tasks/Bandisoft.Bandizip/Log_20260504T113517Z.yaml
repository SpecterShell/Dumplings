  Key: ReleaseNotes
  Value: |-
    - Fixed a security vulnerability that could occur during the parallel decompression of ZIP format files (KVE-2026-0742, Thanks to p4p3r)
    - Fixed a security vulnerability where MoTW (Mark-of-the-Web) information could be removed due to issues with filename normalization (KVE-2026-0743, Thanks to p4p3r)
    - Fixed a memory leak bug that could occur in the PEA format
    - Fixed a security vulnerability that could occur when processing the RAR5 format
    - Fixed a security vulnerability that could occur when processing the EGG format
    - Fixed a security vulnerability that could occur when processing extended fields in the ZIP format
    - Fixed a security vulnerability that could occur when processing the CAB format
    - Other modifications
