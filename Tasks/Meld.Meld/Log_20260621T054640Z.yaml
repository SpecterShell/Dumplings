  Key: ReleaseNotes
  Value: |-
    Features:
    - Add support for building Meld as a Python wheel (Noam Raphael)
    - Add screenshot-and-exit behaviour for CI testing (Noam Raphael)
    Fixes:
    - Avoid leaking file descriptors during matcher shutdown (#962) (Thomas Klausner)
    - Fix opening version control conflict with a single file argument (#486) (Kai Willadsen)
    - Fix crash when right-clicking on notebook (#949) (Kai Willadsen)
    - Don't discard all sides when one side changed on disk (#823) (ks132)
    - Fix diff updating in auto-merge comparisons (#957) (pknowles)
    - Allow intl-8 in addition to libintl-8 on windows, to support conda (Noam Raphael)
    - Fix opening comparison from folder compare with missing left file (#944) (Kai Willadsen)
    - Metadata fixes (Sabri Ünal)
