  Key: ReleaseNotes
  Value: |-
    - feat: 大幅优化 Agent 运行时与编辑器工作流，新增工具注册中心、权限审批、执行时间线、上下文托盘、本轮改动展示，并保存结构化运行历史。
    - feat: 重构 Agent 流式工具调用流程，支持模型思考、工具调用、失败重试、停止任务、执行耗时和错误详情追踪。
    - feat: 优化 Agent 权限判断，区分只读请求和写入请求；写入、删除、脚本执行、外部工具等高风险操作会触发确认。
    - feat: 新增 Agent 内联审批面板，支持“允许一次”和“本会话允许”，减少同一会话内的重复确认。
    - feat: 优化 Agent 编辑器写入流程，支持按选区范围、行号和事务批量修改，降低误改选区外内容的风险。
    - feat: 优化 Agent RAG 与 Skill 展示，显示已检索文件、已加载技能，并支持快速打开引用文件。
    - feat: 优化 Skill 脚本执行与产物收集，生成文件部分成功但后续步骤失败时，也会保留并展示已生成产物。
    - feat: 支持 Markdown 编辑器图片缩放，可设置和重置图片宽高。
    - feat: 支持自定义编辑器快捷键，覆盖基础编辑、格式化、AI、表格和插入命令，并支持冲突提示。
    - feat: 优化 Markdown 导出体验，支持 Markdown、HTML、JSON、PDF 导出。
    - feat: 增强大纲面板编辑体验，支持标题搜索、折叠、编辑和宽度调整。
    - feat: 优化文件管理器拖拽交互，支持文件/文件夹移动并校验无效目标。
    - feat: 改进聊天图片附件反馈，优化选择、粘贴、拖入图片时的状态提示。
    - feat: 增强 Agent 事件消息显示，优化事件详情展示。
    - fix(#1098): 修复顶层新建文件夹路径错误。
    - fix: 修复移动端选中文本未关联对话上下文。
    - fix: 优化移动端对话键盘弹出布局。
