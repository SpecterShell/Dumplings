  Key: ReleaseNotes
  Value: |-
    - 文件管理器支持多选操作，可使用 Ctrl/⌘ 多选文件，也支持鼠标框选多个文件。
    - 文件管理器支持对多选文件批量复制、剪切和删除。
    - Markdown 编辑器支持拖拽节点，方便调整内容结构。
    - Markdown 编辑器支持插入本地文件链接，外部链接可通过系统默认程序打开。
    - Slash 菜单升级为二级菜单，并新增「生成章节」「总结」「自定义指令」等 AI 写作入口。
    - Slash 菜单补充四级到六级标题、文件插入等更多块类型。
    - AI 输出完成后会高亮本次生成的内容，方便确认、接受或撤销。
    - 优化记录图片缩略图加载与预览体验，降低大量图片记录场景下的加载压力。
    - 优化图片预览组件，支持更好的缩放、旋转、关闭和加载状态。
    - 优化 README 项目介绍，让新用户更容易理解 NoteGen 的核心工作流。
    - 修复移动端记录缩略图加载缓慢的问题。
    - 修复 Markdown 编辑器 BubbleMenu 初始状态下偶尔异常出现的问题。
