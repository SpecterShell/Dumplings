  Key: ReleaseNotes
  Value: |-
    新功能
    - 支持为不同 AI 模型服务商单独配置代理，可选择继承全局代理、直连或自定义 HTTP、HTTPS、SOCKS5 代理。
    - 优化 GitHub、GitLab、Gitee 及图床的 Token 创建入口，增加权限说明和 Token 显隐控制。
    改进
    - Agent 遇到写入意图不明确的请求时，将主动询问是否继续，不再直接拒绝操作。
    - 支持单次允许或在本次会话中允许 Agent 执行相关修改。
    - 优化中文输入法下模型配置名称的编辑体验，避免拼音组合过程中出现字符重复或输入混乱。
    问题修复
    - 修复部分思考模型不支持 tool_choice 参数而导致对话或工具调用失败的问题。
    - 修复 Android 端录音所需的音频设置权限缺失问题。
