- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Swap Source ⇔ DestDir now works even when multiple files are specified.
    Fixed an issue where processing could fail to complete if a network drive was disconnected during a Move operation.
    Various stability improvements.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    在交换来源⇔ 目标时，即使指定了多个文件也可以正常处理。
    进行了各种稳定性改进。
- Locale: ja-JP
  Key: ReleaseNotes
  Value: |-
    Source ⇔ DestDir の交換で、複数ファイル指定時でも対応可能に。
    移動時にネットワークドライブ切断があると、処理が終わらないことがあったのを修正。
    各種安定性の向上。
