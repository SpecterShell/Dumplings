  Key: ReleaseNotes
  Value: |-
    New Features
    - New multi-threaded copy engine.
    - Enhanced speed graph.
    - New multi-threaded copy engine.
    - Support for copying to multiple targets.
    - Queue system for managing multiple copy operations.
    - Support for receiving files via the LocalSend protocol.

    Enhancements
    - Per-user installation no longer requires elevation.

    Fixed Bugs
    - Fixed file enumeration on macOS SMB shares: worked around a bug in Apple's SMB server that truncates large directory listings.
    - Fixed issue with file sizes on Macrium tbFAT.
    - Fixed Appx package uninstallation.
    - Minor fixes and stability improvements.
