  Key: ReleaseNotes
  Value: |-
    New Features
    - New multi-threaded copy engine.
    - Enhanced speed graph.
    - New multi-threaded copy engine.
    - Support for copying to multiple targets.
    - Queue system for managing multiple copy operations.
    - Support for receiving files via the LocalSend protocol.

    Enhancements
    - TeraCopy entry in the modern Windows Explorer context menu.
    - Integrated toolbar in the title bar.
    - Improved exception handling and automated bug report upload.

    Fixed Bugs
    - Resolved an issue importing file lists from text files containing UNC paths.
    - Fixed a bug where Overwrite behaved as Overwrite All during same-drive move operations.
    - AdvancedInstaller fixed the installer's security vulnerability: EXE Bootstrapper resolved the %appdata% location incorrectly for the System account.
