- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - feat(chat): Skill $ autocomplete now shows a one-line description, and the default skill template ships with name/description frontmatter.
    - feat(chat): Folder and branch pickers moved to a borderless row below the message input.
    - style(chat): Polished the welcome screen — softer elliptical halo, theme-tuned rings, tighter spacing, no more horizontal scrollbar in tiled mode.
    - style(settings): Swapped the order of Model Providers and Quick Messages in the settings nav.
    - fix(settings): Skill id is locked while editing an existing skill to prevent accidental rename.
    - fix(acp): OpenCode sub-agent (task) calls render as Agent cards during live streaming, matching historical reload.
    - fix(acp): Saving a skill now returns the latest description so the UI no longer shows a stale value.
    - fix(settings): OpenCode enabled_providers allowlist is honored and synced, and provider.<id>.npm is backfilled with the first option.
    - fix(model-provider): Codex overrides OPENAI_MODEL in env_json so the selected model takes effect at launch.
    - chore(acp): Bumped claude-agent-acp to 0.36.1 and OpenCode to 1.15.5.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 功能(聊天)：技能 $ 自动补全行新增一行描述，新建技能默认模板内置 name/description frontmatter。
    - 功能(聊天)：文件夹与分支选择器移到消息输入框下方的无边框行。
    - 样式(聊天)：欢迎页打磨 —— 更柔和的椭圆光晕、跟随主题的同心椭圆环、收紧的间距，并修复平铺模式下的横向滚动条。
    - 样式(设置)：设置导航中「模型提供商」与「快捷消息」位置互换。
    - 修复(设置)：编辑已有技能时锁定技能 id，避免误改导致重命名。
    - 修复(ACP)：OpenCode 子代理（task）调用在实时流式过程中也渲染为 Agent 卡片，与历史恢复行为一致。
    - 修复(ACP)：保存技能后返回最新的描述，界面不再显示旧值。
    - 修复(设置)：尊重并同步 OpenCode 的 enabled_providers 白名单，provider.<id>.npm 自动回填首个可选项。
    - 修复(模型提供商)：Codex 在 env_json 中覆盖 OPENAI_MODEL，所选模型在启动时真正生效。
    - 调整(ACP)：升级 claude-agent-acp 至 0.36.1，OpenCode 至 1.15.5。
