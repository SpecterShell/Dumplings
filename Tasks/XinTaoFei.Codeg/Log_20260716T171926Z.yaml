- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - fix(pet): Desktop pets with extra animations now install and display correctly. The marketplace's new "v2" pets add animation rows that codeg used to reject or render squished. It now adapts to each spritesheet's real size, keeping every pet sharp.
    - fix(chat): Cleaner command and skill badges in sent messages. Badges now show just their name, dropping the leading / or $ to match the composer. What's sent to the agent is unchanged.
    - chore(agents): Bundled agents refreshed. OpenCode (1.18.3), Cline (3.0.42), CodeBuddy Code (2.123.1), and Kimi Code (0.26.0) updated; Claude Code's ACP adapter pinned to 0.58.1.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 修复(宠物)：带更多动作的桌面宠物现在能正确安装与显示。 市场新增的「v2」宠物带有额外动画行，过去会被拒绝安装或显示压扁。现在按每张精灵图的真实尺寸自适应，宠物随处都清晰。
    - 修复(聊天)：已发送消息里的命令与技能徽章更清爽。 徽章只显示名称，去掉开头的 / 或 $，与编辑时一致。发送给智能体的内容保持不变。
    - 更新(智能体)：内置智能体已刷新。 OpenCode（1.18.3）、Cline（3.0.42）、CodeBuddy Code（2.123.1）、Kimi Code（0.26.0）已更新；Claude Code 的 ACP 适配器固定到 0.58.1。
