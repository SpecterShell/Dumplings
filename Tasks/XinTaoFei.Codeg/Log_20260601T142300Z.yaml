- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - feat(delegation): Sub-agent delegations now run in the background — the main agent keeps working while multiple tasks run in parallel, and they survive reload and restart.
    - feat(delegation): Delegation tool calls now show as compact inline cards with live status and a one-click link to open the sub-agent's conversation.
    - feat(delegation): Added a configurable memory budget for delegation results in multi-agent settings (default 512 MB).
    - feat(hyperframes-launcher): New HyperFrames tab in Project Boot scaffolds an HTML-to-video project and opens it in the workspace.
    - fix(delegation): Delegation status now stays reliable across desktop, web, and server modes.
    - fix(settings): Switching the Codex provider no longer applies the wrong settings.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 功能(委派)：子代理委派改为后台运行——主代理无需等待，多个任务可并行执行，并在重载和重启后自动恢复。
    - 功能(委派)：委派工具调用以紧凑的内联卡片呈现，展示实时状态，并提供一键打开子代理会话的入口。
    - 功能(委派)：在多智能体设置页新增可配置的委派结果内存预算（默认 512 MB）。
    - 功能(hyperframes 启动器)：项目启动新增 HyperFrames 标签页，脚手架生成 HTML 转视频项目并在工作区中打开。
    - 修复(委派)：委派状态在桌面、Web 和服务器模式下保持可靠。
    - 修复(设置)：切换 Codex 供应商不再应用错误的设置。
