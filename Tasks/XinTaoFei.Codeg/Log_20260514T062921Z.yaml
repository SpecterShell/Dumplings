- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - feat(remote workspace): remote Codeg workspaces can now be saved, tested, reordered, and opened from the desktop app with token-authenticated HTTP and WebSocket transport.
    - feat(sidebar): the sidebar header now includes a quick new-conversation action for the active workspace.
    - feat(sidebar): themed conversation groups now use app theme colors, clearer folder states, and improved open-tab highlighting.
    - chore(experts): bundled Superpowers expert skills have been synced to v5.1.0.
    - chore(acp): Gemini CLI has been updated to 0.42.0 and OpenCode ACP has been updated to 1.14.50.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 功能(远端工作区)：桌面端现在支持保存、测试、排序并打开远端 Codeg 工作区，并通过 Token 认证的 HTTP 和 WebSocket 通道连接远端服务。
    - 功能(侧边栏)：侧边栏标题栏新增当前工作区的快速新建会话入口。
    - 功能(侧边栏)：会话分组现在使用应用主题色，文件夹状态更清晰，已打开标签的高亮也更明显。
    - 调整(专家技能)：内置 Superpowers 专家技能已同步至 v5.1.0。
    - 调整(ACP)：Gemini CLI 已更新到 0.42.0，OpenCode ACP 已更新到 1.14.50。
