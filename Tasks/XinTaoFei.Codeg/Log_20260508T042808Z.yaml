  Key: ReleaseNotes
  Value: |-
    - 功能(侧边栏)：为文件夹分组新增「在…中打开」子菜单及完整路径 tooltip。
    - 样式(侧边栏)：使用统一的彩色圆点徽章替换原会话状态 SVG，并在侧边栏、标签栏、管理与搜索对话框中共用。
