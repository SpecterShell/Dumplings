  Key: ReleaseNotes
  Value: |-
    This update introduces a re-engineered Security Score to prioritize critical risks; it also optimizes Wi-Fi Sync connectivity and ensures a better experience when managing notes and icons.
    Improvements
    A More Meaningful Security Score
    You can now see a more accurate representation of your vault's health through an enhanced scoring engine. This means the dashboard now prioritizes critical issues, like compromised passwords, and rewards the use of phishing-resistant factors like Passkeys.
    Optimized Wi-Fi Sync discovery
    The Wi-Fi Sync server now prioritizes active Ethernet and Wi-Fi connections while filtering out virtual network addresses from software like VirtualBox. This ensures your devices find and connect to each other reliably during synchronization.

    Bug Fixes
    Unlimited Note length
    The Notes field now supports more than 20,000 characters without truncating your data. Previously, saving an item with a very long note would silently remove content exceeding the character limit.
    Consistent Note appearance
    The Notes field now uses a consistent background color (hex code #FFF8B9) across both light and dark themes. This replaces the bright yellow background that previously appeared in dark mode, ensuring the interface remains easy on the eyes.
    Stable Note scrolling
    The Notes section now maintains its scroll position when a background sync occurs. Previously, the view would automatically jump to the bottom of the note whenever the app synchronized.
    Improved custom icon quality
    Custom icons now render clearly in the interface. Previously, some user-uploaded icons appeared pixelated even when provided at the correct 200x200 pixel resolution.
    Windows Server 2016 compatibility
    Enpass now launches correctly on Windows Server 2016 systems. Previously, a compatibility issue related to font rendering prevented the app from opening on this specific operating system version.

    For Business Users
    Vault connection clarity
    The vault settings page now displays the specific service name and icon for SharePoint, Microsoft Teams, and Google Shared Drives. Previously, these business-specific vaults were labeled generically, making it difficult to distinguish between different storage locations.
    Refined Google Workspace permissions
    The Manage Access page for Google Workspace vaults now only displays members of the Shared Drive who also have explicit access to the vault folder. Previously, it could show users who had folder-level access but were not members of the shared drive.
    This version also includes other minor bug fixes and improvements.
