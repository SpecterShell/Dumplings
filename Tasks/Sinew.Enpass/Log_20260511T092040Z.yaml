  Key: ReleaseNotes
  Value: |-
    A Fresh New Look. The Same Enpass You Trust.
    Enpass has been redesigned from the ground up with a modern, polished interface, which includes cleaner layouts, streamlined workflows, and refined visuals across every screen. Plus, Enpass is now a native 64-bit and ARM64 app, bringing faster performance and improved memory usage. Everything you know and rely on works exactly the same, it just looks and feels a whole lot better.
     Here's what you'll notice:
    - Modern design throughout — Cleaner layouts, improved spacing, and refined icons across every screen including the sidebar, item lists, item details, editing, autofill, sharing, password generator, and lock screen.
    - Redesigned settings — Settings have a new, spacious layout that's less cluttered and easier to read, so configuring Enpass feels effortless.
    - Streamlined workflows — Common tasks like adding items and importing data now take fewer steps and are more organized, so you can get things done faster.
    - Updated visual elements — Buttons, icons, typography, and interactive elements have been refined for a cleaner, more intuitive experience.
    - Refreshed Share Center — For Business users, you can now manage all your vault sharing in one space, and update access rights on the spot.
    Try It Out
    We'd love for you to experience the new Enpass.
    Install the update and try the new Enpass.
