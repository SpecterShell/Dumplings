- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Breaking Changes 💔
    - Allow nullable reads for custom/external resources (#1471).
    This allows custom/external resources to produce null values for nullable reads (read?). While this is a breaking change in behavior, it is currently not possible to exercise with versions of pkl-go or pkl-swift released prior to this change.

    Fixes
    - Fix typo in changelog and language reference (#1455).
    - Fix bugs in CommandSpecParser (#1448, #1449).
    - Respect --omit-project-settings for all evaluator options (#1459).
    - Fix SecurityManager check for HTTP(S) module URIs (#1463).
    - Fix performance regression caused by activation of power assertion instrumentation during some union type checks (#1462).
    - Fix module reflection when power assertion instrumentation is active (#1464).
    - Prevent I/O when checking UNC paths against --root-dir (#1466).
    - Prevent --multiple-file-output-path writes from following symlinks outside the target directory (#1467).

    Contributors ❤️
    Thank you to all the contributors for this release!
    - @04cb
    - @HT154
    - @KushalP
