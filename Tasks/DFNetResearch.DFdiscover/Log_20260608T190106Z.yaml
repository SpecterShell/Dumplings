  Key: ReleaseNotes
  Value: |-
    DFdiscover 2026 Version 5.11 adds new capabilities and improvements that make clinical data management more efficient, secure, and reliable. It builds on the strong foundation of recent updates while adding new capabilities for participant engagement and improving system security, stability, and usability.
    Key features and enhancements in this release include:
    - ePRO Notification Configuration: DFdiscover now supports custom reminders for participants using the DFengage ePRO mobile app, configured through DFsetup, enabling custom notification content and timing, complete with multi-language support. These reminders are delivered through push notifications on the participant’s device.
    - Disable Edit Checks Setting in DFweb: Authorized users can now manually disable edit checks in DFweb via the Settings page, providing more control for specialized scenarios such as training and testing.
    - DFcollect Device Requirement Updates: DFcollect has received several stability & maintenance updates. This has resulted in updated device requirements: tablets must be running Android® 10 or later or iPadOS®/iOS® 16 or later to install DFcollect 5.11.
    - Optional, Region-Limited SMS Support for 2FA: System administrators now have the option to enable SMS on their DFdiscover server to enable delivery of security codes for 2FA via text message instead of email to specified users in supported regions. The default configuration supports SMS to North American phone numbers only, but servers can be configured with a different Azure SMS sender to support a different region.
    - Security Enhancements: Various improvements have been made to ensure the security of the system and your data, including enhanced messaging for connectivity issues in DFweb, improved protection against attacks via uploaded PDFs in DFweb, and ability for system administrators to control which DFdiscover servers can connect to an API instance.
    - Framework Upgrade: DFdiscover’s core application framework has been upgraded, improving long-term maintainability and positioning the software for ongoing performance and compatibility enhancements.
    See the Release Notes for details on all new features, improvements, and bug fixes, as well as information about upgrade steps, version compatibility, and known issues. The Release Highlights provide an overview of the key features and improvements, helping study teams and organizations make the most of the upgrade. The Documentation provides in-depth guides to using DFdiscover applications, and Downloads are available for desktop and server applications.
    View the full DFweb build history and the full DFcollect build history.
