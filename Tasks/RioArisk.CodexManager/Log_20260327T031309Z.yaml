- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    ✨ 新增功能
    账号订阅到期时间展示
    - 账号卡片新增订阅到期横条，直接读取 Token 中的订阅到期时间
    - 展示顺序统一为 5h、7d、代码审查、订阅到期，和现有限额样式保持一致
    - 自动区分已过期、24 小时内到期、7 天内到期、30 天内到期和未提供到期时间等状态
    账号列表筛选
    - 账号列表顶部新增同一行下拉筛选器，支持组合筛选
    - 套餐支持 Free、Plus、Team
    - 到期状态支持 已过期、24 小时内到期、7 天内到期、30 天内到期、未提供到期时间
    - 限额支持按周限额和 5h 限额分段筛选，便于快速定位低额度或可用账号
    ⚙️ 交互优化
    过期账号切换策略
    - 切换到已过期账号时，不再直接切换到失效 Token
    - 现在会自动同步当前 Codex 已登录账号，减少切换后无法立即使用的问题
    - 到期状态判断已统一复用于展示、筛选和切换流程，行为更一致
    📦 本次产物
    - Windows：Codex.Manager_0.1.5_x64-setup.exe、Codex.Manager_0.1.5_x64_en-US.msi
    - macOS：Codex.Manager_0.1.5_x64.dmg、Codex.Manager_0.1.5_aarch64.dmg
    Full Changelog: https://github.com/RioArisk/codex-auth-manager/compare/v0.1.4...v0.1.5
