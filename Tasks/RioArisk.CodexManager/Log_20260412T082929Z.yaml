  Key: ReleaseNotes
  Value: |-
    ✨ 账号切换恢复
    Token 失效账号允许切换
    - 切换账号时只拦截订阅真正过期的账号，不再把 Token 已过期或无效 直接视为不可切换
    - 对于订阅仍有效但 access token 已失效的账号，现在可以先切换过去，再在 Codex 中触发刷新或重新登录
    - 保留订阅过期账号的保护逻辑，避免误切到已经失效的订阅
    ⚙️ 发布同步
    版本更新
