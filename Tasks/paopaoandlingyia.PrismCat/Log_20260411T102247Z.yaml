- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    v1.3.1 is a small patch release focused on compatibility and polish. It improves the merged view for Gemini streaming responses and includes a couple of storage-related fixes.
    - Added Gemini streaming merge support so the Merged view now reconstructs candidates / parts / text correctly
    - Kept the Raw view unchanged, preserving the original upstream payload for debugging
    - Unified log time filtering on UTC unix timestamps to reduce timezone-related inconsistencies
    - Improved legacy database migration compatibility for timestamp index upgrades
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    v1.3.1 是一次以兼容性和细节体验为主的补丁更新，补上了 Gemini 流式响应的 Merged 合并展示，并修复了若干日志与存储层的小问题。
    - 新增 Gemini 流式响应合并支持，Merged 视图现在可以正确拼接 candidates / parts / text
    - 保持 Raw 视图不变，原始返回仍然完整保留，便于排查协议细节
    - 修复日志时间过滤统一基于 UTC unix timestamp，减少时区相关偏差
    - 修复旧数据库迁移兼容性问题，避免历史库在时间索引升级时出错
