  Key: ReleaseNotes
  Value: |-
    [Added] Rename branch dialog now validates branch names against repository rulesets - #21822
    [Added] Allow empty commits via the commit options menu - #21771
    [Added] Add option to include a Signed-off-by trailer on commits for Developer Certificate of Origin workflows - #21741
    [Fixed] Discard Changes now completes even when the GitHub Desktop window is not focused - #21739
    [Fixed] Allow origin fetch on empty repo - #4574 #4575. Thanks @jackfreem!
    [Fixed] Fix window background color when resizing - #21548. Thanks @BaldrianSector!
    [Fixed] Ignore Tab in terminal and keep textarea enabled - #21696
    [Fixed] Clear commit message after a successful commit when switching to the History tab while the commit is in progress - #21721
    [Improved] Liquid Glass icons for macOS Tahoe - #21010. Thanks @fabe and @caiofbpa!
    [Improved] Update default tab size from 8 to 4 - #21705. Thanks @advaith1!
    [Improved] Recognize Copilot CLI bot in commit attributions - #21727
