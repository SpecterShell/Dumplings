  Key: ReleaseNotes
  Value: |-
    macOS 用户首次安装提示
    下载 DMG 拖入 /Applications 后，必须在终端运行：
    xattr -cr /Applications/OpenLess.app
    否则 Gatekeeper 会提示「OpenLess 已损坏」——这是因为当前 build 用 ad-hoc 签名、没做 Apple 公证。
    渠道说明
    - 以 -tauri 结尾的 tag 是正式版（自动推送给所有 in-app 检查更新的用户）。
    - 以 -beta-tauri 结尾的 tag 是 Beta 版（GitHub 标 pre-release，不通过 in-app updater 推送给正式版用户；只对在「设置 → 关于 → 加入 Beta 渠道」开关切到 Beta 的用户可见，且需要手动从此页面下载安装）。
    行为变更提示
    - 流式输入默认开启；不兼容场景会自动回落到一次性插入。可在「设置 → 高级」关闭。
    - 流式输入成功后默认把最终文本同步到剪贴板，方便再次粘贴；可在「设置 → 高级」关闭。
    What's Changed
    - release-sync: workflow rollout + soaked beta features → main by @appergb in https://github.com/Open-Less/openless/pull/333
    - fix(release): backport YAML duplicate env fix into main by @appergb in https://github.com/Open-Less/openless/pull/336
    - Route qwen-asr submodule through organization fork by @H-Chris233 in https://github.com/Open-Less/openless/pull/424
    - feat: marketplace tab + 一键发布 + Settings 风格市场配置 by @appergb in https://github.com/Open-Less/openless/pull/444
    - Keep streaming insertion enabled for migrated prefs by @H-Chris233 in https://github.com/Open-Less/openless/pull/446
    - chore(stable): disable marketplace entry + strengthen ASR correction rules by @appergb in https://github.com/Open-Less/openless/pull/449
    - release: 1.3.2 stable — marketplace UI gated, ASR correction upgraded by @appergb in https://github.com/Open-Less/openless/pull/450
    Full Changelog: https://github.com/Open-Less/openless/compare/v1.3.2-3-beta-tauri...v1.3.2-tauri
