  Key: ReleaseNotes
  Value: |-
    macOS 用户首次安装提示
    下载 DMG 拖入 /Applications 后，必须在终端运行：
    xattr -cr /Applications/OpenLess.app
    否则 Gatekeeper 会提示「OpenLess 已损坏」——这是因为当前 build 用 ad-hoc 签名、没做 Apple 公证。
    渠道说明
    - 以 -tauri 结尾的 tag 是正式版（自动推送给所有 in-app 检查更新的用户）。
    - 以 -beta-tauri 结尾的 tag 是 Beta 版（GitHub 标 pre-release，不通过 in-app updater 推送给正式版用户；只对在「设置 → 关于 → 加入 Beta 渠道」开关切到 Beta 的用户可见，且需要手动从此页面下载安装）。
    行为变更提示
    - 流式输入默认开启；不兼容场景会自动回落到一次性插入。可在「设置 → 高级」关闭。
    - 流式输入成功后默认把最终文本同步到剪贴板，方便再次粘贴；可在「设置 → 高级」关闭。
    What's Changed
    - feat(android): 集成 #704 安卓自动更新 + 同步 PC updater 修复（#705 公钥 / #708 安装失败兜底）到安卓 by @appergb in https://github.com/Open-Less/openless/pull/712
    - fix(less-computer): 护栏高危系统命令设为不可批准，修批准注入畸形规则 (#679) by @appergb in https://github.com/Open-Less/openless/pull/688
    - fix(capsule): 胶囊跟随鼠标光标所在屏，修复多屏/多 Space 只在第一块屏显示 by @appergb in https://github.com/Open-Less/openless/pull/714
    - fix(insertion): macOS 让「恢复剪贴板」开关真正生效，修复被回退的 #525 by @appergb in https://github.com/Open-Less/openless/pull/683
    - fix(asr): add MiMo provider to credential gate validation by @GanAO in https://github.com/Open-Less/openless/pull/713
    - feat(less-computer): 边缘发光改用 EdgeGlow 式四层模糊堆叠 + iridescent 配色 by @appergb in https://github.com/Open-Less/openless/pull/720
    - fix(asr): Whisper/OpenRouter 动态超时 + 全局兜底 15→30s by @H-Chris233 in https://github.com/Open-Less/openless/pull/723
    New Contributors
    - @GanAO made their first contribution in https://github.com/Open-Less/openless/pull/713
    Full Changelog: https://github.com/Open-Less/openless/compare/v1.3.10-tauri...v1.3.11-tauri
