  Key: ReleaseNotes
  Value: |-
    macOS 用户首次安装提示
    下载 DMG 拖入 /Applications 后，必须在终端运行：
    xattr -cr /Applications/OpenLess.app
    否则 Gatekeeper 会提示「OpenLess 已损坏」——这是因为当前 build 用 ad-hoc 签名、没做 Apple 公证。
    渠道说明
    - 以 -tauri 结尾的 tag 是正式版（自动推送给所有 in-app 检查更新的用户）。
    - 以 -beta-tauri 结尾的 tag 是 Beta 版（GitHub 标 pre-release，不通过 in-app updater 推送给正式版用户；只对在「设置 → 关于 → 加入 Beta 渠道」开关切到 Beta 的用户可见，且需要手动从此页面下载安装）。
    行为变更提示
    - 流式输入默认开启；不兼容场景会自动回落到一次性插入。可在「设置 → 高级」关闭。
    - 流式输入成功后默认把最终文本同步到剪贴板，方便再次粘贴；可在「设置 → 高级」关闭。
    What's Changed
    - fix(ime): 繁中用户语音输入始终输出繁体 / enforce 简繁 script on output (#643) by @jiangmuran in https://github.com/Open-Less/openless/pull/729
    - fix(asr): 修复 Apple Speech 听写误走火山路径 by @snvtac in https://github.com/Open-Less/openless/pull/741
    - feat(coding-agent): OpenCode CLI 适配器，语音 Agent 可选 OpenCode 后端 (Refs #579) by @appergb in https://github.com/Open-Less/openless/pull/638
    - chore(release): publish 1.3.12 by @appergb in https://github.com/Open-Less/openless/pull/743
    New Contributors
    - @jiangmuran made their first contribution in https://github.com/Open-Less/openless/pull/729
    - @snvtac made their first contribution in https://github.com/Open-Less/openless/pull/741
    Full Changelog: https://github.com/Open-Less/openless/compare/v1.3.11-tauri...v1.3.12-tauri
    Android 安装说明
    - 推荐：真机下载 OpenLess_<version>_arm64-v8a.apk（arm64 设备）。
    - 模拟器：x86_64 模拟器用 OpenLess_<version>_x86_64.apk。
    - 首次安装需在系统设置中允许「安装未知应用」；应用内更新会拉起系统安装器。
    - adb 调试：adb install -r OpenLess_<version>_arm64-v8a.apk
    Android 应用内更新
    - Stable 用户检查 latest-android-aarch64.json（及 mirror 变体）。
    - Beta 用户（设置 → 高级 → 加入 Beta）检查带 -beta 后缀的 manifest。
