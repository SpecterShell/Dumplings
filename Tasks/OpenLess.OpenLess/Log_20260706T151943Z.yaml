  Key: ReleaseNotes
  Value: |-
    自 v1.3.11 以来的完整更新(1.3.12 / 1.3.13 仅发过测试版，本版一并带给正式版用户)。
    ✨ 新功能
    - 主窗口全新设计：可折叠侧栏(⌘B / 点击 OpenLess 开关)、红绿灯融入顶栏、内容平铺布局、热力图贴边；「风格市场」升级为独立页面
    - 划词追问 & 电脑操控全新聊天面板：基于 shadcn 官方组件重做——纯白大圆角卡片、带头像的对话(GitHub 头像 + 思考动画头像)、打字与语音双输入、面板出现/消失过渡动画；录音时输入框环绕红色跑光、转译思考时黑色跑光，状态一目了然
    - 说话人分离：嘈杂环境下自动过滤非主讲人的声音，转写只保留你说的话
    - Windows 输入增强：新增 SendInput 插入方式与键盘列表控制，兼容更多输入场景
    - 快捷键增强：支持左右侧向修饰键组合(如仅左 Ctrl),按键更随手
    - 语音 Agent 可选 OpenCode 后端；自定义 LLM 服务商支持附加请求头
    🛠 修复
    - 划词追问：点击输入框不再把主窗口带到前台；打字提问报「命令不存在」修复；多轮追问中选区丢失修复；AI 头像不再先于你的话出现
    - 电脑操控：「后端在执行、面板却不显示你说的话/一片空白」修复(事件缓冲重放)
    - 提示音：长时间使用后提示音消失的问题彻底修复(AudioContext 被系统抢占后自动重建恢复)
    - 听写：Apple Speech 正确走本地识别；简/繁字形偏好在所有输出路径强制生效；侧向键松开卡死、macOS 竞态、火山引擎 429 限流处理等一批审计修复
    - 历史：润色结果为空时自动回退显示原始转写，原文面板新增复制按钮
    - macOS:辅助功能引导卡死可自动恢复；深色主题细节打磨
    🔐 安全
    - 修补 tauri-plugin-shell 依赖漏洞(GHSA-c9pr-q8gx-3mgp)

    升级方式：应用内自动更新，或从下方资产下载对应平台安装包(macOS 选 aarch64/Apple Silicon 或 x64/Intel 的 dmg;Windows 选 x64-setup.exe;Linux 选 AppImage/deb/rpm)。
