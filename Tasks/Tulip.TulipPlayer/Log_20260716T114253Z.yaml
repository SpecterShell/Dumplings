  Key: ReleaseNotes
  Value: |-
    We're excited to announce the release of Tulip Desktop Player version 2.11.0.
    Version 2.11.0 of Desktop Player is available for download at 9:00PM ET on June 13th, 2026! If you have auto updates enabled, the Desktop Player application will update in the background and changes will take effect the next time the application is restarted. Alternatively, you can manually initiate the update process from the file menu.
    Bug Fixes
    - Fixed an issue where the TorqueOP driver would be disabled when a new Windows user account opened Tulip Player on a machine that already had the driver set up by a different Windows user.
    - Fixed an issue where the Tulip Player TorqueOP driver's rawJSON payload was missing fields present in the Edge Device equivalent (e.g. toolSerialNumber).
    - Fixed an issue where the keyboard input language mode defaulted to English on a fresh Player install or after running "Clear All Data," causing barcode scanners in keyboard wedge mode to misinterpret non-English keyboard layouts (e.g. AZERTY). The language setting dialog now also takes effect immediately without requiring a Player restart.
    - Fixed an issue where some functions of the Edge Driver SDK Serial driver stopped functioning in Player 2.10.
    - Fixed an issue where selecting a job number via the Kolver Open Protocol driver returned a 500 error.
    Improvements
    - Upgraded the player runtime, bringing performance and security improvements to the Desktop Player.
