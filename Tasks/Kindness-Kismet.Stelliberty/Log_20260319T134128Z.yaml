    📦 构建信息
    项目 内容
    包名 stelliberty
    版本号 1.2.271
    Mihomo 核心 1.19.21
    📋 更新日志
    自 v1.2.270 以来的功能和修复：
    fix(linux): restore silent start and window resizing
    提交：aa3b76a | 作者：oneui
    fix(loopback): flags 降级策略与防火墙服务诊断
    NetworkIsolationEnumAppContainers 在部分 Win11 环境中即使
    以管理员身份运行仍返回 Access Denied，根因可能是 mpssvc/BFE
    服务异常而非进程权限不足。
    - 枚举时先用 flags=1 再降级 flags=0，兼容更多环境
    - Access Denied 时自动检测 mpssvc 和 BFE 服务状态
    - 错误信息附带诊断结果，替代笼统的"权限不足"
    - set_loopback_exemption 复用同一降级逻辑
    提交：8991d95 | 作者：ONEUI9
    refactor(logging): 简化 Dart 与 Rust 日志级别前缀
    提交：61f39d8 | 作者：ONEUI9
    fix(loopback): 提升 NetIso 失败上下文日志可见性
    提交：deaca59 | 作者：ONEUI9
    fix(loopback): 增强 UWP NetIso 诊断日志
    提交：c91090a | 作者：ONEUI9

    ❓ 故障排查
    Linux 启动问题
    如果无法启动应用，请确保已为应用文件夹赋予权限：
    # 进入应用目录
    cd /path/to/stelliberty

    # 赋予权限
    chmod 777 -R ./stelliberty
    端口被占用（Windows）
    如果遇到端口冲突：
    # 1. 查找占用端口的进程
    netstat -ano | findstr :端口号

    # 2. 结束进程（以管理员身份运行）
    taskkill /F /PID XXX
    ⚠️ 重要：必须以管理员身份运行命令提示符。服务模式启动的核心进程需要提升权限才能终止。
    软件工作不正常
    路径要求（ZIP 和 EXE 均适用）：
    - 路径中不应包含特殊字符（空格除外）
    - 路径中不应包含非 ASCII 字符（如中文字符）
    - 支持空格：D:\Program Files\Stelliberty ✅
    EXE 安装程序的位置限制：
    如果使用 EXE 安装程序，还有额外的安装位置限制：
    - 系统盘（C:）：仅允许 %LOCALAPPDATA%\Programs\*（如 C:\Users\用户名\AppData\Local\Programs\Stelliberty）
    - 其他盘（D:、E: 等）：无限制
    💡 如需安装到 EXE 不允许的位置，请使用便携版 ZIP（无位置限制，但仍可能受系统目录权限影响）。
    缺少运行库（Windows）
    如果应用程序在 Windows 上无法启动或立即崩溃，可能是缺少必需的 Visual C++ 运行库。
    解决方案：
    安装 Visual C++ 运行库：vcredist - Visual C++ 运行库合集
