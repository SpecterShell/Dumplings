Version: "2026.1"
Installer:
- Architecture: x86
  InstallerUrl: https://www.microdicom.com/downloads/Software/MicroDicom-2026.1-win32.exe
- Architecture: x64
  InstallerUrl: https://www.microdicom.com/downloads/Software/MicroDicom-2026.1-x64.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - New features:
      Reworked folder scanning — now 5x faster.
      Added error display in the exporter.
      Removed the progress dialog when downloading from a PACS server; progress is now shown in the status bar only.
      Faster opening of DICOMDIR files.
      Selection is now preserved while searching tags in the DICOM Tags pane.
      Added "Advanced" option to the "Send to PACS" entry in the DICOM Browser context menu.
      Added Crash Reporting.
    - Improvements:
      Improved the progress bar when loading images and MPR series.
      Improved the progress bar when importing to the database.
      Improved list controls throughout the application: removed the ability to sort by clicking column headers where sorting is unnecessary, and added tag sorting in the Tag Dictionary dialog.
      Reworked the status bar progress indicator.
      Reworked timeouts in DICOMWeb.
      Refactoring.
      Updated the manual.
      Removed unused UTF-8 conversion and made file format copying occur only when loading an image. This change reduces memory usage by half during folder scanning for DICOM files.
      Faster server shutdown. Fixed an issue that occurred when starting to download a large file and closing the application.
    - Defect fixing:
      Fixed an issue where byte transfer was not added when downloading only a single image.
      Fixed a crash when sending to PACS, along with several related improvements.
      Fixed an issue where searching on a non-existent DICOM server would cause the application to hang after closing the dialog.
      Fixed a potential crash.
      Fixed a regression with exporting video files.
      Fixed string decoding issues under Wine.
      Fixed issues with text encoding.
      Fixed an issue where the root item in the DICOM Browser was displayed twice.
      Fixed an empty icon appearing when the splash screen is shown.
      Fixed a regression with opening common image formats.
      Fixed a crash when playing animations.
      Fixed an issue with opening images using JPEG2000 compression with multi-fragment frame reassembly.
      Fixed a crash.
      Fixed an issue with opening files using JPEG2000 compression.
      Fixed an issue with downloading from a PACS server.
      Fixed an issue with measurements using the Ellipse tool.
      Fixed an issue with MP4 export failing on Windows 7.
      Fixed an issue with incorrect date and time when the application is first launched.
      Fixed a regression with opening DICOM files that are not part of the DICOM Part 10 standard.
      Fixed a regression with editing DICOM tags after downloading a file from a PACS server.
