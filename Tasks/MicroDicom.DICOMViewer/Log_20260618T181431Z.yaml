Version: "2026.3"
Installer:
- InstallerUrl: https://www.microdicom.com/downloads/Software/MicroDicom-2026.3-Setup.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - New features:
      Added 3D volume rendering.
      Added 3D MPR with MIP, MinIP, AVG and slab thickness support, and improved MPR speed.
      Added ROI Window/Level - draw a rectangle to auto-fit contrast to that region (Alt+W).
      Added Screen Capture Selection.
      Added export DICOM to JSON.
      Hovering over a series in the DICOM browser now highlights the corresponding view in MultiView.
      Implemented sorting by Date in the Preview tab in the DICOM browser.
      Made a universal installer.
    - Defect fixing:
      Fixed an issue with updating MPR and 3D volume rendering while downloading from PACS.
      Fixed an issue with scanning causing 3D rendering to switch to other images.
      Fixed an issue with scrolling images in 3D MPR series.
      Fixed multiple crashes.
