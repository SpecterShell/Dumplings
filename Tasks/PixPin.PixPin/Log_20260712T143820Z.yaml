  Key: ReleaseNotes
  Value: |-
    3.3.5.7
    功能
    -【快捷键】支持设置全局忽略列表，在指定进程下所有热键将不被触发
    -【悬浮球】悬浮球右键菜单支持设置在哪个程序上隐藏
    -【贴图】缩略图模式下支持 Shift + 滚轮上下滑动
    -【macOS】截图和贴图支持隔空投送
    会员功能
    -【翻译】翻译窗口支持修改源文后重新翻译，并支持指定源语言
    -【表格识别】支持预览、编辑、复制到 Excel、打印和 macOS 隔空投送
    -【公式识别】公式识别会自动删除空格，提升识别结果的可用性
    设置
    -【外观】「配置」-「外观」-「工具栏图标大小」支持设置工具栏图标大小
    优化
    -【文字识别】升级为新版窗口，支持直接编辑识别结果，直接复制后窗口会自动关闭，选中文字复制不会自动关闭，并优化识别速度和使用流畅性
    -【快捷键】禁用快捷键时，全局鼠标也会一同禁用
    -【贴图】关闭当前显示器后，该显示器上的贴图会自动移动到其他显示器上
    -【截图】截图时选框切换增加动画，可在「配置」-「外观」中关闭
    -【颜色选择器】会记住上次选择的颜色格式
    -【贴图】“贴图当前选择文件”功能支持 QDir
