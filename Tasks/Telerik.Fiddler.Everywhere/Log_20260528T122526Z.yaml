  Key: ReleaseNotes
  Value: |-
    New
    - Expose caching of agent calls through the Fiddler MCP.

    Fixed
    - MCP get_sessions_details returns compressed body when sanitization is used.
    - Requests to bedrock-runtime are not displayed in Agent Calls tab.
    - Certificate errors are shown in application logs when certificate is trusted
    - After Add to Snapshot, the Streaming messages are not visible.
    - SingalR lost connection leads to multple Unexpected Errors.
    - Mark session in Copper colour doesn't work.
    - Update the list of available models in Assistant settings tab.
    - Updated third-party dependencies to mitigate potential security vulnerabilities.
