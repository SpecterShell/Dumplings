  Value: "\U0001F31F 首页分组体验升级：支持跨分组拖拽排序、空分组 hover 提示与快捷添加入口、分组右键菜单及底部添加分组按钮；新增匿名数据分析开关（可在设置中关闭）；优化应用启动流程与 WebApp 表单预填逻辑；删除分组/网站时自动关闭窗口并清理缓存；修复 UUID 分组拖拽异常、搜索分组误删及 Windows 本地壁纸路径识别等问题。"
