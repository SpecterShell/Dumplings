  Value: "\U0001F31F Enhanced home group experience: cross-group drag-and-drop sorting, empty-group hover hints with quick add entry, group context menu, and bottom add-group button; Added anonymous analytics toggle (can be disabled in Settings); Improved app startup flow and WebApp form prefill logic; Auto-close windows and clear cache when deleting groups or websites; Fixed UUID group drag issues, accidental search group deletion, and Windows local wallpaper path detection."
