  Key: ReleaseNotes
  Value: Bluefish 2.4.2 has a few new features and a few fixes. The most visible change is that Bluefish detects icon themes, and has built in icon themes for "Breeze" and "Breeze-dark". This is a big improvement for the visual integration of Bluefish on a KDE desktop. The most important fix is for a segfault that could occur if a filename on disk has a specific broken UTF-8 encoding. Some small improvements are reduced memory usage when working with 100+ files simultaneously, some translation improvements, and the <meta> author field is now configurable.
ReleaseTime: 2026-07-17
