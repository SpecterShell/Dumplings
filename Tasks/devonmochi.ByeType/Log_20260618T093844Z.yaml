  Key: ReleaseNotes
  Value: |-
    ✨ 新功能
    - OCR 结果窗口支持钉住多开：钉住（置顶）某个识别结果窗口后，再次识别时原窗口保持不变，新的识别结果会在新窗口中弹出。可以同时保留多个钉住的窗口，方便对照多段识别内容。
    🐛 问题修复
    - 修复钉住多开场景下的监听器叠加问题：此前钉住一个窗口后，第三次识别会出现无内容显示的情况，现已修复。
    - 修复置顶按钮难以点击的问题：放大了按钮尺寸并优化了拖拽冲突，点击更稳定。
    📦 下载
