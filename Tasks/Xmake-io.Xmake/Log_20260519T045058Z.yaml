- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New features
    - #7430: Add C interop support for the Zig toolchain
    - #7443: Add utils.replace built-in rule
    - #7437: Upgrade built-in Lua runtime to 5.5
    - #7446: Add Fil-C toolchain support
    - #7489: vsxmake: generate .csproj for C# targets
    - #7491: Add xrepo info --depgraph to print the package dependency graph
    - #7490: Support exporting the target dependency graph as JSON or DOT
    - #7518: Add aria2 download backend with multi-threaded support
    - #7535: Add Huawei Ascend C toolchain support
    Changes
    - #7420: Improve zsh completions
    - #7423: Improve has_flags detection for cl / clang-cl
    - #7424: Improve code comments
    - #7439: Switch icx to icx-cc on Windows
    - #7434: Improve nix package config and source selection
    - #7440: Improve code comments
    - #7435: Improve C++ module error messages
    - #7461: Expose checker as a public API
    - #7463: Bump package versions in C++ modules tests
    - #7465: Bump C++ modules test versions again
    - #7467: Parse XMAKE_ROOT / XMAKE_STATS via option.boolean
    - #7478: Improve custom toolchain definition
    - #7485: Improve pairs behavior for Lua 5.5
    - #7505: Add NuGet package repository entry to README
    - #7524: Add lld-link configuration support
    - #7529: Move clang PCH support into its own module
    - #7542: Merge libs contributed by packages
    Bugs fixed
    - #7432: Fix set_kind("test") handling
    - #7433: Fix xpack AppImage package naming
    - #7445: Fix package local cache directory
    - #7455: Avoid duplicate bundle rpath insertion in xcode.application
    - #7451: Use the correct framework rpath for iOS apps in xcode.application
    - #7449: Avoid leaking private dep flags into rebuilt BMIs for C++ modules
    - #7470: Use target_link_libraries to link object libraries in generated CMakeLists
    - #7477: Fix clang when using c++_static
    - #7483: Fix syslink handling on MinGW
    - #7493: Fix Qt cross-compilation
    - #7495: Fix "cannot find known tool script for ar.cmd"
    - #7500: Fix Linux kernel module insmod failure on kernel 6.12+
    - #7502: Fix Rust build
    - #7501: Fix Linux kernel module intermediate filenames
    - #7503: Fix xpack deb / srpm packaging
    - #7512: Handle Windows cross-compile prefix and install path in the Meson backend
    - #7516: Restore missing path.isdir API
    - #7520: Fix cl exception when probing flags
    - #7523: Fix MSVC / Intel snippet detection when the temp path contains spaces
    - #7525: Fix Zig CC stdlib and LTO flags
    - #7527: Handle compiler / linker frontend variants more accurately when generating CMakeLists
    - #7533: Support paths like mingw/current/bin in find_mingw
    - #7538: Align ascendc flags with the Bisheng compiler user guide
    - #7540: xmake show -l targets now lists all targets regardless of set_default
    - #7541: Fix find_qt cache and dep config being overwritten during Qt cross-compilation
    - #7545: Expand builtin variables before calling path.is_absolute in add_moduledirs
