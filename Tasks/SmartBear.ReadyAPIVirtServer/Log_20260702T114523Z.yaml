  InstallerUrl: https://dl.eviware.com/virtserver/3.33.0/VirtServer-x64-3.33.0.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Support for ReadyAPI version 4.1.0: VirtServer is recommended for use with ReadyAPI 4.1.0. For version pairings, see ReadyAPI-VirtServer Compatibility Matrix.
    - Endpoint-level latency control: VirtServer now supports endpoint-level latency control, configured through REST and SOAP Virtual Services in ReadyAPI.
    - HAR logging stability during performance tests: Fixed an issue where HAR logging stopped working during performance tests. HAR logs now reliably capture request and response data throughout the test run.
ReleaseTime: 2026-07-02
