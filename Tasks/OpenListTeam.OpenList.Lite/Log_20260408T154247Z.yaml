  Key: ReleaseNotes
  Value: |-
    🚨 Breaking Changes
    - ci:
      - Update issue CI configuration [skip ci] - by @jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2166 (b5626)
    - db:
      - Replace SQLite Driver with glebarez/sqlite to avoid CGO - by @PIKACHUIM in https://github.com/OpenListTeam/OpenList/issues/2211 (d598e)
      - Replace SQLite Driver with glebarez/sqlite to avoid CGO - by @jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2269 (29447)
      - Migrate SQLite to pure-go and add mips compatibility switch - by @Suyunmeng in https://github.com/OpenListTeam/OpenList/pull/2296 (7bea2)
    🚀 Features
    - drivers: Add doubao_new driver - by @Elegant1E in https://github.com/OpenListTeam/OpenList/issues/2114 (e41b6)
    - drivers/123_open: Support 123 official app api - by @PIKACHUIM in https://github.com/OpenListTeam/OpenList/issues/2293 (9fdba)
    - drivers/123open: Support sha1 reuse api - by @gdm257 in https://github.com/OpenListTeam/OpenList/issues/2089 (a121f)
    - drivers/thunder*: Implement GetDetails - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2113 (795a1)
    - permissions: Implement fine-grained permission control - by @Lanfei and Claude Sonnet 4.5 in https://github.com/OpenListTeam/OpenList/issues/2145 (d85f0)
    - security: Add SECURITY.md - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2147 (db0e2)
    🐞 Bug Fixes
    - 115_share: Adjust 115 share driver for official API update - by @SheltonZhu in https://github.com/OpenListTeam/OpenList/issues/2068 (5d9fc)
    - azure: Remove properties and fix prefix - by @bzssm in https://github.com/OpenListTeam/OpenList/issues/2209 (5eaef)
    - deps: Update go4.org digest to a507140 - in https://github.com/OpenListTeam/OpenList/issues/2095 (8431c)
    - driver/wps: Fetch all files via multiple API invocations - by @mkitsdts in https://github.com/OpenListTeam/OpenList/issues/2139 (e0ee7)
    - drivers/cloudreve_v4: Remove token check for share - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2274 (e11b8)
    - drivers/openlist: Pass through frontend refresh flag - by @sevxn007 in https://github.com/OpenListTeam/OpenList/issues/2307 (9e49a)
    - drivers/teldrive: Enhance file listing and upload functionality with pagination and random chunk naming - by @totza2010 and Copilot in https://github.com/OpenListTeam/OpenList/issues/2034 (f5421)
    - net: Honor proxy settings when uploading to 115/115 Open/PikPak OSS - by @Copilot and jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2222 (f3428)
    - offline_download: Prevent infinite retry on status update failure - by @sdvcrx in https://github.com/OpenListTeam/OpenList/issues/2294 (12c9b)
    - server: Add missing return after error responses - by @Lanfei in https://github.com/OpenListTeam/OpenList/issues/2150 (9a2ba)
