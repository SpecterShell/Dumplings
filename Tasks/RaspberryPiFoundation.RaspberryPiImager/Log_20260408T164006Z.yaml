Version: 2.0.8
Installer:
- Architecture: x64
  InstallerUrl: https://github.com/raspberrypi/rpi-imager/releases/download/v2.0.8/imager-v2.0.8.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    What's changed
    - Fastboot:
      - Enumerate storage devices
      - Add mount, unmount, and custom gadget support
      - Rename stage to download
      - Retry on transient USB errors
    - OS Customisation:
      - Don't set any groups, leave it to the OS
      - Use explicit runcmds for passwordless sudo
      - Require active locale selection; no pre-filled defaults
    - UI:
      - Refresh clipboard status as text fields show
    - SSH:
      - Add state machine for handling PuTTY's multiline SSH keys
    - Linux:
      - Explicitly exclude libsystemd
    - Write Operations:
      - Increase watchdog stall timeout to 180s to match the async write timeout
      - Exclude final data sync from write watchdog to avoid false stalls on slow
        cards
    - i18n: Updated French, Slovak translation dictionaries
    - Documentation:
      - Add a screenshot of the interface
    PRs
    - Screenshot by @nafanz in https://github.com/raspberrypi/rpi-imager/pull/1559
    - Improve french translation by @martignoni in https://github.com/raspberrypi/rpi-imager/pull/1560
    - Added a state machine for handling PuTTY's multiline SSH keys by @bjepson in https://github.com/raspberrypi/rpi-imager/pull/1574
    - 2.0.8: Bugfixes, fastboot improvements by @tdewey-rpi in https://github.com/raspberrypi/rpi-imager/pull/1582
    - Update Slovak translation. by @jose1711 in https://github.com/raspberrypi/rpi-imager/pull/1571
    - 2.0.8: GH templates, changelog by @tdewey-rpi in https://github.com/raspberrypi/rpi-imager/pull/1583
    - fix(stall): Relax thresholds, don't count final sync as stallable. by @tdewey-rpi in https://github.com/raspberrypi/rpi-imager/pull/1584
    New Contributors
    - @bjepson made their first contribution in https://github.com/raspberrypi/rpi-imager/pull/1574
    Full Changelog: https://github.com/raspberrypi/rpi-imager/compare/v2.0.7...v2.0.8
