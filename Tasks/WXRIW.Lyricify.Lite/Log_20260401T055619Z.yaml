Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. [Add] Apple Music and Soda Music lyrics source.
    2. [Add] Word-by-word lyrics toggle and lyrics delay settings for each lyrics source.
    3. [Add] Lyrics source disabling options (per-session and global).
    4. [Fix] Optimize Taskbar Lyrics horizontal scrolling animation.
    5. [Add] Vertical adjustment for Taskbar Lyrics.
    6. [Fix] Chinese conversion issue for some track metadata.
    7. [Fix] Translation issue in QQ Music lyrics source.
    8. [Add] What's New window.
    9. [Add] Options to enable Text Bitmap Cache in Dynamic Lyrics Island.
    10. [Add] More sessions support.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 新增 Apple Music（使用前需要先配置）、汽水音乐歌词源。
    2. 新增针对歌词源的启用逐字歌词开关及歌词源的歌词延迟设置。
    3. 新增禁用指定歌词源选项（会话和全局）。
    4. 优化任务栏歌词横向滚动动画。
    5. 添加任务栏歌词纵向调整功能。
    6. 修复部分曲目信息的中文转换问题。
    7. 修复 QQ 音乐歌词源的翻译问题。
    8. 新增“新增功能”窗口。
