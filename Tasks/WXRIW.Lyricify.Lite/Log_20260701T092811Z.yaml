Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. [Add] Apple Music Lyrics migrated from Lyricify 4.
    2. [Fix] Last.fm connection in store version.
    3. [Fix] Spotify Mobile UI Lyrics regional issue.
    4. [Add] it-IT internationalization by pascal-00.
    5. [Add] Microsoft Store license detection for non-Store versions.
    6. [Add] More sessions recognition in settings.
    7. [Add] Option to disable force topmost in Desktop Lyrics.
    8. [Fix] Focused session issue with disabled sessions.
    9. [Fix] Taskbar Lyrics NotifyIcon area recognition.
    10. [Add] Set default session latency of -400 ms for Apple Music sessions.
    11. [Add] Fullscreen lyrics auto hide for Dynamic Lyrics Island and Desktop Lyrics.
    12. [Add] Multi-display support for Taskbar Lyrics.
    13. [Add] Exact Match tag in Debug window.
    14. [Add] Taskbar Lyrics polling frequency option.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 从 Lyricify 4 迁移 Apple Music 歌词界面。
    2. 非商店版本添加 Microsoft Store 许可证检测。
    3. 设置中添加更多会话识别，并将 Apple Music 会话的默认会话延迟设为 -400 ms。
    4. 桌面歌词添加禁用强制置顶选项。
    5. 灵动词岛和桌面歌词支持全屏歌词时自动隐藏。
    6. 任务栏歌词支持多显示器。
    7. 调试窗口添加精确匹配标签。
    8. 修复商店版本 Last.fm 连接问题。
    9. 修复 Spotify 移动界面歌词区域问题。
    10. 修复已禁用会话的聚焦会话问题。
    11. 修复任务栏歌词托盘图标区域识别问题。
    12. 任务栏歌词添加轮询频率选项。
    13. 由 pascal-00 提供的意大利语支持。
