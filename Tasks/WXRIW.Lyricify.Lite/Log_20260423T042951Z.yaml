Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. [Add] Karaoke mode for Taskbar Lyrics.
    2. [Add] Spotify and LRCLIB lyrics source.
    3. [Add] Last.fm scrobble support.
    4. [Add] Option to show track info only in Taskbar Lyrics.
    5. [Fix] Optimize Taskbar Lyrics embedding and support automatic restart when the taskbar crashes.
    6. [Fix] Some issues with Taskbar Lyrics area detection, custom max width, vertical adjustment, and more.
    7. [Add] Playback source info in the debug window and copy session ID button in per-app settings.
    8. [Add] SMTC unavailable notice in settings.
    9. [Add] More sessions recognition in settings.
    10. [Fix] Unsynced lyrics detection in QQ Music lyrics source.
    11. [Fix] Update info lines defination.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 任务栏歌词添加卡拉 OK 逐字歌词。
    2. 添加 Spotify 歌词源（使用前需要先配置）和 LRCLIB 歌词源。
    3. 添加 Last.fm 支持。
    4. 任务栏歌词添加仅显示曲目信息选项。
    5. 优化任务栏歌词嵌入，并支持在任务栏崩溃时自动重开。
    6. 修复任务栏歌词区域识别、自定义最大宽度、纵向调整等功能的部分问题。
    7. 调试窗口添加播放源信息，逐应用配置页添加复制会话 ID 按钮。
