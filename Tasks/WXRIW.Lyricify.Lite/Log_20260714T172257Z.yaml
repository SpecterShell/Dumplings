- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. [Fix] Optimize the Taskbar Lyrics logo size when small taskbar buttons are enabled.
    2. [Fix] Apple Music Lyrics being clipped when scaled.
    3. [Add] Discord RPC support.
    4. [Fix] Improve SMTC compatibility with QQ Music UWP.
    5. [Fix] Romaji display in Taskbar Lyrics.
    6. [Fix] QQ Music word-by-word lyrics fallback to line-synced lyrics and QRC decryption issue in some cases.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 优化启用小任务栏按钮时任务栏歌词 Logo 大小。
    2. 修复 Apple Music 歌词在缩放时被裁切的问题。
    3. 添加 Discord RPC 支持。
    4. 改进 QQ 音乐 UWP 的 SMTC 兼容性。
    5. 修复任务栏歌词中的罗马音显示。
    6. 修复 QQ 音乐逐字歌词回落至逐行歌词以及部分情况下的 QRC 解密问题。
