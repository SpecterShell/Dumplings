- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - SSH:
      - Improved multiple avenues which a server could use to exert disproportionate memory pressure on the client.
    - SFTP drive:
      - The SSH Client now includes WinFsp version 2.2.26194. This addresses CVE-2026-7162, which is a local privilege escalation. Users who install the SSH Client with the SFTP drive feature are recommended to update, especially on multi-user systems. The SFTP drive feature is available if Install WinFsp is selected when installing.
      - The UNC path used by the SFTP drive is now configurable. This makes it practical to configure a UNC path for access by other users on the system.
      - The SFTP drive can now be configured to expose only the UNC path, without assigning a drive letter.
      - The SFTP drive can now be configured to provide access either to the current user, or any user on the system.
ReleaseTime: 2026-07-20
