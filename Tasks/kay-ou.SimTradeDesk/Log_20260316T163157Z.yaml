  Key: ReleaseNotes
  Value: |-
    🐛 修复
    - 数据下载切换市场失效：下载 A 股数据后切换到美股时下载按钮消失（phase 状态泄漏）
    - 检查更新失败：消除冗余的 GitHub API 调用，优先使用已缓存的更新信息
    🔒 安全
    - 美股数据下载权限：仅高级会员可下载美股数据，与回测权限一致
    - 下载中禁止切换市场：防止下载过程中切换市场导致状态混乱
    📦 构建
    - macOS 双架构构建：分别构建 arm64 (Apple Silicon) 和 x64 (Intel) 两个 DMG
    - macOS Gatekeeper 修复脚本：release 附带 mac-fix-gatekeeper.command，双击即可解除系统拦截
