  Key: ReleaseNotes
  Value: |-
    Added
    - Add brand-aware desktop packaging, theme, module, and authentication configuration support.
    - Add release and packaging infrastructure for customer/self-hosted deployments while keeping customer-only modules hidden in the public SimTradeDesk brand.
    Changed
    - Improve CI, release, package, and installer smoke coverage for desktop builds and customer Windows distribution.
    - Improve history restore, configuration caching, and strategy selection behavior.
    Fixed
    - Fix packaged Windows multiprocessing failures by forcing an ASCII-safe joblib temporary directory.
    - Fix desktop update-check string handling and Windows local release npm invocation.
    - Fix Tencent Windows latest checksum publishing so each installer alias has a single-file verification path.
