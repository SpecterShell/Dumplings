  Key: ReleaseNotes
  Value: |-
    New Features
    - Multi-entry file support: Strategies can now have both backtest.py and live.py entry files
    - Editor file tabs: Segmented control in editor title bar to switch between entry files
    - Create live.py: One-click button to create a live entry file from the editor
    - Run entry selection: Choose which entry file to run (backtest/live) from the run panel
    - API endpoints: GET /strategies/{name}/files and POST /strategies/{name}/files/{file}
    - strategy_file passthrough: Backtest runs now record which entry file was used
    Internal
