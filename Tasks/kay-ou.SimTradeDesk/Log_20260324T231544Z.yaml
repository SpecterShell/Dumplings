  Key: ReleaseNotes
  Value: |-
    New Features
    - Version history for live.py: backtest.py and live.py now have independent version history timelines, with file name shown in panel title
    Bug Fixes
    - Fix momentum strategy history 500 error caused by NaN values in trade name field (missing stock names in CSI 300 dynamic constituents)
    - Fix WebSocket log stream crash on malformed JSON messages
    - Fix stripe-webhook missing signature header null check
    - Fix device registration race condition via FOR UPDATE row lock
    - Fix release.py silently swallowing stderr output
    Improvements
    - Replace fragile priceId.includes("premium") with STRIPE_PRICE_PREMIUM env var mapping (falls back to original behavior if unset)
    - Extract SITE_URL env var for checkout redirect URLs (multi-environment support)
    - Remove 27 unused i18n keys (13.5% reduction), fix inconsistent Chinese term for "drawdown"
    - Improve us_simple strategy: data alignment for ATR calculation, log format fix
