  Key: ReleaseNotes
  Value: |-
    Improvements:
    - Added host state and quality information to the Hosts view.
    Resolved Issues:
    - Fixed custom sound notifications for alert resolution events.
    - Fixed an issue with email headers.
    - Fixed the Alerts view layout in the Web Interface when the Filters panel is open.
    - Fixed a potential exception that could occur after restoring the server connection.
    - Fixed an issue that could cause some hosts and groups to disappear from the Hosts view.
    - Fixed an exception after resetting statistics filters via a dialog.
    - Fixed a potential exception during renaming a document tab.
    - Fixed a potential exception that could occur in the Hosts filter editor when custom fields are enabled.
    - Fixed a potential exception while browsing hosts quality information.
    - Fixed text drawing issues in the Hosts tree view.
