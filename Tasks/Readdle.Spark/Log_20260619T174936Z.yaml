  Key: ReleaseNotes
  Value: |-
    Agents, meet inbox.
    Spark CLI can now triage your inbox — letting AI agents act on emails, not just read them. Ask your agent to draft emails and replies, archive and label emails, and more. You choose the agent. You choose which accounts are shared.
    Go to Settings → AI Agents to choose your access level:
    - Off— the agent can’t see this account.
    - Read-only— search, summarize, and pull context (free).
    - Triage— everything in Read-only, plus draft, reply, snooze, pin, label, move, archive, and team comments (Spark Pro).
    Read access stays free. Triage is included with Spark Pro.
    Curated agent skills — including new ones for inbox triage and morning briefings — live at github.com/readdle/spark-cli-skills.
    We’d love to hear how it goes — share feedback at support@sparkmailapp.com

    P.S. If you encounter any issues with the automatic update, please use the following link to download the update manually:
    https://downloads.sparkmailapp.com/Spark3/win/dist/3.29.4.139442/Spark.exe
