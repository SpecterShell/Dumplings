  Key: ReleaseNotes
  Value: |-
    New Features
    New compatibility option: support for legacy software
    This release adds support for legacy applications and libraries (like VB6 SerialPort class) that assume that all serial port write requests always complete synchronously. They incorrectly issue asynchronous write requests and never wait for their completion.
    Now, all supported virtual serial ports may be created with “Force synchronous writes” compatibility option which forces all write requests to complete synchronously.
    Updated Features
    Refreshed UI
    This release introduces a new virtual serial port creation user interface. It provides a central device creation window with some options shared between different supported serial device types.
    Per-device compatibility options
    In addition to specifying global compatibility options, each virtual serial device may now be created with its own compatibility options.
    Ability to edit existing ports in UI configuration utility
    Now it is possible to change several options of existing virtual serial devices using UI configuration utility (it was always possible to do it using API). Not all virtual serial device types support this mode.
