Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Feature‑level permissions in Conditional Access have been expanded to include Remote Terminal.
    - Users can now share their screen from the web version of TeamViewer. A session can be started from the installed TeamViewer application, with no installation required on the remote side.
    - Devices now inherit the policy of their assigned device group by default if no policy is explicitly set. Users can still assign a different policy at any time. This applies only when a device belongs to a single device group.
    - The default setting for “Session Insights logging” (outgoing Session Insights types only) is now set to “Allowed” instead of “After confirmation.” If user interaction is required, the access control can be adjusted locally, via policy, or by enabling the new stop option in Company Settings.
    - Tooltips in the in‑session toolbar have been reworked to provide a more consistent user experience.
    - Administrators can now filter users by creation date to find accounts created within a specific time range.
    - A new column showing the user creation date has been added to the user management page, making newly created accounts easier to identify.

    Improvements
    - Session Insights logging has been improved when used with the “Switch sides with partner” functionality.

    Bugfixes
    - Improved clipboard functionality for more reliable behavior, including when used with remote desktop connections.
    - Fixed a bug where the Share button disappeared after sharing a device group from the command bar.
    - Fixed a bug where the Dashboard button was missing in the QuickActions area for connections to mobile devices.
    - Fixed a bug where policies were not displayed properly when a device belonged to more than one device group.
    - Fixed a bug where the delete confirmation dialog did not close after a successful deletion.
    - Fixed a bug in the Event Log where outgoing connections to managed devices sometimes displayed the device ID instead of the signed‑in account as the author. Outgoing connections now consistently display the account as the author.
    - Fixed an issue where users could enter edit mode for other users before permissions were fully loaded, leading to confusing error messages.
    - Fixed a security vulnerability (Security Bulletin: TV-2026-1006).
- Locale: de-DE
  Key: ReleaseNotes
  Value: |-
    New Features
    - Die Feature‑Berechtigungen in Conditional Access wurden um Remote Terminal erweitert.
    - User können jetzt ihren Bildschirm über die Webversion von TeamViewer freigeben. Eine Session kann über die installierte TeamViewer-Anwendung gestartet werden; eine Installation auf der Gegenseite ist nicht erforderlich.
    - Geräte übernehmen nun standardmäßig die Richtlinie ihrer zugewiesenen Gerätegruppe, sofern keine Richtlinie explizit festgelegt wurde. User können jederzeit eine andere Richtlinie zuweisen. Dies gilt nur, wenn ein Gerät zu einer einzigen Gerätegruppe gehört.
    - Die Standardeinstellung für „Session Insights‐Protokollierung“ (nur ausgehende Session Insights‐Typen) ist jetzt auf „Zulässig“ statt „Nach Bestätigung“ gesetzt. Falls eine User-Interaktion erforderlich ist, kann die Zugriffskontrolle lokal, per Richtlinie oder durch Aktivieren der neuen Stopp-Option in den Unternehmenseinstellungen angepasst werden.
    - Die Tooltips in der In‑Session‑Toolbar wurden überarbeitet, um eine konsistentere User Experience zu gewährleisten.
    - Administrator:innen können jetzt User nach Erstellungsdatum filtern, um Accounts zu finden, die innerhalb eines bestimmten Zeitraums erstellt wurden.
    - Auf der Userverwaltung wurde eine neue Spalte mit dem Erstellungsdatum des User hinzugefügt, sodass neu erstellte Konten leichter zu erkennen sind.

    Improvements
    - Die Protokollierung von Session Insights wurde bei Verwendung der Funktionalität „Richtungswechsel mit Partner“ verbessert.

    Bugfixes
    - Verbesserte Zwischenablage-Funktionalität für ein zuverlässigeres Verhalten, auch bei Verwendung mit Remote-Desktop-Verbindungen.
    - Es wurde ein Fehler behoben, durch den die Schaltfläche „Teilen“ verschwand, nachdem eine Gerätegruppe über die Befehlsleiste geteilt wurde.
    - Ein Fehler wurde behoben, durch den die Schaltfläche „Dashboard“ im Bereich „QuickActions“ bei Verbindungen zu mobilen Geräten fehlte.
    - Es wurde ein Fehler behoben, durch den Richtlinien nicht korrekt angezeigt wurden, wenn ein Gerät zu mehr als einer Gerätegruppe gehörte.
    - Ein Fehler wurde behoben, bei dem sich der Bestätigungsdialog für das Löschen nach erfolgreichem Löschen nicht schloss.
    - Ein Fehler im Ereignisprotokoll wurde behoben, bei dem bei ausgehenden Verbindungen zu verwalteten Geräten manchmal die Geräte-ID statt des angemeldeten Kontos als Autor angezeigt wurde. Ausgehende Verbindungen zeigen nun einheitlich das Konto als Autor an.
    - Es wurde ein Problem behoben, bei dem User den Bearbeitungsmodus für andere User aufrufen konnten, bevor die Berechtigungen vollständig geladen waren, was zu verwirrenden Fehlermeldungen führte.
    - Behebung einer Sicherheitslücke (Sicherheitsbulletin: TV-2026-1006).
