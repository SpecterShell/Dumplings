- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Try the all-new TeamViewer Remote!

    Improvements
    - Please send us your feedback on how we can further improve TeamViewer: Take this short survey

    Bugfixes
    - Fixed a bug that caused the profile picture to no longer being shown on the dialogue when connecting to a managed device via prompt for confirmation.
    - Fixed a bug that caused the clipboard synchronization to sometimes take longer or doesn't synchronize at all.
    - Fixed a bug that occurred during the remote reboot triggered from the in-session toolbar in a connection to a QuickSupport module without having admin rights on the remote device.
    - Resolved a bug that prevented users from sending feedback after completing a free session.
- Locale: de-DE
  Key: ReleaseNotes
  Value: |-
    New Features
    - Erleben Sie das brandneue TeamViewer Remote!

    Improvements
    - Geben Sie uns gerne Feedback zu den neuesten und zukünftigen Verbesserungen der Benutzeroberfläche: An Umfrage teilnehmen

    Bugfixes
    - Behebung eines Fehlers, der dazu geführt hat, dass das Profilbild im Dialog nicht angezeigt wurde, wenn eine Bestätigung der Verbindung zu einem verwalteten Gerät erforderlich war.
    - Behebung eines Fehlers, der dazu geführt hat, dass die Zwischenablage manchmal nicht oder nur mit Verzögerung synchronisiert wurde.
    - Behebung eines Fehlers, der auftrat, wenn man über die Toolbar den entfernten Computer neustarten wollte, auf dem ein QuickSupport-Modul ohne Admin-Rechte installiert ist.
    - Es wurde ein Fehler behoben, der Benutzer daran hinderte, nach Abschluss einer kostenlosen Remote Session Feedback zu senden.
