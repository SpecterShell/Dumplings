Locale:
- Locale: de-DE
  Key: ReleaseNotes
  Value: |-
    New Features
    - Der Dialog "Add access gateway" ist jetzt direkt in der Agentless‑Access‑Ansicht verfügbar, sodass ein Gateway ohne zusätzliche Navigation einfacher eingerichtet werden kann.

    Improvements
    - Es wurde ein Fehler behoben, durch den neue Nutzer fälschlicherweise einen Hinweis zur Gerätemigration angezeigt bekamen.
    - Falsche Fehlermeldungen werden nicht mehr angezeigt, wenn vorübergehend ein interner Servicefehler auftritt.

    Bugfixes
    - Ein Problem wurde behoben, das auf manchen Systemen zu hohem Ressourcenverbrauch führte.
    - Es wurde ein Darstellungsfehler im Bestätigungsdialog beim Löschen von Gerätegruppen behoben.
    - Es wurde ein Fehler behoben, der bei einem Netzwerkfehler dazu führen konnte, dass zugewiesene Richtlinien von einem Gerät entfernt wurden.
    - Ein Fehler wurde behoben, der beim Verwenden der Option ‚Alle auswählen‘ auf der Geräte‑Seite zu einem Problem führte.
    - Ein Problem wurde behoben, bei dem Authentifizierungsversuche beim Verbinden zu bestimmten Remote-Geräten (Windows 10/Server 1809) nach dem Update auf Version 15.76.3 fehlgeschlagen sind.
