- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. [Fix] Optimize Taskbar Lyrics loading.
    2. [Fix] Apple Music Lyrics animation stutter after track change.
    3. [Fix] Optimize the Taskbar Lyrics logo size when small taskbar buttons are enabled.
    4. [Fix] Apple Music Lyrics being clipped when scaled.
    5. [Fix] Handle Spotify refresh token expiration.
    6. [Fix] Romaji display in Taskbar Lyrics.
    7. [Fix] QRC decryption issue in some cases.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 优化任务栏歌词加载。
    2. 修复 Apple Music 歌词切歌后动画卡顿的问题。
    3. 优化启用小任务栏按钮时任务栏歌词 Logo 大小。
    4. 修复 Apple Music 歌词缩放时被裁切。
    5. 处理 Spotify Refresh Token 六个月强制过期的问题。
    6. 修复任务栏歌词中的罗马音显示。
    7. 修复部分情况下 QRC 解密问题。
