  Key: ReleaseNotes
  Value: |-
    Bug fixes
    - Use a thread for initial XAML diagnostics initialization, to hopefully solve time out issues
    - Make MultitaskingViewVisibilitySink agile to hopefully reduce issues with desktop switching and Win-Tab
    - Add functionality to allow killing Explorer when the package gets uninstalled, which should solve issues when the app is immediately reinstalled after being uninstalled
    - Fix compatibility issues with application that fake a taskbar
    Various improvements/changes
    - Support taskbar preview via window messages
