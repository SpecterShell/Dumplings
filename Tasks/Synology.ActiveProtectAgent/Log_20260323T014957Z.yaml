- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    What's New
    1. Added support for backup and restore on macOS Tahoe 26.
    2. Added support for backing up systems running Linux kernel 6.14. Learn more
    3. Added support for backup and restore of physical servers running Windows Server 2025, including protection for their databases.
    Fixed Issues
    1. Fixed an issue that prevented the ActiveProtect agent for Linux from installing on Debian 12.
