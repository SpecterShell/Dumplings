  Key: ReleaseNotes
  Value: |-
    PhpStorm 2026.2.0.1 is available
    PhpStorm 2026.2.0.1 is out with the following hotfix:

    Resolved issues affecting projects containing files stored in cloud-synced folders on Windows, preventing repeated project reloads and files from disappearing or closing unexpectedly.

    - Files from cloud-synced folders (OneDrive, Dropbox) are closed automatically after opening (Windows) [IJPL-250598]
    - Files in Project View disappear after opening project/folder (Windows) [IJPL-250615]
    - Disable vfs.windows.use.buffered.directory.stream in platform [IJPL-250709]
    For more details and a full list of fixes, please refer to the release notes.

    - Download PhpStorm
    - Tweet us
    - Report bugs to our issue tracker
