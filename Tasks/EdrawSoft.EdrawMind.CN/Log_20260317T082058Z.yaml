  Key: ReleaseNotes
  Value: |-
    文本块功能升级
    1. 新增层级设置支持 完善文本块编辑体系，支持自定义层级配置，方便梳理内容结构、区分内容主次，适配更复杂的排版与内容整理需求。
    2. 新增多选功能 打破单次单选限制，支持批量选中多个文本块，大幅缩减重复操作步骤，提升批量编辑、调整的效率。
    3. 支持组合操作 可将多个独立文本块一键组合为整体模块，组合后统一移动、编辑、管理，避免分散调整，优化整体排版操控体验。
    4. 新增快捷键移动功能 文本块、智能关系线均支持快捷键移动，新增专属快捷移动按键，无需鼠标拖拽，通过快捷键即可精准微调位置，操作更高效，适配高频编辑场景，提升操作流畅度。
    图标面板优化
    1. 新增插入标签入口 优化标签操作路径，在图标面板右侧直接增设标签插入快捷入口，省去跳转步骤，快速完成标签添加，简化操作流程。
