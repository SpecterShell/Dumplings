    一、全新手绘思维导图模式上线！
    告别千篇一律的冰冷框架，带你重温思维导图创始人东尼 · 博赞（Tony Buzan）笔下最自然、有机的思维绽放！
    我们为您带来了全新的【手绘模式】，让每一次灵感记录都成为兼具知识沉淀与高颜值的艺术创作。
    （1）功能入口：在产品首页左下角，点击【手绘模式】切换按钮，即可切换到手绘模式。
    （2）功能说明：您可以随时切换回【专业模式】，在手绘模式下产品界面会发生改变，创建的手绘思维导图文件是全新的文件格式。

    二、手绘思维导图的特性
    打破传统排版的束缚，还原最真实的纸笔触感！
    （1）灵动线条，自由生长：所有的线条位置支持自由调整，长按“+”按钮即可自由拖拽出分支线条，就像在纸上画手绘脑图一样。
    （2）字随线动，自然呼吸：认搭配专属手绘字体，文字会随着分支线条的弧度自然弯曲贴合，视觉体验更具呼吸感。
    （3）随心点缀，图文并茂：支持便捷插入本地图片和官方插画，让您的知识图谱更加生动。

    三、手绘思维导图插画功能
    不仅要效率，更要极高的视觉表现力！
    内置海量精品插画，涵盖各类风格（彩铅、水彩、像素、3D 等）。
    智能语义匹配： 选中任意节点，系统即可精准识别文字语义，并从庞大的插画库中秒速为您匹配最契合的图案，让思维导图瞬间“活”起来！

    四、快捷图片处理
    为您提供轻量、高阶的图片处理能力，所有图像处理一站式搞定！
    （1）一键抠图：轻松剥离图片背景，保留核心主体，让素材与手绘脑图完美融合，告别突兀的白边。
    （2）基础的图像处理：裁剪、替换、镜像翻转等高频功能一应俱全，触手可及。

    五、手绘思维导图 AI 功能 （开放测试期全量限免）
    目前手绘模式正处于开放测试阶段，所有相关 AI 功能均可免费无限畅享！
    （1）AI 一键生成手绘脑图（强烈推荐！）： 灵感枯竭？只需输入一句话，AI 即可为您“变”出一份图文并茂、逻辑清晰且惊艳眼球的手绘思维导图！
    （2）AI 智能配色： 智能分析全局内容与上下文语境，为您量身定制并一键应用绝美配色方案。
    （2）AI 专属配图生成： 找不到满意的素材？输入描述语，让 AI 直接为您描绘出不同风格的专属插图。
