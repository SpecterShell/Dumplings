  Key: ReleaseNotes
  Value: |-
    「AI 解析」功能入口搬新家
    原「AI 解析」入口已整合至首页左侧边栏-万兴脑图 AI。点击界面输入框旁的附件按钮即可上传并解析文件。支持自定义要求总结内容和持续对话。
    附件一键生成 PPT。万兴脑图 AI 支持上传 PDF、Word、Excel、图片等多格式文件，AI 自动提取内容并生成完整 PPT。调研报告、会议资料、课程文档都能快速变成演示文稿。

    二、AI 创作首页全新升级
    首页 UI 与 AI 创作入口优化，思维导图、PPT、文件总结等能力更集中，打开首页即可快速开始创作。
    新增扣点标准说明和附件上传引导，支持格式、文件大小、点数消耗等信息更透明，使用更放心。
    AI 对话中的历史输入支持一键复制，也可带回输入框重新编辑，常用提示词复用更方便。

    三、桌面端 AI 悬浮球上线
    新增桌面端 AI 悬浮球，支持随时唤起万兴脑图 Agent。划词后即可快速生成导图，灵感闪现即刻成图。

     四、搜索功能上新
    新增功能搜索，输入关键词即可快速找到并使用功能。
