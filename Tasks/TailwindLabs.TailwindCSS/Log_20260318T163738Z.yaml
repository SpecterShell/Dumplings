Installer:
- Architecture: x64
  InstallerUrl: https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.2/tailwindcss-windows-x64.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Fixed
    - Don't crash when candidates contain prototype properties like row-constructor (#19725)
    - Canonicalize calc(var(--spacing)*…) expressions into --spacing(…) (#19769)
    - Fix crash in canonicalization step when handling utilities containing @property at-rules (e.g. shadow-sm border) (#19727)
    - Skip full reload for server only modules scanned by client CSS when using @tailwindcss/vite (#19745)
    - Add support for Vite 8 in @tailwindcss/vite (#19790)
    - Improve canonicalization for bare values exceeding default spacing scale suggestions (e.g. w-1234 h-1234 → size-1234) (#19809)
    - Fix canonicalization resulting in empty list (e.g. w-5 h-5 size-5 → '' instead of size-5) (#19812)
- Key: ReleaseNotesUrl
  Value: https://github.com/tailwindlabs/tailwindcss/releases/tag/v4.2.2
