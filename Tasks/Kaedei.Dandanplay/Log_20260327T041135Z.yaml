  Key: ReleaseNotes
  Value: |-
    1. 弹幕引擎底层升级，渲染效率大幅提升；
    2. 新增全局快捷键功能；
    3. 新增快捷键：跳转到下一章节（默认 N）和重新加载视频（默认 R）；
    4. 新增支持加载视频文件所在目录下的字体文件，支持设定字体文件夹；
    5. 新增字幕默认字体设置；
    6. 新增字幕刷新率设置；
    7. 优化了字幕渲染性能，大幅提升了字幕显示时的播放器整体流畅度；
    8. 优化了使用『弹幕外挂』时外部窗口关闭的处理方式；
    9. 修复了使用『弹幕外挂』时仍在主窗口渲染字幕的问题；
    10. 修复了播放 SRT 字幕文件时，缓存可能没有及时更新的问题；
    11. 修复了媒体库中，点击“在线更新视频信息”按钮无反应的问题；
    12. 修复了在多选列表中进行框选时，可能会出现选中状态不正确或报错的问题。
