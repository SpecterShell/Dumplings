  Key: ReleaseNotes
  Value: |-
    更新内容：
    1. 首页新增“排行榜”子页面，可以查看多个热门分类的数据排行；
    2. 支持将“在线观看”的剧集加入播放列表，在列表中可以直接切换剧集；
    3. mpv 内核支持串流播放；
    4. 新增支持设置 MonoTorrent v3+ 内核的端口号；
    5. 优化了 mpv 内核高帧率场景下的渲染调度逻辑；
    6. 将嗅探窗口调整为播放开始后不自动关闭；
    7. 优化了图片的加载速度，修复了图片加载中无法点击的问题；
    8. 优化了第三方弹幕窗口的确认逻辑和 UI 布局；
    9. 修复了 mpv 内核渲染阻塞导致的播放器卡死问题；
    10. 修复了媒体库扫描入库时可能触发闪退的问题。
