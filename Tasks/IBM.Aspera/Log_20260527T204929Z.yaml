Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New features
    - Shares integration: Link Shares accounts using local user authentication. Supports file browsing, upload and download, and file synchronization. Requires IBM Aspera Shares 1.11.1 or later.
    - Windows: Keyboard shortcut to open the application log folder.
    - New RPC methods (integration support): Allow external applications to interact with the desktop app programmatically:
      - test_ssh_ports – Check TCP connectivity to a specified SSH port.
      - authenticate – Validate connectivity to a remote HSTS.
      - show_save_file_dialog – Open the system save dialog and return the selected path.
      - show_transfer_monitor – Display the transfer rate graph for a specific transfer.
      - show_transfer_manager – Open the Transfer Activity view.
      - show_about – Open the About view.
      - get_directory_listing – Browse and traverse directories.
    Enhancements
    - Drag-and-drop reliability on Windows.
    - Automatic update error messages with more context.
    - Startup behavior when the database fails to load.
    Resolved issues
    - Windows: Drag-and-drop resolving incorrect files.
    - Folder browser search text persisting after navigation.
    - Transfers from Shares not opening the Transfer Activity view.
    - macOS crashes in certain drag-and-drop scenarios.
