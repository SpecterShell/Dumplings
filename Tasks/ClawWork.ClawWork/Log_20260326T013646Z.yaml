  Key: ReleaseNotes
  Value: |-
    ✨ What's New
    - 🌍 Multi-language support (8 locales) — ClawWork now ships with English, Simplified Chinese, Traditional Chinese, Japanese, Korean, German, French, and Spanish. The app auto-detects your system language on first launch, and you can switch anytime in Settings. Includes a CI gate to catch missing translation keys. by @samzong in #166
    - 📁 Local workspace files in @ mention picker — The @ picker now has a Local tab that lets you browse and attach files from your workspace directory without leaving the chat input. by @samzong in #164
    - 🥚 Developer mode Easter egg — Tap the version number in Settings 7 times to unlock developer mode, revealing debug tools and internal state inspection. by @samzong in #172
    🏗️ Build & Platform
    - 🍎 Separate macOS arm64 and x64 builds — macOS universal binary has been split into dedicated arm64 and x64 DMGs, reducing download size for users who know their architecture. by @samzong in #168
    🐛 Bug Fixes
    - Fixed macOS menu keyboard shortcuts not working — added explicit accelerator bindings for all menu items by @samzong in #171
    - Fixed dev release CI failing when stale release assets block upload by @samzong in #169
    🔧 Engineering
    - Semantic typography system — replaced ad-hoc font classes with type-* utility classes for consistent text sizing and spacing across the app by @samzong in #170
    - Complete UI contract overhaul — density tokens, layout tokens, persistent user preferences, and dead code cleanup by @samzong in #165
    📖 Docs
    - Bilingual keynote with Chinese support, new slides, and narrative restructure by @samzong in #173
