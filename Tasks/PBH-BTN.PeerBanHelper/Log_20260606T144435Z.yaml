  Key: ReleaseNotes
  Value: |-
    调整
    自 2026 年 7 月起，我们将逐步停止原 2024-2025 期间使用的临时域名 *.ghostchu-services.top，并迁移相关服务至 pbh-btn.com 正式域名下。原有域名将在 2027 年 2 月停止续费，并永久终止服务。
    通过升级到此修补版本，PeerBanHelper 将为您自动更新截至上一版本中仍在使用旧 API 域的配置项到最新的正式域名，无需任何其它额外操作。
    - 原 ghostchu-services.top 域开始启动废弃程序，替换至新服务域 pbh-btn.com。升级到此版本将自动完成配置文件升级。@Ghost-chu
    新的映射关系更改如下：
    - BTN 规则订阅更新地址
      - 原地址：https://bcr.pbh-btn.ghorg.ghostchu-services.top/*
      - 新地址：https://bcr.pbh-btn.com/*
    - BTN Bootstrap 配置启动地址
      - 原地址（2024-2025 上半年）：https://btn-prod.ghostchu-services.top/ping/config, https://sparkle.ghostchu-services.top/ping/config
      - 新地址：https://sparkle.ghostchu.com/ping/config (中国大陆中继节点), https://sparkle.pbh-btn.com/ping/config (全球节点)
    错误修复
    - 尝试修复 PostgreSQL 驱动出现有关 percent 的字段报错问题 @Ghost-chu
    - (dev 向前移植) 修复虚拟线程调度器使用不当，导致虚拟线程被意外池化的问题 @Ghost-chu
    - (dev 向前移植) 修复 PBH Plus 许可证吊销系统从未工作的问题 @Ghost-chu
