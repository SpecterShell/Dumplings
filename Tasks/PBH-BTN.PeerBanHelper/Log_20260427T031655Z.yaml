  Key: ReleaseNotes
  Value: |-
    [!NOTE]
    这是一次计划外更新，用以解决 2604 版本的 GeoCN 数据库读取的问题。由于目前有相当数量的模块依赖 GeoCN 数据，建议您进行更新，以免 GeoCN 本地缓存更新后地理位置信息功能失效，导致反吸血能力和数据统计受到影响。
    错误修复
    - 修复 2026 年 04 月 GeoCN 版本 IPDB 无法解析和读取的问题 @Ghost-chu
      - 注意：2604 版本的 GeoCN 数据库格式产生了重大更改，对于 IPv4 数据类型不再有 “网络类型” 分类，这意味着 2604 版本开始 IPV4 的 “网络类型” 封禁功能将失效。
      - 我们正在寻找替代，但考虑到大部分此类数据产品都是售价高昂的商业产品，可能不会有优秀替代。如果您知道其它高精度 IP 数据库可用，请与我们联系。
      - 自 2604 版本开始的 GeoCN 库使用行政区划代码映射地理位置信息，该映射表内置于 PeerBanHelper JAR 中，精确到区级，当行政区划发生更改后，请您注意新发布的 PeerBanHelper，以便更新区划信息。
      - 行政区划代码映射表数据来自 xiangyuecn/AreaCity-JsSpider-StatsGov。
      - 当前同时支持 GeoCN 第一版格式和 GeoCN 第二版格式。
      - 再次感谢 ljxi/GeoCN 项目多年以来的持续维护❤。
    - 修复 AutoRangeBan 连锁封禁日志消息显示异常的问题 @paulzzh
    优化
    - 自动清除历史运行日志压缩包，避免日志撑爆硬盘 @Ghost-chu
