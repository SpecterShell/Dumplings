- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    This version contains compatibility updates for Jira, GitHub, and Windows installation.
    - CatLight now supports the latest Jira Cloud search API and still falls back to the older Jira Server / Data Center search API when needed.
    - GitHub integration now handles newer GitHub Actions workflow statuses and conclusions, and is more tolerant of missing or changed pull request and issue metadata returned by the GitHub API.
    Windows signing note: we changed the Windows code signing certificate used for CatLight. Because Microsoft Defender SmartScreen builds reputation for each new certificate over time, some Windows users may see a SmartScreen warning for a while after installing this version.
    Download the latest version from https://catlight.io/downloads
