  Key: ReleaseNotes
  Value: |-
    Features
    - 新增消息合并转发，支持批量选择后一次转发，分享聊天内容更方便。
    - 现在可以按项目负责人筛选任务，查找和整理任务更省时。
    - 支持解除任务关联，调整任务关系更灵活。
    - 新增 AI 自动分析开关，可按需开启或关闭，使用起来更可控。
    - 安装和修改设置时会自动检查应用编号与端口是否冲突，减少配置出错和无法启动的情况。
    - 支持自定义 AI 服务地址，连接和接入方式更灵活。
    Bug Fixes
    - 修复了 AI 助手在部分页面显示异常的问题，查看和使用时更稳定。
