  Value: |-
    Features
    - 系统设置新增「创建项目」权限开关，可指定由所有人、部门负责人或特定人员创建项目，未授权时自动隐藏新建入口，管理更清晰。
    - 会员卡片新增「项目与任务」入口，可直接查看该成员参与的项目、待办与已完成任务，团队协作一目了然。
    - 审批详情支持删除已结束的审批，由发起人或管理员清理无用记录更方便。
    - 管理员现在可以设置全员群的群名称，便于统一团队群组的展示。
