  Key: ReleaseNotes
  Value: |-
    What's Changed
    A feature-packed release introducing intelligent speed scheduling, automatic file categorization with archiving, system proxy auto-detection, and a complete animation architecture overhaul. The download grid has been replaced with a modern pill-based layout, and all list animations are now powered by @formkit/auto-animate for jitter-free transitions.
    ✨ New Features
    - Speed scheduler — Schedule download speed limits by time period with configurable profiles
    - Automatic file categorization & archiving — Downloads are automatically sorted into folders by file type (video, audio, documents, etc.) with configurable categories and auto-archive support
    - System proxy detection — One-click detection of OS-level proxy settings (macOS scutil, Windows multi-protocol registry) with auto-fill into download proxy fields
    - Fixed brand watermark — The Motrix Next logo now stays centered in the viewport while task cards scroll underneath
    🛠 Improvements
    - Pill-based download layout — Replaced the download grid cards with a responsive, modern pill-based row layout
    - AutoAnimate for all list animations — Replaced hand-crafted WAAPI hooks and TransitionGroup CSS with @formkit/auto-animate across three components, eliminating ~110 lines of fragile animation code
    - Smoother transitions — Updated lock pill animation to use smooth exit, added slide-fade to schedule warnings, and smooth panel transitions for the torrent upload zone
    - Auto-archive UX — Improved archive logic with base directory validation and enhanced UI components for consistency
    - Proxy detection robustness — Windows multi-protocol parsing, macOS scutil integration, minimum detection duration, and structured logging
    🐛 Bug Fixes
    - Fixed task list cards flickering and layout jumping during deletion
    - Fixed torrent batch list "ghost gap" flash when deleting middle items
    - Fixed watermark scrolling with content instead of staying fixed
    - Fixed rare watermark flash on tab switches caused by component destruction/recreation
    - Fixed CI false-positive from missing Element.prototype.animate in test environment
