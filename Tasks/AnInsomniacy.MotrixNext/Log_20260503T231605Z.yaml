  Key: ReleaseNotes
  Value: |-
    What's Changed
    Motrix Next v3.8.7 improves external download handling, app activation behavior, update checks, and remote integration compatibility. This release includes the new Latest Across Channels update option, stronger diagnostics for browser and deep-link inputs, unified window wake-up behavior, improved native menu action handling, and restored remote API/RPC access for configured integrations.
    ✨ New Features
    - Latest Across Channels — Added a new update channel option that checks both stable and beta releases, then selects the newest valid upgrade.
    - Every Startup update checks — Added an update-check interval that runs whenever Motrix Next starts.
    - Native frontend actions — Added queued frontend action handling for native menu and tray-triggered operations.
    - Deep link diagnostics — Added structured diagnostics for Motrix new-task deep links and external inputs.
    🛠 Improvements
    - Unified window activation across tray, app relaunch, and deep-link handling.
    - Improved macOS-specific frontend action channels and coverage.
    - Added privacy-preserving external input summaries to make future download-routing issues easier to diagnose.
    - Relaxed configured REST API and aria2 RPC access so trusted remote integrations can connect when users configure matching ports and secrets.
    🐛 Bug Fixes
    - Fixed app relaunch and tray/deep-link wake-up paths that could focus the app without reliably restoring the expected frontend action.
    - Fixed update-channel behavior so users can choose stable, beta, or the newest release across both channels without losing fixed-channel behavior.
