  Key: ReleaseNotes
  Value: |-
    What's Changed
    This release decouples seeding tasks from pause operations and fixes the system tray menu.
    🐛 Bug Fixes
    - Pause All no longer stops seeding tasks — "Pause All" (toolbar, tray, macOS menu) now pauses only active downloads, leaving seeding tasks undisturbed
    - Pause All button disables correctly — When only seeding tasks are active, the "Pause All" button is now grayed out instead of clickable
    - Double-click no longer pauses seeding tasks — Double-clicking a seeding task card is now a no-op, consistent with the single-task action buttons
    - Toggle shortcut skips seeding tasks — Keyboard/toggle actions no longer accidentally pause seeding tasks
    - System tray menu fully functional — Added missing core:window:allow-unminimize permission that caused all tray menu actions (Show, New Task, Pause All, Resume All) to fail silently
