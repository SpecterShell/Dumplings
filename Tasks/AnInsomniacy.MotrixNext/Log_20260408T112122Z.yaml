  Key: ReleaseNotes
  Value: |-
    What's Changed
    This release introduces the Smart Capsule Speedometer — a fully redesigned speed indicator in the bottom-right corner that dynamically adapts its size and layout based on download activity. Also included is a complete overhaul of the Windows title bar to match Windows 11 Fluent Design.
    ✨ New Features
    - Smart Capsule Speedometer — two-state adaptive widget that expands when downloads are active and compacts when idle, with smooth CSS-animated width transitions driven by ResizeObserver
    - Speed Limit Toggle — left-click the capsule to toggle speed limits on/off; right-click to configure upload/download limits via an inline popover
    - Lock Pill Indicator — circular badge in the top-left corner of the capsule that appears when speed limits are active, themed via color-mix for automatic M3 color scheme adaptation
    🛠 Improvements
    - Adaptive capsule width — the capsule grows and shrinks smoothly to fit content (speed values, limit badges) using a dual-layer ResizeObserver architecture that avoids circular dependencies
    - Unified idle layout — idle mode reuses the same dual-row structure as active mode, hiding speed values via CSS transitions instead of swapping templates
    - Windows 11 Fluent Design title bar — redesigned WindowControls with proper segmented layout, hover states, and localized tooltips matching native Windows 11 behavior
