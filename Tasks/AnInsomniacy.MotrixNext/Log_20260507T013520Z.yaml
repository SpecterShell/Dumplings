  Key: ReleaseNotes
  Value: |-
    What's Changed
    Motrix Next v3.8.8 brings several focused desktop quality improvements from the beta cycle. This release fixes macOS tray icon rendering, improves lightweight-mode window restoration, and adds the recent and favorite folder picker to the default download path setting.
    ✨ New Features
    - Download path history in Settings — Added the existing recent and favorite folder picker to the default download path field in Downloads preferences.
    - Shared directory picker — Add Task and Downloads preferences now share the same directory history data, keeping saved paths in sync.
    🛠 Improvements
    - Preserved the sidebar logo color through the existing Material 3 theme token system.
    - Made the sidebar logo visual-only to avoid accidental GitHub navigation.
    - Reused the same window-state restore path for startup and lightweight window recreation.
    🐛 Bug Fixes
    - Fixed macOS tray icon visibility by preserving template image rendering.
    - Fixed lightweight mode resetting window size and position after restoring from the tray.
    - Preserved saved window geometry before destroying the WebView in lightweight mode.
