    - aria2 engine upgrade — Updated aria2c sidecar binaries to the latest build for all six target platforms (macOS arm64/x64, Windows x64/ARM64, Linux x64/ARM64). Linux binaries are statically linked for maximum compatibility
    - Linux corner rendering fix — Fixed window border-radius corners showing opaque background color after maximize → restore cycle on Linux (WebKitGTK)
