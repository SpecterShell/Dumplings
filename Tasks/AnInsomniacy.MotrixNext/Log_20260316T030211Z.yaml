  Key: ReleaseNotes
  Value: |-
    What's Changed
    Patch release that fixes a Linux .deb installation conflict reported on Deepin and other distributions.
    🐛 Bug Fixes
    - Fixed .deb package conflict with system aria2 — The bundled aria2c sidecar binary has been renamed from aria2c to motrixnext-aria2c, resolving the dpkg error "Trying to overwrite /usr/bin/aria2c, which is also included in package aria2" that occurred on systems with aria2 already installed.
    - Fixed single-task stop-seeding toast — Stopping seeding on a single task now correctly shows "Seeding stopped" instead of "All seeding stopped".
