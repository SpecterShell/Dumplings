  Key: ReleaseNotes
  Value: |-
    What's Changed
    This stable release updates the bundled aria2-next engine, separates Motrix Next and aria2-next logging behavior, simplifies protocol handler settings, and cleans up outdated configuration and test paths.
    ✨ New Features
    - Separate log levels — Added independent log level controls for Motrix Next and aria2-next.
    - Managed aria2-next logs — aria2-next logs are now handled separately from Motrix Next logs in diagnostics and cleanup.
    🛠 Improvements
    - Updated bundled aria2-next sidecar binaries for macOS, Windows, and Linux.
    - Removed obsolete async DNS configuration after the engine returned to native DNS handling.
    - Simplified protocol handler preferences and removed the protocol hijack warning flow.
    - Remote .torrent links now download as ordinary torrent files.
    - Improved preference hints and refreshed BT-related localization across all supported languages.
    - Cleaned obsolete logging, startup, tray, protocol, updater, and UI regression tests.
    🐛 Bug Fixes
    - Fixed a Linux clippy failure by restricting DeepLinkExt usage to macOS-only code.
    - Fixed managed log cleanup so rotated aria2-next log files are handled correctly.
    - Kept remote torrent handling aligned with aria2-next save mode.
