    What's Changed
    This stable release promotes the v3.8.9 beta line with native download task notifications, stronger filename handling, clearer localized messages, and small UI and Linux cleanup fixes.
    ✨ New Features
    - Native task notifications — Added system notifications for download completion, BitTorrent completion, and download errors.
    - Improved notification text — Updated notification messages to English and improved error formatting.
    🛠 Improvements
    - Improved filename handling for accented characters.
    - Enhanced decoding for legacy percent-encoded UTF-8 filenames.
    - Improved filename sanitization and related test coverage.
    - Aligned main layout items to the start for cleaner UI positioning.
    - Updated task localization strings across multiple languages.
    - Clarified purge record confirmation messages across multiple languages.
    🐛 Bug Fixes
    - Fixed the Catalan purge record confirmation message.
    - Silenced Linux notification dispatch dead code.
