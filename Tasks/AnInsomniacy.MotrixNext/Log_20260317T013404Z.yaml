  Key: ReleaseNotes
  Value: |-
    What's Changed
    This release focuses on stability improvements, preference management enhancements, and critical compatibility fixes for download engines across all platforms.
    ✨ New Features
    - Preference hot-reload — Non-restart-required settings are now applied to aria2 instantly without restarting the engine
    - RPC security warning — A warning is now displayed when the RPC secret is left empty
    - Increased connection limits — Maximum connections per server raised from 16 to 128
    🛠 Improvements
    - Preference page reorganization — Restart Engine button moved to the persistent action bar; Restore Defaults relocated to Advanced → Reset section
    - Engine restart messaging — Confirmation text refined from "Some changes" to "This change" across all 26 locales
    - Async preference validation — Settings are now validated asynchronously for a smoother UX
    - Updated aria2c binaries — Shipped with latest engine binaries
    - Bug report template — Added Windows (ARM64) option, clarified diagnostic log instructions
    - Window management — Improved maximization tracking with OS-specific border-radius handling
    🐛 Bug Fixes
    - Fixed DNS resolution failure on 302 redirects — Disabled c-ares async DNS in favor of OS native resolver, resolving download failures for redirect-heavy links (e.g., cloud drive CDN downloads) on Windows, Linux, and macOS
