- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    [!CAUTION]
    v3.2.2 Windows users should update immediately — that version shows a native "Tauri App" title bar on Windows, breaking the custom UI and transparency.

    What's Changed
    Emergency fix for a critical Windows UI regression introduced in v3.2.2.
    🐛 Bug Fixes
    - Windows native title bar — Fixed tauri.windows.conf.json missing critical window properties (decorations: false, transparent: true, shadow: false, title), causing a native "Tauri App" title bar to wrap the application on Windows. This was due to Tauri's RFC 7396 array replacement behavior in platform-specific configs. macOS and Linux were not affected.
