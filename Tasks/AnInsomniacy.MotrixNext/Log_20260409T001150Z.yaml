  Value: |-
    What's Changed
    This release improves the speed limiter user experience based on community feedback and fixes a Windows tray restore bug.
    ✨ New Features
    - Always-visible speed limit inputs — Upload/download limit fields in Basic Settings are now always visible regardless of toggle state, allowing users to configure values before enabling
    - Context-aware configuration hints — Toast messages now provide location-specific guidance (context menu vs. settings page) with proper i18n across all 26 locales
    🛠 Improvements
    - Unified popover layout — Upload now appears above Download in the speed limit popover, consistent with the capsule and settings page
    - Speedometer icon centered — Pixel-perfect vertical alignment via flexbox
    - Jitter-free adaptive capsule — Debounced width shrinking (1s delay) with 2px hysteresis prevents flickering during rapid speed fluctuations
    - Wider speed limit popover — Prevents label wrapping in longer translations
    🐛 Bug Fixes
    - Windows: tray icon now restores minimized windows — Clicking the tray icon after minimizing the app now correctly restores and focuses the window
