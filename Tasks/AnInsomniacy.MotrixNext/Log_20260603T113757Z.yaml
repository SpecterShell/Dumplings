  Key: ReleaseNotes
  Value: |-
    What's Changed
    Motrix Next 3.9.3 promotes the latest beta work to stable with a broader P2P sharing model, ED2K bootstrap support, refined task cards, manual ordering, user-agent profile management, settings backup, and a set of reliability fixes across proxy handling, notifications, and task cleanup.
    ✨ New Features
    - P2P sharing — Reworked seeding terminology into shared P2P sharing behavior for BitTorrent and ED2K.
    - ED2K bootstrap — Added managed server.met and nodes.dat bootstrap file syncing and bundled defaults.
    - Task card modes — Added full and compact task card views for denser download lists.
    - Manual task ordering — Added drag-based manual ordering with per-tab sort state.
    - User-Agent profiles — Added saved user-agent profiles and rule management.
    - Settings backup — Added import and export support for user settings.
    - Tracker sources — Added browser opening support for BitTorrent tracker sources.
    🛠 Improvements
    - Improved task list transitions, drag handle layout, and task item localization.
    - Improved ED2K task summaries with Low ID and callback waiting peer counts.
    - Improved preference controls, log level controls, sync wording, and restore-default labels.
    - Restructured stylesheets and removed the legacy variables stylesheet.
    - Improved settings backup file error handling.
    - Updated all supported locales for sharing, downloads, ED2K, and preference sync strings.
    🐛 Bug Fixes
    - Removed noisy task merge debug logging.
    - Fixed download failure notifications and native notification formatting.
    - Fixed P2P control-file cleanup alignment for sharing tasks.
    - Fixed tracker auto-sync interval default.
    - Fixed queued task status wording across locales and tests.
    - Fixed proxy application so app-level fetches respect the selected proxy mode and scope.
