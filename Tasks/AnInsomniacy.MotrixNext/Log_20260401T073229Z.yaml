  Key: ReleaseNotes
  Value: |-
    What's Changed
    This release introduces a fully dynamic Material Design 3 color scheme system and a comprehensive UI polish pass, delivering 20 visual combinations (10 palettes × light/dark) with instant-apply previewing.
    ✨ New Features
    - 10 dynamic color schemes — Amber, Deep Space, Mint, Rose, Aurora, Coral, Glacier, Evergreen, Graphite, Sakura, each powered by Google's Material Color Utilities engine
    - Instant color preview — Color scheme and theme changes apply immediately without saving, with localized toast feedback
    - Protocol handler preferences — New settings and localization support for protocol handlers
    🛠 Improvements
    - Surface tonal hierarchy — Optimized light-mode surface tones for desktop LCDs, widening the tonal range from 10 to 14 steps for clearly visible layer depth
    - Dynamic button states — Restart engine button now follows the active color scheme via M3 tertiary tokens (was hardcoded teal)
    - CSS variable cleanup — Removed 6 dead variables and inlined 20+ single-consumer intermediate variables directly into component scoped styles, reducing variables.css by ~50%
    - Tech stack tag readability — Improved About panel tag contrast with solid backgrounds and darkened brand colors
    🐛 Bug Fixes
    - Fixed invisible button hover states in light mode caused by washed-out primaryContainer references
    - Fixed About panel glass background not following color scheme (was using near-white surface instead of surfaceContainerHigh)
