  Key: ReleaseNotes
  Value: |-
    - Improvement: Updated the 'Last Used Project' and 'Use specific' default project logic, so that archived or unavailable projects are no longer assigned to new entries, and added a notification when your default project is no longer available.
    - UI Improvement: Improved the appearance of Pomodoro notification.
    - Fix: Fixed a 403 error when a user attempts to stop a locked entry.
    - Fix: Fixed an issue where the Auto Tracker window would close when preferences were changed on the web.
    - Fix: Set valid minimum height for the main window when switching from mini-timer to regular mode.
