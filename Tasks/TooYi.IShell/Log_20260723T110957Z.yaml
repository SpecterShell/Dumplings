  Key: ReleaseNotes
  Value: |-
    1. 修复重启电脑后已保存的凭证/主机密码丢失的问题
    2. 修复 SSH 传输大文件传到约 1GB 后自动断开的问题（RockyLinux10、openCloudOS 等较新系统）
    3. 新增 SFTP 传输模式（性能优先 / 交互优先），大幅提升大文件上传、下载速率
    4. Agent 模式优化：修复无限循环与「停止」无效；新增命令执行策略（仅安全命令自动 / 全部手动确认 / 全部自动）；命令无输出时不再误触发分析
    5. 修复「用本地程序打开」对无默认关联程序的文件报错，改为弹出系统「打开方式」让用户选择
    6. 消除启动及部分操作时一闪而过的黑色命令行窗口
    7. 新增鼠标中键（滚轮键）粘贴，可在 设置 → 终端 → 鼠标行为 中开启
