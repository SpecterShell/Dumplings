Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Import cloud recordings from Zoom
      - Easily polish your Zoom recordings. Import directly into Camtasia Editor to clean up, enhance, and add a professional look to your videos before sharing.
    - Added basic support for VTT caption import/export in Camtasia Editor.
    - Added ability to sync the timing of media by their audio.
    Feature Updates
    - Improved readability of text in light mode when an update is available.
    - Added vertical aspect Looks and Layouts to Camtasia Rev.
    - Improved Property Panel Header UI for effects.
    Performance Improvements
    - Improved performance and reliability of drag-n-drop.
    - Improved project loading performance.
    Updates for IT Administrators
    - Update cpp-httplib to version 0.38.
    Bug Fixes
    - Fixed an issue where undo might revert more changes than expected after working with closed captions.
    - Fixed a visual glitch in the playhead animation when clicking on the timeline ruler.
    - Fixed a bug that could cause Cursor Scale to preview incorrectly in Camtasia Rev.
    - Reduced resource load on startup in the Home window to address a crash on some systems.
    - Fix a bug where some TREC screen video could show as blank frames.
    - Fixed a bug where decoding of some HEVC video streams could result in a hang.
    - Addresses an issue during file creation which could result in arbitrary code execution by a local attacker.
    - Hardened handling of secrets stored in system memory.
    - Fixed a bug that could cause cursors to be rendered incorrectly at high DPI settings.
    - Fix a potential audio/video sync issue with certain MP4/MOV file sources.
    - Fixed a bug that Camo projects were not saved as standalone projects.
