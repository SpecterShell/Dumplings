Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Notable Changes
    - Updated 7-zip to 26.01. Fixes CVE-2026-48095.
    - Fixed support for SFTP server-side CRC32 calculations using the check-file extension.
    - Other minor fixes.
    FTP
    - Fixed support for SFTP server-side CRC32 calculations using the check-file extension.
    Misc
    - Fixed registering using license keys that have had letters combined into ligatures.
    - macOS/Linux: Fixed the "Enter Key..." dialog not auto-detecting license keys on the clipboard.
    - Fixed "Check for Updates" reporting of operating system version and CPU type.
    Options
    - Unchecking the Options > Tweaks > Check for Updates > Check every checkbox will hide the "New version available" notification.
    Text Views
    - Text grammar regular expressions no longer unintentionally support 2 iterators in a row, e.g. "+*".
    Third Party Libraries
    - Updated 7-zip to 26.01. Fixes CVE-2026-48095.
    Crashes
    - Windows: Fixed crash when launching a comparison from the command line with extremely long paths while BC is already running.
    - Fixed Text Compare crash with specific grammar regular expression.
    - Fixed Table Compare crash when editing a cell.
    - Fixed Table Compare Report crash when opening from Folder Compare.
ReleaseTime: 2026-06-29
