Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Notable Changes
    - Windows: Fixed .docx conversion failures when the system ANSI codepage is a DBCS one.
    - Windows: Fixed report Print, Print Preview, and Print to PDF scaling fonts incorrectly.
    - Windows: Fixed crash when trying to uninstall a "Current User" install.
    - General polish and stability improvements.
    Appearance
    - Fixed Folder Sync's Session Settings > Sync icons showing as blank squares when editing a session from the Home View.
    - Windows: Fixed width of indentation in treeview shown in Media Compare > Session Settings > Importance on high DPI displays.
    - Linux: Fixed overly thick menu separators on high DPI displays.
    Hex Compare
    - Fixed hex editor key handling ([Shift+Tab] keeps selection, [Shift+Left] updates selection, [Delete] affects next byte if none selected).
    Home View
    - Fixed launching multiple comparisons from the Home View opening tabs in an inconsistent order.
    Reports
    - Windows: Fixed Print, Print Preview, and Print to PDF scaling fonts incorrectly.
    - Windows: Fixed Print Preview scaling incorrectly on secondary monitors.
    Text Views
    - Windows: Fixed .docx conversion failures when the system ANSI codepage is a DBCS one.
    Crashes
    - Windows: Fixed crash when trying to uninstall a "Current User" install.
    - Linux: Fixed hang when using Help > Check for Updates to install a .deb or .rpm package.
    - Linux: Fixed hang when opening a comparison while the display is scaled by more than 200%.
    - macOS: Fixed crash when loading SVG images.
ReleaseTime: 2026-03-24
