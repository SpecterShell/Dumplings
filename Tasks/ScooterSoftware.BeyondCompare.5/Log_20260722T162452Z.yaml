  Key: ReleaseNotes
  Value: |-
    Folder Compare
    - Windows: Fixed folders on FAT32 drives showing incorrect timestamps after opening them.
    Third Party Libraries
    - Updated 7-zip to v26.02. Fixes CVE-2026-14266.
    - Updated UnRAR source to v7.2.7 and UnRAR.dll to v7.2.3.
    - Windows: Updated Delphi to v13.1.
    Crashes
    - Windows: Fixed crash when shutting down Beyond Compare with unsaved Text Compare edits.
    - Linux: Fixed crash when running on systems without SSE3 or SSE4 instructions.
