  Key: ReleaseNotes
  Value: |-
    🚀 Features
    - (dashboard) Persist dashboard API secret across browser sessions for LAN deployments (#1409) by @Copilot
    - (dns) Add respect-rules to route upstream DNS via the rule engine (#1427) by @ibigbug
    - MTLS (mutual TLS) support for outbound proxies (#1424) by @Copilot
    🐛 Bug Fixes
    - Upgrade smoltcp to 0.13.1 to fix TCP sequence number underflow panic (#1406) by @ibigbug
    - Timeout on hyper handshake and consolidate proxy state writes (#1404) by @xmh0511
    - Shadowquic udp proxy (#1412) by @spongebob888
    - (dns) DNS client rebuild resilience (#1410) by @xiguagua
    - (tun) Bind interface on windows not valid for dualstack (#1413) by @spongebob888
    - (dns) Skip caching NXDomain, ServFail, and all-unspecified responses (#1414) by @xiguagua
    - Warn on proxy parse failure, harden group handlers against empty providers (#1420) by @Copilot
    - (vless) CMD_PADDING_END must not trigger XTLS splice (#1417) by @Copilot
    - (api) Store startup config path, fix dashboard reload (#1421) by @Copilot
    🚜 Refactor
    - Remove outer RwLock from ThreadSafeProxyProvider (#1407) by @ibigbug
    ⚙️ Miscellaneous Tasks
    - Bump version to v0.10.6 by @github-actions[bot]
    Other
    - Guard tproxy UDP GRO chunking when stride is zero (#1416) by @Copilot
    New Contributors ❤️
    - @xmh0511 made their first contribution in #1404
