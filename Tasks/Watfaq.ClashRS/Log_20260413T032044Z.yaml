  Key: ReleaseNotes
  Value: |-
    🚀 Features
    - Enrich api response for plain proxies (#1056) by @ibigbug
    - Support vless reality (#1057) by @SKTT1Ryze
    - Support inbound provider (#1066) by @ibigbug
    - Allow proxy groups/providers as outbounds for DNS and geo-data downloads (#1061) by @Copilot
    - Support dashboard resources auto-downloading (issue #985) (#1062) by @Copilot
    - IPC and WebSocket support (#1068) by @Itsusinn
    - Support ss2022 multi user inbound (#1073) by @ibigbug
    - Improve cli compatibility mode for verge (#1077) by @Itsusinn
    - RESTful API improvements for Verge compatibility (#1078) by @Itsusinn
    🐛 Bug Fixes
    - Group api name field (#1058) by @ibigbug
    - IPv6 literals fail in direct outbound when dns.ipv6 is disabled (#1063) by @Copilot
    - (tun) Use async sleep to wait for TUN interface visibility before route setup (#1060) by @Copilot
    - (netstack) Add SYN flood protection & deduplication (#1070) by @Alma-human
    - (netstack) Honor EOF and half-close state (#1069) by @OneOne-ai
    - Better tun logging (#1074) by @ibigbug
    - Incorrect tcp state check in tun stack (#1075) by @ibigbug
    - Deterministic TUN GUID on Windows and filter broadcast IPs from fake-ip pool (#1081) by @Copilot
    - Resolve CI failures from rust-dependencies bump (#1084) by @dependabot[bot]
    - (ss-inbound) Loop on UDP decrypt error to re-register waker (#1309) by @ibigbug
    🚜 Refactor
    - Rename feature to (#1076) by @Itsusinn
    ⚡ Performance
    - Add tun bench workflow (#1072) by @ibigbug
    🛠️ Builds
    - (deps) Bump the rust-dependencies group with 23 updates (#1055) by @dependabot[bot]
    - (deps) Bump tar from 0.4.44 to 0.4.45 (#1067) by @dependabot[bot]
    - (deps) Bump the actions-dependencies group with 4 updates (#1082) by @dependabot[bot]
    ⚙️ Miscellaneous Tasks
    - Add rust-expert custom GitHub Copilot agent (#1059) by @ibigbug
    - Bump version to v0.9.7 by @github-actions[bot]
    Other
    - Upgrade shadowquic to v0.3.4 (#1310)
