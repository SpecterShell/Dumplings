  Key: ReleaseNotes
  Value: |-
    New Features
    Section titled “New Features”
    - Startup Page Setting - New setting under Settings > Startup Page lets you choose which page loads when the app opens.
    - User Management Autocomplete Search - Search box now suggests matching users as you type (2+ characters), showing username, display name, department, and OU. Click a suggestion to load the user
    - User Template Location - New Location button on Create Single User page lets you store templates on a network share for team access. Custom path is saved to app settings
    - UPN Domain in Templates - UPN domain suffix is now saved and restored with user templates
    - Bulk Group Membership - Included support for computer objects.
    UI Improvements
    Section titled “UI Improvements”
    - Bulk Update Users - Domain moved inline with Browse/Template buttons. Step 3 and Update Logs merged into a single card. Account options now use a compact 3-column layout. Export/Clear Logs moved to the right
    - Bulk Import Users - Domain moved inline with Browse/Template buttons. Step 3 and Import Logs merged into a single card with Export/Clear Logs on the right
    - Bulk Group Membership - Redesigned into single card layout. Add/Remove radio buttons and Run moved to action row with Export. Columns link moved to Help popup. Selected CSV shown after Template button. Grid cell padding aligned with column headers
    - Header Labels - Darkened label color for improved readability on User Management header
    Bug Fixes
    Section titled “Bug Fixes”
    - Report Export Column Order - Exported files now match the column order displayed in the app grid
    - Report Export Account Status - Account Status now exports as “Enabled”/“Disabled” instead of “Yes”/“No”, matching the app display
    - User Template - Fixed saving name format to template
