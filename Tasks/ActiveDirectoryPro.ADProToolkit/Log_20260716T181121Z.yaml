  Key: ReleaseNotes
  Value: |-
    Improvements
    Section titled “Improvements”
    - Exchange recipient-type attributes (msExchRecipientTypeDetails, msExchRecipientDisplayType, msExchRemoteRecipientType) now resolves the full value set, including hybrid/remote and combined bitmask values.
    - Protected-object move for users, groups, and computers. Prompts to lift “protect from accidental deletion,” moves, then re-protects at the destination.
    Bug Fixes
    Section titled “Bug Fixes”
    - Unlock Account failed in multi-DC/LDAPS environments. Now binds to the authenticated domain controller.
    - Dashboard “Expiring Today” tile opened the 7-day list instead of today’s.
    - Dashboard slideout close button showed a people icon instead of an X.
    - True Last Logon “Show per DC” now adds the per-DC columns to the grid.
    - Modify Group and Modify Computer fields stretched with long values.
