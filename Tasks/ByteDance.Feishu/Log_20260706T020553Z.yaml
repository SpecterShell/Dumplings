  Key: ReleaseNotes
  Value: |-
    云文档
    - 在飞书云盘、我的文档库或知识库中，你可以直接以预览视图的形式查看已上传的 HTML（.html）文件，直观查阅页面渲染效果，并可在预览视图和代码视图中自由切换，满足不同场景下的查看需求。此外，你还可以在飞书文档中或会话中预览 HTML（.html）文件，有效提升协作效率。
    即时消息
    - 你可以在飞书群聊中使用收集表功能快速创建飞书问卷，适用于活动报名、意见反馈、投票调查等多种场景。问卷设计完成后，可直接发布并邀请群成员填写，或将问卷链接与二维码分享给相关人员。
