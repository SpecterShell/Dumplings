  Key: ReleaseNotes
  Value: |-
    多维表格
    - 借助多维表格 AI，只需用文字描述需求，AI 即可帮你快速完成搭建或配置。
    - AI 搭建业务系统：AI 可以从零搭建完整的业务系统，或对已有业务系统进行迭代升级，适用于个人或小团队快速搭建轻量工具、部门搭建业务管理系统、企业搭建跨团队协作管理系统等全方位场景。
    - AI 搭建数据表：AI 可以从零开始创建数据表，或对已有数据表进行更新。字段、视图、关联、排序，均可轻松配齐。
    - AI 搭建仪表盘：AI 可以根据你的指令，选择合适的图表类型、自动制定执行计划、生成或修改仪表盘组件、合理调整组件布局，最终输出清晰美观的仪表盘组件。
    - AI 配置高级权限：AI 可以完成高级权限的完整配置，包括创建自定义角色，为角色配置数据表记录权限、字段权限、视图权限、仪表盘阅读权限及其他权限。
    - 你可以在飞书问卷中增加电话号码题型，用于收集填写者的手机号码或固定电话，适用于客户信息登记、后续回访与联系等场景。覆盖更广泛，填写更方便。
