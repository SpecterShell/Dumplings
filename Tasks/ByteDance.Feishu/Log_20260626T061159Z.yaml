- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Base
    - Simply enter a prompt in Base AI to automatically create or edit forms, making it effortless to design forms and helping your team get things done faster. You can also chat with the AI about your ideas to get professional suggestions and references to assist with your form design.
    - With Base AI, you only need to describe your needs in text to perform data queries and analysis, such as data retrieval, statistical calculations, attribution analysis, trend forecasting, report generation, and base summaries.
    - When selecting a field in Base for actions such as filtering, grouping, or sorting, you can search for the field name directly in the search box within the dropdown menu to quickly locate the target field. This improves efficiency, especially when your table contains a large number of fields.
    Docs
    - In the Feishu desktop app or web version, you can download Feishu documents as Markdown files to easily edit and use them in other tools.
