  Key: ReleaseNotes
  Value: |-
    Lime v1.85.0
    新功能
    - 图片生成主链进入 App Server / Media Runtime worker：@配图、普通“画一张……”自然语言入口和文稿配图位现在共享 .lime/tasks/image_generate 任务、Provider DB 路由、常驻调度和恢复机制。
    - Article Workspace 右侧编辑器新增通用 plugin orchestration rail，可展示内容工厂 workflow、subagent、skill、connector 与 hook 证据，并支持历史恢复。
    - 文稿配图位可直接发起图片任务，任务完成后按 slot / anchor 原位替换 Markdown 占位，多图 slot 分配、失败 / 取消不误写和手动应用透传已接入同一链路。
    - AgentChat Thread Timeline / Session Refresh 主线收口：流式输出期间的 live timeline 不再被过期 session detail 覆盖，read model 只补状态和过程事件。
    修复
    - 修复 @命令 面板二次过滤导致 @配图 搜索结果被隐藏的问题。
    - 修复图片默认模型占位值污染任务的问题，default / auto / __default__ 等值不再作为真实 model 写入 task。
    - 修复 Electron Host 写 config.json、App Server 读 config.yaml 的配置分叉，图片默认 Provider / model 统一读取 current config.yaml。
    - 修复图片 worker 缺 Provider route 时回退旧 local gateway、任务长期 pending、stale running 不恢复和 successful complete 缺 slot_id 的问题。
    - 修复普通 Expert Panel 文本 follow-up 误继承图片 Provider / gpt-image-1 的问题。
    - 修复高频 runtimeGetSession / detail refresh 可能让已显示消息减少、乱序或前文消失的问题。
    优化与重构
    - lime_media_runtime 根模块从 5k+ 行拆成 31 行 facade，图片请求、参考图、后处理、task artifact、worker 和测试按职责拆分。
    - Media Runtime Provider adapter 补齐 OpenAI-compatible edit / reference image、Responses input_image、Gemini inlineData/fileData、智谱原生图片接口和统一 HTTP 错误分类。
    - 图片任务前端 runtime 拆出 imageWorkbenchTaskActions、imageTaskPreviewRuntimeGuards、imageTaskPreviewRuntimePayload 和 workspaceDocumentInlineImageTaskSync，减少巨型 hook 继续膨胀。
    - App Server read model 增加 projected item events，覆盖 message batch、reasoning、tool lifecycle、permission preflight、artifact snapshot 和 routing/runtime 事件。
    - Agent Chat 页面和 Workspace 继续按懒加载与纯投影边界收缩首屏负担。
    测试与质量
    - 新增 / 更新图片 worker、Provider route、stale running 恢复、Media Runtime adapter、文稿 slot 回填、失败 / 取消重试、线程 timeline merge 和 orchestration rail 的 Rust / 前端回归。
    - 重跑并扩展 image-command、plain-image-intent、content-factory-article-workspace 等 Electron fixture，覆盖 GUI、App Server read model、task artifact、reload restore 和 provider 请求体。
    - npm run test:contracts 与 npm run verify:gui-smoke 在多个关键增量中通过；本轮发版前会重新执行版本一致性与发布门禁。
    文档
    - 更新图片能力系统路线图，记录 App Server 图片 worker、常驻调度、Provider adapter 和配置事实源边界。
    - 更新 Writing 实施计划，记录内容工厂 orchestration rail、配图位任务、slot 原位替换和重试闭环。
    - 新增 Thread Timeline / Session Refresh 事实源治理路线图。
    - 新增 Agent 研发验证研究入口和 Agent Verification Contract 模板。
    其他
    - 版本事实源更新到 1.85.0：根应用、CLI npm package、Rust workspace、主 lime-rs/Cargo.lock 与 Aster 子工作区 lock。
    - 本版未纳入本地临时文件 internal/roadmap/Writing/.DS_Store 和 lime-rs/test-tool-call-fix.sh。
    完整变更：v1.84.0 → v1.85.0
    Lime v1.84.0
    新功能
    - Writing 主线继续收口到 Article Workspace / Article Editor：@写文章 产物以独立 ArtifactFrame 呈现，右侧文章画布成为可编辑的 current 承载区。
    - 图片生成能力目录与执行链完成统一：OpenAI-compatible、Gemini、Fal、local image server 等路由现在共享同一套 catalog / executor / error presentation。
    - 插件市场和已安装 Agent Apps 的能力投影更完整，activation、capability profile、installed state 与当前可用性现在按同一视图模型展示。
    修复
    - 修复写文章历史恢复与右侧面板投影偏差，避免恢复后回落到旧 Profile 语义或错误的文章草稿。
    - 修复图片任务完成、取消和错误类型判定，图片任务现在对错误 task type 和取消态 fail closed。
    - 修复插件激活与 marketplace blocker 的展示口径，使禁用、安装不可用、包不匹配和 release evidence 缺失等状态更一致。
    优化与重构
    - 将 Article Workspace、右侧 Surface host、文章产物投影拆成更小模块，减少主文件职责堆叠。
    - 拆分图片生成的 provider matcher、executor、response parser 和本地服务适配器，收口到统一的 image capability catalog。
    - 重构插件 marketplace view model 和 capability profile 计算，提升 installed / activatable / attention 分类的一致性。
    - App Server 侧补充 streaming worker、content factory worker 和 image provider routing 的分层。
    测试与质量
    - 新增写作、图片任务、插件市场和能力投影回归测试，覆盖 current fixture、历史恢复和终态判定。
    - 补齐 Rust / 前端定向测试，覆盖 app-server runtime、image tools、plugin contract 和 image model matcher。
    文档
    - 更新 Writing 路线图与实施计划，继续对齐 Article Workspace / Article Editor 事实源。
    - 更新图片能力系统路线图，记录统一 catalog / executor 的产品边界。
    - 同步右侧 Surface 约束与相关执行计划。
    其他
    - 版本事实源更新到 1.84.0：根应用、CLI npm package、Rust workspace 与 lime-rs/Cargo.lock。
    - 本版未纳入 internal/roadmap/Writing/.DS_Store。
    完整变更：v1.83.0 → v1.84.0
    Lime v1.83.0
    新功能
    - Writing 主线切到 Article Workspace / Article Editor：@写文章 产物以独立 ArtifactFrame 展示，右侧栏承接可编辑文章画布，旧 Product Profile 路径已退出主路径。
    - 内容工厂插件包投影增强，宿主现在能从 plugin manifest 读取 skills、subagents、CLI、connectors 和 hooks，并汇总进 agent app manifest 与历史恢复。
    - @配图 current 链路补齐 mediaTaskArtifact/image/complete，图片任务从创建、完成、回填到 GUI 终态卡片和刷新恢复形成同一条 current 闭环。
    - 图片工作台事件流收敛，前端不再依赖旧的模型预设分流逻辑，而是统一走当前图片任务与 runtime 触发链。
    修复
    - 修复写文章历史恢复中对象、artifact 引用和右侧栏标签的投影偏差，避免恢复后落回旧 Profile 语义。
    - 修复图片任务完成态缺少标准 JSON-RPC 入口的问题，新增任务类型校验、终态拒绝和结果回填测试。
    - 修复 plugin history restore 对空白 surface kind、artifact refs 和选择状态的归一化不足。
    优化与重构
    - 将 Article Workspace 的投影、编辑、预览和右侧 surface 拆成独立模块，减少单文件职责混杂。
    - Content Factory fixture 从旧 Product Profile 叙事迁移到 Article Workspace 叙事，补齐恢复、重载和终态断言。
    - App Server、Rust 协议和前端 client 的图片任务接口同步扩展，补齐 generated types 与 contract 校验。
    测试与质量
    - 新增图片任务 JSON-RPC 定向测试，覆盖正向完成、错误任务类型和取消态拒绝。
    - 新增 @配图 current fixture 及回归断言，验证 GUI、App Server read model、task file 和刷新恢复一致。
    - 更新 plugin contract、history restore、image workbench、workspace article 路径和多语言资源的回归覆盖。
    文档
    - 新增 internal/roadmap/images/README.md，记录图片能力系统路线图。
    - 更新 internal/roadmap/Writing/ 文档，切换到 Article Workspace / Article Editor 事实源。
    - 更新相关执行计划，记录 @配图 current chain 的收口与验证结果。
    其他
    - 版本事实源更新到 1.83.0：根应用、CLI npm package、App Server client package、Rust workspace、主 Cargo lock 与 Aster 子工作区 lock。
    - 本版未纳入本地临时文件 internal/roadmap/Writing/.DS_Store 和未引用的 lime-home.png。
    完整变更：v1.82.0 → v1.83.0
