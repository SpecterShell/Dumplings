    Changelog
    ✨ 新增功能
    - 新增部署提供商：腾讯云 TSE 微服务引擎
    - 新增部署提供商：腾讯云 GA2 全球加速 2.0
    - 新增部署提供商：移动云 CDN 内容分发网络
