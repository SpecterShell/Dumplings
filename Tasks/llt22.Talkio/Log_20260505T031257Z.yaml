  Key: ReleaseNotes
  Value: |-
    What's New
    ✨ New Features
    - Anthropic / Gemini / Azure OpenAI 协议支持解锁：此前由于 provider 类型检查错用字段，所有非 OpenAI provider 都会报 "provider type is not supported yet"。现 AnthropicMessagesAdapter / Responses API 等 adapter 全部可达。
    🐛 Bug Fixes
    - 群聊 think 标签残留：<think> 嵌套或带 <thinking> 别名时旧 regex 会漏匹配，导致其他 AI 看到残留的 </think> 标签
    - 浏览器 dev 模式全文搜索失效：in-memory DB fallback 不支持 LIKE，之前搜索永远返回错误结果
    - 上下文压缩跳过非 OpenAI provider：preComputeCompression 有相同的错误类型检查，修复后 Anthropic/Gemini 也能享受压缩
    - removeParticipant 允许删空：删到最后一个会让会话进入不可用状态，现阻止此操作
    - injectSummary 截断保护：切丢历史后若首条是孤立 tool 消息会导致 API 报错，现跳过
    🎨 Improvements
    - MCP 连接刷新加 TTL 缓存：之前每次发送消息都会重连所有 MCP server / 重新 discover 工具，现 60s 内复用（server 配置变化自动失效）
    - 自动讨论停止响应性：关闭 while 循环退出到 sendMessage 之间的停止信号窗口
