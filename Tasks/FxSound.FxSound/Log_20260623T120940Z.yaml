  Key: ReleaseNotes
  Value: |-
    1. Command line options can now be applied to an already running instance of FxSound
    2. Command line option added to launch FxSound minimized to the system tray
    3. Fixed output device not being changed through hotkeys when FxSound is off (#524)
    4. Individual hotkeys can now be disabled with Delete key (#515)
    5. Fixed the but to prevent invalid hotkeys from being registered (#523)
    6. Bluetooth devices removed from device settings are removed from device preference list
    7. Fixed device detection failures
    8. Fixed application hang when retrieving the audio mix format fails
    9. Fixed presets import dialog file name combo box text alignment
    10. Fixed output device not being applied through command line
    11. Fixed a delay blocking application load when minimizing to the system tray
    12. Fixed EQ band sliders not refreshing when switching number of bands (#521)
    13. Fixed user-set mute being overridden by FxSound
    14. Fixed icon visibility in ARM64 version
    15. Finnish language support added
    16. Corrected Persian translations
