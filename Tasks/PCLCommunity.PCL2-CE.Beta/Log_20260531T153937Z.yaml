  Value: |-
    本更新扩展了进程优先级选项、添加了建造者披风译名，并包含了针对多个错误的修复，建议所有 Beta 版用户安装。
    2.15.0-beta.2 更新一览(2026-05-31)
    🚀 功能追加
    - 在启动选项-进程优先级内增加极高和实时进程优先级 (#2943)
    - markdown: 支持自定义字体 (#2948)
    - 添加建造者披风译名 (#2959)
    - 自动安装模组前置 (#2789)
    - cache: 添加全局缓存系统 (#2917)
    🐛 问题修复
    - 从旧配置迁移会错误匹配进程优先级 (#2950)
    - Issues in #2952 (#2957)
    - mod-loader: Output → output (#2966)
    - http: Null reference warning (#2964)
    - #2955 (#2967)
    - instance-export: 修复 Modrinth 整合包导出时出现的路径拼接问题 (#2971)
    - 修复正版验证失败的问题 (#2975)
    - instance-install: 修复实例修改页面加载器列表不刷新及空列表问题 (#2968)
    - Typo (#2977)
    - login: 修复正版账号皮肤获取与登录刷新异常 (#2947) (#2951)
    🚜 重构
    - Use camelCase (#2952)
    - 击毙主项目中的所有 BOM (#2953)
    - 击毙 PCL.Core 里的所有 BOM (#2954)
    - camelCase for method signature (#2955)
    - Naming for public properties, fields, etc. (#2972)
    ⚙️ 其他改动
    - i18n-setup: 更新语言支持提示 (#2945)
    - C# 版本 Issue Template (#2956)

