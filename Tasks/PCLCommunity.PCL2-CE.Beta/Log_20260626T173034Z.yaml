    - toast: 支持主题切换时刷新已弹出 Toast 的颜色 (#3191)
    - download: 下载详情页显示自动下载的前置 (#3194)
    - save: 存档页面添加跳转到下载世界页面的按钮 (#3197)
    - Add http client definition (#3195)
    - 下载模组时允许跳过前置依赖 (#3181)
    - Remove hmcl profile import and export (#3212)
    - toast: 支持滑动关闭 Hint 通知 (#3218)
    - download: 快速下载资源 (#3240)
    🐛 问题修复
    - ZH-CN: 替换所有 \n 为
     (#3135)
    - i18n: 修复“你知道吗”中的部分姓名错误翻译 (#3139)
