    - mod-main: 修复提示右对齐时被右下角附加按钮遮挡 (#3147) (#3150)
    - Didn't call InitializeAsync (#3153)
    - java: 尝试提升 Java 查找速度 (#3152)
    - mod-path: Validate Minecraft library artifact paths (#3165)
    - cache: Correct ReserveBytes default to 256 MB (#3171)
    - wrapper: 更换老旧的 RetroWrapper 到 LegacyFix (#3159)
    - download-install: 修复 Minecraft 下载页面返回顶部按钮不显示 (#3169)
    - 实例修改页无法安装 Legacy Fabric (#3177)
    - homepage: 阻止自定义主页高危操作 (#3037)
