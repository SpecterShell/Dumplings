    本更新提供了重要的错误修复，建议所有 Beta 版用户安装。
    2.15.0-beta.4 更新一览(2026-06-26)
    🚀 功能追加
    - Upgrade to v7
    - 使用应用内 Toast 代替老的 Hint (#3160)
