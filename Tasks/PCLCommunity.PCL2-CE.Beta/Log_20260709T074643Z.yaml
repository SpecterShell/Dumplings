  Key: ReleaseNotes
  Value: |-
    PCL CE Beta 版可让您提前预览即将推出的功能、技术和修复程序。请在安装测试版之前备份您的 Minecraft 文件夹。
    从此 Beta 版本开始，PCL CE 将使用 .NET 10 桌面运行时。安装更新前建议先确保已安装 .NET 10。你可以访问 https://get.dot.net/10 获取运行时。
    PCL CE beta gives you an early preview of upcoming features, technologies, and fixes. Please back up your Minecraft folder before you install the beta.
    Starting from this beta, PCL CE will use .NET 10 Desktop Runtime. It is recommended to have .NET 10 installed before installing this update. You can visit https://get.dot.net/10 to get the runtime.
    2.15.0-beta.7 更新一览(2026-07-09)
    🚀 功能追加
    - profile: 档案列表为空时提示用户需要先创建一个正版档案才能使用其他验证类型 (#3335)
    - link: 更新 EasyTier 到 2.6.4 (#3325)
    - homepage: 增删一些自定义主页预设 (#3373)
    🐛 问题修复
    - 修复 LiteLoader 安装实例 Json 时间解析格式 (#3300)
    - link: 联机组件下载完成的提示类型错误 (#3332)
    - settings: 启动器调试选项的俩复选框与配置绑定不正确 (#3333)
    - setup: 关于页非中国区隐藏 MC 百科时一并收起行高，消除空隙 (#3327)
    - comp: 自动下载前置模组时文件名遵守“文件名格式”设置 (#3326)
    - download: 对并发共享的 DownloadFile.Errors/Loaders 加锁，避免下载崩溃 (#3308)
    - i18n: 切换语言后刷新启动按钮与版本文本，避免中英混排 (#3306)
    - launch: 外置登录令牌刷新失败时抛出异常而非静默继续 (#3307)
    - 以静态方法代替静态 Lambda 避免 WeakLanguageChanged.Add 参数校验失败 (#3339)
    - tools: 自定义下载页加载时刷新按钮状态 (#3353)
    - link: EasyTier 在部分情况下不会被正确关闭 (#3329)
    - comp: CompFile 的集合字段初始化为空列表，避免 ToJson 空引用崩溃 (#3352)
    - tooltip: 实现 Popup 鼠标事件穿透 (#3343)
    - select-left: 移除多余的 ToolTip 偏移量 (#3345)
    - instance-saves-datapack: 修复数据包下载路径错误 (#3348)
    - launch: 修改玩家 ID 成功后切回 UI 线程刷新，避免线程亲和性崩溃 (#3310)
    - 修复返回 VersionSaves 页面时同步子页面状态 (#3347)
    - cache: 修复 FileCacheStorage 引用计数释放的并发竞态 (#3311)
    - comp: 修复单字/宽泛关键词中文搜索模组无结果 (#3278)
    - tooltip: 切换控件时关闭弹窗再重开以重新定位到新位置 (#3344)
    - install: 修复若干 Mod 加载器的冲突关系不完整问题 (#3316)
    - tooltip: 修复文字垂直居中和鼠标离开窗口时收起 (#3358)
    🚜 重构
    - 新的 Tooltip 样式 (#3324)
    👀 优化改进
    - 使用 IEC 单位 (#3371)
    ⚙️ 其他改动
    - naming: 统一使用 PCL CE 正确指代本启动器 (#3217)
    - 调整 成功提取资源包图标 的日志级别 (#3328)
    - Update mcmod.buf (#3330)
    - Bump to .NET 10 (#3116)

