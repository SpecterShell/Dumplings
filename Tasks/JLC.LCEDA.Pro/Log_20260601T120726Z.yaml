  Key: ReleaseNotes
  Value: |-
    原理图
    - 修复 PCB 更新原理图后器件封装显示空白的问题
    - 修复克隆原理图转 PCB 后出现异常变更的问题
    - 修复替换器件时勾选保留符号失效的问题
    - 修复拉伸侧边面板异常卡顿的问题
    PCB
    - 修复导出 Gerber 卡死及嘉立创 DFM 解析错误的问题
    - 修复拖动过孔导致画布卡住白屏的问题
    - 修复打开 PCB 进度条一直加载无法打开的问题
    - 修复自动铺铜后移动图元导致焊盘与铺铜断开的问题
    - 修复自动重建铺铜结果错误的问题
    - 修复彩色丝印下单无反应及导出镜像操作问题
    - 修复无法编辑异形焊盘外形的问题
    其他
    - 修复 V3 打开 V2 工程无法另存为的问题
    - 修复扩展管理器在半离线/全离线模式下无法打开的问题
    - 修复工程历史还原后数据未恢复的问题
    - 修复系统库搜索立创商城一直加载中的问题
    - 修复 Gerber 导出 18 层板厚选项缺失的问题
    - 修复导出面板制造文件失败的问题
    格式转换
    - 修复导入 Altium 时多部件器件拆分、位号丝印丢失、DRC 结果为空的问题
    - 修复导入 Protel 时层数变多、自定义层丢失的问题
    - 修复导入 KiCad 时焊盘形状和禁止区域丢失的问题
    - 修复导出 AD 后导线短路、网络连接错乱的问题
    - 修复导出 PADS 后打开报数据库严重错误的问题
    - 修复 EDA 导出 AD 再导入后中文变成问号的问题
