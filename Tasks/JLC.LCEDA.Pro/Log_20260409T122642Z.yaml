  Key: ReleaseNotes
  Value: |-
    原理图
    - 修复 PCB 卡死后重新打开工程，左侧树的原理图丢失的问题
    - 修复导出 BOM 时内容丢失、Schematic Title 字段显示空白的问题
    - 修复扩展 API 无法新增原理图文本、修改器件图元失效的问题
    - 修复二进制内嵌对象图元相关问题（原理图部分）
    PCB
    - 修复 PCB 卡死后重新打开工程，左侧树的 PCB 丢失的问题
    - 修复 PCB 右键复制失败的问题
    - 修复深色模式下设计规则表头样式错误的问题
    - 修复仅打开封装标签查看 2D/3D 预览后，左侧库设计 Tab 消失的问题
    - 修复封装转预览格式、导出 3D 进度更新不准确的问题
    - 修复自动布线 API 数据支持问题
    其他
    - 修复点击工程路径无法跳转的问题
    - 修复导入工程时因警告弹窗导致无法导入的问题
    - 修复自动更新同名库时会错误清除不同属性的问题
    - 修复工程库器件另存为本地 V2 格式失败的问题
    - 修复扩展 API 无法下载 CBB 文件的问题
    - 修复导入 PADS 文件时的多项问题（板框丢失、封装丝印错误、尺寸方向偏移、文本镜像、导入卡住、多部件符号内容为空等）
    - 修复多语言加载、PDF 文本合并等底层工具问题
ReleaseTime: 2026-04-09
