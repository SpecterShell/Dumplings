  Key: ReleaseNotes
  Value: |-
    公共
    - 解决浏览器内存不足导致崩溃的问题。
    - 优化常用库请求接口，避免并发请求。
    - 优化底层接口，整合本地解析数据。
    - 修正保存时版本不变更的问题。
    - 修复第一次打开 eprj2 工程后导出变更无显示的问题。
    - 修复提取库文件时进度条卡死的问题。
    - 修复 linux 客户端全离线备份恢复不工作的问题。
    原理图
    - 修复双击左侧树元件 Tab 位号控制台报错的问题。
    - 修复导线图元设置网络名称后没有显示网络标签的问题。
    - 修复允许多部件跨层复制粘贴器件位号跨层分配错误的问题。
    - 修复游离 PCB 从原理图导入变更选择新建原理图导入变更弹窗自动关闭的问题。
    - 修复设置十字大光标后原理图中移动鼠标光标跟随延迟的问题。
    - 修复有源低通滤波器电路错误。
    - 修复替换器件后撤销保存后关闭原理图再次打开丢失撤销后器件的问题。
    - 修复编辑符号保存后刷新底部库预览无内容的问题。
    - 修复原理图和 PCB 复制出来的 PNG 带有背景的问题。
    - 修复原理图选中图元后右键添加批注跳转到图元属性 tab 的问题。
    - 修复复制图片后跨符号粘贴保存后刷新页面图片显示异常的问题。
    - 修复设置导线颜色后对齐操作导致导线颜色改变的问题。
    - 修复原理图导入 svg 图片多出一个无法选中的图片的问题。
    - 修复拖动导线与其相连接的导线消失的问题。
    - 修复获取网表文件时没有分配 Unique ID 的元件合并问题。
    - 修复附件工程在复用模块实例页点击顶部菜单设计回到上层无反应且报错的问题。
    - 修复手动将已有器件属性供应商编号清空器件替换后属性显示不对的问题。
    - 修复绘制组合内的导线导致画布变卡导线无法拖动的问题。
    - 修复导出 PDF 后文字部分显示错误的问题。
    - 修复放置复用模块时左侧树不显示全部图页的问题。
    - 修复绘制 CBB 不显示的问题。
    - 修复全离线模式下新建复用图块弹窗无反应的问题。
    - 解决网络名称命名时无法使用方向键移动光标的问题。
    - 修复批量导入器件进度条显示异常的问题。
    - 解决点击器件标准化列表中的“使用推荐器件”无反应的问题。
    - 修复引脚多编号时符号引脚和封装焊盘对应问题。
    - 修复导出网表再次导入显示删除默认规则的问题。
    - 修复常用库放置器件点击速度过快加入多次工程库的问题。
    - 修复绘制导线、放置网络端口等操作时按 Tab 键输入小写英文自动转成大写英文的问题。
    - 新增修改已有自定义规则的接口。
    - 修复新建工程选择模板后无法自动打开新创建的模板工程的问题。
    - 修复库导入弹窗中归属下拉项过滤框无效的问题。
    - 修复新建文件时模板选择复用模块确定键置灰的问题。
    - 修复右侧网络属性中的滚动条无法使用鼠标左键进行拖动的问题。
    - 修复更新工程库后日志出现警告的问题。
    - 修复 PCB 网络名中无法输入“￥”的问题。
    - 修复复用模块另存为本地弹窗名称框少了一截的问题。
    - 修复封装编辑器查找结果后点击灯泡图标选中无高亮的问题。
    - 增加默认引脚间距设置。
    PCB
    - 修复获取器件关联的所有焊盘返回的旋转角度值不对的问题。
    - 修复 3D 模型管理器中预览图缺少 3D 模型的问题。
    - 修复获取覆铜边框 pourPriority 值不对的问题。
    - 修复左侧树 3D 模型输入框中大写字母转小写的问题。
    - 修复 PCB 从原理图导入变更后检查 DRC 点击网表错误隐藏报错的问题。
    - 修复复用模块工程中原理图更新 PCB 有一网络一直更新不过来的问题。
    - 修复原理图导入与 PCB 相同内容的变更后在 PCB 中全部选中变更后器件进行复用布局布线提示“没有匹配对象”的问题。
    - 修复不对称焊盘焊盘孔切层时朝向异常的问题。
    - 修复开启自动铺铜后导入 AD 文件卡死在 50%的问题。
    - 修复开启自动重建铺铜后无法打开 PCB 的问题。
    - 新增修改已有自定义规则的接口。
    - 修复自动重建铺铜和手动重建铺铜生成的间距不一样的问题。
    - 修复放置焊盘时切换图层改变焊盘图层的问题。
    - 修复无法在右侧属性面板中切换焊盘“金属化”属性的问题。
    - 修复创建尺寸标注字体高度默认值太小的问题。
    - 修复选择参考点后快速粘贴导致参考点偏移的问题。
    - 修复设计规则中助焊扩展测试点扩展值导入后默认为-25.4mm 的问题。
    - 修复放置没有分配规则的约束在铺铜上导致网络规则没有生效的问题。
    - 修复修改焊盘位置再将其位置回正自动铺铜结果与手动铺铜结果不一致的问题。
    - 修复全选带有铺铜的 PCB 拖动后撤销铺铜效果没有恢复的问题。
    - 修复两个工程在两个窗口打开时复制其工程里 PCB 内容到另外一个窗口工程导致粘贴工程卡死的问题。
    - 修复检查 DRC 时画布上有报错但底部面板不显示提示的问题。
    - 修复编辑器 PCB 复制出来的 PNG 和 SVG 带有背景的问题。
    - 修复自动布线产生了断开的多余飞线的问题。
    - 修复自动布线后只有部分网络连接的问题。
    - 修复圆弧 45 度差分对布线差分对圆弧导线之间间距过大的问题。
    - 修复设置盲埋孔对内层导线安全间距不生效的问题。
    - 修复导出 JSON 已有导线缺少部分连接引脚信息的问题。
    - 修复导线无法修改网络为小写英文会自动修正为大写的问题。
    - 修复选中图元缩小之后复制为图片粘贴显示模糊的问题。
    - 修复复制顶层元件后切换底层没有调整元件图层的问题。
    - 修复等长调节无法拉出导线的问题。
    - 修复点击设计规则后卡死的问题。
    - 修复网络连接未忽略英文大小写的问题。
    - 修复导出 PDF 文件时元件属性颜色失效的问题。
    - 修复复制多图元进行粘贴内容不全的问题。
    - 修复给内电层添加网络点击重建内电层重建失败且网络变为空的问题。
    - 修复放置图片失败的问题。
    - 修复工程中无法选中导线和进行走线的问题。
    - 修复器件封装中部分封装编号不能跟随旋转的问题。
    - 更新自动布线会有 DRC 错误的问题。
    - 修复编辑焊盘模式下移动节点再移动线焊盘恢复原样的问题。
    - 修复编辑焊盘形状模式下编辑节点之后直接退出编辑焊盘形状模式的问题。
    - 修复在编辑焊盘时触发变更后无法撤销重做的问题。
    - 修复自动布线案例中大的挖槽超出板框时自动布线没避开挖槽的问题。
    - 修复导出 3D 模型到 UG 中打开需要反复选择几个 3D 文件且文件打开不了的问题。
    - 修复 ctrl+shift+v 进行跨 PCB 文件粘贴时直接放置无法进入预放置状态的问题。
    - 修复修改封装名称后保存 PCB 画布中右侧属性封装名称还是修改以前的值的问题。
    - 修复设置移动过孔导线默认跟随拖动过孔导线消失且撤回无法找回导线的问题。
    - 修复来回拖动三角形铺铜铺铜消失并无法选中的问题。
    - 修复开启允许封装翻转复制整块板子粘贴待放置时按两次 X 或 Y 放置后不正常的问题。
    - 修复放置复用模块模块不跟着十字动放置的器件无法移动的问题。
    - 修复放置器件后添加对象为器件属性时无法移动控制台报错的问题。
    - 修复导出 3D 模型在 CATIA V5 版本中打开失败的问题。
    - 修复绑定本地 3D 模型导出后无反应的问题。
    - 修复导出 3D 模型在 CREO 中打开只显示部分器件的问题。
    - 修复无法导出 3D 文件的问题。
    - 修复 3D 预览显示挖槽区域异常的问题。
    面板
    - 支持图片右键生成描边。
    - 支持生产文件中图片处理为 PNG 格式。
    - 修复辅助线的层跑到其它层导致面板无法下单的问题。
    格式转换
    - 修复导入 Altium 封装的描述属性导入后不正确的问题。
    - 支持导入关联工程库。
    - 支持导入 T/DISA 格式的符号和封装。
    - 修复导入 Altium 文件格式错误的问题。
    - 修复导入 epro 后右侧过滤失效的问题。
    - 修复导入 easyeda 文件后丝印位置偏移的问题。
    - 修复文件另存为 epro 格式到本地导入 epro 文件后器件封装反转的问题。
    - 修复工程另存为 EPRO 后在 V3 里面导入这个工程 PCB 的丝印颜色丢失的问题。
    - 修复导出 pads 提示数据为空无法导出的问题。
    - 修复导入 Altium 封装内顶底层线条、圆弧导入后丢失的问题。
    - 修复导出 AD、导出 PADS、另存为 epro 时报错的问题。
    - 修复导入 Altium 线宽为 0 的文本导入后线宽不正确的问题。
