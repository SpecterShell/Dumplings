    - 修复导出 PADS 文件失败的问题。
    - 修复导入标准版文件显示选择导入的文件格式不正确或不匹配当前类型的问题。
    - 修复导入 Altium 自定义图层内容导入后丢失的问题。
    - 修复导入 Altium 尺寸上标注文本的内容和方向不正确的问题。
    - 修复导出 epro 格式工程后再导入导线网络改变的问题。
    - 修复导入 Altium 宽度为 0 的线条导入后线宽变成 10mil 的问题。
    - 修复导出 AD 显示数据为空导出失败的问题。
    - 修复导出 V2 格式后再导入器件引脚连接处出现连接点的问题。
    - 修复导入含有总线的 epro 总线名称和总线分支丢失的问题。
    - 修复导入 PADS 导入 PCB 时需要根据 part type 生成封装名的问题。
    - 修复导入 Altium 封装内 keepout 图元转换出来的板框和禁止区域不正确的问题。
    - 修复导入 Altium 带扩展的圆弧和线条的扩展导入后丢失的问题。
    - 修复导入 Allegro 设计规则导入丢失的问题。
    - 修复导入 Allegro 封装内非电镀孔的焊盘丢失的问题。
    - 修复将有彩色丝印图片的 pcb 工程另保存为本地 epro 格式后彩色丝印图片消失的问题。
    - 修复导出 epro 格式工程后再导入移动原理图画布上的图元有很多地方连接断开出现未连接点的问题。
    - 修复导出 ad 原理图内容不一致的问题。
    - 修复导入 ad 元件引脚与网络标签连接处断开的问题。
    - 修复导出 epro 格式工程后再导入工程内 PCB 丢失的问题。
    - 修复导入 PADS 无法导入 2.10 导入 9.5 丢失内容的问题。
    - 修复导入 Altium 一些原本有结点的连接处导入后结点消失的问题。
    - 修复导入 Altium 封装内带扩展的 region 导入后扩展丢失的问题。
    - 修复导入 ad 原理图明细表关闭后导出 ad 原理图中还是显示明细表的问题。
    - 修复导入 ad 原理图符号消失的问题。
    - 修复导入 ad 文件原理图内容改变与 ad 中预览内容不一致的问题。
    - 修复导入 PADS 工程库中存在一个焊盘编号不对的封装的问题。
