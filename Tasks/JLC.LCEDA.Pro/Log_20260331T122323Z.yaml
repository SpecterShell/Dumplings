    扩展 API
    - 支持 React 组件化弹出窗口的类型传递。
    - 修复获取所有差分对详细属性控制台报错的问题。
    - 修复获取 BOM 文件接口返回 undefined 或报错的问题。
    - 获取所有差分对详细属性接口返回值类型。
    - 修复查询所有已选中图元的图元对象接口返回参数不对的问题。
    - 修复获取 BOM 文件 property 参数出现没添加的自定义属性接口返回 undefined 或报错的问题。
    - 补充缺失的类型导出。
    - 移除文档生成的历史遗留代码。
    - 修正 PCB 器件图元中无法推断的类型转换。
    - 修正部分代码的语法、Lint 错误。
    - 将所有分类修改为字符串数组以支持多级分类。
    - 新增获取 IPC-2581C 文件接口定义。
    - 扩展内禁用 alert。
    - 新增原理图内嵌对象图元定义。
    - 新增获取 IPC-2581C 文件。
    - 新增原理图网络相关接口定义。
    - 将 React 对象通过全局变量形式提供给扩展，暂时解决 React 实例不一致的问题。
    - 为禁用的方法添加控制台报错提示。
    - 原理图器件的关联属性中新增 name 字段。
    - 定义新增 DISA 仿真网表。
    - 修复导出网表 DISA 后缀多了个点的问题。
    - 新增原理图 BOM 模板操作接口定义。
    - 修改单位跨度描述。
    - 新增获取网表文件支持获取 disa 仿真网表。
    - 新增获取符号、封装渲染图的接口定义。
    - 更新获取符号和封装图像的接口定义，移除对符号、封装文件的支持。
    - 修复错误的类型引用。
    - 验证获取符号和封装渲染图的接口。
