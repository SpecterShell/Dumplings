  Value: |-
    【功能升级】
    - 微信收藏机器人优化收藏结果展示排版，包含文字，语音，聊天记录等内容
    - 微信收藏机器人新增收藏文件夹修改指令和生成待办指令，支持通过聊天发送/folder 指令修改默认收藏文件夹，支持通过聊天发送/todo 指令生成待办
    - 微信收藏机器人新增，支持转发消息时通过自然语言指令总结笔记和给笔记增加标签
    - 新增微信群聊记录自动同步到笔记防丢失，在创建群聊时添加有道云笔记微信收藏机器人，并发送账号口令，即可实现群聊记录自动同步到云笔记
    - 修改部分粘贴问题，以及提升应用运行效率，提升产品性能，优化产品体验

    感谢你使用有道云笔记，记录，成为更好的自己！
