  Key: ReleaseNotes
  Value: |-
    What's Changed
    New features
    - Add tab completion for julia +channel selection by @IanButterworth in https://github.com/JuliaLang/juliaup/pull/1420
    - Update .cshrc and .tcshrc if present by @fingolfin in https://github.com/JuliaLang/juliaup/pull/1108
    Fixes
    - manifestversiondetect: use matching installed version even if the exact channel is installed by @KristofferC in https://github.com/JuliaLang/juliaup/pull/1465
    - security: harden tar extraction and server URL validation by @IanButterworth in https://github.com/JuliaLang/juliaup/pull/1455
    - Pass GlobalPaths to save_config_db instead of re-deriving from current_exe by @IanButterworth in https://github.com/JuliaLang/juliaup/pull/1424
    - don't error when installed channel is missing from versions DB by @KristofferC in https://github.com/JuliaLang/juliaup/pull/1468
    - Improve error messages by showing more context by @fingolfin in https://github.com/JuliaLang/juliaup/pull/1433
    Maintenance
    - Switch tests from 1.11-nightly to 1.10-nightly by @fingolfin in https://github.com/JuliaLang/juliaup/pull/1479
    - chore(deps): bump the cargo-dependencies group with 2 updates by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1469
    - chore(deps): bump azure/trusted-signing-action from 1.1.0 to 1.2.0 in the github-actions group by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1470
    - [AUTO] Update version db by @github-actions[bot] in https://github.com/JuliaLang/juliaup/pull/1475
    - chore(deps): bump the github-actions group across 1 directory with 2 updates by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1478
    - chore(deps): bump semver from 1.0.27 to 1.0.28 in the cargo-dependencies group across 1 directory by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1480
    - chore(deps): bump quinn-proto from 0.11.13 to 0.11.14 by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1447
    - chore(deps): bump rand from 0.9.2 to 0.9.4 by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1476
    - chore(deps): bump rustls-webpki from 0.103.9 to 0.103.10 by @dependabot[bot] in https://github.com/JuliaLang/juliaup/pull/1454
