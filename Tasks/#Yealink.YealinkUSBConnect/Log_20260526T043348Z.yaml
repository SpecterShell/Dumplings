Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Based on the previous software version, problems that might lead to false alarms in the software have been fixed.
    1. YUC adds support for Windows x64 architecture.
    2. Optimized the upgrade logic for YMCS and YUC.
    3. Added configuration support for low battery notification thresholds for BH70 and BH74 headphones. Also optimized battery display and notification switching functions.
    4. Added support for Bluetooth PIN code pairing for specified models.
    5. Fixed the issue of unclear German text expression, improving overall accuracy and readability.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    在上个软件版本的基础上，对可能导致软件误报的问题进行了修复
    1. YUC 新增对 Windows x64 架构的支持。
    2. 优化了 YMCS 和 YUC 的升级逻辑。
    3. 新增对 BH70 和 BH74 耳机低电量通知阈值的配置支持。同时优化了电量显示和通知切换功能。
    4. 新增指定机型支持蓝牙 PIN 码的配对方式。
    5. 修复了德语文本表达不清晰的问题，提高了整体准确性和可读性。
