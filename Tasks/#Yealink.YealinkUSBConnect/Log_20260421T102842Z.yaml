- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Added support for the Windows x64 architecture in YUC.
    2. Optimized the upgrade logic for YUC and YMCS.
    3. Added support for configuring the low-battery notification threshold on BH70 and BH74 headphones. Also optimized battery level reporting and notification toggle functionality.
    4. Added a new Bluetooth PIN-based pairing method.
    5. Fixed issues with unclear German wording, improving overall accuracy and readability.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. YUC 新增对 Windows x64 架构的支持。
    2. 优化了 YMCS 和 YUC 的升级逻辑。
    3. 新增对 BH70 和 BH74 耳机低电量通知阈值的配置支持。同时优化了电量显示和通知切换功能。
    4. 新增指定机型支持蓝牙 PIN 码的配对方式。
    5. 修复了德语文本表达不清晰的问题，提高了整体准确性和可读性。
