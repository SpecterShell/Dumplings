  Key: ReleaseNotes
  Value: |-
    更新内容
    1. 修复更新链接点击时存在卡顿的问题。
    2. 对端设备不在线时，点击连接将会弹出提示。
    3. 修复服务端状态栏影响鼠标捕获的问题。
    4. 服务端镜像新增 Linux ARM64 平台的支持。
    5. 优化字体显示，新增俄语支持。
    6. 修复 Windows 10 以下版本无法运行程序的问题。
    7. 修复守护进程并发问题。
    8. 修复 Linux 平台因键盘事件监听导致的卡死问题。
    9. 修复 Linux 平台粘贴板共享功能阻塞主线程退出的问题。
    10. 修复 Linux 平台无音频设备时程序功能异常的问题。
    11. 修复 MiniRTC 库中的潜在崩溃问题。
