  Key: ReleaseNotes
  Value: |-
    更新内容
    1. 新增最近连接设备在线状态指示与提示信息。
    2. 新增 Windows 屏幕采集方式(WGC->DXG->GDI)。
    3. 网络状态窗口新增视频分辨率与连接模式显示。
    4. 新增连接取消按钮。
    5. 新增 macOS 安装包图标并优化打包脚本。
    6. 默认设置视频质量为高。
    7. 默认启用硬件编解码。
    8. 优化视频质量与流畅度。
    9. 优化主窗口 UI 布局显示。
    10. 修复键盘事件丢失问题。
    11. 修复静止画面导致带宽持续下降的问题。
    12. 修复连接关闭后可能出现的黑屏问题。
    13. 修复高 DPI 下 UI 显示异常的问题。
    14. 修复 OpenH264 解码色彩异常及 macOS 硬解异常的问题。
    15. 修复非控制模式下仍可共享剪贴板的问题。
    16. 修复服务端连接关闭后无法再次被连接的问题。
    17. 修复服务端被 Web 客户端连接时无法主动关闭连接的问题。
    18. 修复 Web 客户端关闭连接后服务端异常崩溃的问题。
