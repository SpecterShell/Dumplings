  Key: ReleaseNotes
  Value: |-
    Added
    - Meru Pro: Full Dark Theme for Gmail (experimental) — a new dark theme engine applies a true dark appearance to emails, compose windows, and everywhere else Gmail's native dark theme doesn't cover
      - Settings... → Gmail → Full Dark Theme
      - Disabled by default; opt in to enable it
      - This feature is experimental — we'd appreciate your testing and feedback to help make it stable
    Fixed
    - Meru Pro: The Save button in the Device Label section of License settings now submits when clicked
    Internal Changes
    - The content blocker is now more efficient and makes Meru smaller, with ad and tracker blocking unchanged
    - Upgraded Electron to v43.1.1
