  Key: ReleaseNotes
  Value: |-
    Changed
    - The About Meru menu item now opens the About page in Settings instead of showing a plain dialog
    - Machine ID is now called Device ID in Settings... → About
    - The General section in Gmail settings is now called Appearance (Settings... → Gmail → Appearance)
    Fixed
    - Full Dark Theme now applies to popped-out compose windows and popped-out messages
    - Full Dark Theme no longer inverts photos in emails
    - Full Dark Theme now uses significantly less memory, especially when reading image-heavy mail over a long session
