  Key: ReleaseNotes
  Value: |-
    The following describes improvements made in the May 2026 update.
    Resolved black screen issue on Windows 11. This update fixes an issue where ZoomText could start with a black screen or become unresponsive on systems running Windows 11 version 25H2 or later, particularly after recent Windows updates (KB5079391, KB5079473, and KB5086672) on systems with Intel graphics hardware (11th generation or older).
    ZoomText 2025 and Fusion 2025 now automatically detect affected environments and switch to a supported display adapter setting. The default setting is Magnification API.
    For more details, see TSN 1817 - Black screen issue on Windows 11.
