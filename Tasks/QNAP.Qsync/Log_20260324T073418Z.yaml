  Key: ReleaseNotes
  Value: |-
    [Enhancement]
    - lnk (shortcut) files are now included in synchronization and backup tasks by default. If you prefer not to sync or back up these files, you can add *.lnk to the Exclusion list in the task settings.
    [Fixed Issues]
    - Fixed an issue where the restore process might not resume properly when the network connection is interrupted and then restored.
    - Fixed issues with incorrect or unclear wording in parts of the user interface.
    - Fixed an issue where a deleted Qsync Client application shortcut would be recreated after a system reboot.
