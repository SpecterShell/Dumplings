  Value: |-
    PCL CE 2.15.0 全面移除了 Visual Basic 代码，重构并优化了多个核心组件，同时升级至全新的 .NET 10 运行时，以确保持续提供卓越的性能与安全性。此版本首次加入多语言与地区支持，方便不同语言习惯的玩家使用。资源下载功能也获得改进，现可自动安装模组前置，并清晰区分必需与可选依赖。此外，还包含了部分 UI 样式改进、多项 Bug 修复及功能优化。
    自 2026 年 7 月 16 日起，版本号 2.15.0 的旧版本将无法从 CurseForge 下载资源，建议尽快更新。
    - 使用 PCL CE 2.15.0 或更高版本，需安装 .NET 10 桌面运行时，可前往 https://get.dot.net/10 获取。
    PCL CE 2.15.0 has completely removed Visual Basic code, refactored and optimized multiple core components, and upgraded to the brand-new .NET 10 runtime to ensure continued exceptional performance and security. This version introduces multi-language and region support for the first time, making it easier for players with different language preferences. The resource download feature has also been improved, now capable of automatically installing mod prerequisites, while clearly distinguishing between required and optional dependencies. Additionally, this release includes some UI style improvements, numerous bug fixes, and feature optimizations.
    Starting from July 16, 2026, older versions below 2.15.0 will no longer be able to download resources from CurseForge. It is recommended to update as soon as possible.
    - To use PCL CE 2.15.0 or later, you need to install the .NET 10 Desktop Runtime, available at https://get.dot.net/10.
    2.15.0 更新一览(2026-07-14)
    🚀 功能追加
    - instance-export: 支持导出未被规则覆盖的文件夹 (#3386)
    🐛 问题修复
    - color: MC 文本格式化时可能产生意外的 null 变量 (#3390)
    - 使用 UseShellExecute 打开目录 (#3385)
    - config: 单个配置项损坏时重置为默认值而非致命崩溃 (#3346)
    - custom-download: 修复自定义下载开始按钮概率不刷新状态问题 (#3408)
    - game-crash: 修复崩溃报告中启动器日志无法正常输出的问题 (#3405)
    - 将内存与下载限速的单位标签更正为 IEC 单位 (#3411)
    🚜 重构
    - game-crash: 改用同步方法而不是异步包装 (#3409)
    👀 优化改进
    - game-crash: 在游戏崩溃弹窗点击查看日志时打开最新的日志文件 (#3404)
    - game-crash: 修改启动器日志文件名称以增加区分度 (#3406)
    ⚙️ 其他改动
    - deps: 更新 Humanizer.Core.zh-CN 到 3.0.10 (#3391)
    - deps: 更新 Downloader 到 5.9.4 (#3392)
    - deps: 更新 NAudio 到 2.3.0 (#3393)
    - deps: 更新 Stun.Net 到 10.0.6 (#3394)
    - deps: 更新 Wacton.Unicolour 到 8.0.0 (#3395)
    - deps: 更新 YamlDotNet 到 18.1.0 (#3396)
    - deps: 更新 Polly 到 8.7.0 (#3397)
    - deps: 更新 Dapper 到 2.1.79 (#3398)
    - deps: 更新 Sentry 到 6.6.0 (#3399)
    - deps: 更新 CommunityToolkit.Mvvm 到 8.4.2 (#3400)
    - deps: 更新一堆 MS 的依赖 (#3401)

