  Key: ReleaseNotes
  Value: |-
    Highlights
    This is a stability release that hardens sending, startup, packaging, and message rendering.
    Bug Fixes
    - Sending to a busy conversation is handled gracefully across all runtimes: instead of surfacing a raw conflict error, AionUi now recognizes "conversation is busy" responses and recovers the queued message properly.
    - Fixed messages being truncated when the text happened to mention the internal file-attachment marker — attachment parsing now only applies to actual attachment blocks on your own messages.
    - If assistant data fails to load at startup, AionUi now treats it as a repairable local-data issue and guides you through recovery instead of failing with a generic error.
    - Bug reports filed from a team page now include the team context, making team issues easier to diagnose.
    - The installer verifies bundled resources against a manifest, catching corrupted or incomplete installs before they cause runtime errors.
    What's Changed
    - fix(startup): classify assistant bootstrap failures as local data issues by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3583
    - chore(docs): update WeChat group QR code to wx-16 by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3588
    - fix(packaging): verify bundled resources from manifest by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3587
    - fix(feedback): attach team route context by @jiahe0510 in https://github.com/iOfficeAI/AionUi/pull/3586
    - fix(conversation): handle busy send conflicts by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3589
    - fix(renderer): restrict message file marker parsing by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3590
    - chore: bump version to 2.1.35 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3591
    New Contributors
    - @jiahe0510 made their first contribution in https://github.com/iOfficeAI/AionUi/pull/3586
    Full Changelog: https://github.com/iOfficeAI/AionUi/compare/v2.1.34...v2.1.35
