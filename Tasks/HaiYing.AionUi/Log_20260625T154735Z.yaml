  Key: ReleaseNotes
  Value: |-
    Highlights
    Faster, Smoother Long Conversations
    - Conversations now load instantly by showing the most recent messages first, then fetching older history as you scroll up. Long chats no longer hang while the whole thread loads, and in-progress agent replies stay live while older history is brought in.
    Smarter Assistant & Connection Management
    - You can now test an assistant's connection right from settings, and assistants stay visible even when their backing agent is temporarily offline — instead of silently disappearing, they show a clear "unavailable" warning with a self-repair entry point.
    - The Skills and Tools settings now read from one unified skill catalog, so what you see in the UI stays consistent with what's actually installed.
    Bug Fixes
    - Agent and provider errors now show clear, localized messages (including expired AWS SSO sessions) across all supported languages, instead of raw or English-only text.
    - Fixed flickering when switching tabs in the Capabilities settings page.
    - Repaired startup for users upgrading from older versions whose local database had drifted — the app now repairs the database on first launch instead of failing to start.
    - Fixed macOS release packaging so the auto-update zip is always produced again, keeping in-app updates reliable on Mac.
    What's Changed
    - ci(pr-checks): trim PR build test matrix by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3411
    - fix(settings): prevent capabilities tab flicker by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3414
    - test(skills): drop removed auto skill expectations by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3417
    - fix(release): restore mac zip artifacts by @TCP404 in https://github.com/iOfficeAI/AionUi/pull/3415
    - feat(conversation): add cursor message pagination by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3422
    - fix(desktop): repair legacy database handoff startup by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3423
    - feat(agent): connection testing and assistant availability surfacing (phase 2) by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3395
    - Use unified skill catalog in settings UI by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3424
    - fix(conversation): localize structured agent errors by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3426
    - chore(release): bump AionUi to 2.1.24 and AionCore to v0.1.37 by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3427
    Full Changelog: https://github.com/iOfficeAI/AionUi/compare/v2.1.23...v2.1.24
