  Key: ReleaseNotes
  Value: |-
    New Features
    - Models now support health checks, enable/disable toggles, and developer debugging. (#1085, @Asunfly)

    - Chrome DevTools Protocol (CDP) is supported for AI-assisted debugging. (#1002, @loonghao)
    What's Changed
    - fix(webui): prevent infinite redirect loop on login page by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1106
    - fix(build): apply ad-hoc signing for unsigned macOS arm64 builds by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1115
    - feat(model): 实现模型健康检测、启停开关和开发者调试功能 by @Asunfly in https://github.com/iOfficeAI/AionUi/pull/1085
    - fix: address multiple issues found in v1.8.20 audit by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1112
    - feat(cdp): Add Chrome DevTools Protocol support for AI-assisted debugging by @loonghao in https://github.com/iOfficeAI/AionUi/pull/1002
    - fix(webui): open external links on client browser instead of server by @Jassy930 in https://github.com/iOfficeAI/AionUi/pull/1121
    - fix(css): 修复设置返回对话页后主题回退问题 by @taekchef in https://github.com/iOfficeAI/AionUi/pull/1109
    - fix(webui): resolve multiple WebUI issues (#977, #1075, #1082, #1083, #1113) by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1124
    - fix(acp): surface relay model_not_found errors to UI by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1122
    - chore: bump version to 1.8.21 and fix slash command dropdown spacing by @kuishou68 in https://github.com/iOfficeAI/AionUi/pull/1126
