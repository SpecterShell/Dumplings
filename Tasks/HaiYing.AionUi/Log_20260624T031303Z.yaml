  Key: ReleaseNotes
  Value: |-
    Highlights
    WebUI Browser Notifications
    - The WebUI now sends a browser notification when an agent needs your confirmation or finishes a turn — but only when the tab is in the background, so it never interrupts you while you're actively working. Click the notification to jump straight back to that conversation. Toggle it from Settings → System → Notifications.
    Bug Fixes
    - Fixed the OfficeCLI install link and the outdated German (de-DE) install hint — OfficeCLI is now downloaded as a prebuilt binary from the official releases instead of pointing at the old npm command.
    What's Changed
    - fix(preview): correct OfficeCLI repo slug casing and de-DE install hint by @goworm in https://github.com/iOfficeAI/AionUi/pull/3399
    - feat(webui): add browser notifications for permission requests and turn completion (#3371) by @lornestack in https://github.com/iOfficeAI/AionUi/pull/3401
    - chore(docs): update WeChat group QR code to wx-13 by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3403
    - chore: bump version to 2.1.23 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3407
