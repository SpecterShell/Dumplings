  Key: ReleaseNotes
  Value: |-
    ✨ Highlights
    1) AionUi Morph PPT with real-time rendering, powerred by OfficeCLI x AionUi

    - Expanded morph-ppt capabilities for a more visual and transparent slide-building workflow.
    - Added clearer preview and system-app warning messages to reduce confusion during generation.
    - Improved WebUI/Server-mode support for PPT preview and shell-open actions, making local and remote usage more consistent.
    - Result: users can see the PPT being produced step by step instead of waiting for a black-box final output.
    2) OfficeCli now includes built-in Skills
    - OfficeCli ships with built-in skills to reduce setup friction and speed up onboarding.
    - Skills sync reliability improved by separating built-in and user skill directories.
    - Better end-to-end flow from intent → generation → preview → iteration in PPT workflows.
    🚀 Other Improvements
    - i18n: replaced Chinese fallback strings with English in t() calls.
    - Search: added Cmd/Ctrl + Shift + F history shortcut.
    - Conversation UX: cycle visible sessions with Ctrl + Tab.
    - Server: added webserver standalone mode.
    - UI polish: formatting fixes in channel config forms and skills hub settings.
    - Mobile: mobile-related enhancements and fixes.
    What's Changed
    - fix(i18n): replace Chinese fallback strings with English in t() calls by @amanharshx in https://github.com/iOfficeAI/AionUi/pull/1651
    - feat(search): add Cmd/Ctrl+Shift+F history shortcut by @Eric-Song-Nop in https://github.com/iOfficeAI/AionUi/pull/1625
    - fix(morph-ppt): clarify preview and system app warning by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/1664
    - refactor(morph-ppt): remove hardcoded inspiration topics by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/1666
    - style: fix formatting issues in channel config forms and skills hub settings by @piorpua in https://github.com/iOfficeAI/AionUi/pull/1668
    - feat(server): webserver standalone mode by @piorpua in https://github.com/iOfficeAI/AionUi/pull/1665
    - fix(skills): separate builtin and user skills directories for reliable sync by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/1673
    - fix(conversation): cycle visible sessions with ctrl+tab by @Eric-Song-Nop in https://github.com/iOfficeAI/AionUi/pull/1623
    - Mobile by @xavierliang in https://github.com/iOfficeAI/AionUi/pull/1506
