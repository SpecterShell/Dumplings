    - fix(desktop): wait for macOS update install readiness by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3484
    - fix(cron): sync manual task assistant selection by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3485
    - fix(assistant): correct engine section badge tone to warning by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3487
    - feat(conversation): keep active conversation, project headers, and batch panel in view by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3483
    - fix(acp): dedupe runtime option requests by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3490
    - fix(cron): support team context job navigation by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3492
    - fix(assistant): render empty avatars consistently by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3493
    - fix(desktop): support dated frontend log layout by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3495
    - fix(runtime): coordinate foreground leases and runtime ensure by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3497
