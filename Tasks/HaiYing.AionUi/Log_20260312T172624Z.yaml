  Key: ReleaseNotes
  Value: |-
    What's New
    Features
    - Codex/PR workspace – Remember last directory for Codex PR workspace (#1265).
    - ACP context usage – Show context usage for ACP-connected Claude Code and Codex sessions (#1207).
    - Conversation – Replace the plus button with an agent selection dropdown for starting new chats (#1206).
    Fixes
    - Gemini – Restore conversation history injection when rebuilding sessions (#1268).
    - Workspace – Fix workspace dropdown arrow on the left not collapsing (#1156, #1197).
    - Conversation – Remove stale workspace entries from expanded state (#1271).
    - WebUI – Add favicon for browser tab (#1173).
    - i18n – Real-time bidirectional language sync between desktop and WebUI (#1189).
    - ACP – Fix Iflow and Qwen failing to start when Electron inherits stale Node.js env (#1278).
    What's Changed
    - Codex/pr workspace last directory by @JAVA-LW in https://github.com/iOfficeAI/AionUi/pull/1265
    - fix(gemini): restore conversation history injection on session rebuild by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/1268
    - feat(acp): add context usage indicator for ACP-connected CC and Codex sessions by @Castor6 in https://github.com/iOfficeAI/AionUi/pull/1207
    - feat(conversation): replace plus button with agent selection dropdown by @Jassy930 in https://github.com/iOfficeAI/AionUi/pull/1206
    - fix(#1156): 修復工作目錄左側下拉箭頭無法收起 by @audichuang in https://github.com/iOfficeAI/AionUi/pull/1197
    - fix(conversation): remove stale workspace entries from expanded state by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/1271
    - fix(webui): add favicon for browser tab icon by @Jassy930 in https://github.com/iOfficeAI/AionUi/pull/1173
    - fix(i18n): real-time bidirectional language sync between desktop and WebUI by @audichuang in https://github.com/iOfficeAI/AionUi/pull/1189
    - fix(acp): iflow and qwen fail to start — Electron inherits stale Node.js env by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/1278
    - chore: bump version to 1.8.26 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/1279
    Full Changelog: https://github.com/iOfficeAI/AionUi/compare/v1.8.25...v1.8.26
