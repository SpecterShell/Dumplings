  Key: ReleaseNotes
  Value: |-
    Verbesserungen/Änderungen:
    - Österreich:
      - UPIS: Das Fach BOKO wird nicht mehr in die PD Zusatzstunden gerechnet. (UN-8946)
      - LFBS Niederösterreich: Die Abendstundenaufwertung unterliegt nicht mehr der MDL-Reduktion. (UN-9168)
    - Deutschland:
      - LUSD: Beim initialen Import wurden die Kurznamen der Schüler nun an das Schema von WebUntis angepasst. (UN-8988)
      - Baden-Württemberg: Der Import der Kurse über die Schnittstelle ASV-BW wurde verbessert. (UN-8899)
      - Sachsen-Anhalt: Wertkorrekturen der Art W werden nun in den Wochenwerten in der Spalte Wertkorrektur angezeigt. (UN-9182)
    Bug Fixes:
    - Abstürze:
      - Beim Öffnen der Tauschvorschläge in einer leeren Untis-Datei konnte ein Absturz auftreten. (UN-9273)
      - Im Unterrichtsfenster konnte es zu einem Absturz kommen, wenn Raumgruppen ohne Räume eingetragen waren. (UN-9351)
    - Allgemein:
      - Das Anlegen eines neuen Schuljahres konnte nicht abgebrochen werden. (UN-9315)
      - Die Fehlermeldung bei der Meldung doppelter Jahrgangsstufen wurde verbessert. (UN-9349)
      - Aktualisierung von Tauschvorschläge korrigiert. (OPT-2562,OPT-2526)
      - Manuell verplanen Kennzeichen wird nun beim Optimierungen in anderen Abteilungen berücksichtigt. (OPT-2458)
    - MultiUser:
      - MultiUser: Die Option ‘Automatische Datensicherung’ konnte nicht dauerhaft deaktiviert werden. (UN-9294)
      - Die Meldung, wenn zwei Benutzer gleichzeitig dieselben Daten ändern, konnte irreführend sein. (UN-9060)
      - Stundenpläne konnten über Tauschvorschläge auch ohne Berechtigung zum Bearbeiten von Stundenplänen verändert werden. (UN-9206)
    - Vertretungsplanung:
      - Beim Eintragen einer Absenz wurde eine Lehrkraft nur aus einer Veranstaltung entfernt, wenn mehrere vorhanden waren. (UN-5563)
      - Beim erneuten Öffnen der Gründe unterrichtsfreier Tage im Kalender konnte sich der ausgewählte Grund unerwartet ändern. (UN-9033)
      - Unter bestimmten Umständen wurden Vertretungen im Stundenplan der Lehrkraft nicht in den richtigen Stunden angezeigt. (UN-9195)
    - Kursplanung: Im Fenster zum Festlegen der Teilbereiche für die Teilbereichsoptimierung waren die Inhalte zweier Spalten vertauscht. (UN-9217)
    - Infostundenplan: In der Vertretungsplanung wurde der Button ‘Infostundenplan’ nicht angezeigt. (UN-9324)
    - WebUntis:
      - Aktualisierung der Schnittstelle zwischen Untis und WebUntis. Ab 01.08.2026 werden bestimmte Funktionen nur noch von dieser oder neueren Untis Versionen unterstützt. (UN-8865)
      - Die Schulsuche im Exportfenster funktionierte nicht mehr. (UN-9340)
      - Die Funktion 'In WebUntis löschen' konnte unter Umständen ausgegraut sein, obwohl das Löschen möglich sein sollte. (UN-9234)
      - Beim Import einer Prüfung wurde in manchen Fällen eine Betreuung anstelle eines Entfalls generiert. (UN-9254)
    - Österreich, UPIS:
      - Fernunterricht am Abend wird nun nicht mehr aufgewertet. (UN-8650)
      - Im Menü zum Anpassen der Schnellstartleiste haben Texte gefehlt. (UN-9260)
    - Deutschland, LUSD:
      - Gewisse Stammdaten wie "Unterrichtsgruppen" und "Raumgruppen" wurden als "ID_0_1" im Fenster nach dem Export angezeigt. (UN-8945)
      - Beim Export wurden bei der LehrerKursZuordnung die KursWochenStunden bei Kursen ohne Klasse fälschlicherweise summiert ausgegeben. (UN-9284)
    - Deutschland, Bayern: Wertkorrekturen der Art + oder - wurden fälschlicherweise in der Spalte Ist im Fenster Wochenwerte angezeigt. (UN-9271)
