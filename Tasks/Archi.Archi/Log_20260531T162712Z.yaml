Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New
    - Add “Invert Connection Direction” feature to reverse source and target ends of a connection
    - New Model Tree alphanumeric sort algorithm
    - Show parent folder paths in “Used in Views” and “Model Relations” analysis tables
    - Open Exchange Format now imports and exports Specialization names
    Improvements
    - Model Tree alphanumeric sort preference is off by default
    - Model Tree search – restore tree selection when clearing search filter and text
    - [CSV Import] Throw an exception if there are duplicate relations declared
    - Aggregation and Composition connection ends are drawn more accurately
    - Ensure icon images are not drawn slightly outside of a figure
    - Add an internal check on startup to ensure workbench part icons are correct when using different versions of Eclipse
    - Remove link in help contents to online ArchiMate 3.2 specification as it’s no longer “open”
    Fixes
    - Fix disabling themes in preferences setting not working
ReleaseTime: 2026-04-14
