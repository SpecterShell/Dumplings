  Key: ReleaseNotes
  Value: |-
    Rider 2026.1 EAP 7 comes with the following updates:
    CMake support for C++ projects [Beta]
    Rider 2026.1 introduces Beta support for CMake-based C++ projects, allowing you to open, edit, and build them directly in the IDE. This makes it easier to work with cross-platform projects without switching to another build system.
    The initial implementation focuses on C++ workflows,including editing and debugging CMake configuration files. Some workflows and edge cases may still require refinement, and we'll continue improving performance and compatibility in upcoming releases. We would love for you to share your experience in this ticket.
    Smoother MAUI iOS development workflow from Windows
    Developing .NET MAUI applications for iOS from Windows requires connecting Rider to a Mac build host. Rider 2026.1 streamlines this workflow with a new setup experience that automatically prepares the remote environment.
    When you connect to a Mac, Rider now verifies the remote system configuration, including macOS, Xcode, the .NET SDK, and required MAUI workloads. If any components are missing, Rider can install or update them automatically, helping you get started faster.
    We've also improved diagnostics and connection stability, and fixed issues that previously prevented MAUI apps from deploying to iOS simulators or devices from Windows. You can now build, deploy, and debug MAUI iOS applications from Windows more reliably.
    Decompiler
    The decompiler now supports C# 14 user-defined compound assignment operators.
    Notable fixes
    We're continuing to improve the new expressions evaluator for Unreal Engine projects. This build comes with fixes for issues [RIDER-136243] and [RIDER-136070].

    For the full list of changes included in this build, please refer to our issue tracker.
