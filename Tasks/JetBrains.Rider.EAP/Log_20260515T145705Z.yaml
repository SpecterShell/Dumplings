  Key: ReleaseNotes
  Value: |-
    Rider 2026.2 EAP 2 comes with the following updates:
    Faster debugger startup and restart
    We've made several performance improvements to the debugger:
    - Debugger startup on Windows is now around 3 seconds faster in affected scenarios. This improvement addresses a debugger worker startup delay that could affect .NET, Mono, and Unity debugging, as well as some mixed-mode debugging workflows.
    - Restarting an application with Monitoring enabled is also faster, with the delay reduced by approximately 2 seconds.
    - We've also reworked silent exception handling to improve performance when debugging applications that throw and catch a large number of exceptions.
    - This build fixes memory leaks and removes unnecessary startup-time calculations that could affect debugger stability and responsiveness.
    Improved source generator debugging
    Debugging source generators should now work more reliably with newer SDKs on Linux and macOS. Starting a debugging session no longer requires a successful build of the target project, and target project files are no longer compiled before startup, which should make the workflow faster.
    XAML Hot Reload for WPF is now available in Beta
    You can now edit XAML while your WPF application is running and apply the changes without losing the current application state or rebuilding and restarting during UI iteration. Together with the existing C# Hot Reload support, this completes the core WPF edit-and-continue workflow in Rider.
    We'd appreciate your feedback on this feature. Please leave your comments here.
    Basic Natvis support on Linux and macOS
    Rider 2026.2 EAP 2 introduces basic Natvis support for the C++ debugger on Linux and macOS, improving the debugging experience when inspecting native data structures across platforms.
    For the full list of changes included in this build, please refer to our release notes.
