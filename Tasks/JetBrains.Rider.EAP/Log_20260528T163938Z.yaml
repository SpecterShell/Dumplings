  Key: ReleaseNotes
  Value: |-
    Rider 2026.2 EAP 4 is out with the following updates:
    New in Azure DevOps support: Pull requests
    Rider 2026.2 EAP expands Azure DevOps support with the introduction of pull requests.
    The new Azure DevOps tool window lets you list and filter pull requests, review changed files, vote, complete existing PRs, and create new ones without having to switch to any external tools. You can review PRs in the context of your project with full access to Rider’s code insight, navigation, and editing features.
    To get started, clone a project from Azure DevOps and connect using a personal access token.
    We’re working toward a more complete Azure DevOps review workflow in Rider. Timeline view and in-editor PR comments and discussions are planned for future updates.
    Support for Godot Asset Store development
    In addition to the recently added project templates for CMake and Godot projects, this preview build introduces support for creating Godot Asset Store addons directly from Rider.
    You can now use dedicated project templates to start new Godot addons, including script-based assets, editor plugins, and native C++ GDExtensions. The generated projects come with a preconfigured structure, build settings, and run configurations, so you can run the Godot editor and debug GDScript or native C++ code from Rider with less setup.
    The templates also follow the official Godot Asset Store submission recommendations, helping you keep your addons publish-ready from the start.
    Check out our documentation for a comprehensive guide.
    The official JetBrains Rider Integration add-on
    We’re also publishing our official Godot addon, JetBrains Rider Integration, on the Godot Asset Store. The addon simplifies connecting Rider as an external editor for Godot, giving you access to Rider’s code insight, navigation, inspections, and debugging support while working on Godot games and addons.
    For the full list of changes included in this build, please refer to our release notes.
