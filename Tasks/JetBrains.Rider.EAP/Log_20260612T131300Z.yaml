  Key: ReleaseNotes
  Value: |-
    Rider 2026.2 EAP 6 is out with the following updates:
    Cleaner async call stacks in the debugger
    Rider 2026.2 EAP 6 improves how async call stacks are presented during debugging. The debugger now reduces noise from generated async and task infrastructure frames, making it easier to follow the logical flow of your code instead of digging through compiler-generated implementation details.
    This should make debugging async .NET code feel closer to working with a regular synchronous call stack: the relevant project frames are easier to spot, while the lower-level generated frames remain available when you need to inspect the full execution details.
    To get more information on the key updates of this EAP cycle, see our blog.
    For the full list of changes included in this build, please refer to our release notes.
