  Key: ReleaseNotes
  Value: |-
    Rider 2026.2 EAP 8 is out with the following updates:
    You may notice this build is labeled EAP 8. We skipped EAP 7 last week and rolled its changes into this fresh build. Everything from the planned EAP 7 is included here.
    Evidence-based performance investigation with the new dottrace-analyze AI agent skill
    Rider 2026.2 EAP 8 introduces dottrace-analyze, a new AI agent skill that lets the agents inside AI Assistant diagnose performance problems using runtime evidence instead of guesswork.
    You can hand your AI agent a .dtp snapshot collected with dotTrace – using dotTrace inside Rider, the standalone dotTrace application, or the dotTrace command-line tool – and it reads the profile, finds where the CPU actually went, traces the hot path back into your code, and explains the root cause and how to fix it.
    In our evals, the skill moved the agent from reliably lost to reliably correct, catching bottlenecks that are genuinely hard to spot by reading code alone. Get the full story on our blog.
    New Welcome screen [Beta]
    The new Welcome screen opens as a tab inside the IDE instead of blocking startup, helping you get to useful actions faster – whether you’re opening a full solution or using Rider’s tooling before a solution is loaded.
    From the Welcome screen, you can open a project, return to recent work, manage plugins, launch the Terminal, attach the debugger or profiler to a running process, or work with databases without waiting for a solution to finish loading.
    For the full list of changes included in this build, please refer to our release notes.
