Version: 3.0.3.0
Installer:
- Architecture: x64
  InstallerUrl: https://download.pixpinapp.com/PixPin_cn_zh-cn_3.0.3.0.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    PixPin3 迎来了全面而重磅的升级，致力于为您提供更加高效、流畅的截图与处理体验。现在发布测试版，在测试版的使用中如果有任何问题或者建议，可以通过邮件向我们反馈，此版本在前一版本（3.0.0.2）的基础上修复了部分已知问题。
    更新说明
    焕然一新的界面
    我们对 UI 进行了全面重构。全新的设计语言，更加现代、清爽的视觉风格，让你在高效工作的同时，也能拥有极致的视觉体验。
    更强大的文本识别
    全新升级的文本识别算法，更准确更全能，能识别多种语言文字
    更强大的图像保存
    全新设计的保存对话框，新增支持 AVIF 和 PDF 格式，预估保存文件大小，预览编码效果
    AI 翻译
    我们正式接入了 AI 大模型，翻译水平大幅度跃升。不仅支持多种语言的自动互译，还能结合语境给出更精准、更自然的翻译结果，阅读外文资料从此畅通无阻。
    桌面悬浮图标
    通过桌面悬浮图标，点击即可触发快捷操作。还可以直接将图像或文字拖动到图标上完成贴图，可全程鼠标操作。
    问题修复
    【修复】MacOS 在多屏幕下在关闭截图时进程崩溃
    【修复】在浏览器上进行窗口贴图，一段时间后会黑屏
    【修复】文本贴图的颜色设置不生效
    【修复】翻译窗口上方有两条红线异常显示
    【修复】缩略图模式在还原时位置会偏移
    【修复】某些场景下即时贴图成功也会显示“没有贴图数据”
    【修复】脚本中指定鼠标所在的屏幕截图会对所有屏幕截图
    【修复】序列号标注工具栏中英文不统一
    【修复】设置了内置快捷键为 A 时，进行序列号标注时会误触发
    【修复】退格键无法删除标注
    【修复】设置“复制截图”与保存成功时的音效不生效
    【修复】录屏回放音画不同步和卡顿
    【修复】一直按住恢复贴图键会导致进程崩溃
    【修复】在 windows7 下无法运行
    【修复】悬浮球设置按钮后重启软件会失效
