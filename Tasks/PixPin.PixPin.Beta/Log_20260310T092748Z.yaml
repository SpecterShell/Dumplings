  Key: ReleaseNotes
  Value: |-
    PixPin3 全新升级
    本次 PixPin3 迎来了全面而重磅的升级，致力于为您提供更加高效、流畅的截图与处理体验。现在发布测试版，在测试版的使用中如果有任何问题或者建议，可以通过邮件向我们反馈
    焕然一新的界面
    我们对 UI 进行了全面重构。全新的设计语言，更加现代、清爽的视觉风格，让你在高效工作的同时，也能拥有极致的视觉体验。
    更强大的文本识别
    全新升级的文本识别算法，更准确更全能，能识别多种语言文字
    更强大的图像保存
    全新设计的保存对话框，新增支持 AVIF 和 PDF 格式，预估保存文件大小，预览编码效果
    AI 翻译
    我们正式接入了 AI 大模型，翻译水平大幅度跃升。不仅支持多种语言的自动互译，还能结合语境给出更精准、更自然的翻译结果，阅读外文资料从此畅通无阻。
    桌面悬浮图标
    通过桌面悬浮图标，点击即可触发快捷操作。还可以直接将图像或文字拖动到图标上完成贴图，可全程鼠标操作。
