  Key: ReleaseNotes
  Value: |-
    发布日期：2026 年 3 月 30 日
    - 兼容以下系统层面的配置。
      注： 要实现以下功能，系统管理员需将 PBX 系统升级至 37.22.0.134 或更高版本。
      - 如果系统管理员已将 Linkus 桌面客户端同时注册数 设置为大于 1 的值，你可以同时登录多个 Linkus 桌面端。
      - 如果系统管理员在 PBX 服务器上为速拨码设置了备注，当使用特征码拨打速拨码时，备注将显示在通话窗口的电话号码下方。

    - 支持管理你的分机所登录的所有 Linkus UC 客户端 (路径：账号 > 当前已登录设备)。
      更多信息，请参见 管理已登录的 Linkus 客户端。
      注： 要实现此功能，系统管理员需将 PBX 系统升级至 37.22.0.134 或更高版本。

    - 优化 Yeastar CTI 功能：你可以在 Linkus 桌面端上通过 CTI 控制 Linkus 手机端。
      在此模式下，Linkus 桌面端将作为可视化控制面板。你可以通过 Linkus 桌面端执行拨号、录音、挂断等通话操作，而语音流则通过绑定的 Linkus 手机端来传输。
      注： 要实现此功能，需满足以下要求：
      - 系统管理员需将 PBX 系统升级至 37.22.0.134 或更高版本。
      - Linkus 手机端需符合以下版本要求：
        - Linkus iOS 端：5.24.13 或更高版本。
        - Linkus 安卓端：5.24.7 或更高版本。
    - 优化 热键 功能：支持将功能键 (F1～F12) 单独或作为组合键的一部分设置为热键。
    - 移除通过 MSI 包安装的 Linkus 桌面端的新版本检测功能。
      - 客户端启动时将不再显示新功能通知弹窗。
      - 关于 窗口中的 检查更新 按钮已移除。
