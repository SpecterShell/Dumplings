  Key: ReleaseNotes
  Value: |-
    New Features
    - Added option to estimate password quality (along with password quality bar)
      to "Enter password" dialog
    - PassCube: Added database name/description box to password settings
    - PassCube: Password confirmation can be skipped by pressing "Skip" button in
      "Enter password" dialog
    Changes & Improvements
    - Redesigned password quality bar: Color (ranging from red over yellow to
      green) and length (full length = 128 bits) indicate password strength
    - Password database format version 1.8: (a) Use Encrypt-then-MAC scheme,
      (b) use different keys for encryption and HMAC, (c) always use salt (random
      32-byte sequence) to derive encryption key when recovery key is set
    - Support for base32-encoded Donor Keys
    Fixes
    - PassCube: Adding/modifying database entry: Changed password accepted when
      pressing "Cancel" button in "Confirm password" dialog
