  Key: ReleaseNotes
  Value: |-
    The following describes improvements made in the June 2026 update.
    OCR and Picture Smart Mouse Mode Results Now Display in the JAWS Results Viewer (Fusion Only)
    Two new layered keystrokes provide another way to use OCR and Picture Smart with Mouse Mode while displaying results in the JAWS Results Viewer window instead of AppReader.
    - INSERT+SPACEBAR, O, M performs OCR using Mouse Mode. Draw a rectangle around an area of the screen to recognize text.
    - INSERT+SPACEBAR, P, M starts Picture Smart using Mouse Mode. Draw a rectangle around an image or screen area to get a description. Hold SHIFT before releasing the mouse button to generate two descriptions for comparison.
    Results from these layered keystrokes are displayed in Results Viewer, allowing you to review content using familiar JAWS and Windows navigation commands. This may be especially useful for JAWS users who prefer the Results Viewer interface.
    When OCR or Picture Smart is started from the Fusion or ZoomText toolbar, results continue to be displayed in AppReader. AppReader remains the preferred option for users who want Fusion or ZoomText's visual enhancement controls and a reading environment that is familiar to ZoomText and Fusion users.
    This feature is available when running Fusion or when using JAWS and ZoomText together.
    Other Enhancements
    - When using multiple monitors, screen enhancements (color, cursor, pointer, and focus) can be configured to appear on a single display. An issue that prevented these settings from being saved as the default configuration has been resolved.
    - Improved the ZoomText shutdown process in multiple monitor environments to ensure the software closes successfully when the mouse pointer is moved between displays during shutdown.
    - Improved stability during the initial auto-start following installation of ZoomText or Fusion.
    - When ZoomText and JAWS are running together, JAWS will stop reading in AppReader and documents when you begin typing or move the mouse pointer.
    - For users who incorrectly specified their age as under 13 when creating a Vispero account, the sign in menu options will now remain available so they can still log in and adjust the age.
    - When running JAWS and ZoomText together and not as Fusion, closing ZoomText no longer causes the account sign in or sign out menu options to become unavailable in JAWS.
