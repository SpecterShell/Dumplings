Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Refreshed onboarding, smoother canvas, safer Lark integration

    - Refreshed login flow with first-time onboarding and interest selection for more personalized recommendations
    - Lark credentials now stored locally with encryption, plus a new in-app credential manager for easy review and rotation
    - Canvas tidy upgraded with multi-source node positioning and subset layout for faster arrangement
    - Fixed image-to-video upload failures for large 20–30MB reference images
    - Voice input now routes all languages through Whisper for more accurate Chinese recognition
    - Fixed overlay and highlight issues with the chat history anchor navigation
    - Fixed login issues on macOS development builds and made the login gate dismissible
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    登录焕新、画布更顺手、飞书接入更安心

    - 登录流程焕然一新：首次进入新增引导与兴趣选择，首页推荐更懂你的偏好
    - 飞书接入支持本地加密保存凭证，并新增凭证管理界面，查看与轮换更安心
    - 画布整理体验升级：节点布局支持多源参考，新增子集整理，整体排布更高效
    - 修复图生视频上传 20–30MB 参考图时偶发的失败问题，大尺寸素材可正常提交
    - 语音输入全语言统一接入 Whisper 模型，中文识别更稳更准
    - 修复历史消息锚点导航的遮挡与高亮落点异常，回看长对话更清晰
    - 修复 macOS 开发环境下的登录异常，登录门可手动关闭不再强制停留
