  Key: ReleaseNotes
  Value: |-
    - Major improvements to scrollbar behavior for Incremental Fetching.
    - Improvements to exporting when using Incremental Fetching.
    - Several small improvements to portable mode.
    - New JSON advanced export option and "export json" script command.
    - New script and exports default file encoding options.
    - New FetchRows option on the advanced options page.
    - New FETCHROWS "set" option for scripting.
    - Fixed an issue with file encoding option missing from save dialogs after exporting.
    - Performance improvements to multi-caret editing on large files.
    - Improvements to multi-word select and changes to default hotkeys:
    - Ctrl+Shift+A will now perform "multi-word select all"
    - Ctrl+M Adds the next matching word selection.
    - Ctrl+Shift+M removes a word selection.
