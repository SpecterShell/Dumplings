  Key: ReleaseNotes
  Value: |-
    Features
    - You can now steer a running generation by sending additional messages mid-turn, both in the main chat and in Quick Chat.
    - Quick Chat now supports steering while the AI is streaming a response.
    - Pasting a localhost URL automatically offers a one-click preview chip so you can open your local site instantly.
    - The in-app browser now keeps webviews alive when the sidebar is closed, marks agent tabs clearly, and includes a multi-tab sidebar browser with a visible agent and picture-in-picture screencast.
    - Plugins now proactively notify you when updates are available.
    - Upgraded the AI SDK from v6 to v7, unlocking smoother streaming and new real-time steering capabilities.
    Bug Fixes
    - Eliminated a whole family of vanishing-message bugs; streaming and completed messages no longer disappear, especially on the first turn of a new chat.
    - Newly posted user messages no longer blink out briefly before stabilizing.
    - Regenerating a response no longer causes the previous reply to flash back momentarily.
    - Chat scrolling now fully respects your intent — scrolling up to read older messages is never interrupted by auto-scroll forcing you back to the bottom.
    - The loading and typing indicators now appear at the bottom without jumping, remain visible as the footer grows, and stay smoothly pinned.
    - The composer text input now has a perfectly concentric corner radius with the round send button.
    - The transition from preview to message is now pixel-exact at any UI scale.
    - Clicking the floating rail in the artifacts sidebar no longer unconditionally expands the sidebar; it now respects your current open/closed state.
    - Notification badges on artifact sidebar tabs no longer inflate the tab height.
    - The send button now stays correctly synchronized with the current generation state.
    - Web search handles CAPTCHA challenges gracefully and surfaces meaningful errors when a search is aborted.
    - Restored tool-model helpers that were broken by the AI SDK v7 upgrade.
    - Collapsed project state in the sidebar no longer persists incorrectly after updates.
    Improvements
    - The chat working indicator now uses a smoother dot-grid animation, and streaming text rendering has been refined for a more fluid feel.
    - Internal AI logic has been migrated away from deprecated APIs and now correctly preserves steering instructions across retries.
