  Key: ReleaseNotes
  Value: |-
    0.0.875
    Features
    - File paths in assistant messages are now clickable, letting you quickly open the referenced file.
    Bug Fixes
    - The “Select All” keyboard shortcut (Cmd+A/Ctrl+A) now only selects text inside the file preview, avoiding accidental selection elsewhere.
    - User-defined capability overrides are now always respected, ensuring your permissions are applied consistently.
    - Fixed a file linking issue that prevented installation on openSUSE.
