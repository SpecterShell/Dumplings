  Key: ReleaseNotes
  Value: |-
    Features
    - You can now queue messages while a response is being generated. Each queued message will be submitted individually with its own steering settings.
    Bug Fixes
    - Fixed a critical issue where starting a new conversation could overwrite (clobber) messages. Now the new-chat handshake is properly limited to one navigation, preventing high-priority data loss.
