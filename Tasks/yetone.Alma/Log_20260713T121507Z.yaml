  Key: ReleaseNotes
  Value: |-
    0.0.872
    Features
    - Chat: Task output cards now update in real time, even if they were captured before the task finished.
    - Chat: Empty task output cards now display useful status metadata.
    - Website: The Linux RPM package is now shown as a download option on the landing page and in the docs.
    Bug Fixes
    - Chat: Fixed an issue where background resume turns could trigger duplicate replies and corrupt threads.
    - Linux: Resolved bugs affecting the in-app menu popover, the opt-in activity recorder, and RPM package installations.
    - Permissions: The permissions overlay now correctly anchors to the bottom of System Settings, shows the proper app icon, and drag-and-drop to add permissions works again.
    - Composer: Reasoning titles and descriptions now respect your system language, while effort names are consistently shown in English.
    - Settings: Fixed the custom provider asterisk marker being clipped in model selector dropdowns.
