  Key: ReleaseNotes
  Value: |-
    v0.0.874
    Features
    - Generating images now shows a Codex-style animated dot field while you wait.
    - Picture-in-Picture: float the in-app browser on top of other windows to keep browsing while you work.
    - Upgraded the in-app browser with the full toolset from Codex.
    - Preview can now import cookies from Chrome, Edge, or Brave to reuse your existing logins automatically.
    - OpenAI-compatible providers now show a viewport-aware model list and support reasoning effort settings.
    Bug Fixes
    - The Picture-in-Picture window no longer snaps to the primary screen corner; it now positions itself on the correct display.
    - Auto-update downloads now respect your configured proxy settings.
    - Stopped idle health checks in Feishu from silently consuming ~1,440 OpenAPI calls per day.
    Improvements
    - Refined the Picture-in-Picture window with native vibrancy effects and a cleaner, content-first layout.
