  Key: ReleaseNotes
  Value: |-
    Changes
    0.0.832 fix(crew): animate a wrapper span for the harness spinners (not the svg) fix(harness): resume an interrupted mission instead of restarting from scratch fix(crew): stop the harness status spinners from stuttering during generation feat(crew): make the Agent Crew floating panel width-resizable fix(harness): recover invalid-but-present planner JSON instead of failing the mission feat(artifact-sidebar): make the sidebar agent-native via CLI (terminal + preview) chore: remove leftover debug instrumentation fix(artifacts): expand the sidebar when a thread gets its workspace mid-generation feat(prompt): tell the model about the Artifact Sidebar + live Preview fix(harness): stop killing long multi-sprint builds at the 30-min tool cap perf(crew): lightweight collapsed subagent tool rows, lazy-mount expanded content refactor(crew): render subagent tools with the same Tool stack as the main agent fix(crew): show Terminal command + make subagent tool rows expandable fix(task): exempt harness mode from the subagent_type/agent_id requirement fix(workspace): instruct the model to work IN the thread workspace, not scaffold elsewhere refactor(tools): single source of truth for the active tool set + regression test chore(tools): guard against full-catalog leak + postmortem PM-011 fix(tools): never ship the full tool catalog — always set a small activeTools feat(claude-subscription): HTTP+cch path — bills the plan, native tools work revert: go back to claude -p CLI for claude-subscription (HTTP cloaking bills extra usage) fix(claude-subscription): revert CLI→HTTP cloaking, restore OAuth login, fix migrated token endpoint feat(ui): show preview errors + tidy system-reminder & stray tool-placeholder rendering fix(workspace): set thread workspace in /api/tools/invoke so subscription/bridge tools get the right cwd fix(task): coerce stringified handoff/array params so delegation doesn't hard-fail fix(tools): keep Task/TaskOutput directly callable so delegation doesn't dead-end feat(ptc): full inner-tool-call observability for run_script (live + rich, no model bloat) feat(ptc-ui): show run_script inner tool calls as an expandable list fix(ptc): don't let run_script wrap single/observable calls (Task, AttemptCompletion) fix(workspace): deliver thread workspace to tools so agents stop running in the app dir fix(subagent): inherit parent thread workspace via persisted task.workspacePath test(resilience): per-tool timeout + background-shell resume notify feat(resilience): auto-resume a thread when its background task finishes feat(resilience): auto-continue when a turn stops but isn't done feat(resilience): per-tool timeout→error-result + 529/Retry-After (Claude Code model) fix(claude-subscription): keep inactivity timer alive on CLI subprocess output feat(iab): make artifact-sidebar preview an AI-controllable in-app browser (Codex-style)
