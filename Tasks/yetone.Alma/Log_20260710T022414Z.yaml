  Key: ReleaseNotes
  Value: |-
    Features
    - Added per-chat session workspaces and an attachment resolve-path endpoint for more reliable file handling.
    - Introduced Max and Ultra reasoning levels with a model-aware selector that only shows valid options.
    Bug Fixes
    - Session directories are now consistently named using the tool-model slug instead of raw text, preventing mismatches.
    - Interrupted subagents automatically resume when the app restarts, so no manual re-queuing is needed.
    - Options in “Ask User” questions no longer disappear after the question is dismissed.
    - Fixed a flash of unstyled theme/layout when opening the Settings window.
    - The sidebar no longer leaves empty gaps when switching to Compact density; virtual rows now remeasure correctly.
    - The sidebar toolbar’s right edge now aligns properly with the thread cards below.
    Improvements
    - Menus, selectors, and thread cards now use a muted grey highlight instead of blue, creating a calmer, more consistent hover and selection style.
    - The tab bar track now nests its corner radius smoothly with the active pill, even when custom border settings are applied.
    - Active and hovered items in menus and lists now have a small visual gap for clearer separation.
    - Thread rows in the sidebar no longer show a redundant “Working…” label.
