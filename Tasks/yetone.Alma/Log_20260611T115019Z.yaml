  Key: ReleaseNotes
  Value: |-
    Features
    - Added support for receiving voice messages in Feishu/Lark, with automatic audio download and speech-to-text transcription.
    - Feishu and Lark International are now supported as separate connections for a smoother multi-region experience.
    - Added a typing indicator in Feishu to show when a reply is being prepared.
    Bug Fixes
    - Reduced noisy progress message spam during task processing in Feishu.
    - Voice transcription in Feishu no longer depends on the desktop Whisper setting.
    - Channel conversations no longer trigger desktop reply notifications.
    - Fixed an issue that could cause duplicate replies in Feishu.
    - Error replies now send only a short summary instead of the full stack trace.
    Improvements
    - Bundled lark-cli into the installation package to simplify setup.
