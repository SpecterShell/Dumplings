  Key: ReleaseNotes
  Value: |-
    0.0.862
    Features
    - Auto‑submit "Fix with AI" error reports to chat from the preview panel.
    - File cards in chat now use Material Icon Theme icons for a cleaner look.
    - LaTeX math in user prompts is now rendered beautifully.
    Bug Fixes
    - Fixed chat scrolling jitter: the scrollbar thumb no longer jumps on upward scroll, and message list jitter with button flicker is resolved.
    - The app no longer crashes when a thread is deleted during text generation.
    - Large file previews will no longer freeze the entire app.
    - Streamed messages now keep proper list and heading styling, which was previously stripped by word‑fade effects.
    Improvements
    - Reduced unnecessary re‑renders when selecting models, improving UI responsiveness.
    - The chat composer now avoids re‑renders on each streaming delta, staying performant during conversations.
    - Removed a breadcrumb animation that was causing app‑wide scroll measurement overhead, leading to smoother scrolling.
    - Timeline highlights during scrolling are isolated, preventing full chat re‑renders.
    - The hidden debug panel no longer triggers re‑renders while streaming or scrolling.
    - Streaming performance is significantly improved by eliminating per‑frame message list re‑renders and scrollbar layout thrashing.
