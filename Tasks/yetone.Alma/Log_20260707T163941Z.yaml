  Key: ReleaseNotes
  Value: |-
    0.0.857
    Features
    - Sidebar: A working spinner now appears on collapsed group headers during active tasks.
    - Chat: New interactive AskUserQuestion card that supports ACP elicitation and native tooling.
    - Chat: Added a tool‑group summary engine with model‑generated, translated titles.
    - Chat: Artifact cards are now compact, with click‑to‑preview and right‑click context menus.
    - Sidebar: The pulsing “working” dot has been replaced with a CLI‑style spinner for clearer status feedback.
    Bug Fixes
    - ACP: The selected model is now correctly applied to the agent via set_model.
    - Bash: The model is now told when a backgrounded command is still running, preventing premature completion assumptions.
    Improvements
    - Design Mode: The element picker now matches the Alma One Dark theme with a flat visual style.
