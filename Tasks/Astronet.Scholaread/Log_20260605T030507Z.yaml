  Key: ReleaseNotes
  Value: |-
    - “Research” continues to improve: AI Agents can draw on your literature library, project files, and web search to help move research projects forward.
    - AI Agents can now help import papers, manage papers.
    - Added sample questions to help you get started quickly.
    - Project files now support export, rename, and delete actions for easier file management.
    - Fixed known issues and improved the overall experience.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 「研究」功能持续更新，AI Agent 可结合文献库、项目文件和全网搜索，辅助推进研究项目。
    - AI Agent 现在可以帮你导入论文、管理论文。
    - 新增示例问题，帮助快速开始研究。
    - 项目文件支持导出、重命名和删除，资料管理更方便。
    - 修复已知问题，优化使用体验。
