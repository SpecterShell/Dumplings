- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Articles can now be imported directly into any folder.
    - Supports Vietnamese, Thai, Persian, etc.; smartly skips translation when the languages match.
    - Fixed known issues.
    - Recap: Library now features Table View (filters/progress); AI Chat supports long & multiple documents.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 文献上传：支持在任意文件夹快速导入。
    - 翻译增强：AI 翻译支持越南语、泰语、波斯语等语种，并能智能跳过相同语言，不翻译。
    - 体验优化：修复已知问题，优化使用体验。
    - 更新回顾：文献库已上线表格视图（支持筛选/进度），AI 问答已支持长文/多文献提问。
