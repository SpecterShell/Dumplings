Version: 1.1.72
Installer:
- InstallerUrl: https://cdn.scholaread.com/assets/pc-releases/1.1.72/com/Scholaread-win-x64-1.1.72.exe
- InstallerLocale: zh-CN
  InstallerUrl: https://cdn.scholaread.cn/assets/pc-releases/1.1.72/cn/Scholaread-win-x64-1.1.72.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Enhanced AI Research Agent：
    - Source-Backed Answers: Answers now include traceable in-text citations and reference lists.
    - Smart Mention (@): Type @ to query specific papers, folders, or project files.
    - Automated Library Management: Simply ask the Agent to import, categorize, move, or batch-delete your papers and folders.
    - Python Data Analysis: Automatically clean datasets, run Python stats, and plot charts.
    - Web Automation (Browser Use): Agent can navigate academic sites to check submission guidelines and find supplementary data.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    「研究」AI agent 功能持续更新：
    - 可溯源的回答：支持文内引用和参考文献列表，保证回答真实可溯源。
    - 精准上下文：支持@文献库文献、文件夹、项目文件等提问。
    - Agent 文献库整理：Agent 可帮你自动导入、分类、移动和批量删除文献与文件夹。
    - 新增 Python 数据分析能力：交个数据给 Agent，可自动清洗实验数据、完成统计计算并生成图表。
    - 新增「网页操控」能力：Agent 可操作学术网页，帮你核对投稿要求、查找补充材料、验证论文页面信息。
