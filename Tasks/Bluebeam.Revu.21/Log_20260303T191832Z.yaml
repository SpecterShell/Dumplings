  Value: |-
    Revu 21.9 - Release Notes
    What’s Fixed
    - Fixed an issue where printing to the Bluebeam PDF printer could cause other open instances of Revu to close unexpectedly.
    - Resolved a problem where links to PDF files would not open correctly in the Web Tab.
    - Fixed an issue affecting polyline editing where control points did not respond correctly when using modifier keys.
    - Addressed an issue where file names in footers could change when converting Word documents to PDF using Stapler.
    - Restored expected behaviour for temporarily disabling Snap to Grid using keyboard shortcuts with certain tools.
    - Resolved a stability issue that could cause Revu to become unresponsive when working with custom line styles and adjusting the Properties panel.
    - Fixed an issue where some custom sequences could not be resumed.
    - Corrected an issue where Polygon Cutout did not work properly on areas with curved segments.
    - Resolved an issue where some images in PDFs did not render correctly on ARM64 devices.
    - Fixed an issue where markups did not snap to grid correctly after rotating a PDF when using certain regional settings.
    - Additional improvements and fixes.
    For full release notes, visit our support site at https://support.bluebeam.com/articles/revu-21-release-notes
