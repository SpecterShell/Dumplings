  Value: |-
    Revu 21.10 - Release Notes
    What's New
    - Expanded MCP workflows including targeted search and markup editing.
    - Improved Stitching with text size controls for regions and matchlines.
    - Updated Connected Sessions with Revit 2027 support.
    - Introduced Session Restoration in Studio, allowing hosts to restore deleted Sessions and files directly from the Studio panel.
    - Updated the User Account experience with a refreshed interface and improved account access.
    - Added Autodesk 2027 plugin support for AutoCAD, Revit and Navisworks.
    - Added localised quantity takeoff and worksite planning profiles for Spanish, Norwegian and Polish.
    What's Fixed
    - Fixed an issue where certain characters in the Hardware ID for offline licences could appear visually identical due to font rendering.
    - Fixed an issue where MCP could override locked markups when executing prompts.
    - Fixed an issue where .txt files could fail to convert when using Stapler.
    - Fixed an issue where Split Count could fail in certain files containing custom columns with a Number format.
    - Fixed an issue where Vitrium-protected files could appear blank instead of displaying a Protected message.
    - Fixed an issue where files converted using Office plugins could display an incorrect file path in the footer.
    - Fixed an issue where Revu could fail to notify users that a file was read-only.
    - Fixed an issue where Tool Chest items could move unexpectedly after updating.
    - Fixed an issue where page numbers in hyperlink URLs could be removed when converting Word files to PDF.
    For full release notes, visit our support site at https://support.bluebeam.com/revu/resources/revu-21-release-notes.html
