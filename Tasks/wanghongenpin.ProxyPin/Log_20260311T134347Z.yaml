- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 新增请求断点，可修改请求、响应后发送；
    2. 在请求编辑器中为 Header 添加自动补全建议；
    3. Android、iOS 新增系统代理 IP 忽略设置；
    4. Android 新增系统代理是否启用设置；
    5. Socks5 代理新增 IPV6 支持；
    6. 修复 MacOS 网线代理设置失败问题；
    7. 修复 h2 协议 IPV6 解析异常。
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Added request breakpoint feature, allowing modification of requests and responses before sending;
    2. Added autocomplete suggestions for HTTP headers in request editor;
    3. Added system proxy IP ignore settings for Android and iOS;
    4. Added system proxy enable/disable settings for Android;
    5. Added IPv6 support for Socks5 proxy;
    6. Fixed an issue where proxy settings failed on macOS;
    7. Fix abnormal parsing of H2 protocol IPV6.
