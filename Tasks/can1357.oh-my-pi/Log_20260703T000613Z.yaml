    - fix(cli): route update plugin shorthand by @roboomp in https://github.com/can1357/oh-my-pi/pull/4306
    - fix(mcp): explain missing client_id when DCR was rejected by @roboomp in https://github.com/can1357/oh-my-pi/pull/4308
    - fix(cli): accept npm protocol plugin installs by @roboomp in https://github.com/can1357/oh-my-pi/pull/4311
