    - fix(ai/devin): bound Connect frame payload at 16 MiB by @roboomp in https://github.com/can1357/oh-my-pi/pull/4284
    - fix(ssh): bound pre-command SSH helpers with ptree.exec timeout by @roboomp in https://github.com/can1357/oh-my-pi/pull/4286
