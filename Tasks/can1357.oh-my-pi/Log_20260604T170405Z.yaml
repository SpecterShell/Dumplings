    - fix(coding-agent): made slash-command handlers compatible with TypeScript 5.x by @roboomp in https://github.com/can1357/oh-my-pi/pull/1822
    - fix(coding-agent): sync pi-natives on omp update by @roboomp in https://github.com/can1357/oh-my-pi/pull/1825
    - fix(tools/ssh): render multiline remote commands in a framed body block by @roboomp in https://github.com/can1357/oh-my-pi/pull/1830
    - fix(mnemopi): populated memory_embeddings on remember and auto-derived queryEmbedding on recall by @roboomp in https://github.com/can1357/oh-my-pi/pull/1833
    - fix(ai): preserve kimi-k2.6 reasoning across tool calls by @roboomp in https://github.com/can1357/oh-my-pi/pull/1839
    - fix(robomp): serialize same-issue event claims by @roboomp in https://github.com/can1357/oh-my-pi/pull/1841
    - fix(tui): list marketplace plugins in settings panel by @roboomp in https://github.com/can1357/oh-my-pi/pull/1844
    - fix(ai): honor Anthropic cache-control compat for OpenAI-compatible providers by @roboomp in https://github.com/can1357/oh-my-pi/pull/1847
    - fix(providers): add Xiaomi Token Plan support by @roboomp in https://github.com/can1357/oh-my-pi/pull/1848
    - fix(providers): cap Kimi K2.x maxTokens on Fireworks/Fire Pass at 32,768 by @roboomp in https://github.com/can1357/oh-my-pi/pull/1852
    - fix(providers): enable append-only auto for xiaomi sgLang endpoints by @roboomp in https://github.com/can1357/oh-my-pi/pull/1854
    - fix(mcp): update completed tool status icons by @roboomp in https://github.com/can1357/oh-my-pi/pull/1856
    - fix(ai): drop image content for DashScope compatible-mode text-only Qwen by @roboomp in https://github.com/can1357/oh-my-pi/pull/1861
    - fix(coding-agent): restore Exa MCP fallback by @roboomp in https://github.com/can1357/oh-my-pi/pull/1862
    - fix(coding-agent): keep local plan writes off ACP bridge by @roboomp in https://github.com/can1357/oh-my-pi/pull/1864
    - fix(utils): swallow editorconfig probe errors to keep TUI rendering safe by @roboomp in https://github.com/can1357/oh-my-pi/pull/1873
    - fix(utils): tolerate malformed paths in editorconfig indentation lookup by @roboomp in https://github.com/can1357/oh-my-pi/pull/1874
