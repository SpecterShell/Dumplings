- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    @oh-my-pi/pi-catalog
    Fixed
    - Fixed compatibility with OpenCode Go DeepSeek V4 models by sending max_tokens instead of max_completion_tokens to match the provider's API requirements.
    @oh-my-pi/pi-coding-agent
    Added
    - Added a --file flag to the say command to read input text directly from files.
    - Enabled streaming text synthesis in the say command for gapless, long-form audio generation.
    - Added voice selection validation to the say command.
    Changed
    - Improved the say command to display the segment count and total duration upon completion.
    Fixed
    - Fixed an issue where local llama.cpp vision models remained text-only after a model refresh, ensuring they are correctly recognized as image-capable when configured as the default or vision role.
    - Fixed omp commit split plans aborting when lock files (such as bun.lockb) were staged alongside their manifests by correctly pairing lock files with their corresponding commit groups and properly handling binary files during split execution.
    - Fixed skill loading to ensure that disabling a higher-priority provider does not drop same-named skills from enabled lower-priority providers.
    @oh-my-pi/pi-mnemopi
    Fixed
    - Fixed extractor JSON parsing to correctly unwrap object-shaped facts, instructions, preferences, and timeline items from known text fields instead of persisting literal [object Object] rows.
    @oh-my-pi/omp-stats
    Changed
    - Refined behavior metrics to significantly reduce false positives in profanity, yelling, and anguish detection by excluding technical terms (e.g., "dummy", "trash", "garbage"), neutral punctuation (e.g., dot runs), and single-word capitalization (e.g., filenames or environment variables).
    - Re-categorized frustration interjections (such as "ugh", "argh", and "grr") from profanity to anguish.
    - Improved negation and blame detection to exclude determiners (e.g., "no auto start") and compounds (e.g., "no-op") while adding support for phrases like "why did you" and "makes no sense".
    - Added sad emoticons as a signal for anguish while excluding code-like patterns.
    - Triggered a one-time automatic re-ingestion of sessions on the next database sync to apply the updated metrics.
    @oh-my-pi/pi-tui
    Fixed
    - Fixed autocompletion for absolute paths (such as /tmp/... or /Users/...) at the start of a prompt, ensuring they fall back to file-path completion instead of being incorrectly treated as slash commands.
    - Updated absolute path autocompletion behavior so that accepting a suggestion inserts the path without submitting the prompt.
    What's Changed
    - fix(commit): pair staged lock files with the split-plan commit that owns them by @roboomp in https://github.com/can1357/oh-my-pi/pull/4634
    - fix(catalog): use max_tokens for OpenCode Go DeepSeek V4 by @roboomp in https://github.com/can1357/oh-my-pi/pull/4651
    - fix(mnemopi): drop object-shaped fact coercion by @roboomp in https://github.com/can1357/oh-my-pi/pull/4653
    - fix(coding-agent): preserve enabled duplicate skills by @roboomp in https://github.com/can1357/oh-my-pi/pull/4652
    - fix(coding-agent): refresh llama vision input metadata by @roboomp in https://github.com/can1357/oh-my-pi/pull/4656
    Full Changelog: https://github.com/can1357/oh-my-pi/compare/v16.3.8...v16.3.9
