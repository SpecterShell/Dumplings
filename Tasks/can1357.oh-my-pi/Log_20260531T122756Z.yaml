    - audit: fix top 5 perf/correctness findings + honorable mentions by @oldschoola in https://github.com/can1357/oh-my-pi/pull/1507
    - fix(coding-agent): strip extension flags from the initial prompt by @erik-sv in https://github.com/can1357/oh-my-pi/pull/1503
