  Key: ReleaseNotes
  Value: |-
    @oh-my-pi/pi-agent-core
    Added
    - Added support for tracking Cloudflare AI Gateway cache status (hit, miss, bypass, unknown) on chat spans.
    Changed
    - Improved tool execution steering behavior: queued steering now cooperatively signals long-running, non-interruptible tools (via ToolCallContext.steeringSignal) to allow graceful early termination or backgrounding, rather than hard-aborting them.
    Fixed
    - Fixed an out-of-memory (OOM) crash caused by an infinite loop when a steer or follow-up message was queued on an agent session with an empty transcript.
    - Fixed an issue where switching providers or models on a session could lose compacted history; the agent now correctly falls back to a portable local summary if the new model cannot replay the prior provider's remote-compaction payload.
    - Fixed a compaction failure with Anthropic models where serializing prior assistant reasoning inside tags triggered reasoning_extraction refusals.
    @oh-my-pi/pi-ai
    Added
    - Added support for caller-owned cachedContent on Google Generative AI and Google Vertex AI GenerateContent options, allowing passing of opaque cache resource names.
    - Added Anthropic extra-usage reporting across CLI, interactive, and ACP usage endpoints, normalizing the authoritative spend payload into a 'Claude Extra Usage' USD row with accurate limit, remaining, and status details.
    - Added process-scoped OAuth account pools for trusted auth-broker clients via OMP_AUTH_BROKER_ACCOUNT_POOL_FILE to filter snapshots, updates, refreshes, and usage reports to selected OAuth identities.
    - Added opt-in Vercel AI Gateway automatic prompt caching for OpenAI Chat Completions, including support for cache anchors and cache lifetimes.
    - Added opt-in explicit prompt-cache controls for OpenAI GPT-5.6+ Responses and Chat Completions, supporting stable boundary selection, stateful Responses markers, and future GPT-5.x/6.x models.
    - Added support for forwarding statefulResponses through streamSimple to allow diagnostic callers to explicitly disable OpenAI Responses previous_response_id chaining.
    - Added native QwenCloud Token Plan support, including API-key login, model discovery, and an optional interactive console-Cookie prompt for quota reporting.
    - Added interactive Meta Model API key login and support for MODEL_API_KEY and META_API_KEY environment variables.
    - Added model-scoped usage health tracking and same-provider reselection for native coding-plan credential pools.
    Fixed
    - Fixed AWS Bedrock cache checkpoints to use resolved model compatibility, falling back to the provider-default 5-minute cache for unsupported 1-hour retentions, emitting AWS-recommended explicit checkpoints for Nova models (Lite, Micro, Pro, Premier, Nova 2 Lite), and honoring configured checkpoint maxima.
    - Fixed Pi-native and compatibility-wrapper requests dropping cache controls required by omp bench --cache to preserve explicit prompt-cache affinity and allow disabling OpenAI Responses chaining.
    - Fixed outbound credential-pattern redaction running unconditionally; it is now opt-in via configureCredentialRedaction and disabled by default.
    - Fixed SuperGrok (xai-oauth) /usage reporting for unified-billing accounts by falling back to the default monthly limit and usage payload when credit usage percentages are absent.
    - Fixed sessions wedging with a 400 Invalid signature in thinking block error when switching Anthropic-compatible providers by stripping signatures whose issuing provider differs from the target.
    - Fixed OAuth callback servers aborting login on premature invalid callbacks, and restricted localhost callback listeners to the IPv4 loopback interface.
    - Fixed Google Gemini CLI and Antigravity OAuth login hanging indefinitely during Cloud Code Assist project provisioning by introducing request timeouts, cancellation checks, and bounded polling.
    @oh-my-pi/pi-catalog
    Added
    - Added Bedrock Converse prompt-cache compatibility limits, including 5-minute checkpoint support for Nova models (Lite, Micro, Pro, Premier, Nova 2 Lite) and 1-hour Claude retention.
    - Added native Meta Model API provider and Muse Spark 1.1 support, featuring Responses API reasoning replay, image input, and reasoning-effort controls.
    - Added Vercel AI Gateway integration features, including opt-in automatic prompt-cache compatibility, provider routing preferences, and Responses cache-anchor and cache-lifetime controls.
    - Added prompt-cache breakpoint capability metadata for OpenAI GPT-5.6, with opt-in support for older models and compatible endpoints.
    - Added native alibaba-token-plan provider with QwenCloud Token Plan Individual discovery and a curated chat-model fallback catalog.
    @oh-my-pi/pi-coding-agent
    Breaking Changes
    - Replaced the providers.webSearch and providers.image single-preference configuration options with providers.webSearchOrder and providers.imageOrder priority lists. Existing configurations migrate automatically on startup.
    Added
    - Added dynamic multi-root workspace context support, allowing users to manage multiple workspace directories mid-session via /add-dir, /remove-dir, and /dirs slash commands, or seed them at launch using the --add-dir CLI flag.
    - Added /live, a Codex-authenticated real-time voice interface that streams microphone audio over WebRTC and routes coding tasks through the active agent session.
    - Added opt-in usage-aware model fallback for rationed coding plans, including a /usage command to view live quantitative usage data and automatic fallback chain traversal.
    - Added error.notify configuration to allow failed model turns to trigger distinct terminal or desktop notifications.
    - Added auto-following light and dark themes to HTML session exports, with a /export --themes option to bundle selected TUI themes.
    - Added owner-routed asynchronous job delivery, ensuring background bash and task results are injected directly into the owning subagent or agent session rather than the top-level session.
    - Added background-on-steer capability for auto-backgrounded bash commands, allowing incoming user or peer messages to immediately background running commands.
    - Added friendlyName support for hidden secrets, allowing model-visible placeholders to carry sanitized semantic labels, hashes, and case hints.
    - Added support for Jujutsu (jj) repositories in the statusline git segment, displaying the nearest bookmark or change ID and retrieving working-copy change counts.
    - Added block and unblock operations for tasks, introducing a blocked status for tasks waiting on external input to exclude them from incomplete-todo reminders.
    - Added a toggle-list editor in /settings for managing array-of-enum settings like search and image provider orders.
    - Added models.yml Bedrock Converse prompt-cache capability overrides for bundled and opaque inference profiles.
    - Added getServiceTiers() and setServiceTier() extension APIs to read and modify the live per-family service tier for session requests.
    - Added opt-in omp bench --cache for independent cold/warm prompt-cache benchmarking with stable-prefix controls.
    - Added tools.xdevDocs prompt-doc modes and the tools.xdevInlineDevices glob allowlist to control which mounted device documentation is inlined into the system prompt.
    - Added the opt-in read.renderMarkdown setting for formatted Markdown read previews.
    Changed
    - Updated subagent behavior to inherit async.enabled and bash.autoBackground.enabled from parent sessions, and refined subagent run completion to wait for background jobs to settle.
    - Added ordered bash.patterns command approval rules to allow, prompt, or deny bash commands by pattern.
    - Updated Markdown file handling so all Markdown flavors (.markdown, .mdx, .mdc, etc.) respect the read.summarize.prose setting.
    - Upgraded xAI web search to use grok-4.5 at low reasoning effort instead of grok-4.3.
    - Improved search provider resilience by cascading and falling back through other configured search providers when the preferred provider fails.
    - Extended the bash tool's direnv and devenv auto-loading to all backends (including the ACP client terminal and interactive PTY) while honoring direnv's local allow list.
    Fixed
    - Fixed a path traversal vulnerability in blob reference resolution by rejecting non-canonical hashes in parseBlobRef.
    - Fixed multiple edge cases in the secret obfuscation and redaction engine, including handling of context-sensitive regexes, placeholder key requirements in unwritable directories, friendly-name forgery vulnerabilities, and regex match boundaries straddling existing placeholders.
    - Fixed a first-use race condition in ArtifactManager where concurrent callers could allocate duplicate artifact IDs.
    - Fixed Vibe-mode session stability, resolving issues with workers disappearing across restarts, hanging during teardown, clobbering target tools during session switches, and resolving against incorrect models.
    - Fixed concurrent MCP configuration mutations losing updates by serializing read-modify-write operations under a per-file lock with atomic writes.
    - Fixed legacy extensions failing to load on npm/source-link installs due to transitive CommonJS dependency graph clobbering.
    - Fixed omp auth-gateway commands bypassing the process-scoped OAuth account pool configured via environment variables.
    - Fixed terminal transcript rendering issues where displaceable snapshots (like waiting polls and todo lists) spammed native scrollback.
    - Fixed the terminal title to reflect the active agent run state (working, waiting, or blocked) when tui.titleState is enabled.
    - Fixed the browser tool's open action ignoring timeouts during browser acquisition and leaking orphaned browser instances.
    - Fixed the write tool silently creating empty files when a read-tool selector was mis-dispatched as a write.
    - Fixed snapcompact archiving reproducing assistant reasoning (¶think: sections) into replayed frames for Anthropic-dialect models.
    - Fixed Linux socket-mode DAP launches hanging indefinitely on connection failures.
    - Fixed Plan Review annotations being discarded on dismissal and limited to headings.
    - Fixed Assistant-mode TTS playback aborting prematurely when an agent continued after a tool call.
    - Fixed absolute usage amounts rendering inconsistently across CLI, TUI, and ACP output surfaces.
    - Fixed MCP sessions dropping tools from servers that finished connecting after the initial startup window.
    @oh-my-pi/collab-web
    Fixed
    - Fixed action metadata loss on xd://resolve, xd://reject, and xd://propose cards to ensure correct action badges are rendered.
    - Added proper rendering support for reject, propose, and hub-family aliases (irc, job, await, poll, cancel_job) to prevent them from falling back to generic JSON.
    @oh-my-pi/snapcompact
    Added
    - Added an includeThinking serialization option (defaulting to true) to allow excluding assistant reasoning (¶think: sections) from archived transcripts.
    @oh-my-pi/omp-stats
    Fixed
    - Fixed an issue where malformed persisted content blocks could abort stats ingestion for subsequent projects, and ensured pending full-session migrations are properly settled after successful backfills.
    @oh-my-pi/pi-tui
    Added
    - Added Text.setStyleFn() to apply foreground stylers at render time, allowing components to dynamically re-resolve colors after invalidation instead of baking in the palette active at construction.
    Fixed
    - Fixed an issue where exiting or tearing down the TUI left the terminal in cursor-key/keypad application mode (DECCKM), which broke arrow keys in the parent shell. Both stop() and emergencyTerminalRestore() now correctly emit standard rmkx resets.
