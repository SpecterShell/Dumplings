  Key: ReleaseNotes
  Value: 'Update outdated gadgets. Reduce CPU usage of following gadgets: Volume Control, 7 Sidebar, Glassy Network Monitor. Drive Info Gadget no longer becomes invisible when all selected drives are unavailable. Properly position and resize the buttons next to all gadgets when the DPI changes, or the monitor changes the gadget is on. Those buttons also get a new skin and are now properly scaled when the DPI is 175% or larger. Fix DPI scaling of some UI elements in settings of various gadgets. Add Desktop Calculator back. App Lanucher Gadget: Avoid crash when shortcut to store app is added and settings is opened. 7 Sidebar: Fix some bugs that occured when DPI changes. Also updated czech translation. Glassy Network Monitor: No longer include virtual network adapters in traffic calculation.'
