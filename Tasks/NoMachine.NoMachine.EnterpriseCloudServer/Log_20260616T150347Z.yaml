- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    NoMachine makes available version 9.7.3 to provide fixes for issues found in previous releases, updates to some third party libraries and some minor enhancements for NoMachine RDP virtual desktops (see https://kb.nomachine.com/AR07J00645 for more details and instructions).
    OpenSSL libraries shipped by NoMachine client and server packages have been updated to v3.0.21. The full list of CVE patched by the new OpenSSL v3.0.21 is available on their Official web site at: https://github.com/openssl/openssl/releases/tag/openssl-3.0.21
    The nxhtd component included in commercial server packages is based on httpd 2.4.68, changes in the new version of Apache are listed here: https://downloads.apache.org/httpd/CHANGES_2.4.68
    Trouble Reports solved in version 9.7.3:
    TR06X11843 - Automatic log rotation may ignore the number of rotated files set by '--rotate' option
    TR06X11854 - The auto-update procedure may complete successfully even if nxusb didn't compile
    TR05X11833 - Message about activating the subscription may be misleading
