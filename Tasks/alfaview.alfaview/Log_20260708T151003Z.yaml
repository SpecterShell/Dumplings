  Key: ReleaseNotes
  Value: |-
    [Feature
    Update] Screen Sharing on iPhone and iPad
    On iPhone and iPad, you can now start screen sharing directly from the “Share screen” button inside alfaview, instead of going through the system Control Center.
    [Technical
    Update] In-App Updates on Linux
    On Linux, alfaview now installs updates and restarts itself directly, instead of opening a separate system tool to finish the update.
    [Technical
    Update] System Audio on Linux
    On Linux, the “Same as system” audio option now also works on systems using PipeWire.
    [Fixes in
    v9.28.0] Recovery page after reloading the web client
    Fixed an issue in the web client where the page could get stuck reloading after an error. It now stops after the first reload and shows a recovery page.

    Safari Downloads
    Fixed an issue in Safari where downloads could get blocked or fail silently.

    File Upload in Safari
    Fixed an issue in Safari where uploading a file through the file picker could fail, especially while the camera was active.

    Memory Usage in Safari
    Worked around a bug in Safari that caused memory use to grow during long meetings as participants turned their cameras on and off.

    Buttons on Android with an external mouse
    Fixed an issue on Android where buttons did not respond when an external mouse was connected.

    Microphone Access on Android
    Fixed an issue on Android where alfaview did not notify you when microphone access was denied.

    Input Methods and Emoji Picker on Linux
    Fixed an issue on Linux where typing with input methods, and using the emoji picker, did not work.
    [Fixes in
    v9.28.1] Audio on Safari
    Fixed an issue on Safari where meeting audio stayed silent after switching back to the alfaview browser tab.
    Fixed an issue on Safari where the speaker test sound and the mute-speakers control did not work.

    Screen shares on iPhone and iPad
    Fixed an issue where screen shares from iPhone and iPad were displayed with distorted colors.
