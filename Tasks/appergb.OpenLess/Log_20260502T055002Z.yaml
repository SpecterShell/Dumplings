  Key: ReleaseNotes
  Value: |-
    🛠 修复
    - Windows 划词追问 preset 用 Ctrl+Shift+ 替代 Cmd+Shift+（#119 follow-up）：之前 SelectionAsk 设置页 dropdown 全是 Cmd+Shift+;/// ...（macOS 命名），Windows 用户选了之后后端把 cmd 翻译成 Win 键 → Win+Shift+; 大概率被 OS 占用 / 注册失败 → 浮窗永远不弹。现在按 detectOS() 平台分流：
      - macOS：Cmd+Shift+; / Cmd+Shift+/ / Cmd+Shift+, / Cmd+Shift+.（不变）
      - Windows：Ctrl+Shift+; / Ctrl+Shift+/ / Ctrl+Shift+, / Ctrl+Shift+.
    为什么不用 Fn+Shift+/ (评估过)
    Windows 的 Win32 全局热键 API（RegisterHotKey 和 WH_KEYBOARD_LL）收不到 Fn 的虚拟键码——Fn 是硬件级 modifier，在 OS 内核 / 键盘驱动之下被吃掉。Linux 同理。写进 preset 用户也注册不上。Cmd 在 Windows 上的对等键就是 Ctrl（参见 macOS 的 Cmd+C ↔ Windows 的 Ctrl+C）。
    备注
    - 对 macOS 用户：本版本无功能变化，跟 v1.2.10 行为一致；Sparkle 自动更新跳过即可。
    - 对 Windows 用户：升级后第一次打开划词追问设置页会看到全新的 Ctrl+Shift+ preset 列表；旧 prefs 里如有不兼容的 cmd+shift+ 绑定会自动落回 list 第一项。
    - 后端 types.rs::QaHotkeyBinding::default() 早就按平台返回正确默认（Windows=ctrl+shift+;），本次只补前端 dropdown 的平台分流。

    Full Changelog: https://github.com/appergb/openless/compare/v1.2.10-tauri...v1.2.11-tauri
