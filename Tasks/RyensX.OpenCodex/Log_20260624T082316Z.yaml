- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Launcher now supports keeping the tray icon active even when the window is closed.
    2. Added a plugin system. Enhanced functionality is achieved through this system, and it supports using third-party plugins from specified external plugin directories.
    3. Fixed display issues on iOS.
    4. Added PWA support, improving the local user experience.
    5. Added automatic update checks for the launcher.
    6. Added token consumption display (at the bottom of the AI ​​reply).
    7. Optimized the launcher UI.
    8. Optimized the authentication page UI.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 启动器支持关闭窗口在托盘图标常驻
    2. 新增插件系统，增强功能通过插件系统实现，且支持指定外部插件目录使用三方插件
    3. 兼容修复 iOS 下显示问题
    4. 新增 PWA 支持，提升本地使用体验
    5. 新增启动器自动检查更新
    6. 新增 token 消耗情况显示（在 AI 回复底部）
    7. 优化启动器 UI
    8. 优化认证页面 UI
