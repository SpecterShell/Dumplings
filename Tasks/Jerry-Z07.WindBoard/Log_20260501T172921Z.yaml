- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - ✨ feat: Improved the update dialog interaction, refreshed the primary action copy, and refined Markdown rendering and layout.
    - 🐛 fix: Improved the uninstall flow used during upgrade installs by adding status feedback, progress indication, and more reliable uninstaller discovery.
    - 🐛 fix: Fixed the text-element preview logic in import flows so long text keeps more visible content while capping extremely long preview rendering cost.
    Known Issues
    - Users upgrading directly from v1.x by overwriting the installation may encounter unknown compatibility issues. It is recommended to completely uninstall the old version and reinstall the new one.
    - The removed import flow may be added back in a future update.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - ✨ feat: 优化更新对话框交互，调整主操作文案并改进 Markdown 渲染与排版。
    - 🐛 fix: 改进升级安装时的卸载流程，增加状态提示和进度反馈，并增强卸载程序定位的稳定性。
    - 🐛 fix: 修复导入文字元素的预览逻辑，长文本预览可保留更多可见内容，并限制超长预览的渲染开销。
    已知问题
    - 位于 v1.x 版本的用户直接覆盖安装可能会有未知兼容性问题，建议完全卸载旧版并重装。
    - 移除的导入流程可能会考虑在后续加回。
