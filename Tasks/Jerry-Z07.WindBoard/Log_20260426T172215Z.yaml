Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - ✨ feat: Added a custom main-window title bar with improved button styling and more reliable visibility sync between windowed and full-screen modes.
    - ✨ feat: Reworked the Settings window with native TitleBar + NavigationView layout, and added Settings search for faster navigation to specific options.
    - ✨ feat: Streamlined import flow by switching to direct system file picking and a unified multi-file import entry.
    - 🐛 fix: Prevented conflicts caused by duplicate Settings navigation registrations (root nodes and title providers).
    Known Issues
    - Users upgrading directly from v1.x by overwriting the installation may encounter unknown compatibility issues. It is recommended to completely uninstall the old version and reinstall the new one.
    - The removed import flow may be added back in a future update.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - ✨ feat: 主窗口新增自定义标题栏，适配全屏/窗口模式切换并优化标题栏按钮与可见性同步。
    - ✨ feat: 设置窗口重构为原生 TitleBar + NavigationView 布局，并新增设置项搜索，支持快速定位并跳转到对应配置。
    - ✨ feat: 导入流程改为系统文件选择器直选文件，减少中间步骤并统一多文件导入入口。
    - 🐛 fix: 修复设置导航定义重复时可能引发的冲突问题，避免重复注册根节点和标题提供器。
    已知问题
    - 位于 v1.x 版本的用户直接覆盖安装可能会有未知兼容性问题，建议完全卸载旧版并重装。
    - 移除的导入流程可能会考虑在后续加回
