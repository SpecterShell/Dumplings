  Key: ReleaseNotes
  Value: |-
    修复：
    1. 修复本地歌曲按文件夹分类的文字排版问题；
    2. 修复了离线歌单删除歌曲时导致的封面丢失问题；
    3. 修复了歌单页面歌单为 0 时不显示数量的问题；
    4. 修复了专辑页多 disc 播放错误的 bug；
    新增：
    1. 新增歌单信息更新功能；
    2. 新增副歌时间设置、能否通过点击播放栏空白处打开歌词页的逻辑设置；
    3. 新增本地歌曲目录多选；
    4. 新增 windows 系统缩放功能；
    调整：
    1. 将桌面歌词 mini 模式 + 双行歌词里第一行歌词的更新逻辑；
    2. 更新 electron 至 37+，不再支持 catalina 系统，可 fork 项目修改依赖后自行打包。
    New Contributors
    - @Dj-Shortcut made their first contribution in https://github.com/stark81/VutronMusic/pull/366
    - @sleepy-cloud made their first contribution in https://github.com/stark81/VutronMusic/pull/372
