    - Recovered viewer websocket connections in https://github.com/Myriad-Dreamin/tinymist/pull/2536
    GPU Viewer
    - (Fix) Painted default page backgrounds in the viewer in https://github.com/Myriad-Dreamin/tinymist/pull/2522
