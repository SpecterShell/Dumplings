  Key: ReleaseNotes
  Value: |-
    FreeDV 2.3.1 has been released, including improved audio quality for those running the Flex waveform and other bug fixes. These changes are outlined below:
    1. Bugfixes:
       - Fix TX/tune level context menus on Linux distros using wxWidgets ⇐ 3.2. (PR #1333) - thanks @barjac!
       - Fix audio routing problems on Windows due to hardware offloading. (PR #1335)
       - Hamlib: Detect empty rig name on start. (PR #1339, #1351) - thanks @barjac!
       - Fix missing Hamlib defines when building from source (PR #1353) - thanks @barjac!
       - FreeDV Reporter: Fix issue preventing mode changes on double-click. (PR #1343)
       - Fix compiler warning/error in EventHandler when using GCC 16.1. (PR #1347)
       - Improve Flex waveform RX audio quality. (PR #1338, #1348, #1356)
       - Flex: Use version number without Git hash for waveform registration. (PR #1359)
       - Fix intermittent CSV logging corruption. (PR #1361)
       - Hamlib: Fix bug preventing frequency change after changing on the radio. (PR #1363)
       - KA9Q: Remove custom AppRun script causing audio distortion. (PR #1364)
    2. Enhancements:
       - Allow use of a custom key for PTT. (PR #1309)
       - Improve Reporter message list usability. (PR #1310) - thanks @barjac!
       - Clarify Reporter on/off tooltip. (PR #1345)
    Available binary releases (click Assets to expand the section and retrieve download links):
    - FreeDV-2.3.1-windows-x86_64.exe (64 bit Windows for Intel/AMD)
    - FreeDV-2.3.1-windows-aarch64.exe (Windows on ARM)
    - FreeDV-2.3.1.dmg (ARM/Intel macOS, Big Sur/11.0 or later required)
    - FreeDV-2.3.1-x86_64.AppImage (AppImage for Linux for Intel/AMD)
    - FreeDV-2.3.1-aarch64.AppImage (AppImage for Linux for ARM systems, e.g. Raspberry Pi 5+)
    - FreeDV-FlexRadio-2.3.1-x86_64.AppImage (AppImage for experimental FlexRadio support, for Intel/AMD PCs)
    - FreeDV-FlexRadio-2.3.1-aarch64.AppImage (AppImage for experimental FlexRadio support, needs Raspberry Pi 4+)
    - freedv-waveform-2.3.1.tar.gz (Docker container for direct upload to Flex 8000/Aurora series)
    - FreeDV-KA9Q-2.3.1-x86_64.AppImage (AppImage for web SDR support, for Intel/AMD PCs)
    - FreeDV-KA9Q-2.3.1-aarch64.AppImage (AppImage for web SDR support, needs Raspberry Pi 4+)
