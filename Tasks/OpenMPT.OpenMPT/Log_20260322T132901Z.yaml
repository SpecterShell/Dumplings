- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Pattern tab
    - [Mod] <js> Effect info now shows volume and panning volume command parameters as both hex and decimal if hex volume column was enabled (http://bugs.openmpt.org/view.php?id=1943).
    - [Fix] <js> Effect info for volume command panning was shown in decimal even if hex volume column was enabled (http://bugs.openmpt.org/view.php?id=1943).
    - [Fix] <js> Choosing "Copy Pattern" from the order list context menu always copied the currently displayed pattern, not the one on which the context menu was invoked.

    VST / DMO Plugins
    - [Imp] <js> Plugin editors can now receive SysEx messages from OpenMPT's MIDI recording.
    - [Fix] <js> Work around apparently broken channel negotiation in MaxSynths DR-910 plugin (http://forum.openmpt.org/index.php?topic=7442.0).

    Playback
    - [Fix] <js> Avoid potential read past end of sample data in a specific combination of reverse sample playback + offset past sample loop.

    MOD
    - [Fix] <js> ProTracker arpeggio wrapraound results in an effective period of 65536 on Paula, not pausing the sample entirely (tx eightbitbubsy).

    Other formats
    - [Fix] <js> ULT: Loop points were incorrectly limited for 16-bit samples (http://bugs.openmpt.org/view.php?id=1953).

    Misc
    - [Fix] <js> MIDI Recording: On recent versions of Windows 11, MIDI recording stopped working after receiving a SysEx message (http://forum.openmpt.org/index.php?topic=7456.0).
    - [Fix] <js> MIDI Export: Exporting from MOD or S3M did not correctly export implicit note-offs when playing a new note on the same channel (http://bugs.openmpt.org/view.php?id=1946).
    - [Fix] <js> Keyboard Settings: The instrument note map category was missing (http://bugs.openmpt.org/view.php?id=1945).
    - [Fix] <js> Display Settings: Changing DPI awareness didn't mark the settings page as modified.

    Third-Party Libraries
    - [Imp] Update libopusenc (v0.3), mpg123 (v1.33.4), opus (v1.6.1), unrar(v7.2.4) and zlib (v1.3.2)
