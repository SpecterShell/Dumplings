- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Pattern tab
    - [Fix] <js> Fixed possible crash when trying to display a very long plugin parameter name in the status bar.

    Sample tab
    - [Imp] <js> Add Silence / Resize: Entered milliseconds values can now be fractional.
    - [Fix] <js> Resampling with r8brain could introduce unwanted ringing artifacts at the end of the sample.

    VST / DMO Plugins
    - [Fix] <js> OpenMPT 1.32.09.00 reported incorrect PPQ positions to plugins, resulting in wild position fluctuations (http://forum.openmpt.org/index.php?topic=7465.0).

    Other formats
    - [Fix] <js> ULT: Sustain loops were stopped after a portamento (http://bugs.openmpt.org/view.php?id=1967).

    Audio I/O
    - [Fix] <js> When using ASIO with hardware timing, it was possible that GUI updates were not synchronized properly with audio.

    Misc
    - [Imp] <js> Improved screen reader accessibility in Add Silence / Resize and various Export dialogs.
    - [Fix] <js> Fixed potential input focus issues in various parts of the user interface.

    Bundled plugins
    - [Fix] <jh> FXP preset files for the SymMOD echo could not be restored, and preset files for the DigiBooster Pro Echo could only be restored in 32-bit builds of OpenMPT (http://bugs.openmpt.org/view.php?id=1966).
    - [Fix] <js> MIDI I/O Plugin: Editing a MIDI macro during playback could potentially cause nonsensical MIDI messages to be sent or even a crash.

    Third-Party Libraries
    - [Imp] Update mpg123 (v1.33.5) and unrar(v7.2.6)
