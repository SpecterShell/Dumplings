Version: 1.20.0
Installer:
- Architecture: x64
  InstallerUrl: https://stable-downloads.kreya.app/1.20.0/Kreya-win-x64.msi
- Architecture: arm64
  InstallerUrl: https://stable-downloads.kreya.app/1.20.0/Kreya-win-arm64.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Features
    - Auth: add operation auth handler for login-based authentication
    - Auth: transmit intermediary certificates during TLS client authentication
    - Core: embed libmsquic to support HTTP3.0 on all platforms
    - Core: improve example value generator
    - GraphQL: save responses to file
    - gRPC: add reflection importer version selector
    - gRPC: better report protobuf import warnings
    - gRPC: speedup protobuf imports
    - gRPC: support google.type.* imports such as google.type.Date
    - Importers: include importer name in error messages
    - Linux: add AppImage packaging and Freedesktop metadata
    - Linux: add GTK-based Linux UI host
    - Linux: move menu into titlebar and improve menu behavior
    - macOS: TLS 1.3 support
    - REST: generate multipart example content based on OpenAPI specs
    - REST: preserve content when switching content types
    - REST: support for the http verb query
    - UI: detect package manager and display in about window
    - UI: format content in user variable editor
    - UI: improved multiple responses view
    - UI: single app instance
    - UI: sort quick actions by importance
    - UI: store editor word wrap option in new user settings
    Bug Fixes
    - CLI: support parallel operation invocations in junit reports
    - Core: always edit operation name after duplicating
    - Core: use different browser contexts for different OAuth configurations
    - Core: handle tracing event membercs correct if there are empty values
    - Core: improve performance by unloading the content of tabs that are not visible
    - Core: rm referenced auth configs and certs in operations when deleting
    - Core: run importers in background on app start
    - Core: run Script before any templating is applied to the operation
    - GraphQL: fix raw formatting in subscription response view
    - gRPC: handle invalid metadata keys
    - gRPC: show unexpected proto responses
    - gRPC: simplify adding proto file importer import paths
    - Linux: correct folder organization inside .tar.gz
    - UI: add copy to clipboard button for grpc errors
    - UI: add space for operations with long names
    - UI: disable tab selection animation to speed up tab switching
    - UI: don't allow drag on close button of operation tabs
    - UI: edit on hoverable should stay editable while focused
    - UI: enhance project creation dialog layout
    - UI: hide operation context menu for history views
    - UI: improve loading view for gRPC method and REST template selector
    - UI: improve snapshot testing scrubbers editor
    - UI: improve the readability of the test result tab badge
    - UI: lazy-load some tab contents to improve performance
    - UI: save directory settings on tab switch
    - UI: sort newly created directories in operation list after import
    - Windows: use correct quotes when copying as kreyac
ReleaseTime: 2026-06-08
