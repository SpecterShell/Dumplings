Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Bug Fixes
    - Auth: prevent crash when closing the OAuth login window
    - Core: handle invoker script cancellation when kreya.sleep is running
    - Importers: prevent crash when importing OpenAPI byte values
    - Linux: flathub build due to invalid metadata
    - macOS: fix a rare crash when running long invoker scripts
    - macOS: fix a rare macOS SSL bug when resuming TLS sessions
    - macOS: pin QUIC bottles to a specific version reproducibly
    - UI: catch fatal errors in native UI entry points
ReleaseTime: 2026-07-07
