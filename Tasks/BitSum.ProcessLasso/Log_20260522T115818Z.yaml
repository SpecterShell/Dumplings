    (19) GUI: Have action (e.g. terminate) confirmation messagebox list the specific process(es)
    (21) GUI: Improve tooling around translation validation
    (21) GUI: Fix an issue with the sort of CPU average column
    (23) GUI: Add HKCU registry settings to override GPU widget colors “gpuColor1”, “gpuColor2”, …
