  Key: ReleaseNotes
  Value: |-
    v0.6.2
    New Features
    - Session Dashboard & Session HUD — Clawd now tracks every AI coding session it sees and surfaces them through two complementary surfaces: a multi-row clickable HUD docked next to the pet (so you can glance at all live sessions while continuing to work) and a full Session Dashboard (opened from the pet shortcut, tray, or Settings) with second-level elapsed timers, session aliases for naming runs, and an always-on session-id card badge replacing the older showSessionId toggle. The legacy "Sessions" submenu has been retired in favor of the dashboard.
    - Codex CLI official hook integration — Codex CLI now uses proper state hooks and permission approvals as the primary path on every supported platform — including Windows, which previously had to rely on JSONL polling. State hooks drive the pet's working/notification state directly, permission approvals route through the same bubble UI as Claude Code / CodeBuddy (with safe fallback guards for stale prompts), and the existing JSONL polling is kept as a fallback for older Codex builds that don't expose hooks yet.
    - Windows ARM64 native installer (#179) — first-class native .exe installer for Windows on ARM, alongside the existing x64 installer.
    - Windows-on-ARM x64 → ARM64 migration prompt (#183) — packaged x64 builds running under ARM64 translation now detect the situation and prompt the user to download the native ARM64 installer directly from the latest GitHub Release, never silently cross-grading through electron-updater.
    - Low power idle mode (#175) — opt-in mode that further reduces CPU/GPU work while the pet is idle, on top of the platform-wide idle improvements in #167.
    - Categorized bubble controls (#165) — permission, notification, and update bubbles are now configurable as separate categories in Settings, with hardened policy controls and clearer auto-close behavior.
    - Per-agent Notification hook toggle (#155) — each agent can now decide independently whether the Notification hook raises a bubble. Master-off greying logic for sub-switches (#156, #157, #158) makes the resulting state legible at a glance.
    - Theme-aware update visual flow (#159) — the update process visuals now adapt to the active theme, with hardened overlay rendering and a restored PermissionRequest resync path.
    Bug Fixes
    - Taskbar entries lingering after Explorer restart (#185 + follow-up 09b80fc) — floating pet/helper windows could re-appear in the Windows taskbar after explorer.exe was restarted, because shell state is recreated and creation-time skipTaskbar no longer holds. A shared src/taskbar.js helper now reasserts setSkipTaskbar(true) via the existing Windows topmost watchdog, with the same treatment extended to the context-menu owner window.
    - Multi-question AskUserQuestion bubbles (#191) — elicitation prompts with several option groups now use a stepper and clamp overflowing form content inside the bubble, keeping labels, radio controls, and the Submit action reachable.
    - Bubble auto-close timers sync with Settings (#173) — changing the auto-close duration in Settings now retimes already-visible bubbles instead of leaving them on the old schedule.
    - Settings collapsible interaction stability (#171) — Settings collapsible sections no longer flicker / lose focus during quick toggles.
    - Updater bubble anchors across themes (#164) — update bubbles anchor consistently regardless of the active theme.
    - Session HUD shadow shell rebalanced (#172) — HUD shadow geometry retuned so the docked HUD sits cleanly against the pet across themes.
    - Linux Electron sandbox explicitly disabled (#168) — sandbox state is now declared rather than implicit, with matching startup notes.
    - hideBubbles drops the HTTP connection for Claude Code / CodeBuddy (#162) — hiding a permission bubble now also closes the underlying HTTP connection, so dismissed prompts no longer keep the agent waiting.
    - Update bubble overlap with permission bubbles — the update bubble now yields layout space when a permission bubble is active.
    Refactoring, Docs & License
    - Source license switched to AGPL — please review if you build on top of Clawd's source.
    - Maintainers section in README/AGENTS recognizing @YOIMIYA66 as the first project maintainer alongside @rullerzhou-afk.
    - Animated hero GIF added to all three README languages (#187 + follow-ups) — the top-of-README demo now shows the pet reacting through a five-beat product narrative (sleeping → thinking → typing → juggling → notification → happy) using real sprites and TUI shape.
    - Docs refresh across Codex/WSL clarification, supported-agent guidance, ARM64 installer instructions, agent runtime architecture, and session dashboard readmes.
    Contributors
    Huge thanks to everyone who shipped code, reviewed behavior, or improved release quality for this release:
    - @YOIMIYA66 — categorized bubble controls, theme-aware update flow, Settings collapsibles, session HUD shadow shell, bubble auto-close timer sync, updater bubble anchoring, localized Kimi setup docs (#159, #160, #164, #165, #171, #172, #173)
    - @PeterShanxin — Windows ARM64 installer support, ARM64 migration prompt, low power idle mode, Windows idle CPU/GPU reduction (#167, #175, #179, #183)
    - @Rladmsrl — per-agent Notification hook toggle and master-off sub-switch greying (#155, #156)
    - @v-avuso — taskbar entry leak after Explorer restart (#185, first contribution)
    - @livlign — animated hero GIF (#187, first contribution)
    - @tomaioo — Linux Electron sandbox security note (#168)
    - @anhtrinh919 — hideBubbles HTTP connection drop (#162)
    Known Limitations
    - Kimi permission classification is still partly heuristic — explicit approval flags are honored directly, but some Kimi tool runs still rely on a short delay-then-promote heuristic to switch the pet from working to notification.
