Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Changes since 25.3.0:
    - Administration:
        - Preference pages with sensitive data were hidden for non-administrators:
            - Only administrators have access to AI settings, Network profiles, Connection types, Cloud configurations, and Schema compare settings
            - Only administrators and developers have access to the command-line tools
    - AI assistant:
        - AI Chat:
          - Added the ability to attach files to the chat and either open them as tables or import data from them
          - AI Functions are now enabled by default. You can run popular DBeaver tools directly from the Chat
          - Added streaming for the chat. AI responses now appear in real time as they are generated
          - Added token usage statistics. It is disabled by default and can be configured in the Chat settings
          - Added support for custom AI instructions for all AI features
        - AI engines:
          - Added support for using Copilot with GitHub Enterprise accounts
          - Added support for the Azure OpenAI Legacy API
          - Added the ability to choose an authentication method for AWS Bedrock, including Access Key/Secret Key or AWS Profile
    - SQL Editor: improved performance when executing multiple SQL queries simultaneously
    - Data Editor: added the Percent of Total function in the Grouping Panel
    - Data Transfer: added the ability to export fetched rows without querying the database
    - Data compare:
        - Added the ability to compare more than two pairs of objects at once — tables, queries, or views
        - Improved automatic column mapping. Columns are matched by name, ignoring case and underscores
    - Task Management:
        - Added the ability to exclude the DBeaver signature from emails with task results.
        - The "Save Task" button was moved to the same row as the other action buttons
    - Cloud Storage: added support for custom AWS S3 endpoints
    - Connectivity:
        - Added the ability to import the connection list with all settings from pgAdmin
        - Renamed the "Database Native" authentication type to "Username/Password"
        - Added an internal connection information page to the connection edit dialog
    - General:
        - Added support for parameters and variables in datasets
        - Redesigned visual page structure in Preferences and some dialogs
        - Projects are sorted case-insensitively
        - Dangerous query confirmation is now shown in the SQL Editor for all DROP statements, not just for tables
        - Fixed an issue with AWS ECS deployment and load balancer
    - Installation: added an option to exclude the application from Microsoft Virus Defender during installation
    - Databases:
        - Athena and Redshift: fixed IAM authentication when connecting with username/password credentials
        - Athena driver was updated to version 3.27.0
        - Azure SQL Server: added the ability to connect to Мicrosoft Fabric
        - ClickHouse driver was updated to version 0.9.5. Fixed multiple issues with data type reading and presentation
        - Databricks: added support for spatial data
        - Db2 LUW: added Microsoft Entra ID authentication
        - Denodo: driver version was updated to 9.0
        - DuckDB: driver version was updated to 1.4.4.0
        - Netezza: implemented bulk load support to improve data import and migration performance
ReleaseTime: 2026-03-09
