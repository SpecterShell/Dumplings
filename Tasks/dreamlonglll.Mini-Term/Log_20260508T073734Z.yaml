  Value: |-
    更新内容
    - release: 升级版本号至 v0.4.1 - Hook Server 按需启动，由设置页面开关控制，避免 Windows 防火墙无条件弹出 - Hook 配置片段改为 Tab 选项卡分别展示 Claude Code 和 Codex - README 补充 toggle_hook_server 命令，命令数更新至 44 个 - 三个版本文件同步升级：package.json、Cargo.toml、tauri.conf.json
    - feat: Hook 配置片段改为 Tab 选项卡分别展示 Claude Code 和 Codex - 后端 get_hook_config_snippet 返回结构化 JSON，拆分 claude/codex 两部分数据 - 前端配置片段区域新增 Tab 切换，Claude Code 和 Codex 各自独立展示 - Codex Tab 清晰列出需修改的两个文件（hooks.json 和 config.toml），标注追加说明
    - chore(task): 新增 hook-server-on-demand 任务目录 - 记录 Hook Server 按需启动功能的 PRD 和上下文配置
    - feat: Hook Server 按需启动，由用户在设置页面控制是否启用 - 新增 hookEnabled 配置项（默认关闭），避免 Windows 防火墙在启动时无条件弹出授权 - 设置页面 Hook 区域顶部新增开关，关闭时下方注册/卸载按钮和状态信息整块置灰 - 新增 toggle_hook_server 命令支持运行时启动/停止 server，通过 unblock() 优雅退出监听线程 - start_hook_server 改为返回 Result，端口绑定失败时错误传播到前端展示
