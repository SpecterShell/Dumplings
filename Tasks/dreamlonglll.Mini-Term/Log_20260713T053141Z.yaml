  Value: |-
    v0.6.8 · 主界面三栏重构
    🧭 界面重构
    - 三栏新布局：最左新增常驻图标侧栏（折叠中间栏 / Sessions / Git / 设置 / SSH / 连接）；中间栏纵向叠放 Projects 与 Files、可一键整栏折叠；右侧为终端。
    - Sessions / Git 悬浮抽屉：从右边缘滑出、浮在终端之上，互斥单开，左缘可拖拽调宽（240–720px，宽度持久化），✕ 关闭；开合态每次启动默认收起。
    - 顶栏精简：移除自定义标题栏，版本号写入原生窗口标题（Mini-Term vX）；设置 / SSH / 连接三入口收入图标侧栏；「有新版本」提示改为侧栏图标高亮、点击前往下载。
    🐛 修复
    - 右侧抽屉拖拽调宽时禁用页面文本选中，避免划过终端误选。
    ⚙️ 其他
    - 新增配置 middleColumnVisible / rightDrawerWidth（前后端对齐，兼容旧 config.json）。

    Windows：Mini-Term_0.6.8_x64-setup.exe（推荐）或 _x64_en-US.msi · macOS(Apple Silicon)：_aarch64.dmg · Linux：.AppImage / .deb / .rpm
