  Key: ReleaseNotes
  Value: |-
    更新内容
    - release: 升级版本号至 v0.4.13 - 主要变更：「字体」设置从「系统设置」中独立成单独菜单，承载界面/终端字体大小与 font-family 共 4 项配置；修复输入框输入大写 F 被 F1-F12 拦截逻辑误吞的隐藏 bug（任何文本输入框都受影响，不止字体输入框） - 字体菜单：在「系统设置」与「AI 完成通知」之间插入，系统设置迁出后聚焦于主题/皮肤/外部编辑器 - F 键 bug 修复：main.tsx 中 F1-F12 拦截原写法 e.key.startsWith('F') && !isNaN(Number(e.key.slice(1)))，单独 'F' 时 slice(1) 为空串、Number('') 为 0 不是 NaN 命中拦截；改为正则 /^F([1-9]|1[0-2])$/ 精确匹配 - package.json、Cargo.toml、tauri.conf.json 与 Cargo.lock 版本号同步升级至 0.4.13，README 版本徽章同步
    - fix: 修复输入框无法输入大写 F 的问题 - main.tsx 中 F1-F12 功能键拦截逻辑漏判：e.key === 'F' 时 'F'.slice(1) === ''，Number('') 为 0 不是 NaN，单独的大写 F 被误判为功能键 preventDefault - 改为正则 /^F([1-9]|1[0-2])$/ 精确匹配 F1-F12，单独的 'F' 不再被拦截 - 影响范围不止字体输入框，任何文本输入框输入大写 F 都被吞掉
    - refactor: 字体设置从系统设置中独立成单独菜单 - SettingsPage 类型新增 'font'，菜单项在「系统设置」与「AI 完成通知」之间插入「字体」 - 新增 FontSettings 组件，承载字体大小（界面/终端）与字体 family（界面/终端）四项配置 - SystemSettings 中字体大小滑块、字体 family 输入框及对应 4 个 handler 整块迁出，迁出后系统设置只保留主题/皮肤/终端跟随主题/外部编辑器
    - feat: 新增界面与终端字体自定义能力 - AppConfig 增加 ui_font_family / terminal_font_family 两个可选字段，配套 2 条 serde 往返单测覆盖老配置缺省与新字段读写 - styles.css 把硬编码 font-family 抽成 --app-font-family / --app-font-mono CSS 变量，新增 .font-mono 重定向覆盖 Tailwind v4 默认值 - 新增 utils/fontManager.ts，单字段同时写入两个变量实现「一项覆盖整个 UI」；空值移除 inline style 回退默认 - SettingsModal 设置面板增加「字体」分组与 FontFamilyInput 子组件，onBlur/Enter 提交避免每键写盘 - TerminalInstance 监听 terminalFontFamily 变化实时刷新 xterm.options.fontFamily 并 refit，无需重开终端 - terminalCache 抽出 DEFAULT_TERMINAL_FONT_FAMILY 常量与 resolveTerminalFontFamily 工具，新建终端时直接用配置值
    - chore(task): archive 05-25-support-wsl-project-root
