- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    更新内容
    本版主特性：全应用中英双语 (i18n)。每个页面、每个功能的界面文案均支持 中文 / English 一键切换 —— 覆盖设置中心、项目列表、文件树、终端右键菜单、Git、SSH、cc-connect、各类弹窗与提示。
    新增
    - 中英双语界面 (i18n) — 「设置 → 系统」新增语言切换开关，一键在 中文 / English 间切换，整个 UI 实时重渲染、无需重启；首次启动按系统语言（navigator.language）自动探测，之后记忆到本地并在重启后保留。
      - 全覆盖 — 28 个组件 / 工具的全部用户可见文案抽取为 29 个 zh / en 命名空间字典，含按钮、菜单项、输入占位符、标题 / tooltip、toast / 通知 / 确认弹窗、空状态、相对时间等。
      - 轻量实现 — 内置基于 Zustand 的极简 i18n 层（点分 key + {占位符} 插值 + 中文兜底），无新增运行时依赖；中文用户的文案与行为与旧版逐字一致。
    说明
    - 少量由后端 (Rust) 生成的诊断 / 报错文案本版暂未纳入翻译（语言偏好为纯前端态）；代码注释与 console 调试日志按约定保持原样。
    下载
    - Windows — Mini-Term_0.5.0_x64-setup.exe（NSIS，推荐）或 Mini-Term_0.5.0_x64_en-US.msi
    - macOS (Apple Silicon) — Mini-Term_0.5.0_aarch64.dmg（首次启动需在终端运行 xattr -cr /Applications/Mini-Term.app 解除 Gatekeeper quarantine）
    - Linux — Mini-Term_0.5.0_amd64.AppImage / Mini-Term_0.5.0_amd64.deb / Mini-Term-0.5.0-1.x86_64.rpm
    平台支持：Windows 为主要支持平台，日常开发与测试均在 Windows 上进行；macOS / Linux 代码层面已支持，但未经充分打磨，可用性欠佳，欢迎提 Issue 反馈。

    完整 commits: https://github.com/dreamlonglll/mini-term/compare/v0.4.22...v0.5.0
