  Key: ReleaseNotes
  Value: |-
    更新内容
    - release: 发布 v0.3.4，设置弹框布局优化 - 设置弹框固定顶部定位，切换菜单页时不再上下跳动 - README、package.json、tauri.conf.json、Cargo.toml 版本号同步升级至 0.3.4
    - style: 设置弹框固定顶部定位，避免切换菜单时位置跳动 - 弹框改为距顶部 10vh 固定定位，切换不同高度的设置页时左侧菜单不再上下位移
    - fix: 消除 track_input 未使用的编译警告 - 该方法仅在测试中使用，添加 #[cfg(test)] 限定编译范围
    - fix: 修复 Markdown 预览本地图片无法显示的问题 - 启用 Tauri asset protocol，允许 webview 通过 asset URL 直接访问本地文件 - Markdown 预览中自定义 img 组件，将本地相对路径转为 asset protocol URL - tauri 依赖新增 protocol-asset feature，tauri.conf.json 配置 assetProtocol scope
