Version: 2.2.0.1
Installer:
- InstallerUrl: https://downloads.athena.us-east-1.amazonaws.com/drivers/ODBC/v2.2.0.1/Windows/AmazonAthenaODBC-2.2.0.1-windows-amd64.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Fixes
    - Fixed an issue that caused some browser-based authentication requests to fail because of a missing Content-Length header.
    - Fixed an issue that caused query parameters to be truncated when you use SQL_C_WCHAR bindings.
    - The license file now includes a reference to the AWS Service Terms.
    To download the new ODBC v2 driver, see ODBC 2.x driver download. For connection information, see Amazon Athena ODBC 2.x.
ReleaseTime: 2026-07-06
