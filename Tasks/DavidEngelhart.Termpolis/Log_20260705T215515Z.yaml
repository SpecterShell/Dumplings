  Key: ReleaseNotes
  Value: |-
    🔎 Browse the code graph yourself
    v1.20.0/v1.20.1 built the native code graph for your agents; v1.20.2 makes it visible to you, and easier to discover.
    New: an in-app Code Graph browser
    The Memory panel (Ctrl+Shift+M) now has a Code Graph section:
    - Search any symbol (function, class, method, …) across the codebase.
    - Explore it — its source, its callers and callees, and its blast radius (how many symbols a change could affect), in one click.
    - Live stats (symbols · edges) and a Rebuild button that re-indexes the active repo on demand.
    So the same structure your agents query via the code_* tools is now something you can look at directly.
    Discoverability
    The Auto-index everything setting now explains that it also builds the structural code graph the code_* tools use — and the termpolis.com docs gained a "Code graph (automatic)" section covering how it builds itself, how agents use it, and the supported languages.
    Reminder: it's automatic
    Nothing to turn on. Opening a terminal in a Git repo indexes it (once per session, plus a 15-min re-sweep); the graph builds alongside semantic memory and persists across launches. On by default, opt out in Settings.
    Quality
    The browser ships with component tests (search → explore, rebuild → git-root → re-index, empty state). Full suite green; lint + typecheck + build clean; coverage gate green.
    Full Changelog: https://github.com/codedev-david/termpolis/compare/v1.20.1...v1.20.2
