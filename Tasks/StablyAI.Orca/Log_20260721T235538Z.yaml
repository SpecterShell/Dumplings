  Key: ReleaseNotes
  Value: |-
    What's Changed
    The full 1.4.148 feature train (which shipped separately as a minimal hotfix) plus the Codex multi-account fixes:
    Codex accounts & sessions
    - Automatic Codex resume now stays on the account that created the session — sleep/wake and restart resumes launch from the session's originating Codex home instead of the currently selected account (https://github.com/stablyai/orca/pull/9696)
    - Usage tracking now counts sessions from per-account Codex homes, so multi-account usage is no longer undercounted (https://github.com/stablyai/orca/pull/9763)
    - Account removal dialog now accurately describes that the account's session history and MCP logins are permanently deleted (https://github.com/stablyai/orca/pull/9763)
    Also included
    - fix(mobile): pairing QR column no longer starves CJK copy (https://github.com/stablyai/orca/pull/9711) — already in v1.4.148 stable
    - Everything from the 1.4.148 release train (v1.4.147...this tag)
    Full Changelog: https://github.com/stablyai/orca/compare/v1.4.147...v1.4.149
