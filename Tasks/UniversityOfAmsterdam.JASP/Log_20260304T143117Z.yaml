Version: 0.96.0
Installer:
- InstallerUrl: https://github.com/jasp-stats/jasp-desktop/releases/download/v0.96.0/JASP-0.96.0.0-Windows.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Online Module Library: It is now possible to load new analyses, or update them, on the fly.
    - Support for importing Minitab workbook files in https://github.com/jasp-stats/jasp-desktop/pull/6134
    - New analyses:
      - MNLFA SEM Analysis
      - Frequentist Test Statistics Analysis in Summary Statistics
    - Various improvements for Quality Controls:
      - Add Z bench option to process capability
      - Rewrite MSA gauge Linearity
      - Auto transforms in Process Capability\
      - New distributions and historical parameters
      - And much more....
    - In T-Tests, ANOVA & Regression: add Confidence interval for Q-Q plot residuals
    - Add Tamil and Basque languages
    Fixes
    - Enable Save button correctly in https://github.com/jasp-stats/jasp-desktop/pull/6047
    - UI adjustment in Preferences in https://github.com/jasp-stats/jasp-desktop/pull/6034
    - Fixes Crash with autosave with analysis without data in https://github.com/jasp-stats/jasp-desktop/pull/6052
    - Fix label load from old jasp file in https://github.com/jasp-stats/jasp-desktop/pull/6053
    - Fix Hypothesis naming undo automatically when adding additional hypothesis in Binomial testing in https://github.com/jasp-stats/jasp-desktop/pull/6054
    - Keep "R Syntax in result" setting in JASP file in https://github.com/jasp-stats/jasp-desktop/pull/6062
    - Use readstat library from conan in https://github.com/jasp-stats/jasp-desktop/pull/6063
    - Remove computed columns depending on analysis when closing the analysis in https://github.com/jasp-stats/jasp-desktop/pull/6065
    - Add auto transform functions to computed columns in https://github.com/jasp-stats/jasp-desktop/pull/6000
    - Fix decimal reading from xlsx on non en_us locale systems (like german) in https://github.com/jasp-stats/jasp-desktop/pull/6069
    - Fix LaTeX vertical alignment in notes in https://github.com/jasp-stats/jasp-desktop/pull/6072
    - Avoid crash when closing workspace in https://github.com/jasp-stats/jasp-desktop/pull/6075 (https://github.com/jasp-stats/jasp-issues/issues/3913)
    - Fix Ordinal variables are automatically converted to Scale in the Drag-and-Drop Filter in https://github.com/jasp-stats/jasp-desktop/pull/6077 (https://github.com/jasp-stats/jasp-issues/issues/3933)
    - Add a progressbar hide timer for autosaves in https://github.com/jasp-stats/jasp-desktop/pull/6083
    - Use collapse icon instead of "delete analysis" in https://github.com/jasp-stats/jasp-desktop/pull/6085
    - Some filter functions in some analyses are not working in https://github.com/jasp-stats/jasp-desktop/pull/6082 (https://github.com/jasp-stats/jasp-issues/issues/3941)
    - Quality control crash in Type 4 Linearity Study due to plot title is not a real string in https://github.com/jasp-stats/jasp-desktop/pull/6078 (https://github.com/jasp-stats/jasp-issues/issues/3955)
    - Give only non empty labels when generating filter in https://github.com/jasp-stats/jasp-desktop/pull/6093 (https://github.com/jasp-stats/jasp-issues/issues/3932)
    - Upgrade R to R-4.5.2 and Qt to 6.10.1 in https://github.com/jasp-stats/jasp-desktop/pull/6084
    - Make file menu wide enough even in long translations in https://github.com/jasp-stats/jasp-desktop/pull/6094
    - Fix Extra row when copying tables and inconsistencies in table alignment in https://github.com/jasp-stats/jasp-desktop/pull/6071 (https://github.com/jasp-stats/jasp-issues/issues/3914)
    - Fix some decimal separator related issues in https://github.com/jasp-stats/jasp-desktop/pull/6098
    - Fix upgrade issue with missing values in https://github.com/jasp-stats/jasp-desktop/pull/6099
    - Improve tooltip in https://github.com/jasp-stats/jasp-desktop/pull/6104, https://github.com/jasp-stats/jasp-desktop/pull/6113, https://github.com/jasp-stats/jasp-desktop/pull/6117, https://github.com/jasp-stats/jasp-desktop/pull/6119
    - Do not crash when starting Development module with wrong path in https://github.com/jasp-stats/jasp-desktop/pull/6105
    - Error in paired T-Test when renaming variable and refreshing in https://github.com/jasp-stats/jasp-desktop/pull/6114 (https://github.com/jasp-stats/jasp-issues/issues/3973)
    - Make developer module easier to use in https://github.com/jasp-stats/jasp-desktop/pull/6122
    - Do not use Locale when the double is already set in English format in https://github.com/jasp-stats/jasp-desktop/pull/6115
    - Add vcs-browser to fix flatpak build linker warnings in https://github.com/jasp-stats/jasp-desktop/pull/6107
    - Fix crash when using JASP after computer was sleeping in https://github.com/jasp-stats/jasp-desktop/pull/6125
    - Formula Fields do not get always the right value in https://github.com/jasp-stats/jasp-desktop/pull/6127
    - Make JASP file, easier to zip and unzip in https://github.com/jasp-stats/jasp-desktop/pull/6138 (https://github.com/jasp-stats/jasp-issues/issues/4063)
    - Check known issues per module version in https://github.com/jasp-stats/jasp-desktop/pull/6139
    - XSL import: #NULL! should be as missing in https://github.com/jasp-stats/freexl/pull/2 (https://github.com/jasp-stats/jasp-issues/issues/4069)
    ANOVA
    - Flip labels for exported residuals (standard/student) in https://github.com/jasp-stats/jaspAnova/pull/493
    - Capitilize post hoc correction names in footnote and p-value subscript in https://github.com/jasp-stats/jaspAnova/pull/470 (https://github.com/jasp-stats/jasp-issues/issues/3720)
    - Better handling of missing data in type I/II ANOVA in https://github.com/jasp-stats/jaspAnova/pull/504
    - Add CI to QQ-plots, display error bars in descriptives plots by default in https://github.com/jasp-stats/jaspAnova/pull/507
    Audit
    - Fix bug when no book value and critical transactions in https://github.com/jasp-stats/jaspAudit/pull/651
    BFPack
    - fixed: Adding a nominal variable as predictor gives an error 'object findex not found'. This occurs for both the regression and for (M)AN(C)OVA (as fixed effect).
    - Fixed: The left Bayes Factor and Bayes factor type options can only be selected when either the options 'BFs: Standard hypotheses' and 'BFs: Manual hypotheses' are ticked.
    - Implemented: Can we have the option to include an intercept (also possible in the classical regression analysis in JASP). Also for (M)AN(C)OVA. This would be nice as sometimes it is faster to write constraints with or without intercept depending on the hypotheses that are tested ((in https://github.com/jasp-stats/jaspBfpack/pull/11)
    Bsts
    - Improve layout of Seasonalities in https://github.com/jasp-stats/jaspBsts/pull/134
    Circular Statistics
    - Fix rao.table import in https://github.com/jasp-stats/jaspCircular/pull/85
    Descriptives
    - Adjust pareto plot in https://github.com/jasp-stats/jaspDescriptives/pull/413, https://github.com/jasp-stats/jaspDescriptives/pull/454, https://github.com/jasp-stats/jaspDescriptives/pull/459, https://github.com/jasp-stats/jaspDescriptives/pull/460 (https://github.com/jasp-stats/jasp-issues/issues/3733)
    - Add geometric and harmonic means in https://github.com/jasp-stats/jaspDescriptives/pull/398
    - Fix plotbuilder in https://github.com/jasp-stats/jaspDescriptives/pull/449
    - Adding quantile types in https://github.com/jasp-stats/jaspDescriptives/pull/437
    - Move omission footnote in frequency tables in https://github.com/jasp-stats/jaspDescriptives/pull/456 (https://github.com/jasp-stats/jasp-issues/issues/2026)
    Distributions
    - Shapiro-Francia test of normality in https://github.com/jasp-stats/jaspDistributions/pull/200 9https://github.com/jasp-stats/jasp-issues/issues/3590)
    Equivalence T-Tests
    - Add Raw Equivalence Tests in https://github.com/jasp-stats/jaspEquivalenceTTests/pull/194
    ESCI
    - Make Summary Stats available without data in https://github.com/jasp-stats/jaspEsci/pull/6 (https://github.com/jasp-stats/jasp-issues/issues/3979)
    Factor
    - Fix Residual covariances CFA in https://github.com/jasp-stats/jaspFactor/pull/288 (https://github.com/jasp-stats/jasp-issues/issues/3550)
    - Fix Identical Fit Indices Across Different CFA Estimators in https://github.com/jasp-stats/jaspFactor/pull/286 (https://github.com/jasp-stats/jasp-issues/issues/3976)
    - Changing a sorting method of factor loadings in EFA in https://github.com/jasp-stats/jaspFactor/pull/290 (https://github.com/jasp-stats/jasp-issues/issues/3600)
    Frequencies
    - Row label of Odds Ratio now reflects Odds Ratio or Log Odds Ratio in https://github.com/jasp-stats/jaspFrequencies/pull/267
    - Various bug fixes frequencies (error check loglinear, limit levels binomial, limit counts multinomial) in https://github.com/jasp-stats/jaspFrequencies/pull/304
    JAGS
    - Do not try to do customizable inference when the model errored in https://github.com/jasp-stats/jaspJags/pull/179
    Learn Stats
    - Fix issue #3107: Change default value of delta from 0 to 0.5 in https://github.com/jasp-stats/jaspLearnStats/pull/147
    Machine Learning
    - Hierarchical Cluster Analysis: Ward and Ward2 methods produce identical results; discrepancies with R/SPSS in https://github.com/jasp-stats/jaspMachineLearning/pull/494 (https://github.com/jasp-stats/jasp-issues/issues/3837)
    Meta-Analyses
    - Add standard errors to classical meta-analysis tabular output with user control in https://github.com/jasp-stats/jaspMetaAnalysis/pull/363
    - Fix Footnote Error in https://github.com/jasp-stats/jaspMetaAnalysis/pull/406
    Mixed Models
    - Allow bernoulli glms with categorical outcome in https://github.com/jasp-stats/jaspMixedModels/pull/254
    - Fix parametric bootstrap error in Generalized Linear Mixed Models in https://github.com/jasp-stats/jaspMixedModels/pull/291
    - Fix uninformative error messages with 'kenward-roger' trend in https://github.com/jasp-stats/jaspMixedModels/pull/288
    Network
    - Fixed bug: now populating the Weight Matrix is done correctly in the Bayesian submodule in https://github.com/jasp-stats/jaspNetwork/pull/153
    Process
    - Refactor moderation probe syntax in https://github.com/jasp-stats/jaspProcess/pull/166 (https://github.com/jasp-stats/jasp-issues/issues/3539)
    - Fix futures default in LL function in https://github.com/jasp-stats/jaspProcess/pull/191
    Prophet
    - fix forcast plots in https://github.com/jasp-stats/jaspProphet/pull/125
    Quality Control
    - Add Z bench option to process capability in https://github.com/jasp-stats/jaspQualityControl/pull/377
