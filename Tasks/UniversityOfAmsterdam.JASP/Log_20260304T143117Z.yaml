    Regression
    - Fix glm input in https://github.com/jasp-stats/jaspRegression/pull/427 (https://github.com/jasp-stats/jasp-issues/issues/3681)
    - Linear Regression: Add quadratic terms + equation table in https://github.com/jasp-stats/jaspRegression/pull/432
    - Flip labels for exported residuals (standard/student) in https://github.com/jasp-stats/jaspRegression/pull/451 (https://github.com/jasp-stats/jasp-issues/issues/3945#issue)
