    - Helper function to plot residuals in partial correlation scatter plots in https://github.com/jasp-stats/jaspRegression/pull/417 (https://github.com/jasp-stats/jasp-issues/issues/3507)
    - Linear regression: backwards regression handles factors better in https://github.com/jasp-stats/jaspRegression/pull/465 (https://github.com/jasp-stats/jasp-issues/issues/4038, https://github.com/jasp-stats/jasp-issues/issues/4042, https://github.com/jasp-stats/jasp-issues/issues/4041)
    - Add confidence intervals qq plots linear regression in https://github.com/jasp-stats/jaspRegression/pull/469
    Reliability
    - Fix analytic SEs for alpha and lambda2 with continuous data in https://github.com/jasp-stats/jaspReliability/pull/273 (https://github.com/jasp-stats/jasp-issues/issues/3622)
