    - Fix plot legend for categorical in latent growth in https://github.com/jasp-stats/jaspSem/pull/342 (https://github.com/jasp-stats/jasp-issues/issues/3822)
    - New analysis mnlfa in https://github.com/jasp-stats/jaspSem/pull/347
    - Fix errors in SEM module in https://github.com/jasp-stats/jaspSem/pull/335 (https://github.com/jasp-stats/jasp-issues/issues/3642, https://github.com/jasp-stats/jasp-issues/issues/3851, https://github.com/jasp-stats/jasp-issues/issues/3692, https://github.com/jasp-stats/jasp-issues/issues/3698)
