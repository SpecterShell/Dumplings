  Key: ReleaseNotes
  Value: |-
    New Feature
    JASP AI (https://github.com/jasp-stats/jasp-desktop/pull/6275): an AI-powered assistant that lets users interact with JASP through natural language. Users can ask questions, create and run statistical analyses, inspect results, and generate reports — all from a chat interface inside JASP.
    The assistant communicates with any OpenAI-compatible API (OpenAI, Anthropic, Mistral, OpenRouter, local models, etc.) and uses tool calling (function calling / native tool use) to interact with the JASP directly.
    Improvements
    - Speed up old file issue checks (https://github.com/jasp-stats/jasp-desktop/pull/6268)
    - Improve user experience for plot editing (https://github.com/jasp-stats/jasp-desktop/pull/6229)
