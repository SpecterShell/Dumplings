  Value: |-
    ReSharper 2026.1.1
    These are the most notable bug-fixes included in this build:
    - Support has been added for Avalonia 12 bindings [RSRP-502879], and the null-conditional operator in Avalonia binding expressions [RSRP-500877].
    - Fixed flickering and lag in the editor when using ReSharper with Visual Studio 18.4.0. [RSRP-503199]
    - Values in the "Comma-delimited list of values" macro for live templates are now preserved after reopening the template. [RSRP-503460]
    For the complete list of issues resolved, please see our release notes.
