Version: 2.5.36
Installer:
- InstallerType: nullsoft
  InstallerUrl: https://hndl.urbackup.org/Server/2.5.36/UrBackup Server 2.5.36.exe
- InstallerType: wix
  InstallerUrl: https://hndl.urbackup.org/Server/2.5.36/UrBackup Server 2.5.36(x64).msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Fill up last patch buffer before writing if possible to fix resumed file backup failing with fatal error
    - Potential fix for patching issue in combination with sparse extents
    - Add feature to mount directories on the server via SMB on Windows
    - Obfuscate the EICAR string a bit
    - Show a warning on the status page if there is no users
    - Ask for Internet server url if it is empty when adding client
    - Fix archive window being used as letter
    - Disable running backups in background per default
    - Double check there is no user before allowing anonymous login
    - Fix issue allowing users with a valid session (logged in) but no permission to access any last actions of any client to access last actions of all clients
