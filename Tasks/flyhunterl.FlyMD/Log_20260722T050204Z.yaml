    修复：PDF 导出与打印时统一列表缩进与 marker 间距，避免无序列表圆点侵占后方内容空间
    修复：所见模式与阅读模式的加粗边界兼容性，中文标点、引号和括号包裹的加粗内容可以更稳定渲染
