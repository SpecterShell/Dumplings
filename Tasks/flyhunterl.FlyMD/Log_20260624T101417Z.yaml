- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新增：通过系统双击或“打开方式”打开库目录外的 md / markdown / txt 文档时，会话内自动把该文件所在目录作为临时库显示在侧栏；关闭应用或切回正式库后不写入库配置
    改进：临时库侧栏会展示同目录下内置支持的 md / markdown / txt / pdf 文件以及插件扩展后缀，并在标题中标记“临时”，避免和正式库混淆
    改进：临时库状态下禁用 WebDAV 同步入口，避免侧栏显示临时目录但同步仍作用到旧正式库
    新增：主题设置加入符号自动补全开关，可按需关闭成对符号补全
    修复：所见模式代码块粘贴后高亮层可正常刷新，避免粘贴代码不渲染或显示状态滞后
    改进：库侧栏 Markdown / PDF 文件图标与选中态样式调整，当前文件识别更清晰
    文档：移除 README 中失效或不再推荐的 PackyCode 中转服务链接
