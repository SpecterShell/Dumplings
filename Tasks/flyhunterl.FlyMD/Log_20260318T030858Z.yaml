  Key: ReleaseNotes
  Value: |-
    改进：启动链路继续瘦身，主窗口改为首屏就绪后再显示；多标签、分屏、行号、库宽拖拽、主题面板等非关键模块延后加载，启动更快更稳
    修复：源码模式中 * 与反引号补全改为即时处理，消除输入延时；单/双/三反引号包裹与代码围栏生成响应更直接
    改进：Tab 缩进统一为四空格式缩进，并兼容旧版 / 全角空格缩进；所见模式不再出现转译后的缩进残留
    改进：源码模式行号样式进一步收敛，当前行提示更清晰
    更新：扩展生态新增第三方插件「翻译选中文本」；「Blinko 集成」插件升级至 v1.2.0，支持发送文章、选择拉取、同步本地目录与生成登录门户文档
