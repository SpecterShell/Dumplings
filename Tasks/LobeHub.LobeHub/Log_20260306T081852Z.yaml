    🔀 Description of Change
    This hotfix updates the stable desktop release workflow on main to archive renderer assets from the current Electron renderer output directory instead of the removed out/ directory.
    It prevents stable Linux desktop builds from failing after packaging succeeds when creating lobehub-renderer.tar.gz.
    🧪 How to Test
    - 
      Tested locally
    - 
      Added/updated tests
    - 
      No tests needed
    Verified the workflow change by checking the final diff against main and running bunx prettier --check .github/workflows/release-desktop-stable.yml.
    📸 Screenshots / Videos
    Before After
    N/A N/A
    📝 Additional Information
    This is a workflow-only hotfix for the stable release pipeline on main. The desktop packages were already building successfully; the failure came from the extra renderer archive step using an outdated path.
    Made with Cursor
    Summary by Sourcery
    Build:
    - Update Linux packaging step in the stable desktop release workflow to tar the renderer from apps/desktop/dist/renderer instead of the removed out directory, with a guard to ensure the directory exists.
