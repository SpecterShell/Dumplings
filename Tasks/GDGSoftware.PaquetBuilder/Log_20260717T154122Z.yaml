  Key: ReleaseNotes
  Value: |-
    - Improved Modernized the custom action property editor: boolean properties now use native checkboxes, every text field gets an edit (…) button for inserting variables and resource strings, a new Ctrl+Enter shortcut opens the value editor, and the editor follows the active light or dark theme
    - Improved Improved the integrated Help window and other HTML-based screens
    - Improved Internal code improvements to several custom actions, plus minor improvements
    - Fixed Fixed a crash (access violation) that could occur when closing Paquet Builder after a WebView-based window, such as the Help browser, had been used during the session
    - Fixed Fixed text appearing at twice its normal size on some interface elements (hyperlinks, tab captions, File Manager column headers, tree and list items) on displays scaled above 100% (high-DPI screens at 125–200%)
