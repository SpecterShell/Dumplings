  Key: ReleaseNotes
  Value: |-
    🚨 Breaking Changes
    - cache: Extract hybrid_cache package - by @j2rong4cn in https://github.com/OpenListTeam/OpenList/issues/2477 (9eae6)
    - settings: Move FilterReadMeScripts to frontend - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2346 (a5ba6)
    🚀 Features
    - 115_open: Implement Getter interface - by @sevxn007 in https://github.com/OpenListTeam/OpenList/issues/1811 (07506)
    - 189pc: Implement AccessToken login - by @zypluckyphoenix in https://github.com/OpenListTeam/OpenList/issues/2245 (0726d)
    - func: Support ed2k & magnet & torrent offline download - by @PIKACHUIM in https://github.com/OpenListTeam/OpenList/issues/2452 (1d071)
    - s3: Implement Getter interface - by @ZRHann in https://github.com/OpenListTeam/OpenList/issues/1790 (9033b)
    - sharing: Allow custom share IDs - by @MuelNova in https://github.com/OpenListTeam/OpenList/issues/2353 (7e37c)
    - webdav: Implement Getter interface - by @ZRHann and Copilot in https://github.com/OpenListTeam/OpenList/issues/2421 (e2840)
    🐞 Bug Fixes
    - 115:
      - Fix capacity display and CDN 403 errors - by @SheltonZhu in https://github.com/OpenListTeam/OpenList/issues/2510 (ffbbc)
    - 189pc:
      - Handle numeric res_code in RenameResp to fix JSON unmarshal error - by @PIKACHUIM in https://github.com/OpenListTeam/OpenList/issues/2489 (b2820)
    - about:
      - Fix large logo on about page - by @jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2418 (201a2)
    - driver:
      - Fix 189 & 189pc fastcopy form local storage - by @PIKACHUIM in https://github.com/OpenListTeam/OpenList/issues/2471 (7feec)
    - driver/139:
      - Remove RFC-incompatible request header - by @Copilot and jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2478 (daad2)
    - drivers:
      - Add headers in Link methods - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2401 (ece15)
    - drivers/139:
      - Check cdnSwitch before returning cdnUrl in personalGetLink - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2379 (331f5)
    - drivers/local:
      - Capture ENOTTY in reflink to allow fallback - by @elysia-best in https://github.com/OpenListTeam/OpenList/issues/2492 (7cfb2)
    - drivers/wps:
      - Implement driver.GetRooter interface - by @xrgzs in https://github.com/OpenListTeam/OpenList/issues/2414 (37663)
      - Correct account relevant handling - by @xrgzs and Copilot in https://github.com/OpenListTeam/OpenList/issues/2415 (2d2d9)
    - fsmanage:
      - Improve path validation - by @j2rong4cn in https://github.com/OpenListTeam/OpenList/issues/2437 (c7c0c)
    - internal/fs:
      - Add ObjectAlreadyExists error check - by @mkitsdts in https://github.com/OpenListTeam/OpenList/issues/2019 (e87e0)
    - offline_download:
      - Fix login failure caused by qBittorrent 5.2.0 returning HTTP 204 No Content on successful authentication - by @yuanczx in https://github.com/OpenListTeam/OpenList/issues/2476 (31b41)
    - qbittorrent:
      - Handle non-200 response during login to prevent long startup waits - by @airium in https://github.com/OpenListTeam/OpenList/issues/2248 (bfda7)
    - setting:
      - Handle delete of setting item with empty key - by @j2rong4cn in https://github.com/OpenListTeam/OpenList/issues/2131 (ea19b)
    🏎 Performance
    - Replace strings.Split with strings.SplitSeq - by @j2rong4cn in https://github.com/OpenListTeam/OpenList/issues/2441 (d3a6b)
