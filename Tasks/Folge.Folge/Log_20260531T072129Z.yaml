  Key: ReleaseNotes
  Value: |-
    🎁 New Features
    - Open Guide (Team Collaboration) – Work on a shared .flgg file directly, with changes saving back to the original and staying in sync with your team. Works with files stored on network drives, Dropbox, Google Drive, or OneDrive.
    - Animated GIF Export – Export your guide as an animated GIF — great for sharing in chat, wikis, and bug reports. Customize step duration, max width, background color, a progress bar, per-step title overlays, and an optional title card as the first frame. Includes an in-app preview so you know exactly what you're getting.
    - Dark Mode – Folge finally has dark mode! 🌙 A new Appearance setting lets you choose between System, Light, and Dark. The entire UI has been carefully adjusted to look great in both light and dark, and it follows your OS theme by default.
    - Curved Arrows – Arrows can now be drawn as straight lines or smooth curves.
    ⭐ Improvements
    - Trash bin now displays step images for easier identification.
    - Region capture: resize knobs are now larger and easier to grab, and their position is correctly maintained when capture is paused.
    - Right sidebar reworked for a cleaner layout.
    - Brought back the "Mark clicked area with rectangle" option.
    🔧 Bug Fixes
    - Cmd+S / Ctrl+S now reliably saves in the editor.
    - Fixed step reordering issues.
    - Fixed navigation issues.
    - Word export fixes.
    - Fixed WordPress export for sites hosted in a subpath.
ReleaseTime: 2026-06-01
