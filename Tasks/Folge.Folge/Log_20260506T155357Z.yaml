  Key: ReleaseNotes
  Value: |-
    🎁 New Features
    - Hudu Integration – Publish guides directly to Hudu as Knowledge Base articles. Supports multiple accounts, company and global KB selection, a folder and article tree browser with search, and updating previously published articles.
    - Copy HTML to Clipboard – New "Copy to clipboard" action for Simple and Rich HTML exports — paste your guide straight into OneNote, Word, email, or any app that accepts rich content.
    - Copy URL from Published Pages – Copy the URL of any published item directly from the Notion, Confluence, WordPress, and Hudu page trees.
    - Bulk Edit for Placeholders – Edit all guide placeholders at once via a simple bulk editor.
    ⭐ Improvements
    - Bulk Blur: improved similarity detection and a redesigned UI.
    - Bulk Blur: the applied blur rectangle is now scaled correctly when target steps have different image resolutions than the source step.
    - Bulk Crop: redesigned UI.
    - Export modal redesigned.
    - Focused View panel redesigned.
    - Cover Page Editor modal redesigned.
    - Step Details, Step Settings, Step Text Blocks, Guide Settings, Import Steps, Move Step To, Change Parent Step, Trash Bin, Folders, Backup, Restore, Automated Backups, Manage Online Guide, Authentication, AI Settings, and AI Voice Input modals all redesigned.
    🔧 Bug Fixes
    - Capturing with hotkeys no longer triggers while capture is paused.
    - Cover page preview now always shows the cover page, even if it is disabled in export settings, so you can see what you're editing.
ReleaseTime: 2026-05-06
