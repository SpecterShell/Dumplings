  Key: ReleaseNotes
  Value: |-
    🎁 New Features
    - Guides List Drag-and-Drop – Guides and folders can now be reordered by dragging them in the sidebar, including dragging directly into folders.
    - Azure DevOps Markdown Export – Export guides as Markdown files compatible with Azure DevOps wiki.
    - Custom AI Prompts – Set custom system prompts for the AI Writing and Dictation features in AI Settings.
    - Hotspot Improvements – New cursor style options for hotspot annotations, with configurable circle size, color, and border, plus an updated capture settings UI.
    - Textbox Outline Border – Text box annotations now support a configurable outline border.
    - Add Guide via Folder Menu – Guides can now be created directly from a folder's context menu.
    ⭐ Improvements
    - Active window capture now correctly handles windows that are partially outside the screen bounds.
    - Improved active window detection on Windows.
    - Steps without a screenshot are now visually distinguished in the steps list.
    - Content blocks no longer allow substeps to be dragged into them.
    - Content blocks are now visually marked in the step list for easier identification.
    🔧 Bug Fixes
    - Fixed window close and minimize button issues in modals on Windows.
    - Fixed the PDF preview banner position and corrected step spacing in table mode.
ReleaseTime: 2026-04-26
