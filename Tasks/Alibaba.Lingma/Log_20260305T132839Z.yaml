Version: 0.4.0
Installer:
- Architecture: x64
  Scope: user
  InstallerUrl: https://lingma-ide.oss-rg-china-mainland.aliyuncs.com/release/0.4.0/LingmaUserSetup-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    功能更新
    - 内置 create-skill 和 create-agent 技能，以引导和简化用户创建技能和自定义 Agent。同时支持通过 / 快速唤起并使用 skills、subagents。
    - Quest 模式增加文件树，提升当前项目中文件查阅能力，可便捷添加到上下文。
    - Quest 模式支持通过对话唤起 Vercel Skill，可快速部署应用上线。
    优化与修复
    - 一键优化提示词：优化对提示词内包含 @上下文场景的处理
    - 支持 .agents/skills 目录：现已支持从 .agents/skills 读取技能，遵循行业统一标准
    - 自定义 Subagent 执行详情支持展开浮窗查看
    - NEXT 支持读取剪贴板历史
    - 修复偶现系统异常问题
    - 修复偶现编辑文件卡住问题
    - 修复上下文带图可能会导致 IDE 崩溃问题
    - 登录稳定性优化：提升登录稳定性（如升级后遇到登录、权限等问题，请尝试退出并重新登录）
    - 增强 Quest 任务中 Agent 调用 Skills 能力
    - 优化 Quest 模式页面中新建任务、工具栏折叠的体验
    - 更新 Quest 模式首页案例内容
