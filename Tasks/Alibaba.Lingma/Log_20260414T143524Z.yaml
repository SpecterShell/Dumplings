  Value: |-
    功能更新
    - DevContainer 支持：新增开发容器（DevContainer）能力，支持通过 .devcontainer/devcontainer.json 配置文件定义标准化开发环境，帮助团队实现一致的开发体验。
    - Agent 模式支持 Windows 终端沙箱：Agent 执行的命令现已支持在安全沙箱中运行，有效隔离潜在风险操作。
    体验优化
    - Extension Host 进程隔离：优化内置 AI 编码相关扩展的进程隔离能力，将 AI 扩展运行在独立的 Extension Host 进程中，提升运行时稳定性与整体使用体验。
