  Key: ReleaseNotes
  Value: |-
    Updated Features
    Improved CP437 (OEM-ASCII) code page support
    Hex Editor Neo now provides full support for OEM-ASCII (CP437) code page, including pseudographics characters in control character range.
    New macro scripting methods
    Macro scripts normally provide all editing capabilities through the editor window's IDocumentView interface (which allows full macro recording support of user actions). In addition to this support, this release also adds several basic data modification methods directly to IDocument interface to simplify script operations.Ability to copy file comparison report
    File Comparison Report may now be copied to the Clipboard.
    Completed Japanese and Korean language packs
    Japanese and Korean language packs have been updated with all new and modified strings in version 8, thanks to our respectful contributors.
    Bug Fixes
    Data Inspector refresh on endian change
    Data Inspector now correctly refreshes whenever the Little/Big Endian mode is changed in an editor window.
