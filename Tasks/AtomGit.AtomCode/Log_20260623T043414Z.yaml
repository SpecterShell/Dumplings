    AtomCode v4.25.5 Release Notes
    发布日期：2026-06-23
    v4.25.5 是一个紧急修复版本，聚焦于两处关键问题：CC Hooks 插件 hook 因启动失败误阻塞所有对话 / 工具的回归问题，以及 v2 引擎下网关偶发返回空响应导致 turn 静默终止的问题。

    🛠 修复（Fixes）
    CC Hooks / 插件
    - 修复 exit-2 hook 启动失败导致的全局阻塞：当插件 hook 因脚本路径不解析（如 python3 "$CLAUDE_PLUGIN_ROOT/x.py" → Python can't open file → exit 2）、命令未找到、Python 模块缺失等启动失败场景退出代码 2 时，之前被 CC 合约解释为故意「block」从而阻塞每一次 prompt 和工具调用。现在通过捕获 stderr 并检测解释器/Shell 启动失败特征（can't open file、command not found、ModuleNotFoundError、ImportError 等），区分「有意的阻止」（有实际输出内容）和「hook 启动失败」（静默跳过）。仅当 hook 输出真实的阻止原因时才阻塞 turn，broken hook 不再 wedges 用户
    Provider / 网络
    - 修复 v2 引擎偶发空响应中止 turn 的问题：部分 OpenAI-compatible 网关（atomgit→DeepSeek 路径）偶发返回状态码 200 但内容完全为空（stream 打开后直接 Done，无文本、无工具调用、无 reasoning），v2 引擎此前将其视为正常 Stop，导致 turn 在当前任务中间静默结束。现在通过 saw_stream_content 标记检测到零内容完成时，自动重试最多 5 次（1/1/2/2/3s 前置退避，可取消），重试期间显示可见警告「模型返回空响应，N 秒后重试……」。全部耗尽后以 ProviderError 失败（而非无声的 Stopped），保留会话快照，用户可直接重发
    其他修复
    - 管理员权限警告文案优化：将提示从「请在 /codingplan 中配置信任目录」改为「建议改用普通权限、并在受限的工作目录中运行 AtomCode」，更清晰指引用户避免以管理员身份运行
