  Key: ReleaseNotes
  Value: |-
    🎉 v0.2.33版本更新内容:
    · 上线专家开放平台，支持将自建专家发布至专家广场
    · 支持在新窗口中打开对话内容，便于详细查看
    · 文件空间新增云端文件汇总功能，并支持批量操作
    · 本地模型能力换新升级
    · 实验室板块改版升级
    · 增强专家广场搜索能力，检索更精准高效
    · 连接器新增腾讯地图、美团跑腿、麦当劳点餐等服务接入
    · Hermes Agent支持选择模型
    · 若干性能优化与 bugfix
