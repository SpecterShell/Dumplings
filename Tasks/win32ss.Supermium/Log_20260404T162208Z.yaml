  Key: ReleaseNotes
  Value: |-
    The following improvements have been implemented in this version of Supermium 144:
    - Upstream security patches
    - (#1832) Screen sharing issues fixed across several Windows versions
    - (#1814, #1827 and others) Mitigation for Windows XP initialization issues by using --disable-gpu-rasterization. This can be reverted by using --enable-gpu-rasterization
    - CMD shortcuts added for portable mode, which can be easily combined with either legacy UI modes or ungoogled-supermium mode. They are named "Supermium (Portable).cmd", "Supermium (Portable Classic).cmd", and on...
    The user data profile will be written to the same directory as the Supermium executable using these shortcuts and the profiles will be unencrypted so they can be moved to other disk volumes.
