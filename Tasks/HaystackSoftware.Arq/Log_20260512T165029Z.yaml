  Key: ReleaseNotes
  Value: |-
    Improvements
    - pCloud uploads are now additionally verified by fetching the file's checksum from pCloud after upload and comparing it to the expected value. This was added after a case where pCloud failed to save all bytes of a file; the post-upload checksum check (suggested by pCloud support) confirms pCloud has received and stored the file correctly.
    - Log the backup plan's immutability settings (object-lock days range) to the activity log when a backup starts.
    - Prefix B2 error messages with "B2 error:" in the activity log so the source of the error is clear.
    - Color the budget progress bar in the backup-plan detail view based on usage; the bar turns red when the plan is over budget.
    - Confirm before sending the agent log to support.
    - Preserve expanded items in the backup record's tree view across re-selection of the same backup record.
    - Disable the "Exclude" and "Reveal in Explorer" buttons in the activity errors view when the selected error has no file path.
    Bug Fixes
    - Fixed active backup plans disappearing from the UI on databases where the SQL plan_uuid column was empty. Plans are now deduped in memory by the planUUID loaded from JSON, then re-sorted by creation date.
    - Fixed the Arq Cloud storage dashboard showing "Inactive" for a plan that was actually active when more than one backup_plans row shared the same plan UUID. AllBackupPlans now returns one row per plan UUID, picking the row with the newest updated_time.
    - On a GCS retention 403 during cleanup, parse the retain-until time out of the error message and update the local locked_until so the same blob is not re-attempted every cleanup cycle.
    - Match the backup plan's WiFi network names case-insensitively when deciding whether the current network is included.
    - Rename the Arq Premium storage location after a trial converts to paid (it was still showing "Arq Cloud Storage free trial" after payment).
