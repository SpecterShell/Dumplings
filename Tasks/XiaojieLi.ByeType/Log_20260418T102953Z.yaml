  Key: ReleaseNotes
  Value: |-
    新功能
    - 处理模板系统：支持为每个快捷键绑定不同的处理模板（自动换行、翻译、自定义等），替代原有的固定文本优化功能
    - 4 个可配置快捷键：扩展为 2 个语音转录快捷键 + 2 个图像识别快捷键，各自独立绑定模板
    - 模板提示词管理：语音模板和图像模板均支持新增、编辑、删除和重置为内置
    优化
    - 统一数据目录：将配置文件（config.json）迁移至 Tauri 标准目录，与提示词、历史记录统一存放；旧版本升级时自动迁移，用户无感知
    - 重置为内置提示词时增加确认对话框，防止误操作
    - 录音状态气泡圆点样式优化
    - 移除 OpenRouter 预置模型 qwen3.6-plus:free
    修复
    - 修复 CI 构建在仅包含维护性 commit 时 release notes 生成失败的问题
    文档
    - README 更新：模板系统说明、快捷键表格扩展、提示词与模板系统章节重写
