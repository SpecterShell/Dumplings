  Value: |-
    qBittorrent v5.2.2 was released.
    SCAM WARNING: We don't provide qBittorrent via the Microsoft Store. Sometimes 3rd parties upload an application that is basically a ripoff of the qBittorent code wrapped with ads/monetization schemes. They don't provide their source code and violate the GPL. Be aware. Link to report is here.
