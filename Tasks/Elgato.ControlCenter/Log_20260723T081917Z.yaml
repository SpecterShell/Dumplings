  Key: ReleaseNotes
  Value: |-
    What’s new in Control Center 1.9?

    💡 Introducing Key Light Air MK.2
    Up to 2100 lumens of soft, edge-lit illumination in a size that fits any desk. Designed for creators, Key Light Air MK.2 is USB-C powered with touch controls and an adjustable clamp-on stand. App, Stream Deck, and MagSafe ready. Look great on camera — no studio required.
    🔗 Discover Key Light Air MK.2

    🛠️ Improvements & bug fixes
    - Lighting accessories connected via USB now report status changes in real time.
    - Simplified the initial connection process, so newly paired accessories are added and ready to use faster.
    - Connection status messages during setup now include the accessory name for clarity.
    - Improved the layout of the LED settings panel in device settings.
    - A warning is now shown when mDNS is disabled by system policy, making it easier to diagnose why accessories aren’t being discovered.
    - Fixed an issue that could prevent Windows from properly entering sleep or idle mode while a Key Light Neo was connected via USB.
    - Fixed a software update failure that could occur due to an expired certificate check.

