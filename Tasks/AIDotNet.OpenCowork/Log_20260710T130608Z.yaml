    What's Changed
    - feat: render Bash-execution artifacts as a card with Reveal/Open actions by @warischa in https://github.com/AIDotNet/OpenCowork/pull/126
    - fix(chat): 优化折叠动画并修复虚拟列表展开滚动跳动 by @cipherTing in https://github.com/AIDotNet/OpenCowork/pull/130
