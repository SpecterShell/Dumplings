  Key: ReleaseNotes
  Value: |-
    🔥 新增
    自动化测试：支持新增「新建 HTTP」与「导入 cURL」步骤。
    自动化测试：失败断言支持展示 JSON Path 路径信息。
    IF 与循环跳出逻辑：支持多条件组合（AND / OR）。
    飞书推送：支持将自动化测试个性化报告推送至指定群组。
    导入功能：支持导入 Apipost 用例及测试场景。
    ⚡ 优化
    内置函数：身份证生成支持指定前 6 位与出生年份；银行卡生成支持指定前 6 位与长度。
    迭代分支：合并请求支持展示审批人头像。
    OpenAPI：自动化测试相关接口能力优化。
