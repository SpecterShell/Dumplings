    - Update skill, fix some CLI bugs and paper cuts by @nblumhardt-ro in https://github.com/datalust/seqcli/pull/460
    - Fix error reporting in seqcli query by @nblumhardt in https://github.com/datalust/seqcli/pull/461
    - Nudge towards using signals in the skill by @nblumhardt-ro in https://github.com/datalust/seqcli/pull/462
