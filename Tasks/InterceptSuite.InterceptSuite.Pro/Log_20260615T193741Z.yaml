  Value: |-
    InterceptSuite v1.2.1
    📢 Important Announcement
    Starting with v1.2.1, InterceptSuite is now closed-source and Pro-only.
    The community/standard (free) edition has been discontinued. InterceptSuite is no longer open source.
    This decision was made to ensure the continued development and maintenance of both InterceptSuite and ProxyBridge. ProxyBridge remains fully open-source.
    For more details, see the project README.

    💼 Pro Edition
    A trial version is now available - no purchase required to evaluate InterceptSuite.
    Students, researchers, or individuals with a valid non-commercial use case can reach out to support@interceptsuite.com with the subject "Community License" to request a free Pro license.
    Purchase InterceptSuite Pro

    🛠️ Changes
    - Minor stability improvements and bug fixes.
    - UDP Session timeout fixed
