  Key: ReleaseNotes
  Value: |-
    What's New
    QUIC Protocol Interception
    InterceptSuite Pro now intercepts and decrypts QUIC traffic. All QUIC sessions appear in Proxy History just like HTTP/TLS - inspect, modify, and replay with the same workflow you already know.
    DTLS Interception
    Full support for DTLS traffic over UDP. Encrypted DTLS sessions are now decrypted and visible in Proxy History alongside your existing TCP/TLS captures.
    Project Management
    Open and save projects directly from the application. You can now launch InterceptSuite Pro with a project file path as an argument to jump straight into a saved session.

    Improvements
    - More reliable session cleanup - no stale sessions left behind after disconnect
    - Smoother application startup and shutdown
    - Minor UI refinements across dialogs and the main window

    Bug Fixes
    - Fixed a crash that could occur when closing active sessions
    - Fixed an issue where the application could hang on exit with active connections
