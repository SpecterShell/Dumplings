  Value: |-
    Proma v0.15.7 更新
    新功能
    - Pi Agent 成为新会话默认 Runtime — 新建 Agent 会话默认使用 Pi Runtime，同时保留 Claude Runtime 可选。(#1221)
    - Agent 会话星标 — 可为重要 Agent 会话添加星标，未星标时仅在悬停时显示操作入口。(#1232)
    Bug 修复
    - 默认开启模型思考 — 新建 Agent 会话会默认启用支持模型的思考能力。(#1220)
    - 优化 Agent 直接执行 — 调整默认执行策略，减少不必要的执行前阻塞。(#1223)
    - 修复 Codex 上下文窗口 — 为 GPT-5.4、GPT-5.5 和 GPT-5.6 使用正确的上下文窗口，确保自动压缩及时触发。(#1227, #1229, #1231)
    - 重试前清理旧错误 — Agent 重试时不再保留上一轮失败提示。(#1228)
    - 修复超宽 Mermaid 图滚动 — 现在可以滚动查看超出容器宽度的图表左侧内容。(#1224)
    - 修复 Token Plan 标题生成 — 通义千问与小米 Token Plan 渠道不再发送不兼容的 thinking 参数。(#1233)
    - 增强 Pi Runtime 稳定性 — 修复终端流中断恢复、协作子会话直接运行及豆包消息角色兼容问题。(#1225, #1236, #1237)
