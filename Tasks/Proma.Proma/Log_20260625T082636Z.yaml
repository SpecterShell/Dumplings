  Value: |-
    Proma v0.13.15
    对比基准：v0.13.4
    这一版围绕委派 / 协作子会话体系做了集中打磨：子会话以可折叠树嵌套在父会话下、可在标签切换器中直接选择、支持为子 Agent 单独指定模型，并修复了重启后委派恢复可能跨父会话泄露的隐患。自动任务侧修正了会话归属与 maxRuns 重置语义两处行为偏差。其余为图片编辑器渲染性能优化、Markdown 预览目录交互重做，以及一批侧栏 / 输入区 / 文件浏览器的视觉细节统一。
    新功能
    - 委派子会话侧栏树嵌套 — 带 parentSessionId + sourceDelegationId 的委派子会话不再平铺在列表中，而是以可折叠树嵌套于父会话之下：父行展示聚合运行状态指示灯与 completed/total 子会话计数，一眼看清整组委派进度。pin / archive 父会话时级联同步其全部委派子会话，并在级联中途失败后重新拉取磁盘真实状态，避免侧边栏与磁盘不一致直到下次重载。(#922)
    - 委派 Agent 支持模型选择 — 发起委派时可为子 Agent 单独指定模型，让不同子任务按需匹配能力与成本，不再被迫沿用父会话模型。(#938)
    - 委派会话进入标签切换器 — 委派子会话现在会出现在标签（tab）切换器中，可像普通会话一样直接切换进入。(#923)
    - Markdown 预览目录改为手动开闭 — 差异预览的 TOC 目录从「localStorage 持久化 + 窄屏自动收起」改为运行期记忆 + 用户手动控制：收起态在预览区左侧提供「展开目录」chevron，展开态目录头部提供「收起目录」按钮。同时修复标题提取——useTocHeadings 在容器为 null 时清空 headings 避免持有已卸载 DOM，并新增 3 个初始重提取定时器补偿 Shiki 高亮与图片懒加载带来的异步 DOM 变更。(#926)
    Bug 修复
    - 协作委派恢复跨父泄露修复 — 重启后按全局唯一 sourceDelegationId 恢复委派会话时，可能仅凭 UUID 就恢复到另一个父会话的委派，造成跨父泄露。修复后 getPersistedDelegationSession 仅在会话无记录父会话、或其父会话与调用方匹配时才接受该 UUID 回退；recoverDelegationRecordFromSession 优先采用持久化的 session.parentSessionId（回退到 ctx），与 getDelegationResult 一致地解析归属。(#936)
    - 自动任务会话始终留在自动任务区 — 此前向自动任务会话发送消息会触发「毕业」（automationGraduated），使其从「自动任务」分组静默移入工作区普通会话列表，造成困惑。修复后自动任务会话始终留在「自动任务」分组，毕业时弹出 toast 明确提示会话已移动；调度器内部仍用 automationGraduated 标记避免复用已被用户介入的会话来跑后续自动任务。(#918)
    - maxRuns 重置语义修复 — 当用户调高 maxRuns 让已完成 / 已停用的自动任务再跑一轮时，updateAutomation 会重置运行次数配额，却把任务留在 inactive 且 nextRunAt 过期，导致永不触发。修复收紧重置语义，并在 SKILL 指引层补充：当意图是恢复已停止 / 已完成任务时，应在同一次 update_automation 调用里一并设置 active:true。(#925)
    - 点击已可见会话不再被强制置顶 — 此前为「从搜索打开旧会话需立即可见」引入的 pinnedCurrent，会把 activeSessionId 对应会话强制提到顶部，副作用是本就落在最近窗口内的会话被点击后也被抽出置顶。修复后 fillSessions 独立按 updatedAt 倒序计算，currentSession 仅在既非活跃、又不在 fillSessions 中时才补入——既保留「打开超窗 / 被截断旧会话立即可见」，又让已可见会话点击后保持原位。(#920)
    - 图片编辑器画布渲染优化 — 引入 devicePixelRatio 缩放使 Retina 屏显示更锐利，棋盘格底纹改用 createPattern 缓存避免逐帧双重循环，拖拽 / 触摸移动时用 requestAnimationFrame 节流重绘并在抬手时取消挂起 RAF 强制最终重绘；同时图片未加载完成时禁用「发送」按钮、优化笔刷大小指示器对比度。(#889)
    - 统一侧栏与输入区配色 — 修正动态主题类被裁剪的问题，为浅色主题输入区着色，并统一侧栏控件底色与对比度，使整体配色更协调。(#917)
    - 移除 minimap 搜索框聚焦光边 (#927)；文件浏览器悬停时显示树形引导线 (#933)；降低折叠内容提示的视觉噪声 (#930)；简化标签页运行状态指示器 (#932)；修复侧栏委派开关 hover 态并调整其位置 (#937, #939)。
