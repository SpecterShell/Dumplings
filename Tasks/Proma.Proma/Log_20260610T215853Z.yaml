  Value: |-
    Proma v0.12.1
    对比基准：v0.12.0
    这一版带来两件事：Claude Fable 5 加入 1M 上下文支持，以及全面重写的教程文档。
    新功能
    - Claude Fable 5 支持 1M 上下文 — claude-fable-5 现已加入 Proma 的百万上下文支持名单。选用 Fable 5 时，Proma 会自动启用 context-1m-2025-08-07 beta header，上下文窗口显示也同步更新为 1,000,000 tokens，与 Sonnet 4.6、Opus 4.6 / 4.7 / 4.8 等已支持模型保持一致
    - 教程升级为独立标签页 — 教程内容全面重写（tutorial-v2.md），并以独立 Tab 的方式打开，替代原先弹出 Sheet 的体验。无论从启动引导页完成 onboarding、点击侧边栏的「教程」入口，还是通过设置页导航，都会在主界面打开一个带目录（TOC）的沉浸式阅读视图，不再遮挡当前工作区
