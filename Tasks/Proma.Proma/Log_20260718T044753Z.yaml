  Value: |-
    Proma v0.15.0 更新
    新功能
    - 新增 Pi Agent Runtime — Agent 输入框下方可切换 Claude / Pi 内核；Pi 可使用所有已启用的模型渠道，并复用工作区、Skills、用户 MCP、协作子 Agent 与权限能力。(#1170, #1175, #1178, #1180)
    - 定时任务支持 Pi 内核 — 新建或编辑自动任务时可选择 Pi，并使用任意已启用的模型渠道执行。(#1174)
    - 支持 OpenAI Responses API 渠道 — 可配置使用 OpenAI Responses 协议的模型，并完善工具调用解析稳定性。(#1176)
    - Pi 内核支持联网与浏览器工具 — 可使用内置联网搜索及 Chrome DevTools MCP 工具完成网页相关任务。(#1179)
    Bug 修复
    - 修复 Pi 运行时打包依赖 — 安装包会正确携带 Pi 运行时所需依赖，避免发布版本启动时找不到模块。
    - 修复嵌套区域滚动影响主窗口 — 滚动锁定仅作用于对应容器，避免嵌套滚动时页面滚动异常。(#1182)
    - 调整记忆设置位置 — 将记忆设置移动至设置页底部，减少与常用配置的干扰。(#1181)
    - 优化 Agent 界面细节 — 修正 Plan 模式输入框虚线圆角，并保持思考文本为正常字重。(#1172, #1173)
