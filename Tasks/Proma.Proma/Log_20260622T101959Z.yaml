  Value: |-
    Proma v0.13.0
    这一版引入了 Nowledge Mem 本地记忆，把图片预览升级成能直接编辑的画布，还让多个 Agent 之间能更顺畅地协作干活。另外修了一堆输入框和界面上的小毛病，用起来更跟手。
    新功能
    - 引入 Nowledge Mem 本地记忆 — Chat 里新增了 Nowledge Mem 记忆卡片，配置一次之后，对话就能记住你的偏好和过往内容，换个工具、换个会话也不会忘。配置过程有清单引导，且无需登录或注册账号。
    - 图片可以直接编辑了 — 点开任意图片，现在能裁剪、旋转、画框、涂鸦（5 种颜色、2 种笔触），改完直接发回对话。无论是 Chat 还是 Agent 里的图片都支持，高分屏下也清晰不糊。
    - 多 Agent 协作更顺 — Agent 把任务委派给子 Agent 时，主 Agent 现在能替子 Agent 回答弹出的提问、也能在子任务结束后接着追加新要求。子 Agent 卡住时也会及时通知到主 Agent，整个协作过程不容易卡死。
    - 自动任务单独归类 — 定时任务多了之后，这些自动产生的会话会被收进侧栏一个专门的「自动任务」分组，不再和你手动开的会话混在一起。你一旦在某个自动会话里手动发消息，它就会「转正」回到普通列表。
    - 补全面板更清楚 — 输入 /、#、& 弹出的补全面板都加了标题（分别是调用 skill、MCP 服务、引用会话），并标注了快捷键，一眼就知道当前在选什么。
    - 新增通义千问渠道 — 新增 qwen-anthropic 渠道，支持千问 1M 超长上下文，切换后自动填好默认模型。
    - 预览支持文档元信息 — Markdown 文件开头的元信息（frontmatter）现在能在预览里正常显示了。
    体验优化与修复
    - 第三方代理下更省、更快 — 修复了经第三方代理 / 网关使用时缓存命中率骤降的问题，调用更稳定、成本更低。
    - 输入框更跟手 — 修复了斜杠命令弹出后按回车会误发消息、Shift+Enter 无法换行等问题；Chat 的模型选择器也移到了工具栏最左侧，和 Agent 模式保持一致。
    - 界面更流畅 — 移除了若干弹窗和按钮上拖慢渲染的毛玻璃效果，低配机器上不再卡顿；三块面板之间的阴影也调得更统一协调。
    - 一些细节修复 — 修好了模型图标偶尔显示错误、从搜索打开旧会话不立即出现在侧栏、预览切换后滚动位置错位、重启后分屏偏好丢失、点击推荐消息却发出草稿等问题。
