  Value: |-
    Proma v0.14.20 更新
    新功能
    - 草稿区支持待办清单与无序列表 — 底部工具栏新增「待办清单」「无序列表」按钮，一键插入/切换。勾选后正文置灰划线，各外观主题自动适配配色；排版样式作用域限定在草稿区，不影响其他扩展。空待办项光标显示也已修复。(#1130)
    - Agent 会话引用列表可展开 — 扩展了 Agent 会话引用列表的展示能力，方便查看和管理引用的历史会话。(#1139)
    - Agent 模型支持 1M 上下文 — 支持百万 token 级别的大上下文模型，适配超长对话和大型代码库场景。(#1138)
    Bug 修复
    - 代码预览支持换行切换 — 代码预览面板新增自动换行开关，长代码行不再需要横向滚动，阅读更舒适。(#1142)
    - 修复消息正文内联文件引用无法预览与定位 — 消息正文里内联的文件引用（如 user-profile.md）现在能正确识别为可点击的文件标签，点击预览和"在文件管理器中显示"都能正常工作，不再静默失败。(#1136)
    - 修复钉钉机器人 ID 更新 — 修复了钉钉机器人配置更新时 ID 处理异常的问题。(#1140)
    - 修复钉钉机器人会话绑定迁移 — 修复了钉钉机器人会话绑定数据迁移逻辑，改用原子写入防配置损坏，并补充了合并去重测试。(#1129)
