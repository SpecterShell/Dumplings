  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've added support for @vue/language-server 3.0.0 (WEB-73932).
    - We've fixed extension matching and path building for the exports field in package.json (WEB-70793).
    - We've improved code parsing in Svelte files, so quotes inside inline expressions, #await :then without a variable name, in-attribute expressions, and special characters in text expressions are now recognized (WEB-70810, WEB-73120, WEB-72801, WEB-62966).
    - We've added support for Svelte 5 named snippets, so they are no longer erroneously reported as Unused Function Title (WEB-70432).
    - We've added support for Svelte reroute hooks (WEB-70333).
    - We've implemented a service-powered type engine (SPTE) for Vue with Vue Language Service version 3.0 (WEB-74847).
    - We've fixed the types shown for Vue.js variables on hovering variables inside <div></div> (WEB-74528).
    - Color preview for CSS color() and color-mix() now works in SASS, SCSS, and Less files (WEB-76917, WEB-76104).
    - We've introduced a DSL to define symbol patterns (WEB-77679, WEB-77673).
    - We've improved the PolySymbolDocumentationTarget.create method (WEB-77646).
    - We've removed the PolySymbol.adjustNameForRefactoring method (WEB-77644).
    - We've fixed a problem with StylusPreFormatProcessor being not ready for invalid PSI (WEB-77480).
    - We've generalized WebFrameworkTestCase and moved it to the PolySymbols test framework module (WEB-77461).
    - We've slightly optimized dependency processing in Angular2SourceSymbolCollectorBase (WEB-77185).
    - We've improved search performance for JavaScript test frameworks (WEB-77184).
    - We've fixed the behavior of pinned temporary run/debug configurations, so they no longer disappear when the limit for temporary configurations is exceeded (IJPL-61104).
    - We've got rid of popping up long read action in HighlightInfoUpdaterImpl .addEvictedInfos (IJPL-235455).
    - Menu bars on Windows can be now accessed by pressing Alt (IJPL-58454).
    - We've fixed a problem with the Conflicting Plugin dialog not responding (IJPL-163412).
    - We've fixed the digest authentication in the HTTP client (IJPL-149024).
    - We've fixed a problem with code fragments' disappearing on dragging and dropping then onto their own position (IJPL-235895).
    - We've fixed several IDE freezes of various origins (IJPL-224542, IJPL-203153, IJPL-242758).
    - We've fixed the Merge all project windows action (IJPL-238788).
    - Traffic light icons are now colored in the inspection widget (IJPL-239011).
    - We've fixed the appearance and behavior of the floating code toolbar, so it no longer overlaps debugger popups (IJPL-182321).
    - We've got rid of an exception that occurred when opening the author list in GitHub Pull Requests without push permissions (IJPL-74160).
    - We've added suggestions and auto-completion for @mentions in comments to GitHub Pull Requests comments (IJPL-74258).
    - We've fixed the Accept Theirs/Accept Yours functionality in the Merge popup (IJPL-241824).
    - We've fixed the Find/Replace in Files functionality, so the search results in the Find tool window are shown expanded to the selected match with the focus on it (IJPL-188999).
    - A view link is shown for long strings when a second vertical monitor is used during a debugging session (IJPL-85419).
    - We've introduced multiple improvements to the Search Everywhere funtionality (IJPL-237834, IJPL-234737, IJPL-243626, IJPL-239455, IJPL-243357).
    - We've bundled Jackson 3 while Jackson 2 is now deprecated (IJPL-218825).
    - We've implemented a possibility to download JDK for the WSL and Docker environments (IJPL-243505).
    - We've restored the behavior of the Switcher, so the list only shows currently open files after restarting the IDE (IJPL-243258).
    - We've fixed a couple of memory leaks (IJPL-241783, IJPL-240870, IJPL-229273).
    - We've fixed a problem with the German dictionary suggesting English words (IJPL-241768).
    - We've fixed a problem with missing __sprintf_chk and __vsnprintf_chk symbols for selfcontained/lib/libz.so.1 (IJPL-241578).
    - We've fixed a problem with Pending events is empty being logged repeatedly (IJPL-241570).
    - Quick fixes for typos are now shown in the list again (IJPL-241329).
    - We've added a CLI-friendly Windows launcher (IJPL-240730).
    - The Build finished notification group is now available in Settings | Notifications (IJPL-240726).
    - We've improved performance when typing in large Markdown files (IJPL-239157).
    - We've restored the correct processing of comments in the diff view of the Merge Requests dialog, so only up-to-date comments are shown (IJPL-238105).
    - We've fixed a couple of flaky tests (IJPL-237538).
    - We've allowed updates of bundled plugins for JetBrains OS Integration (IJPL-237488).
    - We've fixed a problem with the unified Ruby plugin being only installed on the host (IJPL-220069).
    - We've improved the appearance of the Installed tab of the Settings | Plugins page, so installed plugins that match a search query are now shown first in the list (IJPL-200825).
    - We've restored the behavior of Live Templates created with groovyScript() (IJPL-241581).
    - We've fixed launching wsl.exe -d Ubuntu via IJENT in WSL (IJPL-236576).
    - We've restored the possibility to view diff in an external tool (IJPL-241256).
    - We've got rid of numerous excessive thread dumps (IJPL-241850).
    - We've restored the Update option on the context menu of the active branch (IJPL-240184).
    - We've restored the behavior of the Esc key on Linux, so it removes focus from the Floating and Window view modes (IJPL-236926).
    - We've restored the behavior of the Save console output to file option, so it takes effect during a debugging session (IJPL-241921).
    - HTML files that are exported from Markdown files retain the original theme styling on opening in the browser (IJPL-236346).
    - We've restored the behavior of the Processes tool window, so it is hidden automatically on stopping a process and restarting the IDE provided that the Window | Processes | Auto Show setting is enabled (IJPL-232319).
    - We've restored the external link image in the GotIt popup with a dark theme used (IJPL-229861).
    - We've restored the Save to dictionary spellchecking inspection option (IJPL-243431).
    - We've restored the appearance of stripe icons, so they retain the original size when marked with an indicator of a running process (a dot) (IJPL-242766).
    - We've got rid of rebase failure with git config commit.cleanup = whitespace (IJPL-241829).
    - We've fixed a problem with the Natural Languages plugin preventing refactoring (IJPL-241563).
    - We've fixed white blinking of menus in dark themes (IJPL-241229).
    - We've restored the correct grouping of Grammar Inspection results as Typos (IJPL-241175).
    - We've supplied the thin-client icon in the frontend About dialog with an RD badge (IJPL-241064).
    - We've fixed the issue with the changes to tab titles in the Terminal being ignored despite the enabled Show application title in tab name option (IJPL-240838).
    - We've fixed the positioning of the evaluate-on-hover popup regardless of the length of the string variable to be evaluated (IJPL-239540).
    - We've restored the Apply button for port forwarding and the partially hidden scrollbar in the Backend Status Details dialog (IJPL-239036, IJPL-238649)
    - We've restored the behavior of shortcuts with Alt (IJPL-238972, IJPL-238771,IJPL-238661).
    - We've got rid of false Modified indication for some settings (IJPL-238830).
    - We've restored the behavior of the internal Dump Plugin Descriptors action, so it now writes data in a formatted file (IJPL-237885).
    - We've restored the appearance and behavior of the Structure view, so nodes no longer disappear in it even if the corresponding files or folders are opened from the Project tool window (IJPL-237419).
    - We've fixed the Cannot invoke "java.util.Collection.add(Object)" because "this.dumpTasks" is null exception (IJPL-235442).
    - We've restored the appearance and behavior of the Editor color scheme list, so the text in it changes on changing the theme (IJPL-234699).
    - We've fixed multiple problems that occurred in the Remote Development mode (IJPL-233445, IJPL-239124, IJPL-235374, IJPL-239049, IJPL-237325, IJPL-243423).
    - We've fixed the scope, pagination, and sorting in the Navigate | File list (IJPL-227442).
    - We've restored the mini scroll bar on hovering the editor scrollbar and rolling the mouse wheel (IJPL-224268).
    - We've restored the Show Log in File Manager menu and the possibility to open files or folders in an external file manager when running the IDE from a container on Linux (IJPL-158198).
    - We've added support for footnotes in Markdown (IJPL-91141).
    - We've added the ability to resize the Run widget manually (IJPL-61101).
    - We've improved ranking in plugin search results (IJPL-7519).
    - We've added support for action root blocks in Terraform files (IJPL-219261).
    - We've added support for $random/faker dynamic variables with configurable locale in the HTTP client (IJPL-180243).
    - We've added support for Junie in MCP autoconfiguration (IJPL-241772).
    - We've improved the LSP integration by adding support for on-the-fly formatting (IJPL-189559).
    - We've introduced a SyntaxTreeBuilder#advanceToEOF function to consume all tokens in a single call (IJPL-243452).
    - We've added a public API to register ModalityStateListener via ModalityStateListener.TOPIC (IJPL-242986).
    - We've added support for passing JVM options in the Update IDE from Sources process (IJPL-242945).
    - We've improved Git performance by using --pathspec-from-file for long path lists instead of chunking them (IJPL-242465).
    - We've added indicators of progress states to JStack dumps (IJPL-240231).
    - We've added support for comparing exclusion conditions in the workspace model (IJPL-237424).
    - We've added an inspection to prevent casting open services to implementation classes (IJPL-237268).
    - We've enabled the use of the Switcher for files during background write actions (IJPL-230794).
    - We have deployed IJENT on Windows and implemented a File Watcher for this environment (IJPL-231615, IJPL-236948).
    - We've added an API to terminate entire process groups on POSIX systems and thus ensure proper subprocess termination (IJPL-220691).
    - We've made disabled context menu actions visible during indexing and provided a possibility to view their description in tooltips (IJPL-210693).
    - We've added support for all primitive types in codegen-impl (IJPL-14741).
    - We've added a context action to show descriptions of regex symbols and groups (IJPL-235313).
    - We've added a possibility to set JVM options globally via the IJ_JAVA_OPTIONS variable (IJPL-48989).
    For more details, please see the release notes.
