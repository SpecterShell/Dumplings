  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've restored the behavior of the JavaScript debugger, so HTML pages are successfully opened and loaded in Chromium, with the debugger stopped at the breakpoint (WEB-78446).
    - We've got rid of a com.intellij.diagnostic.PluginException: Can't instantiate configurable for !settings.javascript.linters.eslint.configurable.name! exception (WEB-78422).
    - We've fixed the width of smileys in the Terminal (IJPL-177936).
    - We've fixed the appearance and behavior of items in context menus of files and folders in the Project tool window (IJPL-241544).
    - We've added support for using a custom PsiElement class for custom Markdown IElementType implementations (IJPL-244925).
    - We've improved the appearance of the Services popup (IJPL-247148).
    - We've made the file counter in the new Diff toolbar clickable while indexes are being built (IJPL-247522).
    - We've restored proper API visibility for io.netty classes that were incorrectly marked as @ApiStatus.Internal (IJPL-247841).
    - We've restored the visibility of the SmartElementDescriptor Platform API (IJPL-247864).
    - We've removed the internal status from the GistAstMarker Platform API (IJPL-248008).
    - We've restored the visibility of the ActionsOnSaveFileDocumentManagerListener.ActionOnSave class (IJPL-248128).
    - We've restored the visibility of the BaseInjectedFileChangesHandler class (IJPL-248131).
    For more details, please see the release notes.
