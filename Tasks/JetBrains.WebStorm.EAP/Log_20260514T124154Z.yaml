  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've added a Disable Source Maps icon to the toolbar of the Debug tool window, thus making it possible to switch between source-mapped code and original code (WEB-61256).
    - We've fixed incorrect parsing of quotes in Svelte markup comments, so they are no longer erroneously reported as unclosed (WEB-68668).
    - We've fixed a false positive Unused property warning in TypeScript code (WEB-76748).
    - Remote Development is no longer in the Beta state and supports the required use cases (WEB-77898).
    - We've got rid of a threading assertion that occurred when calculating the WEB context (WEB-77805).
    - We've fixed a problem with enabling Coding assistance for Node.js (WEB-77774).
    - We've got rid of a NullPointerException that was thrown in the New Project dialog when creating Angular applications (WEB-77686).
    - We've fixed a false positive Nested selector can't start with an identifier error reporting in CSS files (WEB-77672).
    For more details, please see the release notes.
