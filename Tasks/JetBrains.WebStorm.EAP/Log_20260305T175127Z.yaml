  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've added support for @attach Svelte 5 attachements (WEB-73331).
    - We've made it easier to provide generic properties in implementations of the PolySymbols interface (WEB-76927).
    - We've restored the behavior of the reflective getter in PolySymbolPropertyGetter, so it translates the java.lang.reflect.InvocationTargetException exception to its target (WEB-77003).
    - We've moved the Explicit types inspection to the service-powered type engine (WEB-76832).
    - We've added support for running Vitest tests from the editor in Angular projects (WEB-76536).
    - We've implemented support for regex with escaped slashes in Angular templates (WEB-76924).
    - We've fixed false-positive Mismatched parameters error reporting for CSS variables inside .scss files (WEB-41093).
    - We've got rid of irrelevant var() completion suggestions in some functions in .sass/ .scss files (WEB-65240).
    - We've got rid of duplicates in completion lists for optional properties in TypeScript-Go projects with the service-powered type engine enabled (WEB-76345).
    - We've fixed erroneous reporting of Angular signal effects as unused (WEB-65078).
    - We've improved support for NgRx effects, so effects created by createEffect are no longer shown as unused (WEB-55172).
    - We've fixed erroneous reporting of ionic and `ngAfterViewInit` lifecycle hooks as unused in Angular projects (WEB-41604, WEB-59499).
    - We've restored error highlighting for Angular two-way bindings to readonly properties (WEB-76725).
    - We've fixed a problem with HtmlCompletionContributor#shouldTryDeselectingFirstPopupItem interfering with behavior of completions added to HTML by third-party plugins (WEB-76438).
    - We've restored the Share project on GitLab functionality (IJPL-236940).
    - We've restored showing the Screen Reader Detected dialog on IDE start (IJPL-236574).
    - Pressing Alt on Windows now activates menu bars instead of bringing forward context menus (IJPL-58454, IJPL-47743).
    - We've improved the usability of the Terminal (IJPL-235924, IJPL-232564, IJPL-221853, IJPL-221050, IJPL-236425, IJPL-236415, IJPL-236348, IJPL-235214, IJPL-233771, IJPL-235142).
    - We've restored accessibility of the Quick Documentation popup with Ctrl+Q (IJPL-162213).
    - We've fixed a UI freeze that occurred on attempts to open large files in the editor after running the Update Project command (IJPL-235355).
    - The undo dump in case of corruption is now saved separately in the frontend-undo-corruption-dump.txt and in the backend-undo-corruption-dump.txt files (IJPL-236542).
    - We've suppressed resurrecting for `Job`-bridging `ProgressIndicator` (IJPL-236372).
    - We've improved the Perforce integration by fixing a problem with endless refresh of local changes (IJPL-236557).
    - We've removed beforeAllDocumentSaving and beforeAnyDocumentSaving from the write action (IJPL-235912).
    - We've merged the functionality of the Markdown for JetBrains Client plugin into the main Markdown plugin (IJPL-180080).
    - We've fixed the appearance and contents of the suggestion list in the Action tab of the Search Everywhere popup (IJPL-236533, IJPL-235909).
    - We've restored the appearance and behavior of the modal Welcome screen, so it no longer changes its position after rendering in the Remote Development mode (IJPL-235658).
    - We've fixed a freeze that occurred when searching for a commit in the Git Log tab (IJPL-234667).
    - We've fixed the appearance and behavior of the Progress bar, so it displays processed commits during cherry-picking (IJPL-235294).
    - We've improved indexing by using WorkspaceFileIndexChangedEvent for generating module iterators (IJPL-208268).
    - We've fixed the Find Action action, so it no longer opens the Text tab (IJPL-236203).
    - We've fixed the behavior of the Changes in the Split mode (IJPL-236745).
    - We've fixed the appearance and behavior of the Git Local Changes tab in the Remote Development mode, so the list of Change Lists gets the focus (IJPL-236515).
    - We've fixed the behavior of the Git Log editor tab, so it is restored after restart (IJPL-235688).
    - We've got rid of extraneous visual artifacts of the smooth caret that appeared on dragging the mouse (IJPL-232914).
    - We've added a possibility to attach an assignee or a reviewer to a GitHub pull request (IJPL-236234).
    - We've unified the UI of hover states in the main menu (IJPL-176136).
    - We've fixed performance degradation that took place when opening a file in the editor (IJPL-235380).
    - We've improved the Git integration by introducing case-insensitive matching for fatal: Not a valid object name and thus ensuring compatibility with future Git versions (IJPL-236313).
    - We've restored the possibility for the embedded frontend to start (IJPL-236246).
    - Caret animations are now disabled in RDP sessions (IJPL-233066).
    - We've made the resize cursor more visible, thus making it easier to resize popups (IJPL-235511).
    - We've fixed a problem with saving IDE settings in the Remote Development mode, so the Enable SSH agent Forwarding& setting is preserved on reconnecting to the host (IJPL-185269).
    - We've fixed the appearance and behavior of the Search Everywhere popup, so the preview window no longer disappears on navigating between tabs (IJPL-227351).
    - We've fixed a problem with some breakpoints' being disabled on editing comments during a debugging session (IJPL-235318).
    - We've restored the proper colors to render the GateWay and RemDev menus (IJPL-235444).
    - We've fixed the appearance of shortcut labels in the Presentation Mode with the Islands Dark theme enabled (IJPL-237225).
    - We've got rid of extraneous artifacts that appeared on hovering over main toolbar widgets in the inactive window with the Islands theme enabled (IJPL-235435).
    For more details, please see the release notes.
