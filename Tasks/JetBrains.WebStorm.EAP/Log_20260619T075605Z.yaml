  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've fixed an issue with CSS/SCSS absolute import paths being converted to relative paths when files with import statements are moved (WEB-37434).
    - We've restored the possibility to launch a debug session with Ctrl+Shift+Click (WEB-76695).
    - We've got rid of a false positive error reporting that occurred on attempt to debug an Angular application with a JavaScript Debug run/debug configuration (WEB-75974).
    - We've fixed a problem with get_project_dependencies returning an empty list instead of a list of project's npm dependencies as declared in package.json (WEB-76561).
    - We've restored error highlighting and related editor functionality in .svelte files when using newer versions of svelte-language-server (WEB-77974).
    - We've added support for Svelte 5.56 {const ...} and {let ...} declaration tags (WEB-78239).
    - We've improved updating of import statements in SCSS/Sass files, so glob patterns are preserved when a file with such import statements is moved (WEB-20400).
    - Renaming a directory no longer causes removing aliases from its imports (WEB-64881).
    - We've got rid of duplicated file extensions in import statements (WEB-74720).
    - We've fixed a problem with alias-based import statements being replaced with relative paths on renaming or moving files or directories (WEB-74773, WEB-62766).
    - We've fixed code completion in ESM projects, so required file extensions are added in import statements automatically (WEB-74725).
    - We've restored the possibility to select other browsers than Chrome in NPM run configurations (WEB-76809).
    - We've unified the remote development customization by removing an extraneous WebStorm Frontend Customization plugin (WEB-78336).
    - We've fixed incorrect rendering of JSDoc links with import references, so links are now navigable (WEB-78356).
    For more details, please see the release notes.
