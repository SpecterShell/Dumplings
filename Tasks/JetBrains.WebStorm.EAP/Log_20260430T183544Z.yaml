  Key: ReleaseNotes
  Value: |-
    What's fixed:
    - We've fixed highlighting of interfaces and type parameters in remote environments (WEB-75991).
    - We've implemented auto-imports for path aliases with wildcards in their names in tsconfig.json (WEB-62873).
    - We've added support for a service-powered type engine (SPTE) in TypeScript files with the Svelte plugin enabled (WEB-77053).
    - We've fixed scrolling in type hint tooltips (WEB -42467).
    - We've fixed import for components in Svelte monorepos, so suggestions for components from other projects are used (WEB-77699).
    - We've fixed parsing for arrow function overrides in JSDoc, so they are no longer incorrectly reported as unimplemented abstract methods (WEB-77490).
    - We've restored the behavior of tags with Angular function names, so they no longer change their positioning in HTML code unexpectedly and without any reason (WEB-77403).
    - We've extended Angular integration by adding support for @case following a @default case within the same group (WEB-77357).
    - We've fixed highlighting for fields with no call signature in their types, so they are no longer incorrectly highlighted as methods (WEB-77329).
    - We've fixed type inference issues in RxJS operators (WEB-74813).
    - We've got rid of unnecessary unresolved warnings in JavaScript code (WEB-58209).
    - Menu bars on Windows can be now accessed by pressing Alt (IJPL-58454).
    - We've fixed a problem with code fragments' disappearing on dragging and dropping it onto its own spot (IJPL-235895).
    - We've fixed several IDE freezes of various origines (IJPL-224542, IJPL-203153, IJPL-242758).
    - We've fixed a problem with the German dictionary suggesting English words (IJPL-241768).
    - We've improved performance when typing in large Markdown files (IJPL-239157).
    - We've allowed updates of bundled plugins for JetBrains OS Integration (IJPL-237488).
    - Updates of bundled plugins are now successfully recognized by the host in the Remote Development mode (IJPL-235374).
    - We've fixed a problem with the unified Ruby plugin being only installed on the host (IJPL-220069).
    - We've improved the LSP integration, so on-the-fly formatting is supported (IJPL-189559.
    - We have deployed IJENT on Windows (IJPL-231615).
    - We've restored the behavior of Live Templates created with groovyScript() (IJPL-241581).
    - We've restored the possibility to view diff in an external tool (IJPL-241256).
    - We've got rid of numerous excessive thread dumps (IJPL-241850).
    - We've restored the correct grouping of Grammar Inspection results as Typos (IJPL-241175).
    - We've fixed the issue with the changes to tab titles in the Terminal being ignored despite the enabled Show application title in tab name option (IJPL-240838).
    - We've restored the behavior of shortcuts with Alt (IJPL-238972, IJPL-238771,IJPL-238661).
    For more details, please see the release notes.
