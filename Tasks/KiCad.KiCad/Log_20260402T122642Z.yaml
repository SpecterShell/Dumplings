- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    It’s the turning of the seasons today, and to celebrate, the KiCad project is proud to announce the release of Version 10! This release is packed with new features, improvements, and hundreds of bug fixes. We hope you enjoy it! Head to the KiCad download page to get your copy (note that some packages may still be in the process of being released at the time this announcement is published). Our thanks go out to everyone who contributed to KiCad this past year. Whether your contribution was large or small, writing code, submitting bug reports, improving our libraries and documentation, or just supporting us financially: your help made a difference.
    Read on to see some of the highlights of the new version!
