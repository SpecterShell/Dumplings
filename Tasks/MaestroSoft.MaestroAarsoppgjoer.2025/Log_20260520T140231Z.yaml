  Value: |-
    Publisert 20.05.2026

    Generelt om denne versjonen

    Kraft
    Det er gjort ytelsesforbedringer generelt i skjermbildet for kraftverk, og i enkelte spesifikasjoner/forstørrelsesglass.

    Gevinst- og tapskonto
    Opprettet nytt valg i rediger som tillater at inntektsføring eller fradragsføring fra gevinst- og tapskonto er i samsvar med den oppgitte regnskapsperioden. Valget er kun synlig dersom regnskapsperioden som er oppgitt er ulik 12 måneder.

    Offentlig regnskap
    Det har vært problemet med at noten aksjonærer - detaljert har vært svært treg for selskaper som har stort aksjonærregister. Hastigheten er forbedret.

    Deltakers andel
    Forbedret utskrift av felter som gjelder for NOKUS. Nå er det bedre overlapp mellom skjermbildet og utskrift. Videre er feil i delingstjenesten som feilaktig overføre verdier for NOKUS fra selskapsmelding til deltakers andel løst.

    Merket utskrift
    Problemet med feilmelding 'Out of memory' ved eksport til Excel fra Merket utskrift er løst.

    Brutte fillenker
    Feilmelding om brutte fillenker ved åpning av datasett kan løses ved å bruke knappen Fjern ugyldige blob-koblinger i skjermbildet til Dokumentsenter. Feilmeldingen er borte når datasettet åpnes på nytt.
