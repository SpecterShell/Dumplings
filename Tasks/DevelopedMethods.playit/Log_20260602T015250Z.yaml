  Key: ReleaseNotes
  Value: |-
    Ignore UDP Connection Reset errors and protect against excess UDP error logging
    Notes
    - on ConnectionReset we would tear down the UDP connection and let it be cleaned up
    - can happen when the origin is no longer online or firewall is blocking
    - better to treat as dropped packet so when origin is back we can immediately return to processing data
