  Value: |-
    Improvement: AI Helper - Model name is now shown in the AI Helper tab.
    Improvement: Json View - It is now possible to limit the number of object and array elements shown in Json View in Preferences. This is particularly useful for very large arrays or deeply nested fields.
    Fix: Connection Tree - Fix an issue where certain context menu options would be disabled when they should not.
    Fix: Vulnerability - Update third party dependency to fix GHSA-72hv-8253-57qq.
    Fix: Vulnerability - Update third party dependencies to fix CVE-2026-1605.
