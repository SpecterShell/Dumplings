- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New: AI Helper - Studio 3T now lets you generate MongoDB queries from natural-language questions, right where you work in the sidebar.
    Improvement: Icons - Added higher resolution versions to a lot of icons so they no longer appear blurry for certain resolution and scaling setups.
    Fix: Aggregation Editor - A date hashtag (e.g. #last12calmonths) in an aggregation query was not handled correctly when reused from Export to the Aggregation Editor.
    Fix: Vulnerabilities - Update third-party dependency to fix CVE-2026-44249, CVE-2026-45416, CVE-2026-45674, and CVE-2026-47691
