Version: 2026.9.0
Installer:
- InstallerUrl: https://download.studio3t.com/studio-3t/windows/2026.9.0/studio-3t-x64.zip
Locale:
- Key: ReleaseNotesUrl
  Value: https://files.studio3t.com/changelog/changelog.txt
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New: AI Tools - The AI Helper now has access to a set of tools capable of performing several MongoDB related actions, the complete set of tools is: list-connections, connect, list-databases, list-connections, explain-query, analyze-schema, list-indexes, collection-statistics, query. These tools are also available through a local MCP.
    New: Local MCP - Studio 3T can now create a local MCP server that capitalizes on its existing connections and tools to support AI agents with MongoDB related queries.
    Improvement: OIDC - Caching tokens is now optional. This setting can be changed in the Behavior settings tab.
    Fix: OIDC - Fix an issue where the Shell (IntelliShell) failed to start for OIDC connections to on-premises MongoDB instances with custom hostnames.
ReleaseTime: 2026-05-06
