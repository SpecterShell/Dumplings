  Key: ReleaseNotes
  Value: |-
    Changelog
    Improvements
    - Upgraded Electron to v41.1.1 (Chromium 146.0.7680.166). :electron:
    - Proxy settings: auto-parse URLs pasted into the host field.
    - Import apps from browser history for Onboarding.
    - Now .dmg installer for MacOS is signed.
    - Internal "Alerts" UI obscures other services and disrupts tab focus.
    New
    - Option to Hide Notification Content Preview (per app or globally).
    - "Copy link URL" for images in Context Menu.
    - Auto Wake-up Interval for Hibernated Apps: users can configure an automatic wake-up interval for apps that are hibernated.
    - Per-app Proxy Sync Scope: Each app can now have its proxy settings scoped as local-only or synced across devices.
    - Flatpak Support: Rambox can now be distributed and run as a Flatpak package on Linux.
    - MacOS users can now use their iPhone as a camera input within Rambox apps.
    Fixes
    - Fixed popups not using the parent app's partition on macOS and Linux.
    - Linux: Fixed startup issues for AppImage packages.
    - Fixed app icon not showing correctly in .tar.gz and .zip packages on Linux.
    - Fixed scroll buttons flickering on window resize in the navigation bar.
