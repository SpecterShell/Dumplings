  Key: ReleaseNotes
  Value: |-
    Changelog
    New
    - Option to set the Tray icon color: "Auto" (default, follows system), "Light" or "Dark".
    Improvements
    - Upgraded Electron to v42.5.2 (Chromium 148.0.7778.271). :electron:
    - Windows: Added option to change the installation directory during setup.
    - Linux (Flatpak): Upgraded to Flatpak runtime version 25.08.
    Fixes
    - Orphan processes kept alive. Now it should wipe them out correctly (if present).
    - Refactor Windows and MacOS signing tool. Now all installers and executables are correctly signed.
    - MacOS: added NSAudioCaptureUsage permission to allow access to system audio when screen sharing.
    - Linux: prevent startup crashes on Linux Wayland sessions.
    - Linux (Snap): added "wayland" plug for proper Wayland support.
    - Linux (Flatpak): Fixed audio permission.
    - Linux (Flatpak): Fixed apps name.
    - Linux (Flatpak): Fixed apps icon.
    - Fixed a crash when clicking an extension's icon in the toolbar.
    - Fixed extension popups not closing properly in some cases.
    - Fixed a crash caused by certain background requests (e.g. searching "weather" in Google, which loads an analytics request that could crash the app).
    - Fixed popups (mostly authentication) being unable to communicate to their parent app under COOP restrictions.
    - Fixed LinkedIn redirect links showing a 404 error.
    - Fixed TikTok Studio failing to load.
    - Fixed the "Auto Wake Up" interval setting not being saved.
    - Fixed adding a custom app with an alias/internal hostname being rejected as an invalid URL (e.g. "http://localhost:8080/").
    - macOS: Fixed the .dmg installer showing an extra folder instead of the Rambox app itself.
    - Linux (Flatpak): Fixed missing audio in some implementations.
    - Linux (Flatpak): Fixed the app name shown by the desktop environment.
    - Linux (Flatpak): Added missing package metadata for software stores.
    - Linux (Snap): Fixed startup by adding the required no-sandbox and ozone-platform launch arguments.
