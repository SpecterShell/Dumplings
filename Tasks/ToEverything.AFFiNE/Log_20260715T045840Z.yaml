  Key: ReleaseNotes
  Value: |-
    What's new
    Web & Editor
    - Added AI BYOK feature (Experimental)
    - Added Calendar View to Database blocks
    - Improved rendering and interaction behavior for Code Block, LaTeX, Mermaid, and Typst
    - Fixed display, sorting, and shortcut behavior for Database blocks and table cells
    - Improved Edgeless rendering performance, memory usage, and touch responsiveness
    - Improved multilingual support
    - Fixed MCP token not displaying
    Native Client
    - Added OneNote, Obsidian, Bear, and Notion importers
    - Improved input & editor stability on mobile
    - Improved recording stability and preview performance
    Backend
    - Automatic cleanup of blobs deleted by clients is now supported
    - Improved CalDAV sync queue and compatibility
    - Improved stability of the task queue
    - Updated dependencies and improved overall stability and security
    Breaking change
    Starting from server version 0.27, only clients at version 0.26 or higher are supported to connect and sync.
