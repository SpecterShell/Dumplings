  Key: ReleaseNotes
  Value: |-
    1. 新增了录音机应用，支持录音文件跨设备云同步与管理，分角色语音转文本、智能标记与快速定位；支持 AI 洞察语音场景、多模板 AI 总结等功能。
    2. 新增了小 V Claw 智能办公助理，实现办公自动化，支持快速部署、智能管理日程或原子笔记、创建定时任务、数据备份与恢复、全链路安全守护等功能。
    3. 新增了跨屏互联手机投屏多应用窗口，支持手机投屏多窗口并行，大屏布局自由调节，多任务一屏处理（当前仅支持 vivo XFold6 系列机型）。
    4. 新增了跨屏互联电脑模式，将手机扩展桌面级视野，支持大屏沉浸操作、应用无极缩放调节布局、双向跨端拖拽传输文件、手机文件跨平台打开、独立音频控制等功能（当前仅支持 vivo XFold6 系列机型）。
    5. 优化了手机投屏标题栏自动隐藏、云存储空间展示、相册图片视频预览、运行流畅度等体验。
    6. 修复了日历时间显示等已知问题。
