- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Features
    - Add in new MFA flow to the app.
    - Update Angular version to 21.
    - Users can add a new contact directly from the Messages interface.
    - Users can search for their phone numbers and users when creating a message box.
    - The background color of the Messaging chat interface was updated to a gray background.
    - Users can start a text message with contact from various pages in the app.
    - Users can block inbound messages from a phone number.
    Fixes
    - The date/time stamps in the Messaging chat interface have been adjusted to be more aligned with other chat apps.
