  Key: ReleaseNotes
  Value: |-
    New features:
    - Added an MCP (Model Context Protocol) server so AI coding agents can interact with JProfiler. Set up your agent from the JProfiler UI or with the installation script available on our website.
    - All command-line executables now feature a modern rich console with arrow-key menus, inline completion, progress indicators and styled output
    - Linux profiling agents are now included in all distributions, so they do not have to be auto-downloaded at runtime when profiling containerized JVMs or JVMs on remote Linux servers
    - Support new lambda numbering scheme (Java 24+) for precise source navigation in IntelliJ IDEA
    Bug fixes:
    - When setting the zoom factor for the UI, the factor was applied twice
    - Heap walker: The biggest objects calculation could not be canceled except for the initial object set
