  Key: ReleaseNotes
  Value: |-
    - Added Continuous View mode (can be enabled via Settings → Advanced → Top Bar)
    - Added support for inserting tables in the editor
    - Added support for expanding child document annotations in "Current Chapter" mode
    - Improved editor performance
    - Enhanced custom background image settings
