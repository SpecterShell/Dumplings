    - 在「本章」模式下支持展开下级文档标注
    - 提升编辑器性能
    - 改进自定义背景图设置功能
    - 修复一个偶发的同步问题
    - 修复窗口大小变化后切分编辑器无法及时调整尺寸的问题
    - 修复追加导入时白板类型可能丢失的问题
    - 一些细节改进与小问题修复
