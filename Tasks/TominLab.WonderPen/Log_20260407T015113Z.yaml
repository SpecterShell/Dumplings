- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Fixed an issue where split editors could not be resized by dragging
    - Fixed some issues with the one-click formatting feature
    - One-click formatting shortcuts are now supported in floating editor windows
    - Added Ctrl + B / I shortcuts to toggle bold/italic while typing (Cmd + B / I on macOS)
    - Fixed an issue with highlighting the current line
    - Fixed some issues with code block rendering
    - Improved code block features with syntax highlighting and automatic line wrapping
    - Improved English word count statistics
    - Sidebars will no longer be compressed when reducing the window size
    - Fixed an issue where whiteboard cards in floating windows only occupied half the space when maximized
    - Improved attachment management by adding a recycle bin for deleted attachments
    - Improved cloud sync stability under poor network conditions
    - Updated underlying dependencies to fix some compatibility issues
    - Other minor improvements and bug fixes
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 修复编辑器切分后无法拖拽调整大小的问题
    - 修复一键排版的一些问题
    - 浮动窗口的编辑器内容也支持快捷键一键排版
    - 输入时，可按 Ctrl + B/I 快捷键切换加粗/斜体模式（macOS 下是 Cmd + B/I）
    - 修复高亮当前行的问题
    - 修复代码块渲染的一些问题
    - 改进代码块功能，增加语法高亮颜色支持，支持自动换行
    - 改进英文词数统计
    - 调小窗口尺寸时，不再压缩左右边栏的宽度
    - 修复浮动窗口白板卡片最大化时只占了一半空间的问题
    - 改进附件管理，为删除的附件添加回收站功能
    - 提升网络不佳时云同步的稳定性
    - 调整底层依赖，修复一些兼容问题
    - 一些其他细节改进及小问题修复
