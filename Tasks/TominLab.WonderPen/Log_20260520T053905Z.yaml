- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Fixed several issues when exporting to Docx
    - Optimized the export process and fixed a potential freeze when exporting a large number of chapters to TXT
    - Fixed an issue where today’s word count might not display correctly in some cases
    - Fixed an issue in snapshot comparison
    - Added syntax highlighting for custom CSS display
    - Fixed an issue related to Typewriter Mode + top padding + Continuous View
    - Added support for pasting Markdown content (can be toggled in Settings → Advanced → Document Editing → Copy & Paste)
    - Other minor improvements and bug fixes
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 修复导出为 Docx 时的一些问题
    - 优化导出流程，修复大量章节导出为 txt 时可能卡住的问题
    - 修复一些情况下今日码字数字可能不能正常显示的问题
    - 修复快照对比时的一处问题
    - 自定义 CSS 显示时增加语法高亮
    - 修复打字机模式 + 顶部留白 + 连续视图的一处问题
    - 支持粘贴 Markdown 内容（可在设置 → 高级 → 文档编辑 → 复制和粘贴中切换）
    - 一些其他细节改进和小问题修复
