  Key: ReleaseNotes
  Value: |-
    PhpStorm 2026.2 EAP #7 is now available
    This build brings a bunch of bug fixes and quality-of-life improvements.

    Here are the most notable changes and bug fixes in this build:

    - Fix: PHPStan plugin ignores baseline because it runs inspections on temporary files [WI-58890]
    - Fix: PHP Add support for persistent File Reference injection [WI-20028]
    - Fix: Reformat code doesn't remove space after scope resolution operator [WI-83335]
    - Fix: Inline comment before catch indentation. [WI-84280]
    - Fix: Pest: Files with "describe" blocks are not recognized as tests [WI-84920]
    - Fix: Code style: PHP - Function/constructor call arguments: force "New line after '(' " [WI-41308]
    - Fix: Get rid of additional "PhpStorm Frontend Customization" plugin [WI-85137]
    - Fix: Exception during creating of workshop project [WI-85124]
    - Fix: Call of function trigger_error isn't counted as exit point [WI-85080]
    - Fix: "Access from EDT is not allowed" when applying PHP project settings [WI-84950]
    - Fix: Update default version of PHP [WI-84811]
    - Fix: rdkafka stubs: update to support php-rdkafka 6.0.x (PHP 8.3+) [WI-84546]
    - Fix: PHPUnit: Make it possible to navigate to the specific method via #[CoversMethod] [WI-84302]
    - Fix: Fix Validation Errors in FUS [WI-84203]
    - Fix: Allow substituting static with self in final classes [WI-84105]
    - Fix: Scope resolution operator shares partial spaces formatting behavior with object access operator [WI-83975]
    - Fix: Missing parameter's type declaration quick fix suggests not possible type combination [WI-83928]
    - Fix: Incorrect weak warning "Getter can be replaced with get hook" in PHPStorm 2025.2 [WI-82989]
    - Fix: Number ranges mismatch: false positive when initialise property with one constant value and then assign another constant value using QFN [WI-67869]
    - Fix: changing color code destroys code [WI-54134]
    - Fix: CSS / SCSS absolute import path changes to relative when a file is moved [WEB-37434]
    - Fix: Ctrl+Shift+Click doesn't launch a debug session but opens only a browser [WEB-76695]
    - Fix: JavaScript Debug is throwing error [WEB-75974]
    - Fix: The application.yaml file exception triggers a schema validation error. [IJPL-245723]
    - Fix: Pasting Images to Claude Code is inconsistent [IJPL-228663]
    - Fix: Selected scope doesn't persist between restarts in Navigate -> Class/File/Symbol [IJPL-55641]
    - Fix: Find in path window does not list all instances of the searched word [IJPL-45177]
    - Fix: New tabs: cannot see file color for selected tab in the editor [IJPL-189299]
    - Fix: Theme setting got reset after every restart [IJPL-241602]

    For the full list of changes in this build, please see the release notes.
