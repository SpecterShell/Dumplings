Version: 2.5.5
Installer: []
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Added support for capturing screenshots and text by right-dragging to select an area.
    - Added group management for multiple tabs.
    - Added support for naming favorite watermarks and managing them in batches.
    - Added an option to export OCR conversions in PDF/UA format.
    - Improved the PDF default app setup flow and prompt dialogs.
    - Fixed an issue where image size units were displayed incorrectly.
    - Fixed issues reported by some users to improve product stability.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 新增通过右键拖拽区域捕获截图和文本。
    - 新增多标签页分组管理功能。
    - 支持为收藏水印命名并进行批量管理。
    - 新增将 OCR 转换结果导出为 PDF/UA 格式的选项。
    - 优化 PDF 默认程序设置流程及提示弹窗。
    - 修复图片尺寸单位显示错误的问题。
    - 修复部分用户反馈的问题，提升产品稳定性。
