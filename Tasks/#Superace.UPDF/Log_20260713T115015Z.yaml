Version: 2.5.6
Installer: []
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Added custom rotation for images and text.
    - Added cross-document splitting for batch duplex printing.
    - Added a toggle for PDF/A document detection.
    - Added a toggle for digital signature detection.
    - Added multi-select deletion for annotation and form lists.
    - Supported manual crop box adjustment in white margin removal mode.
    - Improved tone rewriting and polishing in AI editing.
    - Fixed issues reported by some users and improved product stability.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    - 新增图片和文字的自定义旋转功能。
    - 新增批量双面打印时的跨文档分割功能。
    - 新增 PDF/A 文档检测识别开关。
    - 新增数字签名检测识别开关。
    - 注释和表单列表支持多选删除。
    - 支持在删除白边距模式下手动调整裁剪框。
    - 优化 AI 编辑的语气改写和润色功能。
    - 修复部分用户反馈的问题，提升产品稳定性。
