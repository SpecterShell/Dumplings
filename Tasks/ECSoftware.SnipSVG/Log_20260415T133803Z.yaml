  Key: ReleaseNotes
  Value: |-
    We are glad to announce the immediate availablility of SnipSVG version 2.2!
    What’s new in SnipSVG 2.2?
    SnipSVG can extract text from images. This function is new in the Windows version and requires Windows 10 or Windows 11, it makes use of the OCR engine that comes with Windows.

    Other Changes in SnipSVG 2.2
    - When an image has been edited (e.g. cropped) and the image is the only item on the canvas, the canvas is auto-sized to fit the new image
    - Copy as image to clipboard: when nothing was selected, the copy-as-image function created a picture that was too large.
    - The image effects editor (crop & bitmap effects) now has 8 drag handles instead of just four, making it easier to place and resize effects.

    Download
    All downloads for Windows and macOS are available from the SnipSVG website.
