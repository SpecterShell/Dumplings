  Value: |-
    多维表格
    - 在业务汇报、项目进展展示、数据分析说明等场景下，你可以将多维表格仪表盘中的图表插入飞书文档，实现数据可视化。源图表的数据和样式变化时，文档中的图表会自动更新，无需反复重新截图，确保信息始终保持最新。
    应用中心
