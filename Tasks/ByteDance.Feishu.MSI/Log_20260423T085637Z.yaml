- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    飞书 aily
    - 飞书 aily 全新升级，成为你的专属智能伙伴。它支持以 Agent 形态常驻飞书联系人，深度融入你的日常工作流，懂你所有工作的上下文、有记忆、会主动工作、持续进步，越用越懂你。访问 aily.feishu.cn 即可预约激活。
    - 你还可使用飞书 aily 专业版。它是承载专业场景的 AI 生产力工具，支持复杂任务处理和专业内容创作，深度融合飞书，可基于企业场景工作，能自主读取群聊、会议、文档等信息完成业务分析。
    飞书妙搭
    - 飞书妙搭是为个性化业务工具和系统而生的智能伙伴，可满足不同用户的 AI Coding 需求，用于开发业务系统、效率工具、组织文化应用等，让业务系统“当天想、当天用”。
    多维表格
    - 在工作流和自动化中发送消息或邮件时，你可以使用富文本模式编辑内容格式。内容层级更清晰，信息传递更顺畅。
    - 在工作流中使用 AI Agent 节点时，如果工作流触发方式为接收飞书消息时触发，你可以选择是否开启 AI 实时回复。开启后，系统会将 AI Agent 节点生成的内容逐字输出，并实时回复至触发工作流的消息，无需等待全部内容生成后才发送消息。
    - 在工作流中使用多分支节点时，你可以选择执行所有满足条件的分支，满足多场景并行处理需求。业务逻辑更灵活，流程配置更高效。
    视频会议
    - 你可以在 iOS 系统中为妙记设置手机快捷方式。设置后，即可通过桌面组件、锁屏组件、侧边按钮入口，快捷开启录音与进入录音页面，提升记录效率。
