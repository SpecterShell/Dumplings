  Key: ReleaseNotes
  Value: |-
    更新内容
    - 合并 PR #5：新增 Claude Code web_search_* 支持，提供 auto / native / translate 三种模式；支持 web search 专用模型、Base URL 和 API key，并在设置页提供配置入口。
    - 修复 Issue #6：为 DeepSeek / GLM 等 OpenAI 兼容推理模型加入 reasoning_content 缓存回放。Claude Code 压缩上下文后即使丢失 thinking block，只要保留上一轮 tool_use，代理也会按 tool call ID 自动补回 reasoning_content，避免多轮工具调用报错。
    - 增强 Responses/Codex 兼容：Responses 输入里的 reasoning summary 会转换为 Chat Completions 的 reasoning_content，压缩后只剩 function_call 时也会尝试从缓存恢复。
    - 改进 prompt cache key 稳定性：使用会话提示、Anthropic cache_control 边界和更稳定的工具/上下文排序，减少无意义的缓存失效。
    - 版本号更新到 1.3.0，Release 资产和 GHCR Docker 镜像已自动构建。
    验证
    - go test ./...
    - npm run build
    - GitHub Actions Release workflow 通过，已上传 Linux / Windows / macOS 多平台二进制和 checksums.txt。
    - Docker workflow 通过，已发布 ghcr.io/kiowx/opencode-cc:1.3.0 和 latest。
    完整变更：v1.2.9...v1.3.0
