- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    更新内容
    - 移除了控制面板里的 OpenCode Go 额度显示卡片。
    - 移除了设置页里的 OpenCode Go Workspace ID / Auth Cookie 配置项。
    - 移除了后端 /api/opencode-go/quota 接口和抓取 OpenCode Go Dashboard 的逻辑。
    - 移除了配置中的 opencode_go_* 相关字段，避免继续保存或依赖浏览器登录 Cookie。
    - 项目版本号更新到 1.2.9。
    为什么要移除
    OpenCode Go 额度显示依赖 Dashboard 页面、Workspace ID 和登录 Cookie。Cookie 过期、Workspace 不匹配或登录态失效时，面板会出现类似 HTTP 302 to /auth/authorize 的提示，容易造成误解。
    这个版本直接去掉这块不稳定的额度抓取功能，保留核心代理能力：请求转发、模型转换、API Key 管理、统计、日志、Docker 镜像和多平台 Release 构建都不受影响。

    Full Changelog: https://github.com/Kiowx/opencode-cc/compare/v1.2.8...v1.2.9
