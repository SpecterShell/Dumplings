  Key: ReleaseNotes
  Value: |-
    MindFS v0.3.4
    新功能
    - 当前链接状态圆点提示
    - 错误信息框中可以刷新重启后台 agent
    - 普通 toolcall 结果从后台获取
    - 回复中可以发送新消息、发送后排队、可打断发送
    - 定时任务
    - agent 增加 reasonix
    优化和修复
    - 修复 relay 下的 ws 链接错误
    - 修复 切换 project 后的 ws 状态错误
    - ask user 中增加自定义回答
    - 侧边栏可折叠收回
    - 会话导入增加全选
    - 修复 cc 导入会话项目匹配问题
    - 修复项目发现时加入临时目录问题
    - 修复有的 ui 组件颜色模式不一致问题
    - 修复 cc 默认模型无法设置思考等级问题
    - 修复导入阶段卡主问题
    - e2ee 安全加固
    - 自升级安装包签名验证
