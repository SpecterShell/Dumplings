  Key: ReleaseNotes
  Value: |-
    MindFS v0.4.0
    新功能
    - 增加任务看板，可自定义任务阶段及每阶段提示词
    - 侧边栏布局调整，增加 worktree 和关联文件
    - 会话、任务、worktree 关联展示，review 时更加清晰
    - 增加 git diff 双栏视图
    - 用户消息快速定位浮钮
    - 服务启动可指定 webhook 通知脚本
    - 增加两款配色主题
    优化和修复
    - 子会话默认折叠，展示数量角标
    - 增加 git push/pull/commit 操作
    - 过滤 shell 命令脏历史
    - 修复 ios 触底回滚
    - 多项目会话搜索
    - 关联文件包含项目外文件，提交后 diff 仍然可用
    - 优化 acp 会话加载速度
    - 优化会话卡片展示
    - claude 会话导入忽略 subagent
