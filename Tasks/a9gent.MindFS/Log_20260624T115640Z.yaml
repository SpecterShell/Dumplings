    MindFS v0.3.8
    新功能
    - 多项目会话列表（需要主动勾选）
    - 左右测变化位置交换（需要主动勾选）
    - codex 增加 /login，方便远程登录
    优化和修复
    - 修复同名项目移除在添加后 git 历史缺失问题
    - 优化 web push 内容
    - 会话列表中正在回复会话添加呼吸灯效果
    - 子会话过多时折叠展示
    - 优化 codex /status 展示
    - 修复 codex /compact 立刻返回问题
    - 增加 codex skill 候选扫描目录
    - 修复执行命令创建脏文件问题
    - 修复切换会话时的额外提示音
