  Key: ReleaseNotes
  Value: |-
    MindFS v0.2.7
    新功能
    - codex 增加 /goal, /shell 命令
    - 项目菜单增加 worktree 切换
    - 增加内置 agent：omp，hermes
    - 增加桌面快捷键：esc 取消会话
    - 增加手机全局设置：回车键发送
    优化和修复
    - agent 错误不影响继续交互
    - 添加项目时如果已有同名项目，错误提醒
    - 支持目录软连接
    - 修复重启后重复输入 e2ee 配对码问题
    - 修复开启 e2ee 时 Android 通知卡主问题
    - 修复开启-tls 时，mindfs -stop 无效问题
    - 已有同名备份时可覆盖备份
