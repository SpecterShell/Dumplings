Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    + Optimized SKIF gamepad input and eliminate spurious input while SKIF is inactive.
     + DLSS Frame Generation "Native Pacing" is now on by default, and has Smooth,
         Low-Latency and Ultra Low-Latency Modes.
     + DLSS Frame Generation pacing reports output framerate instead of native now.
     + Flip Metering is now enabled by default for DLSS Frame Generation.
     + Added option to prevent the mouse cursor from unhiding the Windows taskbar
         when moved to the edge of the screen while SK is locking the cursor to
           the game window.
     + Workaround GOG Galaxy DRM bug that causes crashes when unlocking achievements.
