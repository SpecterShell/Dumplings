- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    [Enhancements]
    - When configured to launch at startup, QVPN now starts minimized to the system tray on Windows or the menu bar on macOS instead of opening the main window.
    - QVPN for macOS is now provided as a universal binary, delivering native performance on both Apple silicon and Intel-based Mac systems.
    - Updated the minimum supported macOS version for QVPN to macOS 12.
    [Fixed Issues]
    - Improved the display logic and user interface of connection logs to enhance clarity and readability.
    - Addressed several minor issues to improve system performance and reliability.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    [改善项目]
    - QVPN 若设为开机时启动，现在会最小化在 Windows 的系统匣上或 macOS 的菜单列上，而不会打开主窗口。
    - macOS 版 QVPN 现在采用了通用二进位格式，无论是 Apple Silicon 还是 Intel 版的 Mac 上都能提供原生性能。
    - QVPN 已将最低支持的 macOS 版本更新为 macOS 12。
    [修复问题]
    - 改善了连接记录的显示逻辑与用户接口，让信息更加清楚、更容易阅读。
    - 解决了一些小问题，以改善系统性能及可靠性。
