  Value: |-
    F.1.1 Changelog

    F.1.1.1 Security
    - Don't use the Low IL temp directory when elevated (thanks Richard Warren for responsibly disclosing, bug #1326)
      This stops a possible privilege escalation for installers running as SYSTEM.

    F.1.1.2 Minor Changes
    - Added StartsWith[S], EndsWith[S], Contains[S], IsLowerCase and IsUpperCase LogicLib operators.

    F.1.1.3 Build System
    - Support Python older than 3.6 again (bug #1325)
    - Preliminary ARM64 support in makensis.nsi (patch #318)
