  NestedInstallerFiles:
  - RelativeFilePath: MobaXterm_installer_26.2.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - New feature: added a warning prompt before pasting content identified as malicious by MobaXterm
    - Improvement: added detection of potential homograph attacks in pasted content (when a Unicode character visually impersonates a Latin character)
    - Improvement: added detection of potential "pipe to shell" risks in pasted content (when a downloaded script is directly piped to a shell)
    - Improvement: added detection of potential "redirect to profile" risks in pasted content (when a command or script is redirected to a profile script)
    - Improvement: added detection of potential "unpack to root" risks in pasted content (when an archive is extracted to the root folder to replace system files)
    - Improvement: added detection of zero-width or non-breakable spaces in pasted content (when the command contains unusual space characters)
    - Improvement: you can now modify, copy, or paste the paste confirmation content itself
    - Improvement: reduced the main executable size by removing unused resources and changing the main icon format
    - Improvement: improved detection of new lines in text copied from web browsers
    - Improvement: removed the left margin for SSH browser elements to gain space
    - Improvement: reduced SSH agent startup time, making local terminal sessions start faster
    - Improvement: suppressed the /etc/passwd and /etc/groups files that are no longer needed in the local terminal
    - Improvement: added a new "Duplicate tunnel" button in the "MobaSSHTunnel" port forwarding tool
    - Improvement: improved the font selection control when the dark theme is enabled
    - Improvement: improved the background color of pasted text in the 64-bit local terminal
    - Improvement: improved Windows XP and Wine for Mac/Linux compatibility by using replacement system calls when recent ones are not available
    - Improvement: prevented the terminal from freezing when pasting very large text
    - Improvement: increased the number of lines taken into account when printing terminal content
    - Improvement: improved startup speed by removing unnecessary file checks
    - Improvement: the contextual macro menu triggered with Alt+Space now appears in detached windows, even if they do not correspond to the current tab
    - Improvement: added a new right-click menu option in the sessions tree to collapse all open session folders
    - Bugfix: fixed delayed closing of SSH sessions with the error message "SCP transfer in progress, please wait"
    - Bugfix: fixed glitches when switching to the dark theme with an FTP or SFTP session open
    - Bugfix: in the Professional Edition, "%" characters in the "force log folder" field could break the "Terminal type" value
    - Bugfix: in the Professional Edition, the Customizer did not remember the dark theme when it was previously selected
    - Bugfix: fixed refresh issues with the "private key" field in SSH sessions when selecting part of it in dark mode
    - Bugfix: fixed an issue causing the MobaXterm desktop shortcut to request administrator privileges on first launch on some Windows versions
    - Bugfix: removed the "msimg32.dll" library dependency
ReleaseTime: 2026-04-03
RealVersion: 26.2.0.5480
