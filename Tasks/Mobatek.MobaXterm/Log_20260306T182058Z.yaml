  NestedInstallerFiles:
  - RelativeFilePath: MobaXterm_installer_26.1.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - New feature: small dots in the session tree now indicate which sessions are already open
    - New feature: clicking the green dots in the session tree now jumps to the corresponding tabs
    - New feature: you can now assign a dedicated icon to each session via the Customizer or in shared sessions
    - Improvement: improved session tree rendering performance
    - Improvement: custom icons are now stored with sessions when exporting or sharing them
    - Improvement: it is now possible to assign a specific custom icon per session even when more than 64 custom icons are used
    - Improvement: updated the embedded X server to the latest Xorg version
    - Improvement: improved X server startup speed
    - Improvement: updated several other embedded command-line tools to their latest versions
    - Improvement: improved autocompletion for the "livesession" and "createsession" commands
    - Improvement: optimized code executed during tab switches to improve tab switching performance
    - Improvement: reorganized the icon chooser window to display more icons per row
    - Improvement: improved custom icon loading speed from the INI file at startup
    - Improvement: improved detection of default Linux and macOS shell locations under Wine
    - Improvement: disabled the Edge browser on legacy Windows versions (XP, Vista) to prevent potential crashes in MobaTextEditor
    - Improvement: improved icon rendering in tabs with better anti-aliasing
    - Improvement: added a new button in MobaTextDiff to swap left and right files
    - Improvement: improved detection of non-Latin characters in MobaTextEditor for word boundary detection
    - Improvement: updated MobaSwInfo and MobaHwInfo to support the latest Windows releases
    - Improvement: some agents such as SK-SSH-Agent now work even when MobAgent is disabled
    - Improvement: SSH sessions now support logins containing square brackets
    - Improvement: updated the command-line SSH client and the OpenSSL library to their latest versions
    - Bugfix: prevented an error when upgrading from an older MobaXterm version using an obsolete Xorg release
    - Bugfix: fixed an issue where tab text remained red after selecting and unselecting an inactive tab
    - Bugfix: fixed a brief black rectangle flash when clicking the "Quick Search" field
    - Bugfix: fixed a high memory usage issue after mutiple successive pastes of very long texts in the terminal
    - Bugfix: fixed potential graphical glitches when starting MobaXterm with a theme and then switching to the Windows dark theme
    - Bugfix: fixed an issue with the 64-bit command-line OpenSSH client when requesting keys from MobAgent or the PuTTY SSH agent
    - Bugfix: fixed a high memory usage issue after leaving the terminal window detached for many hours
    - Bugfix: fixed an issue where MobaTextDiff would not start in portable mode when it was launched from the SSH browser
    - Bugfix: fixed an issue where copying an IP address from Google Chat inserted a newline character into the host field
    - Bugfix: fixed a search path issue when choosing a custom text editor in the global settings window
ReleaseTime: 2026-03-06
RealVersion: 26.1.0.5456
