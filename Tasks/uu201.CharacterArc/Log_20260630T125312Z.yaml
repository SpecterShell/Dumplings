    1.12.2 - 2026-06-30
    Changed
    - 全局 AI 工具上下文增强：全局助手与章节助手的 agent 工具补强项目资料、章节内容、知识库与技能参考读取能力，工具调用结果展示更清晰，减少因上下文不足导致的回答偏差
