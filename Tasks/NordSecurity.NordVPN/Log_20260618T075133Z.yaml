  Key: ReleaseNotes
  Value: |-
    * Map lovers shouldn’t have to rely only on country lists to pick a server. Nor do they have to any longer — the interactive map is back. Zoom in, drag around, and connect to a server right from the map. The world is yours!
    * We’ve simplified the tray app to two core actions: “Open the NordVPN app” and “Quit.” The full experience is available in the main app — just a click away.
