  Key: ReleaseNotes
  Value: |-
    MShell v0.2.8 更新内容
    新增「懒人脚本」功能，支持管理常用脚本文件、脚本分类、变量参数、脚本预览、部署到远程主机并运行。
    懒人脚本支持导入、导出、复制命令、部署脚本、运行到指定 SSH 终端，并新增运行前确认，避免误发到错误终端。
    内置多种运维脚本，包括系统基础信息查看、磁盘大目录检查、SSH 端口修改、防火墙端口放行、SSH 密钥登录、关闭/开启 SSH 密码登录、修改用户登录密码等。
    优化 SSH 加固脚本逻辑，修改 SSH 端口时会检测并处理常见防火墙规则，降低改端口后失联风险。
    SSH 端口修改或开启密码登录脚本执行成功后，支持同步更新当前 SSH 会话配置中的连接端口。
    优化终端命令发送和滚动逻辑，修复脚本部署后终端新输出无法正常滚动显示的问题。
    新增终端背景图片功能，支持全局终端背景和单个 SSH 会话独立背景，支持本地图片、远程图片、透明度和显示方式配置。
    备份、恢复和同步逻辑增强，补充更多数据类型迁移能力，包括懒人脚本、终端背景配置等。
    日志功能优化，补充系统日志、审计日志相关处理，并在设置中支持控制日志开关，减少不必要的日志占用。
    新增和优化软件外观风格，包括现代、简洁、复古等外观模式，并修复部分深色/浅色模式下文字、状态栏、会话列表、终端顶部区域显示不清的问题。
    优化左侧菜单和底部状态栏显示，版本信息改为关于入口样式，并改善不同外观下的适配。
    优化 SSH 连接认证逻辑，密码登录和密钥登录不再混用，选择密码时只使用密码，选择密钥时只使用密钥。
    Android 移动端补充构建和打包说明，新增一键打包命令 npm run android:build。
    Android 打包文档补充版本要求，明确 JDK 21、Gradle、Android Gradle Plugin、SDK 版本要求，并说明 无效的源发行版：21 的处理方式。
    Android 端继续完善 SSH、设置、安全锁、导入导出和同步相关能力。
    下载
    MShell-Setup-版本号.exe - 安装版（推荐）
    win-unpacked.zip - 免安装版
    app-debug.apk - 安卓手机版本
    其他文件（latest.yml、.blockmap）为自动更新所需，无需手动下载
