Version: 17.0.03.31
Installer:
- InstallerUrl: https://updatefiles.loxone.com/LoxConfig/LoxoneConfigSetup_17000331.zip
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New
    Climate
    - A3D9-T1991: Fan Speed off: Set AC to off by fan speed adaption
    - A3D9-T2060: Intelligent Room Controller – rename temperature mode “off” to building protection
    - A3D9-T2246: Automatically connect CO2/Humidity Sensors to Intelligent Room controller
      - Only applied if temperature of room controller is provided by Air/Tree devices supporting CO2/Humidity
      - Respective inputs do not have sensors connected
    General
    - Config: New Main-Window and Ribbon implementation
      - Main-Window and Ribbon have been completely rewritten from scratch
      - new overall simplified UI
    - A3D9-T2056: Air Based Integration into IRC – Object Input
    - A3D9-T2061: Ac Unit Controller – default temperature value setting updated
    - BG-T3904: A checkbox in DALI search dialog is added to show all devices regardless of whether or not they are already learned
    - A3D9-T2049: All Climate blocks are coloured in orange by default
    - A3D9-T2048: Function block name editing initiated on insert
    - A3D9-T2062: AC Unit Controller: Parameters Hys and O enabled only when using IRC
    - New Media Control configuration dialog
    - Media Control: naming outputs is now possible
    - A3D9-T1930: Added a setting button to note block, text in note left aligned
    - BG-I40328: Project Backups Popup is ported to new framework
    - [General] A3D9-T1917: Project Backups dialog is ported to new framework
    - SPO: System message when no next day data available
    - Added Ukrainian language
    - Honeywell Plugin 1.0.1
      - Added setting for severity level for “OPIF timestamp mismatch” system status message
    - Added room and category to info pinner
    - Support for new Remote Connect
      - Faster connection established by constant tunnel connection
      - New URL connect.loxonecloud.com
    - A3D9-T2159: Extended token validity for App token
      - Configurable in Settings in Document
      - Allow extension of validity to 12 months instead of the default 3
      - Can be used in installations where users don’t access the visualization for several months
    - A3D9-T2094: New Function Block – Presence Central
      - Get a combined overview of the presence in a building
      - Longterm Absence pulse
      - Auto Config will enable house in deep sleep on long-term absence
      - App support will be added in the next weeks
    - A3D9-T1870: Central function blocks – Added state Outputs
    - A3D9-T2237: Added History entries for presence when activate/deactivate manually
    - A3D9-T2172: State Control – Increase to 8 inputs
    - Link to new Remote Support Tool instead of Team Viewer
    - Add checkbox to run after install
    - A3D9-T2238: Show info message box with option to save into Miniserver after closing a learn dialog and something has changed
    - A3D9-T2225: Controller Frequency and Open input options are hidden if they are not different from their default values
    - Wireless Speaker
    - A3D9-T2284 – Touch Pure Flex Controller
      - Brightness for Display and backlight are handled separately now.
      - Display is exclusively activated by Presence and Don input
      - New Output CBrD: Shows the default brightness used for display and status LEDs
      - Fixed: Text with only white spaces triggered backlight
      - Fixed: After falling edge of reset input, the outputs would not recalculate
    - A3D9-T2224: Reworked name setting description for some objects
    - AC Control Air for Panasonic
    - Connection references can be temporarily moved
      - Please note the position will not be saved!
      - Moving them is only for convenience while programming logics
    - New Colours and Icons
      - We proudly present the new Colours of our Brand now also in Loxone Config
      - New Splash Screen
      - Category colours get converted to new colour equivalents
    - Upgraded to newest version of the Framework used for the Loxone Config UI
    - Loxone Config now supports only 64-bit systems
    - Increased minimum system requirements
      - Windows 10 (64-bit) or higher
      - Graphics processor (GPU): Support for OpenGL 4.5 or DirectX 11
    Devices
    - Wallbox Air: Enable Tree interface – New Wallbox Air FW 16.2.11.27
    - R20-T805: Nano Dimmer US: Touch IC IQS7222C support for Nano Dimmer US
    - A3D9-T2216: Create Meter and Switch for Smart Socket Air
    - Support for Door Lock Air
    - Hörmann Air: Support new Hörmann actuators SupraMatic H4
    Trust
    - Add Trust Members by importing CSV file
      - Action in the context menu
    - Private Trust
      - Isolate your trusts so that only the Manager can see who is a member of the trust
      - Members can only communicate with the Trust Manager
      - This can be used for partners to manage access to their customer installations
    - A3D9-T1244: Trust Manager – Allow replace of the Manager Miniserver
      - The Trust Manager serial can now be edited on Trust Members
      - System Status Message ‘New Trust Manager detected’ with option to ‘accept and reboot’ when a new Miniserver claims to be the Manager
      - Multiplicator: Edit Trust Manager serial, perform a ‘Trust Update’ and save into Miniservers
    Usability
    - Learning dialog now also preselects the switchboard like the room depending on the previous selection
    - Reduced categories and rooms which get added in a new project
    - Removed “Reset Interaction” button from tree learning dialog
    - Add Column title to tooltip in a Table View (e.g. Multi Edit Dialog)
    - Removed connector letter from objects in tree (example ‘P’ on presence inputs)
    - Proper Error message when trying to connect with invalid credentials to the Miniserver
    Auto Configuration
    - A3D9-T2210: Changed Handling of General Inputs/Outputs
      - General purpose IO won’t be connected to function blocks anymore by the Auto Config, to prevent invalid usage
    - A3D9-T2214: Digital Inputs in category presence detection create a presence control in the room
    - A3D9-T2213: Similar light devices will be connected to the same light output
    - A3D9-T2211: Audio Player Group will be automatically created when needed
    - A3D9-T2209: A relay in category Ventilation will create a Toilet Ventilation instead of a Room Ventilation
    OCPP
    - BG-I46333: Added “Miniserver Authorization preferred” setting
    Gateway-Client
    - BG-I42658: New warning window added in case of credential mismatch
    Access
    - A3D9-T1949: Added dedicated permission to access system messages
    Lighting
    - BG-T4542: Periodically retransmission of DALI light control commands
