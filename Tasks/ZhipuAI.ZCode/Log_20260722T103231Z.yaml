Version: 3.4.2
Installer:
- Architecture: x64
  InstallerUrl: https://cdn-zcode.z.ai/zcode/electron/releases/3.4.2/windows-x64/ZCode-3.4.2-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增定时任务，可按计划自动执行任务
    - 定时任务支持立即运行和查看历史
    - 支持自定义重复规则和截止时间
    - 定时任务可设置模型、模式和思考强度
    - 聊天中可直接创建并查看定时任务卡片
    - 支持辅助对话，可以在副屏继续提问
    - 支持划选文字，快速添加到上下文
    - 长会话滚动和回到底部体验更顺畅
    - 支持在聊天中展示附件和工具结果
    - 新增代码库 Wiki 生成和语言选择
    - 插件商店改版，支持搜索和详情页
    - 插件支持远程同步和 CDN 安装
    - 支持远程工作区和 WSL 同步操作
    - Windows 默认关闭到托盘
    - 更新窗口改为独立展示并显示产品标识
    - 支持 Kimi K3
    - 新增非项目会话模式
    - 侧栏任务分区可折叠和排序
    - Markdown 表格支持横向滚动和展开查看
    - 飞书机器人支持流式卡片回复
    问题修复
    - 修复移动端输入、缩放和消息操作问题
    - 修复 Markdown 表格滚动方向和抖动问题
    - 修复插件安装、卸载和远程同步异常
    - 修复远程工作区启动和插件刷新问题
    - 修复 OAuth 凭据损坏后的恢复问题
    - 修复自动更新下载、取消和安装状态异常
    - 修复 Linux、Windows 标题栏和设置窗口交互
    - 修复反馈提交超时和重复工单问题
    - 修复无法归档、归档任务无法过滤的问题。
    - 修复应用重启后丢失对话思考过程的问题。
    - 恢复兼容旧版本 SSH 任务的历史记录。
    - 修复终端标签页命名错误，并在退出时自动关闭标签。
    - 修复草稿中自定义指令丢失的问题。
    - 优化 Windows 标题栏菜单，避免与其他控件重叠。
    - 修复 128k 模型无法压缩的问题
    - 粘贴表格时优先保留纯文本格式，避免格式错乱
    - 支持空内容发送
    - 修复 Windows 偶现的卡顿问题
    - 修复 Plan 模式下点击确认计划不会继续的问题
ReleaseTime: 2026-07-22T10:08:52.3200000Z
