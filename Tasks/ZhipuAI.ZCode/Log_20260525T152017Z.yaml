Version: 2.9.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.9.0/ZCode-2.9.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 现在可以直接在应用内开通和升级 Coding Plan，订阅流程更完整、更方便。
    - 新增订阅验证步骤，提升开通流程的安全性。
    - 支持更多支付方式，包括海外支付与银行卡支付，海外用户购买更方便。
    - 新增支付二维码展示，方便通过扫码完成购买。
    - 优化了套餐展示与升级入口，当前可升级的方案更清晰，也更容易找到适合自己的版本。
    - 终端体验得到增强：在 macOS 上会更好地匹配系统终端的字体和配置，显示效果更统一。
    问题修复
    - 修复了套餐状态、订阅信息和用量显示不一致的问题，相关信息现在会更准确。
    - 修复了未开通套餐、未登录或切换账号等场景下，侧边栏和用量页面显示异常的问题。
    - 修复了支付流程中的一些问题，包括支付回调、支付失败提示、支付方式默认选择和二维码展示异常，购买过程更稳定顺畅。
    - 修复了部分套餐升级限制和状态判断不准确的问题，避免出现不可用升级项或错误操作。
    - 优化了订阅与授权验证逻辑，减少因凭证异常或空白信息导致的开通失败。
    - 修复了在某些情况下解除关联后套餐状态丢失的问题，账户切换后的状态保留更稳定。
    - 修复了聊天与命令执行时部分异常反馈不明显的问题，遇到问题时提示会更及时。
    - 修复了输入法输入过程中重命名时可能出现的问题，中文输入体验更稳定。
    - 修复了终端消息关闭、聊天间距等界面细节问题，整体使用体验更顺手。
    - 修复了远程工作区任务和资源处理中的一些稳定性问题，减少任务丢失或异常中断的情况。
    - 修复了反馈记录在部分设备上的区分问题，反馈信息归类更准确。
    - 修复了某些运行环境下应用依赖不完整导致的问题，提升整体启动和运行稳定性。
