  Key: ReleaseNotes
  Value: |-
    新功能
    - 工作区 MCP server 默认可信。
    - 新增内置配置与自诊断指南。
    - 可使用 $zcode-configuration-guide 技能了解并配置 ZCode 的技能、插件、MCP 与 AGENTS.md。
    - 切换任务时保留输入草稿和附件。
    问题修复
    - 修复 Anthropic API Key 认证失败的问题。
    - 提升恢复会话和压缩时间线的稳定性。
    - 修复 Linux 自动更新问题。
    - 修复 macOS 窗口按钮间距异常。
    - 请求确认通知不再重复显示。
    - 修复归档确认按钮容易消失的问题。
    - 修复标题栏内帮助入口无法点击的问题。
    - 修复方向键导航后提及内容丢失的问题。
    - 支持删除软链接创建的技能。
    - 修复 Windows 终端输入法兼容问题。
    - 调整子智能体模型菜单显示位置。
