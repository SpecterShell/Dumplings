Version: 2.2.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.2.0/ZCode-2.2.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增 Linux 平台支持，现在可以在 Linux 系统上正常安装和使用。
    - zcode agent 新增 /goal 命令，设置目标和推进任务更顺手。
    - 新增更清晰的代码变更对比视图，查看文件修改、行内差异和 Git 变更时更直观。
    - 更新下载时会显示当前状态，方便了解新版本下载进度。
    - 支持在对话中提及子代理，更方便地把任务交给不同助手协作处理。
    问题修复
    - 优化 Linux 版本的安装包、图标、终端能力、窗口显示和更新体验，提升在 Linux 上的稳定性。
    - 修复任务恢复后状态不同步或任务流中断的问题，继续处理历史任务时更可靠。
    - 修复部分代理启动失败、初始化异常或错误信息不清晰的问题，遇到故障时更容易恢复和排查。
    - 改进与不同智能代理的兼容性，减少回复内容丢失、夹杂无关日志或结果展示不完整的情况。
    - 修复子代理历史记录和完成摘要显示异常的问题，任务执行结果更完整可读。
    - 修复按 Esc 关闭弹窗时可能意外停止任务的问题。
    - 修复终端快捷键粘贴可能重复触发的问题。
    - 修复代码块、差异对比、侧边栏等界面样式不一致的问题，整体显示更稳定。
    - 优化输入框中的技能检索效果，查找和选择技能更顺畅。
    - 修复远程技能创建时预填内容可能丢失的问题。
