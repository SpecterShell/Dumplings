  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.0.0/ZCode-2.0.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增远程资源通过 SSH 下载和安装的方式，在远程环境中部署所需内容时更方便、更灵活。
    - 远程下载现在会显示进度，让你能更直观看到安装和准备过程，不再只能被动等待。
    - 优化了任务时间线和任务列表的展示，信息查看更清晰。
    - 改进了移动端远程控制相关界面，操作体验更顺手。
    问题修复
    - 优化了远程资源的复用与校验，减少重复下载，在应用更新后也能更稳定地继续使用已有资源。
    - 修复了远程安装方式切换时可能出现的问题，提升不同安装方式之间切换时的稳定性。
    - 改进了远程控制断线后的恢复体验，并让失败原因反馈更准确。
    - 修复了移动端在后台重连后草稿可能丢失的问题，现在未发送内容会更稳定地保留下来。
    - 修复了移动端选择器打开或关闭时容易误触发输入焦点和键盘的问题，操作更自然。
    - 修复了部分菜单关闭后输入焦点丢失的问题，聊天和输入可更顺畅地继续进行。
    - 修复了移动端部分界面显示与布局问题，包括侧边栏底部内容、任务列表偏好保存和不必要的菜单显示等细节。
    - 优化了时间线的时间间距显示，阅读起来更整齐。
    - 提升了远程下载与部署过程的稳定性，减少无关提示信息，整体过程更安静清晰。
    - 修复了部分下载资源路径与资源信息校验问题，降低下载或使用失败的概率。
ReleaseTime: 2026-05-11T15:00:37.9320000Z
