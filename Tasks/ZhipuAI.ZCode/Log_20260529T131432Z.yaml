  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增通用技能支持，使用常见能力时更方便、更快捷。
    - 现在可以在对话中直接显示 Markdown 格式的图片，查看内容更直观。
    问题修复
    - 优化了通用技能的筛选与显示逻辑，减少混淆，查找和使用更顺手。
    - 修复了登录状态变化后相关方案信息不能及时刷新的问题，方案状态、预览和购买信息显示会更准确。
    - 优化了价格显示方式，现在会根据你的地区使用更符合习惯的格式展示。
    - 修复了发送消息后会话引用标签可能丢失的问题。
    - 优化了文件树中的默认操作，打开文件更加直接。
    - 修复了部分会话在使用过程中可能异常中断或状态不稳定的问题，整体连接体验更稳定。
    - 优化了日志导出内容，导出的文件更精简。
    - 修复了某些情况下接口调用结果为空的问题。
