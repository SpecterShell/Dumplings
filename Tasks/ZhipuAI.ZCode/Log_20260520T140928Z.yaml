Version: 2.6.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.6.0/ZCode-2.6.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 支持在命令列表中使用 Claude 的 /clear 命令。
    - Git 状态会根据工作区文件变化自动刷新，文件改动后的状态展示更及时。
    - 聊天内容中的 Mermaid 图表现在可以直接渲染展示，查看流程图、时序图等更直观。
    问题修复
    - 修复部分本地命令执行后状态不同步的问题，使用命令时更稳定。
    - 修复任务回退后模型选择可能丢失或显示不正确的问题。
    - 优化 Codex 相关模式的显示与保存逻辑，避免模式名称、权限提示或选择状态异常。
    - 修复 Claude 1M 相关模型在选择、恢复和代理场景下可能不正确的问题。
    - 修复部分代码修改内容无法正常展示的问题。
    - 修复 Mermaid 图表渲染失败时的兼容处理，避免影响消息展示。
    - 修复已完成的 Markdown 内容可能反复渲染、导致界面卡住的问题。
    - 修复消息界面在某些情况下可能陷入死循环的问题。
    - 修复 Git 状态自动刷新范围过大的问题，减少不必要的刷新和干扰。
    - 修复编码计划和用量图表在部分情况下显示不稳定的问题。
    - 修复恢复任务后模型显示可能不稳定的问题。
    - 修复远程连接二维码刷新时可能导致链接或登录状态异常的问题。
    - 修复命令列表中可能显示不兼容命令的问题。
    - 增加配置项，避免 OpenCode 被自动更新。
