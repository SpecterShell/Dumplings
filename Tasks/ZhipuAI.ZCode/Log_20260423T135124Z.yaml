  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/1.3.0/ZCode-1.3.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 现已支持切换和管理不同的模型服务，使用时可以按需启用或停用，更方便选择适合自己的模型。
    - 新增对更多模型的支持，模型切换和使用场景更加灵活。
    - 助手最新一条回复新增快捷操作，常用处理更方便，减少重复点击。
    - 新建任务时，标题生成更智能，能更准确概括任务内容。
    - 新增提示词优化能力，可以帮助你更方便地完善和增强输入内容。
    - 终端的复制、粘贴和文本选择体验得到增强，日常操作更顺手。
    - macOS 下补充了提醒关闭能力，界面提示更清爽。
    - 新增退出前确认，避免误操作直接关闭应用。
    问题修复
    - 修复了任务结束后部分待办事项状态没有正确更新的问题，任务结果展示更完整。
    - 修复了部分模型服务登录状态、会话加载和模式设置异常的问题，使用过程更加稳定。
    - 修复了自定义模型服务配置在部分场景下不能正确保存或生效的问题。
    - 修复了关闭最后一个窗口时可能直接退出的问题，现在会先进行确认，减少误关应用的情况。
    - 修复了与 VS Code Insiders 的兼容问题，相关操作现在可正常使用。
    - 远程连接现已支持带密码短语保护的 SSH 密钥，同时优化了相关报错提示，连接远程环境更顺畅。
    - 修复了移除远程连接后仍可能继续重连的问题。
    - 优化了远程任务列表的加载表现，查看任务时更稳定。
    - 修复了部分界面布局在恢复后宽度不正确的问题，窗口使用体验更一致。
    - 优化了归档操作的确认流程，减少误触带来的困扰。
