Version: 3.1.2
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/3.1.2/ZCode-3.1.2-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 现在可单独设置代理证书和直连地址，网络配置更灵活。
    - Windows 现已支持选择使用不同命令行环境。
    - 支持从文件夹菜单中使用 ZCode 打开。
    - 更新可用时会显示更明确的更新入口。
    - Bash 环境下可更稳定地保持当前工作目录。
    问题修复
    - 修复了部分情况下任务恢复后思考强度异常的问题。
    - 修复了编辑替换时特殊字符被错误处理的问题。
    - 优化了代理相关设置的整理方式，查找和配置更直观。
    - 修复了更新入口在部分状态下显示异常的问题。
    - 修复了 Windows 界面顶部控件偶尔遮挡的问题。
    - 修复了中断生成内容时提示不准确的问题。
    - 提升了切换远程模型时的响应速度和稳定性。
    - 修复了部分命令行环境下配置读取和执行异常的问题。
    - 修复了 sse|http MCP http header 传递不生效的问题。
