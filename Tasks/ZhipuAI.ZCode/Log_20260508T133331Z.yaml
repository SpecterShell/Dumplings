Version: 1.10.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/1.10.0/ZCode-1.10.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - Windows 端新增编辑器菜单选项，操作更便捷
    - 窗口菜单新增进程监控面板，随时掌握运行状态
    - 侧边栏标签页菜单交互优化
    - 多终端功能现已可用，可同时管理多个终端窗口
    问题修复
    - 修复了配置存储路径问题，相关设置现在正确保存到用户目录
    - 历史记录中耗时单位的中文显示更加准确
    - 修复了远程工作区在连接断开后状态显示异常的问题
    - 修复了远程任务恢复流程的不稳定问题
    - 当没有可提交的代码时，顶部 Git 操作入口不再显示，界面更简洁
    - 移动端连接断开后的重连流程更加稳定，聊天操作体验更流畅
    - 远程控制认证信息现在能够正确保存，无需重复登录 -修复了特定模型上下文超限时可能出现的兼容性问题
    - 修复了 GLM 模型工具调用不工作的问题
