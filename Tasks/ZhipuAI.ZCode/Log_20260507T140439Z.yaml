Version: 1.9.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/1.9.0/ZCode-1.9.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增工作流调试器，支持对工作流进行调试
    - 工作流执行失败时可自动重试
    - AI 在需要时会主动向你提问，收集必要信息后再继续执行
    - 新增对话轮次控制功能，可切换紧凑和标准视图
    - Memory 功能支持软链接、新建、编辑和打开文件
    - 新增 hooks、memory 和输出风格（OutputStyle）的配置界面 -OutputStyle 支持单选模式
    - 模型切换时自动联动思考级别和上下文等参数
    - 移动端支持 SSH 工作区重连功能
    - 新增默认 API Key 链接，方便快速配置
    问题修复
    - 修复 GLM 模型在切换和重试时不稳定的问题
    - 修复移动端远程控制重连失败的问题
    - 修复飞书消息解析失败的问题
    - 修复远程任务状态更新不及时或显示不一致的问题
    - 修复远程控制状态指示器闪烁的问题
    - 优化移动端页面加载性能
    - 优化模型加载速度，降低远程控制的内存占用
