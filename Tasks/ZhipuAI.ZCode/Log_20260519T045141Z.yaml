Version: 2.4.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.4.0/ZCode-2.4.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 远程 SSH 环境支持选择资源包，配置远程开发环境时更灵活。
    - 更新了助手入口与可选服务，让常用功能更容易找到和使用。
    - 升级了智能助手能力，带来更稳定的任务执行和交互体验。
    问题修复
    - 修复远程资源配置流程中的状态残留问题，重新配置时不再容易受到上一次操作影响。
    - 优化 SSH 资源包依赖检查，减少远程环境配置失败的情况。
    - 修复已删除的远程工作区仍出现在历史记录中的问题。
    - 优化 SSH 配置表单展示，端口和认证信息填写更清晰。
    - 修复任务执行过程中可能出现回复重复、内容丢失或顺序错乱的问题。
    - 修复连续任务和远程控制场景下的消息流中断、恢复异常等问题，任务状态同步更稳定。
    - 修复部分任务恢复后错误信息显示不完整或无详情时仍提示错误的问题。
    - 修复命令执行成功后状态不更新的问题，执行结果反馈更准确。
    - 优化助手追问和确认类回复，减少冗余内容。
    - 修复多文件修改预览在部分情况下无法正常展示的问题。
    - 修复上下文整理后可能出现空回复报错的问题，长对话体验更稳定。
    - 修复待办面板完成后仍显示的问题，界面状态更干净。
    - 修复模型服务商排序、状态显示和权益识别不准确的问题。
    - 修复编码计划相关的状态、权益刷新和重置时间显示问题。
    - 修复多轮对话后模型版本不显示的问题。
    - 修复折叠状态、终端输出和命令运行状态在刷新或恢复后丢失的问题。
    - 修复排队提示在多工作区场景下可能关联错误工作区的问题。
    - 优化后台监控逻辑，避免在任务进行中产生不必要的干扰。
