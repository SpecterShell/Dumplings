Version: 3.1.3
Installer:
- Architecture: x64
  InstallerUrl: https://cdn-zcode.z.ai/zcode/electron/releases/3.1.3/ZCode-3.1.3-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新建任务会优先添加到当前所在分组。
    - 问题反馈时可以附带截图，提交信息更完整。
    - 反馈记录页面新增返回入口，来回查看更方便。
    - 新增团队版购买入口，并优化整体购买流程，使方案选择和订阅路径更加清晰顺畅。
    - 在特定 Windows 远程工作区下，会提示使用更合适的连接方式。
    - 恢复了飞书渠道入口。
    问题修复
    - 助手回复支持打字机效果，阅读过程更连贯。
    - 聊天界面会自动保持在底部，也可一键回到底部。
    - 修复聊天过程中偶发不跟随到底部的问题。
    - 修复历史消息恢复后动画重复播放的问题。
    - 优化助手输出与思考内容显示，减少闪烁和卡顿。
    - 优化任务分组拖拽体验，落点和预览不稳定问题。
    - 修复空分组也能正常接收拖入任务的问题。
    - 修复反馈与帮助入口中的多余提示，操作更顺畅。
    - 修复团队版和企业版购买页的部分显示与交互问题。
    - 修复团队订单创建后返回、继续支付和订单恢复异常。
    - 修复企业版数量填写、价格展示和方案信息不准确的问题。
    - 修复支付确认页部分内容显示不全或布局错乱的问题。
    - 修复验证码等支付控件偶尔无法正常点击的问题。
    - 修复远程工作区连接中的部分异常，连接更稳定。
