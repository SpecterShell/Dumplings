Version: 1.11.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/1.11.0/ZCode-1.11.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增对更多智能体连接方式的支持，接入和管理外部服务更方便，也支持直接删除已添加的服务并进行确认提示。
    - 新增助手预览卡片，让你更直观地查看助手内容。
    - 现在可以在代码查看时添加评论，并将代码评论作为对话附件一起查看，协作和沟通更方便。
    - 远程连接窗口支持折叠，界面更清爽，使用起来更灵活。
    - 手机端远程任务列表支持排序，查找和查看任务更高效。
    - 优化了 Markdown 预览效果，文档阅读体验更流畅。
    - Markdown 中的目录链接现在可以直接定位到文件树，浏览项目内容更方便。
    - 加载工作区时会显示对应的远程连接日志，便于了解当前连接状态。
    - 现在支持从用户目录加载技能，管理和使用自定义技能更方便。
    问题修复
    - 优化了新建草稿时的默认助手选择，减少手动切换。
    - 修复了部分模型接入场景下无法正常使用的问题，兼容性更好。
    - 提升了远程连接的稳定性，尤其是在手机端和桌面端切换、重连或短暂断线后，恢复更可靠。
    - 改进了远程连接失败和超时提示，连接状态更清晰易懂。
    - 修复了远程工作区和资源加载过程中的一些异常，打开和部署远程环境更稳定。
    - 优化了聊天区、预览区和设置页的界面细节，滚动和导航体验更顺手。
    - 修复了远程目录树无法顺畅滚动、滚动条出现时列表抖动等显示问题。
    - 远程连接过程中，工作区打开入口会继续可用，操作不中断。
    - 修复了相同名称模型难以区分的问题，选择时更清楚。
    - 修复了助手预览卡片和代码评论预览在多轮对话或切换标签页后丢失的问题，内容展示更稳定。
    - 优化了 Markdown 文件链接的跳转和显示，文档内链接使用更准确。
