  InstallerUrl: https://cdn-zcode.z.ai/zcode/electron/releases/3.1.4/ZCode-3.1.4-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 界面缩放支持更大放大倍率，让界面缩放更自在。
    - 新增 Mermaid 图表预览，查看流程图更直观。
    - 预览面板现已集成终端标签页，让命令行操作无处不在。
    - 远程工作区连接时会显示提示，状态更清楚。
    问题修复
    - 修复远程工作区稳定性问题。
    - 修复终端输入法组合输入异常的问题。
    - 修复任务恢复时模型信息丢失或回退异常。
    - 修复远程任务列表在切换工作区后的显示问题。
    - 修复对话、反馈和功能请求弹窗内容过长时溢出的问题。
    - 修复任务重命名后重启丢失的问题。
    - 修复 MCP 健康检查不准确的问题
    - MCP 配置支持自定义 timeout
    - 修复部分 Skill.md 读取的兼容性问题
    - 修复软连接迁移的 Command 无法/ 补全的问题
