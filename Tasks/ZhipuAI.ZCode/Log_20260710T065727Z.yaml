  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增后台任务，子智能体和 bash 都可后台执行。
    - SSH 场景支持同步本地插件和市场。
    - Markdown 表格支持展开查看和横向滚动。
    - 大屏下聊天内容区域显示更宽。
    - 团队订阅方案开通成功后会通知成员。
    问题修复
    - 修复手机端输入框自动放大的问题。
    - 修复登录凭据异常时可能无法恢复的问题。
    - 修复远程环境初始化不稳定的问题。
    - 修复后台子任务可能卡住的问题。
    - 修复不可用模型未正确提示的问题。
    - 修复模型选择和默认配置可能丢失的问题。
    - 修复聊天宽度变化时的显示抖动。
