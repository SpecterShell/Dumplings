Version: 3.1.1
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/3.1.1/ZCode-3.1.1-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - Windows 关闭窗口时会最小化到系统托盘，后台使用更方便。
    - 现在可以直接在应用内打开 HTML 文件查看内容。
    - 生成提交信息时会自动适配你的系统语言。
    - 你之前的使用记录和记忆可延续到新的智能体能力中。
    - 提交反馈后，现在可以查看对应的问题编号。
    问题修复
    - 修复了部分情况下智能体模型切换异常的问题。
    - 优化了任务启动繁忙时的处理，减少卡住或失败情况。
    - 修复了远程连接和资源同步中的多个问题，使用更稳定。
    - 修复了工具运行时的环境继承问题，网络相关能力更稳定。
    - 修复了 Windows 选择数据目录时可能出现的问题。
    - 修复了手动填写的任务标题会被自动改掉的问题。
    - 修复了数学公式与 $ 文本混排时的显示问题。
    - 修复了金额区间等内容在消息中的显示异常。
    - 优化了移动端的排队提问、草稿布局和远程图标显示。
    - 优化了提示文案和反馈复制状态，交互更清晰。
