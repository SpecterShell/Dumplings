Version: 2.3.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.3.0/ZCode-2.3.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增编码套餐相关支持，可在应用内查看套餐、连接可用模型，并了解对应的额度与价格信息。
    - 新增用量与计费入口，方便查看当前套餐和额度使用情况。
    - 新增浏览器元素上下文选择能力，让提问或操作时可以更方便地指定页面中的相关内容。
    - 升级智能代理运行环境，提升相关功能的稳定性和兼容性。
    问题修复
    - 修复代理连接在网络异常或连接重置时可能失败的问题，提升联网环境下的稳定性。
    - 修复导入 Claude 相关内容时可能出现异常消息的问题，减少对话记录混乱。
    - 修复 Linux 上编辑模型提供方设置时草稿内容可能丢失的问题。
    - 修复代码注释区域无法正常拖拽选择的问题。
    - 优化套餐与额度提供方的展示，信息更清晰。
    - 隐藏不应出现在设置中的内部提供方选项，减少误操作。
    - Windows 启动时不再因检查更新而阻塞主界面，应用打开更快；有可用更新时会在左下角显示轻提示。
