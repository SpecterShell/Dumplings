Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 白板侧边栏现在支持查看和使用附件，整理内容时更方便。
    - 在终端中点击网页链接时，可以直接在内置浏览器中打开，查看内容更顺手。
    - 远程环境中的斜杠命令现在会直接显示在输入区，可用功能更直观。
    问题修复
    - 优化了聊天消息自动跟随到底部的体验，减少流式输出时跟随失效、内容显示滞后或无法顺畅上滑查看历史消息的问题。
    - 修复了部分目标描述更新不及时的问题，信息展示更准确。
    - 已完成的目标面板会自动隐藏，界面更简洁。
    - 本地地址在浏览器中打开时会更智能地补全协议，减少无法访问的情况。
    - 移动端远程报错时，现已提供反馈入口，方便快速上报问题。
    - 优化了 Windows 下部分会话处理的稳定性，减少偶发异常。
    - 部分权限说明文字已更新为中文，理解更轻松。
