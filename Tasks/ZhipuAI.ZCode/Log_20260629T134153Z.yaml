  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增支持插件管理和自定义添加插件 beta。
    - 新增通用型子智能体，支持自定义读写权限和模型。
    - 长文本粘贴会自动转为附件。
    - 计划模式退出后会恢复原来的模式。
    - 更新前会先完成必要版本检查。
    问题修复
    - 优化压缩逻辑。
    - 优化 windows 任务体验。
    - 安装插件后自动启用 （推荐确认插件来源安全后再安装）。
    - 优化强制更新流程，减少卡住和失败。
    - 修复从工作区链接进入时可能跳过更新检查的问题。
    - 修复升级后无法回到工作区的问题。
    - 优化聊天和侧边栏渲染，减少卡顿。
    - 修复窗口缩放时部分内容抖动的问题。
    - 修复任务切换时大会话卡顿的问题。
    - 修复聊天加载状态可能不消失的问题。
    - 修复额度不足提示不清晰的问题。
    - 修复套餐升级入口价格显示不准的问题。
    - 修复终端可能重复输入空格的问题。
    - 修复停止会话后任务仍继续推进的问题。
    - 修复暂停任务仍继续迭代的问题。
    - 修复等待用户操作时提示可能丢失的问题。
    - 修复搜索异常时可能中断的问题。
    - 修复历史会话恢复时的兼容提示问题。
