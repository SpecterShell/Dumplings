Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 远程资源的加载与缓存机制已升级，首次使用后的资源管理更顺畅，后续获取和使用也更稳定。
    - 现在聊天中支持图片附件预览，发送前可以更直观地确认图片内容。
    - 聊天界面会更清晰地提示高权限模式，帮助你更容易区分不同对话能力。
    问题修复
    - 修复了部分模型服务的连接地址问题，提升了相关功能的可用性与兼容性。
    - 优化了登录与订阅流程，避免两者相互干扰，使用过程更顺畅。
    - 改进了提示词增强相关体验，减少异常或不符合预期的情况。
    - 修复了远程资源加载、缓存和重连中的多项问题，降低资源丢失、加载失败或状态异常的情况。
    - 修复了远程状态提示显示不准确的问题，没有异常时不再出现多余提醒。
    - 提升了应用内部分组件与资源信息的稳定性，减少启动或使用过程中的异常。
    - 修复了部分 Git 操作可能卡住的问题，提升相关操作的稳定性。
    - 改进了启动时的鉴权同步与自恢复逻辑，减少启动阶段授权异常或状态不同步的问题。
    - 提升了日志导出的稳定性，减少导出失败或异常报错的情况。
    - 修复了代码块频繁渲染时可能出现的报错，阅读内容更稳定。
    - 修复了部分模型仍被错误要求授权的问题，降低不必要的授权提示。
    - 优化了错误场景下的界面稳定性，减少异常状态对正常使用的影响。
    - 调整了远程连接在启动阶段的行为，避免自动重连带来的干扰。
