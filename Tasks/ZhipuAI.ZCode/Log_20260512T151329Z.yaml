Version: 2.1.0
Installer:
- Architecture: x64
  InstallerUrl: https://cdn.zcode-ai.com/zcode/electron/releases/2.1.0/ZCode-2.1.0-win-x64.exe
Locale:
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新功能
    - 新增可视化活动面板，帮助你更直观地查看和理解任务进展。
    - 当操作过程中需要你补充信息时，现在可以直接收到提问并及时回答，交互更加顺畅。
    - 在远程连接重新连接时，会显示更清晰的状态与日志信息，方便了解当前连接进展。
    问题修复
    - 优化了对话与任务执行过程中的恢复能力，减少回复内容丢失、截断或状态错乱的问题，整体交互更稳定。
    - 修复了权限记忆相关问题，当前会话或任务中的授权选择可以更稳定地保留，减少重复确认。
    - 修复了部分远程连接和重连场景下的异常，包括会话中断后控制失效、连接状态不同步、恢复不稳定等问题，远程使用体验更流畅。
    - 改进了移动端远程连接的恢复表现，连接波动后可用性更好。
    - 修复了通过斜杠命令调用技能时可能失败的问题。
    - 修复了模型切换时的异常，切换过程更顺畅。
    - 修复了自定义模型配置同步中的部分问题，配置保存和使用更稳定。
    - 修复了远程任务排序无法保持的问题，你的排序方式现在会被记住。
    - 修复了部分界面显示问题，包括 SSH 相关弹窗和日志区域遮挡、滚动位置异常等，查看内容更方便。
    - 优化了可视化活动面板的状态展示、选择交互和滚动体验，使用起来更自然。
    - 修复了编辑权限相关问题，权限行为更加一致。
