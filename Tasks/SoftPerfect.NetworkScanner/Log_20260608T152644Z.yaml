  Key: ReleaseNotes
  Value: |-
    - Added: Device history — long-term per-network record of every device ever seen.
    - Added: Bold indicator in the device tree for devices new to the current network.
    - Added: History dialog (right-click a device) showing the full timeline of recorded sightings.
    - Added: Device Inventory report listing every device ever seen on the current network.
    - Improved: Windows version detection is now build-precise via SMB2 NTLMSSP.
    - Improved: Smoother scan start — the initial probe burst has been moved off the GUI thread.
    - Improved: Tree-level export from various managers now offers TXT, CSV, HTML, XML and JSON.
    - Improved: Nmap discovery on macOS and Linux now resolves .app bundles and standard system paths.
