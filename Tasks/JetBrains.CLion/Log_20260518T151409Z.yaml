  Key: ReleaseNotes
  Value: |-
    CLion 2026.1.2 is ready for you to download. This build includes the SARIF Viewer, available out of the box. If you use tools that produce SARIF reports – such as Parasoft C/C++test, Clang Static Analyzer, or in-house checkers – you can now review their findings directly in the IDE, navigate to the relevant source code, and keep the triage process within your development workflow.
    Please try this build, share your feedback, and report any issues to our issue tracker.
