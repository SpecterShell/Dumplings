  Key: ReleaseNotes
  Value: |-
    Good afternoon Everyone,
    I have another small build for you today.
    FFmpeg has recently added support for animated WEBP, and of course this means that Icaros support these files now as well.
    Besides animated WEBP, this build mostly focuses on fixing a number of issues posted on the issue tracker.
    As always, Thank you all for posting feedback, and giving support and donations!
    I appreciate it so much!
    I hope you all enjoy the new release! ❤️

    Icaros v.3.3.6 Final
    - Added support for Animated WEBP thumbnailing
    - Added support for UTF-8 filenames in CBX files (Comic book files)
    - Added support for rotation of MKV thumbnails
    - Added support for "Sort title" property in MKV files
    - Fixed some wav files not showing properties
    - Fixed some old h264 files producing green thumbnails
    - Fixed default level of MKV tags (now set to 50)
    - Updated FFmpeg
