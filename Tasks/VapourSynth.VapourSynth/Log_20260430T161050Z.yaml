  Key: ReleaseNotes
  Value: |-
    - slightly improved memory usage when many frames are queued for output
    - improved things for distro packagers
    - improved ccfEnableFrameRefDebug flag, it now outputs a list of all allocated frames as a log message after every external frame request has been completed
    - fixed config issues on fedora and alpine linux and probably their closest friends too
    - plugins can now ship with multiple copies targeting different optimization levels on x64 and have the best one automatically loaded
    - simple plugin manifests have been implemented that stops further recursive plugin loading and enables loading of plugins compiled with optimized settings
    - multiple improvements to the portable version experience where vsrepo is now installed by default again and forwarding bat files are provided to closer match pre R74 paths
