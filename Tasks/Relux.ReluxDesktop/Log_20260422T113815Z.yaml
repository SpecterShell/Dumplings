  Key: ReleaseNotes
  Value: |-
    ADDED

    Luminaire arrow intersection support for boolean groups.
    Option to save the rdf file in 2025 file format for backward compatibility.
    Add illuminance class C6 to the lighting classes.

    CHANGED

    Sign used DLLs to prevent deletion by AV software.

    FIXED

    ReluxCAD for AutoCAD works again.
    Intersection issues with composite meshes and luminaire arrows.
    Resetting of last object axis 3d setting when changing selected object.
    Missing dimming icon for geometry groups.
    Potential crash after modifying luminaire geometry.
    Crash when canceling new project wizards with escape key.
    Crash when trying to create a new project with CAD plan.
    Emergency Lighting: Bug where loaded LDT photometries did not have photometry type set, leading to a bug in distance calculation.
