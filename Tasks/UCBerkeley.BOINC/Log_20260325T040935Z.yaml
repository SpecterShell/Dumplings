  Key: ReleaseNotes
  Value: |-
    What's Changed
    - [ci] add opensuse 16.0 to the stable release list by @AenBleidd in https://github.com/BOINC/boinc/pull/6696
    - client, docker_wrapper (Win): run Podman commands as root by @davidpanderson in https://github.com/BOINC/boinc/pull/6705
    - client, Android: clarify message by @davidpanderson in https://github.com/BOINC/boinc/pull/6714
    - add comment about suspend strings by @davidpanderson in https://github.com/BOINC/boinc/pull/6715
    - Skip WSL discovery and fix logging for BOINC running as service by @AufarZakiev in https://github.com/BOINC/boinc/pull/6720
    - client: don't complain about projects/virtualbox; we created it by @davidpanderson in https://github.com/BOINC/boinc/pull/6722
    - [snap] add arm64 build by @AenBleidd in https://github.com/BOINC/boinc/pull/6723
    - Mac: update ReadMe to reflect new location of BOINCManager.app by @CharlieFenton in https://github.com/BOINC/boinc/pull/6728
    - [linux] update custom gdk-pixbuf vcpkg port by @AenBleidd in https://github.com/BOINC/boinc/pull/6731
    - client: improve Docker-related messages by @davidpanderson in https://github.com/BOINC/boinc/pull/6734
    - Mac: If Manager is hidden on system light / dark mode switch, don't unhide it by @CharlieFenton in https://github.com/BOINC/boinc/pull/6737
    - Client: use 'abort' rather than 'quit' when appropriate by @davidpanderson in https://github.com/BOINC/boinc/pull/6736
    - Mac: Hide users boinc_master & boinc_project from System Events, login screen, Finder by @CharlieFenton in https://github.com/BOINC/boinc/pull/6753
    - Add Fedora 43 linux package by @AenBleidd in https://github.com/BOINC/boinc/pull/6758
    - Client, Manager: fix wrong suspend reason messages in Manager by @davidpanderson in https://github.com/BOINC/boinc/pull/6763
    - Client: fix Docker issues by @davidpanderson in https://github.com/BOINC/boinc/pull/6757
    - client: fill in resource usage if not specified by @davidpanderson in https://github.com/BOINC/boinc/pull/6800
    - client: allow projects to change resource usage of app versions by @davidpanderson in https://github.com/BOINC/boinc/pull/6807
    - Fix incorrect links in the linux package installer scripts. by @AenBleidd in https://github.com/BOINC/boinc/pull/6808
    - client: fix crashing bug by @davidpanderson in https://github.com/BOINC/boinc/pull/6825
    - client: need -f arg for docker rm container on cleanup by @davidpanderson in https://github.com/BOINC/boinc/pull/6826
    - Mac Add utility app to remove Podman by @CharlieFenton in https://github.com/BOINC/boinc/pull/6851
    - client: restore get_screensaver_tasks() RPC, which I mistakenly removed by @davidpanderson in https://github.com/BOINC/boinc/pull/6869
    - BUDA: allow output files to be gzipped. by @davidpanderson in https://github.com/BOINC/boinc/pull/6876
    - client: add <prioritize_gpu> config option by @davidpanderson in https://github.com/BOINC/boinc/pull/6877
    - Increase timer_thread stack limit from 32KiB to 64KiB by @vient in https://github.com/BOINC/boinc/pull/6884
    - include wslinfo only on windows by @ahorek in https://github.com/BOINC/boinc/pull/6885
    - Fix duplicate running manager instance checker on Linux by @AenBleidd in https://github.com/BOINC/boinc/pull/6893
    - client (Win) and scheduler: don't use Vbox if Docker is present by @davidpanderson in https://github.com/BOINC/boinc/pull/6895
    - client (Win): including WSL disk image in BOINC disk usage by @davidpanderson in https://github.com/BOINC/boinc/pull/6896
    New Contributors
    - @vient made their first contribution in https://github.com/BOINC/boinc/pull/6884
