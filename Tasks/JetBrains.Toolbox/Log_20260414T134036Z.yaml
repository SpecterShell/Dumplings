  Value: |-
    Toolbox App 3.4.2 Update
    - You can now keep installed plugins up to date automatically. TBX-17192
    - Improved remote tools reconnections reliability after environment rebuilds. TBX-18127
    - Fixed issue when daemon may not start after deleting the last used IDE instance. TBX-18226
    - Fixed cleanup behavior when old tools cannot be removed immediately, causing CPU load. TBX-18307
    Toolbox App 3.4.1 Bugfix Update
    - Fixed an issue where Toolbox could fail to connect via SSH if any forwarding step failed. TBX-18203
    - Fixed an issue where the daemon could fail to register on Linux systems without xdg-mime. TBX-18088
    - Added exec support to the plugin API. TBX-18112
    - Fixed a race condition during concurrent upgrades. TBX-18152
    What's New in Toolbox App 3.4
    Remote IDE lifecycle hooks
    New plugin API callbacks allow hooking into the remote IDE launch lifecycle. Plugins can now run custom logic before the IDE starts and receive a notification when the launch completes.
    - Callback for initiation of remote IDE launch. TBX-17467
    - Callback for completion of remote IDE launch. TBX-17468
    - Support for hooks when projects and IDEs are clicked or launched. TBX-17270
    macOS fullscreen fix
    The Toolbox App window no longer disappears when opened in fullscreen mode on macOS. TBX-10354
    UTF-8 support on Windows
    The Toolbox App now works correctly for Windows users with non-ASCII characters in their username. TBX-5989
    jetbrainsd service improvements
    Several improvements were made to the daemon service to make its behavior cleaner and more predictable across platforms.
    - The daemon no longer re-registers its protocol handler on every startup. TBX-18045
    - The daemon now exits gracefully when all client applications disconnect, instead of running indefinitely in the background. TBX-17497
    - Fixed .desktop file mimetype removal and scheme handler registration on Linux. TBX-18024
    Remote development fixes
    Remote development reliability has been improved with fixes for connection handling and Linux-specific issues.
    - Fixed a file descriptor leak on Linux that could cause the system tray icon to disappear. TBX-17384
    - Fixed indefinite progress when connecting to a remote machine. TBX-17425
    - Enabled TCP Keepalive for OpenSSH to prevent connection drops. TBX-17100
    Bug fixes
    General stability improvements and update flow fixes.
    - IDE now restarts correctly during updates. TBX-17259
    See the full list of release notes here.
