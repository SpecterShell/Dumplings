  Value: |-
    What's New in Toolbox App 3.5
    Remote development observability
    The Toolbox App now emits OpenTelemetry metrics for remote development connection latency and reliability, so enterprise teams can monitor connection health in their existing observability stacks. TBX-17436
    Zoom controls
    You can now zoom in and out of the Toolbox App interface with Cmd/Ctrl +, Cmd/Ctrl -, and Cmd/Ctrl 0. The zoom level persists across restarts. TBX-17170
    Cleaner update progress
    We’ve enhanced the experience of checking for updates by adding clearer progress indicators. TBX-15780
    Enterprise configuration
    - The Toolbox App now sends static headers with dynamic headers together when communicating with backend services. TBX-18352
    - Header updates are now pushed automatically to running IDEs. TBX-18425
    Bug fixes
    - IntelliJ-based IDEs no longer randomly disappear from the Toolbox App home view. TBX-10600
    - Android Studio and other aliased IDEs now keep their display name after updates. TBX-12998
    Linux improvements
    - The Toolbox App taskbar icon now appears reliably on KDE Plasma 6.6. TBX-18018
    - The tray and app icons now appear correctly on Pop!_OS. TBX-17349
    Remote development fixes
    - SSH canonicalization failures no longer abort the connection. TBX-18279
    - The remote development environment list no longer shows an empty page when the canCreateNewEnvironments flag is set. TBX-17235
    See the full list of release notes here.
