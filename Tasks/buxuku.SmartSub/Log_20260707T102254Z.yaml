Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    feat
    - 新增「云端听写」引擎：接入六家在线 ASR 服务商，免 GPU 即可转写
      Added a "Cloud ASR" engine with six online providers — transcribe without a GPU
    - 成句与断句增强：硬切词边界回退、三态断句设置（不拆词 / 可不限长度）
      Smarter segmentation with word-boundary fallback and three-state line-break settings
    - 任务高级设置支持可配置字幕重分割 (感谢 @nightt5879 #362)
      Configurable subtitle resplitting in task advanced settings (thanks @nightt5879 #362)
    - 校对行内新增单条删除按钮，支持撤销恢复 (#365)
      Per-line delete in proofreading with undo support (#365)
    - 批量翻译并发 / 批次 / 间隔三参数并排直显
      Batch translation concurrency, batch size, and interval shown side-by-side
    - 结构化输出测试时自动探测可用模式并写回配置
      Structured output test auto-detects available modes and saves them to config
    perf
    - 任务并发调度改为阶段流水线：本地引擎仅转写互斥，云端按服务商全局限流
      Stage-pipeline scheduling: local engines serialize transcription only, cloud providers get global rate limiting
    - faster-whisper 变体切换免重复下载，秒级切回
      faster-whisper variant switching without re-downloading, instant switch-back
    fix
    - ffmpeg 音频提取失败时显示具体错误原因 (#370)
      ffmpeg audio extraction failures now show meaningful error messages (#370)
