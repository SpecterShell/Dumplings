    New Features and Improvements in Foxit PDF Editor Subscription Release 2026.1.1.36485
    - The Cloud Documents service has been upgraded to Foxit Document Management System (DMS) in certain regions, giving users a unified hub to store, organize, and share files across Foxit products. Foxit DMS offers:
      - Unlimited cloud storage to centralize every file in one repository.
      - Secure sharing and role-based access controls to protect sensitive documents.
      - Version history and document tracking to improve visibility and compliance.
    - Other enhancements to the user experience.
