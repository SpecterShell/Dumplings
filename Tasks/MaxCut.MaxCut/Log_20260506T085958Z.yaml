  Key: ReleaseNotes
  Value: |-
    Updates
    - Improved DXF Layer Naming and Colors
      - DXF exports now use a consistent, standardized naming and color convention, making it easier to identify and map layers in your CAM or CNC software:
        Layer
        Naming Convention
        Color
        Panels
        PANELS
        Red
        Cuts
        CUTS_WIDTH (e.g. CUTS_16)
        Blue
        Holes
        HOLES_DIAMETER_DEPTH (e.g. HOLES_20_D10)
        Purple
        Grooving
        GROOVING_WIDTH_DEPTH (e.g. GROOVING_30_D15)
        Green
    DXF Export Settings
    - You can now customize your DXF export to match the requirements of your CNC machine or CAM software.
    - From the new DXF Export Settings dialog, you can:
      - Choose which layers to include in your export (Panels, Cuts, Holes, and Grooving)
      - Rename layers to match the naming conventions expected by your machine or software (e.g. renaming HOLES to DRILL)
      - Set a custom color for each layer — useful when your CAM software automatically assigns operations based on layer color
    - Layer names act as a prefix, keeping individual variations clearly separated (e.g. HOLES_20_D10, HOLES_20_D15 remain distinct layers).
    - A "Export Legacy DXF Layers" option is available for users with existing workflows built around the previous DXF export format, ensuring those automations continue to work without changes.
