  Key: ReleaseNotes
  Value: |-
    新增
    - 端点筛选栏：类型标签页、动画搜索框，启用/视图收入设置菜单
    - 端点筛选状态下支持拖拽排序
    - 请求监控支持手动清理明细
    - 快速队列：常用端点优先轮询，仪表盘双队列拖拽管理（最高优先级）
    - 端点归档：移入归档、侧栏查看与还原/删除
    修复
    - 各页面状态切换或操作后刷新更及时（含修改代理地址/启停/UA 后仪表盘滞后）
    - 端点连通性测试通过后卡片仍显示不可用或熔断中
    - 精简代理转发过程日志，降低正常运行时的日志噪音
