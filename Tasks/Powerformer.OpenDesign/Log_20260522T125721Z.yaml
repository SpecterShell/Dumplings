    ✅ System requirements
    - 🍎 macOS — Apple Silicon (arm64) and Intel (x64), macOS 11 Big Sur or newer.
    - 🪟 Windows — x64, Windows 10 / 11. Installer is unsigned but now ships packaged auto-update.
    - 🐧 Linux — headless lifecycle (install / start / stop from CLI). Packaged GUI artifact is still deferred while the release lane is hardened.
    - ❄️ Nix — official flake at flake.nix with home-manager and NixOS support.
    - 🧑‍💻 From source — Node.js 24.x and pnpm 10.33.2+ (per engines in package.json).
    ⚠️ Known issues
    - 🪟 Windows installer is unsigned. SmartScreen / antivirus warnings expected on first launch. Code signing is follow-up work.
    - 🐧 No Linux desktop GUI package in 0.8.0 stable — use headless mode, the Nix flake, or run from source.
    - 🐚 od CLI shadows POSIX od when installed globally. Use /usr/bin/od or command od for the system tool.
    - 🧪 Several preview-period feedback issues (#1729, #2076, #2059, #1797, …) remain open for community follow-up — see the issue tracker.
