    ✨ Added
    🎨 Studio, export & design systems
    - Programmatic screenshot-backed PPTX/PDF export so finished HTML work can move into shareable documents with less manual staging. (#4604) Thanks @lefarcen.
    - Bundled Perplexity AI design-system plugin manifest and duplicated example plugins as projects, making real plugin material easier to inspect and reuse. (#4828, #4861) Thanks @MaxHsu, @pftom.
    - Richer design-system chip and preview UI for scanned brands and built-in systems. (#4530, #4776, #4806) Thanks @PerishCode.
    - Explicit data-od-id guidance in generated HTML prompts so inspect/edit affordances have a clearer contract. (#4305) Thanks @fuyizheng3120.
    🔑 BYOK, OpenDesign Cloud & model choice
    - BYOK provider presets to make model setup more discoverable. (#4902) Thanks @PerishCode.
    - OpenDesign Cloud wallet balance visibility across the Settings card and follow-up flows. (#4675, #4965) Thanks @alchemistklk.
    - Mimo Code support and a corrected Cogito output cap for broader agent/model coverage. (#4578, #4575) Thanks @yangweijie, @Grumpster-Dev.
    🧠 Agents, sessions & diagnostics
    - Native session resume across Codex, OpenCode, Pi, and OpenDesign Cloud so follow-up turns can reconnect to the same work. (#4629) Thanks @lefarcen.
    - Run lifecycle tracing and touched-file tracking for better reopen and diagnosis flows. (#4431, #4432) Thanks @PerishCode.
    - Packaged startup telemetry before daemon launch so early desktop failures are easier to see. (#4696) Thanks @lefarcen.
    🌐 Home, teams & docs
    - Workspace-for-Teams entry chip and enterprise lead page for teams evaluating Open Design. (#4737) Thanks @lefarcen.
    - Long-form tutorials, comparison pages, release blog posts, and customer-story polish across the public site. (#4693, #4748, #4807, #4809, #4853, #4860) Thanks @xne998808-ai, @ScarletttMoon.
    - Azure deployment support for teams deploying Open Design on Azure App Service or ACI. (#3387) Thanks @youcefzemmar.
    🔁 Changed
    - Settings social links now cover the official channels people actually ask for: Instagram, LinkedIn, Xiaohongshu, and refreshed Discord. (#4779, #4849, #4977) Thanks @Tuola, @kokisanai, @lefarcen.
    - The Open Design CLI picker controls are tighter, making command-line selection flows easier to drive. (#4958) Thanks @PerishCode.
    - The startup splash now consistently says "Open Design" and uses dark-mode-friendly card tokens where relevant. (#4674, #4721) Thanks @PerishCode, @lefarcen.
    - First-touch attribution, design-system analytics, and Home task-card analytics are clearer without changing the user's core workflow. (#4769, #4783, #4820) Thanks @elifive555555, @PerishCode, @ScarletttMoon.
    🐛 Fixed
    🎨 Studio, Home & onboarding
    - Home task cards and document chips stay usable by seeding required inputs and keeping the pinned Home tab visually stable. (#4446) Thanks @AriaZhao.
    - Onboarding brand extraction, brand actions, and language menu placement are calmer and less likely to collide. (#4633, #4702, #4813, #4939) Thanks @PerishCode.
    - Logo previews and OpenDesign Cloud card layout no longer fight for space. (#4952, #4984, #5002) Thanks chaoxiaoche, @alchemistklk.
    - The chat splitter no longer overlaps the scrollbar hit area. (#4583) Thanks @CaipingPeng.
    🔑 OpenDesign Cloud, agents & runtime
    - OpenDesign Cloud retry states are visible and balance checks recover better from stderr noise. (#5010, #5015) Thanks @alchemistklk.
    - Codex installed through the standalone Codex.app bundle is detected correctly. (#4889) Thanks @xne998808-ai.
    - Idle MCP stdio helpers release abandoned sessions, reducing process leaks during agent setup. (#4658) Thanks @Sid-Qin.
    - WSL MCP setup paths are clearer. (#4655) Thanks @Sid-Qin.
    🩺 Reliability & release quality
    - Run error diagnostics and task-failure cards are easier to read. (#4656, #4701) Thanks michaeltaxman911-hue.
    - Additive cache-hit reporting no longer exceeds 100%. (#4903) Thanks @lefarcen.
    - Settings updater status controls are back. (#4946)
    - Stable release publishing mode is restored, so the release workflow can move from dry-run validation to a real public release. (#5031) Thanks @PerishCode.
    - A security issue in multiple subprocess calls was fixed. (#4754) Thanks @OrbisAI.
    🙏 Thanks to everyone who shipped 0.13.0
