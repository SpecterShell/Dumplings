  Value: |-
    🌟 Codename: Stay in Flow
    🧭 116 PRs · 26 contributors · 6 days — 0.13.0 keeps the design session alive. The old rhythm was easy to break: a run lost its place, a model picker made you guess, an OpenDesign Cloud balance check hid behind a retry, or a finished deck needed one more export detour. 0.13.0 turns those interruptions into a calmer loop: resume the work, see what is happening, choose the right model faster, and hand off real files without leaving Open Design. 🚀
    🔥 Highlights
    - 🧵 Resume the conversation instead of rebuilding the context. Long design sessions used to punish every interruption: switch tools, come back later, and the next prompt might feel like starting from scratch. Native session resume now keeps Codex, OpenCode, Pi, and OpenDesign Cloud runs connected across turns, so follow-up work can continue from the same live thread. (#4629) Thanks @lefarcen.
    - 🔑 BYOK setup stops feeling like provider archaeology. Bringing your own keys should be a choice, not a scavenger hunt through model names and provider quirks. Presets now make provider setup clearer, and the first-artifact handoff is cleaner for both CLI and BYOK flows. (#4902, #4634) Thanks @PerishCode.
    - 🤖 OpenDesign Cloud shows its wallet, its retries, and its next move. Balance checks are no longer a black box. The settings card shows wallet state more clearly, keeps actions inline, restores follow-up handling, and promotes retry statuses so a transient balance lookup feels recoverable instead of mysterious. (#4675, #4965, #4984, #5002, #5010, #5015) Thanks @alchemistklk.
    - 📤 Exports behave more like deliverables. Finished work can now go straight to screenshot-backed PPTX and PDF output, while deck keyboard navigation no longer double-steps through slides. The export path feels closer to handoff, not a separate production chore. (#4604, #4897) Thanks @lefarcen, @PerishCode.
    - 🧩 Design-system previews got richer and easier to trust. Brand pages stay previewable after prefetch, rich design-system chips are easier to scan, logo previews behave, and bundled plugin examples are easier to open as real projects. (#4530, #4776, #4806, #4861, #4952) Thanks @PerishCode, @pftom, chaoxiaoche.
    - 🧠 Agent choices are broader, clearer, and less brittle. Open Design now recognizes the standalone Codex app bundle, ships a newer bundled Vela CLI, supports Mimo Code, and fixes the Cogito output cap so agent setup is less likely to fail for environmental reasons. (#4575, #4578, #4888, #4889) Thanks @Grumpster-Dev, @yangweijie, @lefarcen, @xne998808-ai.
    - 🏢 Teams and official channels are easier to find. Workspace-for-Teams now has a visible entry point and enterprise lead page, official social links include Instagram, LinkedIn, and Xiaohongshu, and the product/resource navigation is less likely to steal clicks from the pages people meant to open. (#4737, #4779, #4784, #4977) Thanks @lefarcen, @Tuola, @xne998808-ai.
    - 🩺 When something fails, the app gives you a better starting point. Run lifecycle tracing, clearer task-failure cards, simpler error-source diagnostics, and better cache accounting make failed or resumed work easier to understand without turning the UI into a log viewer. (#4431, #4432, #4656, #4701, #4903) Thanks @PerishCode, michaeltaxman911-hue, @lefarcen.
