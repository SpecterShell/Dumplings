    🐛 Fixed
    🖼 HTML, previews, and delivery
    - Successful analysis no longer looks like a failed design task. When you ask Open Design to inspect, critique, or explain existing work, a useful text answer completes normally instead of showing an ARTIFACT_NOT_FOUND failure. Runs that attempted but failed to deliver files still surface the real error. (#5724)
    - HTML work reaches the screen more reliably. Plan-mode HTML opens automatically after generation, in-place edits keep their delivery history, large previews refresh with the full source when needed, redirect loops no longer freeze the preview, and HTML projects keep their visual covers. (#5602, #5689, #5710, #5469, #5762)
    - Preview and deploy feedback stays visible. Delivery status is clearer, cross-project file links stay inside the app, and deployment success messages appear above the modal that triggered them. (#5557, #5611, #5455, #5696)
    🎞 Decks and export
    - Deck exports now match what you reviewed. Multi-page PPT/PDF exports include every slide, slide-image and PDF output avoids overlapping text, editable PPTX keeps CJK typefaces, and rendered thumbnails no longer disappear. (#5645, #5628, #5644, #5626)
    - Presentation details stay in sync. Page counters follow keyboard navigation, speaker-note presentations use a safer sandbox, and dark-theme Mermaid diagrams keep the intended visual discipline. (#5594, #5571, #5595)
    🤖 Agents and BYOK
    - Agent interruptions recover instead of ending the job. AMR retries transient runtime closures, and OpenDesign Agent resume EOF failures clear stale sessions and continue through the existing recovery path. (#5564, #5744)
    - BYOK Agent failures are more accurate and less disruptive. Permission prompts no longer block supported BYOK runs, while provider “Not Found” responses stop cleanly instead of retrying as a transient stream failure. (#5701, #5726)
    - Model and media integrations return the expected result. Pi model discovery reads the correct output, long model names keep their lock affordances visible, call-prefixed Codex images are accepted, and od media generate accepts prompt files as documented. (#5637, #5533, #5582, #5534)
    🛟 Desktop and data reliability
    - Packaged startup and updates are more dependable. The bundled database binary is aligned with the packaged runtime, relaunch can stop an older incompatible desktop process, and updater cleanup waits instead of fighting a launcher file that is still locked. (#5680, #5677, #5780)
    - Concurrent and external inputs fail safely. Simultaneous imports of the same library item are deduplicated instead of returning a server error, and remote library ingestion blocks unsafe local-network targets. (#5662, #5529)
    - Small interface regressions stay out of the way. Home layers, browser guidance, question-form text, route scrolling, model controls, branding, fullscreen settings, and Community browsing now behave consistently; the gallery opens on all content types by default. (#5590, #5596, #5423, #5493, #5607, #5533, #5613, #5550, #5597, #5759)
