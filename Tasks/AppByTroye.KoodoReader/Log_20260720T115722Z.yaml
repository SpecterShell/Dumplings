- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - The context length for custom AI models now retains approximately 5 messages by default to prevent the context from growing indefinitely
    - (Mobile) The context length for custom AI models now retains approximately 5 messages by default to prevent the context from growing indefinitely
    Fixes
    - Fixed an issue where backup files from the 1.7.4 stable release could not be restored
    - Fixed an issue where PDF reading progress was lost in the 1.7.4 stable release
    - Fixed an issue where the book list was not displayed after upgrading from the 1.7.4 stable release
    - Fixed compatibility issues with the Minimax audiobook plugin
    - (Mobile) Fixed a UI issue on the TTS voice page
    Note
    This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
    Tip
    You can also download the installation package for this version from the our self-hosted mirror.
