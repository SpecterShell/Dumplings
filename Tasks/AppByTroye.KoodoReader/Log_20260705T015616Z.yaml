- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Support for importing local fonts and downloading curated open-source fonts
    - New highlighting styles: strikethrough and wavy underline
    - Support for customizing text highlighting styles during audiobook playback and in-book searches; go to Settings > Appearance
    - Support for customizing keyboard shortcuts for over 20 actions, including page turning, note-taking, and highlighting; go to Settings > Shortcuts
    - Support for adding books to the Bookshelf, Favorites, and the Trash by dragging and dropping them
    - Added the Volcano TTS (Doubao TTS) voice plugin
    - Added the Merriam-Webster dictionary plugin
    - Added a Flipping page-turning animation; enable it in the reading options panel on the right
    - The image viewer now supports continuous browsing of all images in a book
    - Images from web articles are now embedded and saved in base64 format within the HTML file
    - AI Chat now supports saving and exporting chat history
    - Support for searching book tables of contents
    - Support for editing book content using replacement and deletion rules; go to Settings > Text Rules
    - Optimized the accuracy of online book cover and metadata matching
    - Added an option to preserve the original PDF background; enable this in the right-side reading options panel
    - Added an option to force override the book’s background style; go to Settings > Reading
    - Support for navigating to a bookshelf directly from the book detail dialog
    - Copying Japanese text no longer copies ruby
    - The book library backup feature has been moved to Settings > Sync and Backup; a separate entry is no longer displayed at the top of the app
    - Support for customizing the target language for full-text translation (AI Encyclopedia)
    - Free users can now back up and restore their book library via WebDAV, SFTP, FTP, S3-compatible storage, and Docker
    - Free users can now import books from WebDAV, SFTP, FTP, and S3-compatible storage
    - Support for code highlighting has been added; please enable it in the reading options panel on the right
    - 20 new reading theme colors have been added; please enable them in the reading options panel on the right
    - Support for cropping PDF margin, please click the crop button in the upper-right corner
    - Support for marking the book as read or unread
    - (Mobile) Support for selecting text across pages
    - (Mobile) Strikethrough and wavy underline styles have been added to highlighting options
    - (Mobile) The image viewer now supports continuous browsing of all images in a book
    - (Mobile) AI Chat supports saving and exporting chat history
    - (Mobile) Support for editing book content using replacement and deletion rules
    - (Mobile) Optimized the accuracy of online book cover and metadata matching
    - (Mobile) Added an option to preserve the original PDF background
    - (Mobile) Copying Japanese text no longer copies ruby
    - (Mobile) Support for customizing the target language for full-text translation (AI Encyclopedia)
    - (Mobile) Support for code highlighting
    - (Mobile) Support for cropping PDF margin
    Fixes
    - Fixed an issue where the word definition feature sometimes failed to enable
    - Fixed an issue where books could not be opened after enabling “Import as Link” in certain cases
    - Fixed an issue where text in different paragraphs of some books overlapped
    - Fixed an issue with hyperlinks not working in web articles
    - Fixed an issue where tables in books would overflow onto the next page
    - Fixed an issue where S3 compatible storage not working in the web version after installing the browser extension
    - Fixed an issue where full-text translation did not work for certain paragraphs
    - Fixed an issue where code was truncated and not displayed in full
    - (Mobile) Fixed an issue where text from different paragraphs in some books would overlap
    - (Mobile) Fixed an issue where tables in books would overflow onto the next page
    - (Mobile) Fixed an issue where full-text translation did not work for certain paragraphs
    - (Mobile) Fixed an issue where code was truncated and not displayed in full
    - (Mobile) Fixed an issue with the sorting of notes, highlights, and bookmarks on the reading page
    - (Mobile) Fixed an issue where certain chapters were skipped while using TTS feature
    Note
    This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
    Tip
    You can also download the installation package for this version from the our self-hosted mirror.
