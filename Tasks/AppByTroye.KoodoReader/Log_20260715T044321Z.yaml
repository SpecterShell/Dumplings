- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Added accurate mode for official AI OCR, which preserves PDF formatting and images
    - Windows and macOS now support using the system’s built-in OCR engine for text recognition
    - Scanned PDFs now support the highlighting feature; click the pen icon in the bottom-right corner
    - Local folders have been added as a new sync data source, allowing cross-platform data synchronization with tools like Syncthing without changing the data storage location
    - Notes can now be saved by pressing the Enter key
    - Now the menu buttons near the edge are hidden by default. You need to move the mouse near the edge to trigger.
    - Added an option to hide the sync progress bar during synchronization; go to Settings > Sync & Backup
    - (Mobile) The sync progress bar is automatically hidden while reading
    Fixes
    - Fixed an issue with image styling in Duokan e-books
    - Fixed styling issues with underlines, strikethroughs, and wavy lines in vertically aligned text
    - Fixed an issue with the text menu position in PDFs
    - Fixed an issue where the panel would unexpectedly close while searching the book table of contents
    - Fixed an issue with extra spacing between text paragraphs
    - Fixed an issue where full-text translation was incomplete in scroll mode
    - (Mobile) Fixed an issue where highlights in PDFs were not displayed in certain cases
    - (Mobile) Fixed an issue where reading progress in PDFs was recorded incorrectly in some cases
    - (Mobile) Fixed image display issues in Duokan e-books
    - (Mobile) Fixed styling issues with underlines, strikethroughs, and wavy lines when text is formatted vertically
    - (Mobile) Fixed issues with extra spacing between text paragraphs
    - (Mobile) Fixed an issue where full-text translation was incomplete in scroll mode
    Note
    This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
    Tip
    You can also download the installation package for this version from the our self-hosted mirror.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新增
    - 官方 AI OCR 新增高精度模式，支持保留 PDF 的排版和图片
