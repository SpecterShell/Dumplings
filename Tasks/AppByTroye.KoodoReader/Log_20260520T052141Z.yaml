Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - Added scheduled synchronization with customizable intervals. Go to Settings > Sync & Backup.
    - Backup and restore of book libraries now display progress percentages.
    - Backup and restore of book libraries now support streaming, resolving memory leaks caused by large book libraries.
    - Support for importing books by dragging and dropping local folders.
    - The Docker version has been rewritten in Go, reducing image size and improving performance.
    - The Docker version now supports OPDS functionality, allowing you to share book libraries via OPDS
    - Support for syncing reading progress with KOReader. Go to Settings > Data
    - The Docker version supports the KOReader sync server feature, fully compatible with the official sync server API
    - Support for obtaining redirect links for books, notes, and highlights, allowing you to open specific books, notes, and highlights directly via these links
    - Supports syncing new vocabulary to Eudic and Anki. Go to Settings > Data
    - Supports importing local MDX dictionaries for lookup. Go to Settings > Local Dictionaries
    - Supports protecting the app with a password, PIN, Windows Hello, or Touch ID. You need complete verification before opening the app after enabling it. Go to Settings > More Settings
    - (Mobile version) Supports batch replacement of book covers. Please tap the “More” button at the top and select “Batch Operations”
    Fixes
    - Fixed compatibility issues with Cloudreve WebDAV
    - Fixed lag when opening certain books
    - Fixed an issue with abnormal TXT table of contents
    - Fixed an issue where text was obscured in some PDF files
    - Fixed an issue where reading statistics did not update when opening a book in the main window
    - Fixed an issue where bookmarks remained on the page after deletion
    - Fixed an issue where backing up the book library via the web version failed in some cases
    - (Mobile version) Fixed lag when opening certain books
    - (Mobile version) Fixed an issue with abnormal TXT book directories
    - (Mobile version) Fixed an issue where text was obscured in some PDF files
    - (Mobile version) Fixed an issue with abnormal sorting by book title
    [!NOTE]
    This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
    [!TIP]
    You can also download the installation package for this version from the our self-hosted mirror.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新增
    - 新增定时同步功能，支持自定义同步间隔，请前往设置-同步和备份
    - 备份和恢复图书库支持展示进度百分比
    - 备份和恢复图书库支持流式处理，解决因图书库太大导致的内存泄露问题
    - 支持拖拽本地文件夹导入图书
    - Docker 版使用 Go 重构，减小镜像体积，提升运行速度
    - Docker 版支持 OPDS 功能，您可以将 Docker 版中的图书库以 OPDS 的方式进行分享
    - 支持和 KOReader 之间同步图书阅读进度，请前往设置-数据
    - Docker 版支持 KOReader 同步服务器功能，完全兼容官方同步服务器接口协议
    - 支持获取图书、笔记和高亮的外链，直接通过外链打开指定的图书，笔记和高亮
    - 支持同步生词到欧路词典和 Anki，请前往设置-数据
    - 支持导入本地的 MDX 词典用于查词，请前往设置-本地词典
    - 支持使用密码，PIN，Windows Hello，TouchID 保护软件，需要完成验证之后才能打开软件，请前往设置-更多设置
    -（移动版）支持批量替换图书封面，请点击顶部的更多按钮-批量操作
    修复
    - 修复 Cloudreve WebDAV 的兼容性问题
    - 修复部分图书打开时的卡顿问题
    - 修复 TXT 图书目录异常问题
    - 修复部分 PDF 文件文字被遮挡的问题
    - 修复在主窗口打开图书时，阅读统计不生效的问题
    - 修复删除书签后，页面上的书签不消失的问题
    - 修复部分情况下，网页版备份图书库失败的问题
    -（移动版）修复部分图书打开时的卡顿问题
    -（移动版）修复 TXT 图书目录异常问题
    -（移动版）修复部分 PDF 文件文字被遮挡的问题
    -（移动版）修复按照书名排序异常的问题
    [!NOTE]
    此版本由于功能已经稳定，bug 也基本修复，被选为下个稳定版候选。如果您对此有任何顾虑，可以下载上一个稳定版.
    [!TIP]
    我们还提供了高速下载镜像，您也可以从 自托管镜像 下载此版本的安装包
