- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New Features
    - The TTS feature now supports AI multi-role speech, allowing you to set separate voices for male, female, and child narrators
    - Full-text translation is now supported, including side-by-side bilingual translation and full-text translation
    - Custom AI models are now supported for AI translation, AI dictionary, and AI chat; go to Settings > AI Services
    - Multi-select books now supports batch selection using the Shift key
    - Custom book CSS and app CSS are now supported
    - Support for importing local images as book and app backgrounds
    - Support for infinitely adjusting book cover size using the slider at the bottom of the book list
    - You can filter books by their reading status. Please click the dropdown menu in the bottom-right corner of the book list.
    - Support for clearing applied book styles, located in the top-right corner of the reading options panel on the right
    - Support for automatically syncing notes and highlights to Notion, Readwise, Yuque, Obsidian, Joplin, Siyuan, and more. Go to Settings > Data
    - Supports Discord Rich Presence. Once enabled, your reading status and current book will be displayed on your Discord profile. Go to Settings > Data
    - Supports the OPDS protocol. Click the dropdown menu next to the “Import” button
    - Supports minimizing to the system tray after closing the app. Go to Settings > General
    - Supports viewing your remaining daily AI voice quota. Go to Settings > Account
    - Supports previewing TTS voices
    - Optimized S3 protocol compatibility and added an option to force path-style URLs
    - Supports selecting text that has already been highlighted
    - AI Encyclopedia will generate definitions based on the original context
    - The word lookup history now includes the original sentence containing the word
    - Supports customizing actions after selecting text, including immediate word lookup, translation, highlighting, and note-taking. Please configure these in the options panel on the right
    - Optimized footnote display for some MOBI and AZW3 format books
    - UI detail optimizations
    - (Mobile) Supports selecting highlighted text
    - (Mobile) TTS feature now supports AI multi-role speech, allowing separate voice settings for male, female, and child voices
    - (Mobile) Full-text translation feature added, including side-by-side bilingual translation and full-text translation
    - (Mobile) Support for custom AI models for AI translation, AI dictionary, and AI chat. Go to Settings > AI Services
    - (Mobile) Support for automatic synchronization of notes and highlights to Notion, Readwise, and Yuque. Go to Settings > Sync Options
    - (Mobile) Support for the OPDS protocol
    - (Mobile) Support for viewing daily remaining AI voice quotas. Go to Settings > Account
    - (Mobile) Optimized S3 protocol compatibility; added an option to enforce path-style URLs
    - (Mobile) Support for selecting highlighted text
    - (Mobile) AI Encyclopedia now generates definitions based on the meaning of the term in the original text
    - (Mobile) Support for custom actions after selecting text, including immediate lookup, translation, highlighting, and note-taking; go to Settings > Reading Options to enable
    - (Mobile) Optimized performance for TXT books without parsed tables of contents
    - (Mobile) Optimized footnote display for certain MOBI and AZW3 format books
    - (Mobile) Added support for editing publisher and description fields in book metadata
    - (Mobile) Added sorting support for books on the bookshelf
    - (Mobile) Sliding animations are now enabled by default
    - (Mobile) The iOS version now supports using locally installed dictionaries such as Merriam-Webster, Google Translate, Yandex Translate for word lookup and translation. Please go to Settings > Third-Party Services
    - (Mobile) After navigating to a table of contents, notes, highlights, or bookmarks, you can now tap the back button in the bottom-right corner to return to your previous location
    Fixes
    - Fixed an issue where the page would refresh after resizing the window
    - Fixed an issue where the TTS window was obscured after pinning the right-side reading options panel
    - (Mobile) Fixed a crash issue in certain situations on iOS
    - (Mobile) Fixed an issue with the sliding animation behaving abnormally in certain situations
    [!NOTE]
    This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
    [!TIP]
    You can also download the installation package for this version from the our self-hosted mirror.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    新增
    - 听书功能支持 AI 多角色朗读，支持给男声，女声和童声分别设置声音
    - 支持全文翻译功能，包括双语对照翻译和全文替换翻译
    - 支持自定义 AI 模型用于 AI 翻译，AI 词典，AI 问书，请前往设置-AI 服务
    - 多选图书支持使用 Shift 键批量选择
    - 支持自定义图书 CSS 和应用 CSS
    - 支持导入本地图片用于图书和应用背景
    - 支持无极调节图书封面大小，使用图书列表底部的滑块
    - 支持清除设置的图书样式，位于右侧阅读选项面板的右上角
    - 支持根据图书的阅读状态筛选图书，请点击图书列表右下角的下拉菜单
    - 支持自动同步笔记和高亮到 Notion, Readwise, 语雀，Obisidian, Joplin, 思源等，请前往设置-数据
    - 支持 Discord Rich Presence，开启之后将在您的 Discord 主页显示您的阅读状态和正在阅读的图书，请前往设置-数据
    - 支持 OPDS 协议，请点击导入图书按钮旁的下拉菜单
    - 翻译插件新增火山翻译、彩云翻译、小牛翻译、谷歌翻译、阿里云翻译、腾讯云翻译、百度翻译、有道翻译。需要您自行配置 API Key
    - 支持关闭软件之后最小化到托盘，请前往设置-通用开启
    - 支持查看每日剩余 AI 语音额度，请前往设置-账户
    - 支持试听 TTS 语音
    - 优化 S3 协议的兼容性，新增强制使用路径样式的选项
    - 支持对已高亮文本进行选择
    - AI 百科将根据词条在原文中含义生成释义
    - 查词历史新增单词所在的原文句子
    - 支持自定义选择文字后的动作，支持选择文字之后立即查词、翻译、高亮、记笔记，请在右侧阅读选项面板中设置
    - 优化部分 MOBI 和 AZW3 格式图书的脚注展示
    - UI 细节优化
    -（移动版）支持对已高亮文本进行选择
    -（移动版）听书功能支持 AI 多角色朗读，支持给男声，女声和童声分别设置声音
