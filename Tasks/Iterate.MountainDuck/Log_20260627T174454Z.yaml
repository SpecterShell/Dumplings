Version: 5.3.0.29446
Installer:
- InstallerType: msix
  InstallerUrl: https://dist.mountainduck.io/Mountain%20Duck-5.3.0.29446.msixbundle
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - [Feature] Support for Windows on ARM64 (Windows)
    - [Feature] Display bookmark window in popover attached to status bar item (macOS)
    - [Feature] AWS IAM Identity Center Support (S3) (#13377)
    - [Feature] Connect with credentials from credential_process configuration directive in ~/.aws ( S3) (#11664)
    - [Feature] Index of connection profiles allows instant display in Preferences → Profiles
    - [Bugfix] Focus input field in alert shown in popover of status bar item (macOS)
    - [Bugfix] Occasional permission failure connecting in "Integrated" connect mode (macOS)
    - [Bugfix] Derive disk space from server quota when available in "Smart Synchronization" connect mode
    - [Bugfix] Renaming parent folder during upload marks child uploads prematurely complete in "Integrated" connect mode (macOS)
    - [Bugfix] Unable to set custom cache location in Preferences (Windows)
    - [Bugfix] No trailing delimiter for path style requests with bucket name only (#17901)
    - [Bugfix] Do not write file header to placeholder files for folders (Cryptomator, Mega.nz S4)
    - [Bugfix] Remove /Default symbolic link (Sharepoint) (#17918)
    - [Bugfix] Map all SSL failures to network error and await server response on control connection (FTP) (#17946)
    - [Bugfix] Compare public key blob instead of comment when retrieving key from agent (SFTP)
    - [Bugfix] Support "Include" directive when reading from OpenSSH config (SFTP) (#10451)
    - [Bugfix] Exclude trashed folders in list by default (Backblaze B2) (#18101)
ReleaseTime: 2026-06-18
