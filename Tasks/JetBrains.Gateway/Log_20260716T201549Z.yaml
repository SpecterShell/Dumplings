  Key: ReleaseNotes
  Value: |-
    The Gateway 2026.2 is out. What's New in Remote Development 2026.2:
    - Pull request comments are now displayed correctly in remote development sessions.
    - The Build finished notification group is now available in Settings | Appearance & Behavior | Notifications.
    - The Backend Status Details window now scales correctly and displays its UI elements as expected.
    - The Surround with, Undo, and Expand actions now work as expected with Emmet.
    - Windows that previously didn't update promptly after the zoom level was changed in Edit | Appearance | Zoom now work as expected.
    - The Wayland toolkit is now supported and enabled in the frontend.
    - Synchronization of settings between the backend and frontend has been significantly expanded. Instead of only syncing a limited whitelist of settings, the system now syncs a much broader range using a blacklist approach - only explicitly excluded settings are skipped. Performance has also been improved to reduce network traffic.
    - Code completion, the File Structure popup, and the Problems tool windows have been reworked, providing a smoother overall experience.
