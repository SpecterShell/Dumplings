  Key: ReleaseNotes
  Value: |-
    The Gateway 2026.1 is out. What's New in Remote Development 2026.1:
    - The Code With Me plugin is now unbundled.
    - The plugin manager features various improvements, including new installation and uninstallation options in the context menu, clearer visibility into the state and location of installed plugins, and a smoother plugin installation flow.
    - Issues related to the Undo and Mark Modified actions have been fixed.
    - Several UI improvements related to Lux technology have been implemented.
    - The run configuration UI has been improved, resolving issues with infinite loading and ensuring configuration names display correctly.
    - Additional fixes address minor issues with the Search Everywhere window, error highlighting, the Commit window UI, and UI freezes.
