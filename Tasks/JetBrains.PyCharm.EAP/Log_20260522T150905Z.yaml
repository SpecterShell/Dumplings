  Key: ReleaseNotes
  Value: |-
    Highlights of this release:
    Code insight
    - Augmented assignment type narrowing: Added comprehensive type narrowing validation and resolved type inference issues triggered by augmented assignments - PY-80622, PY-6426, and PY-36969.
    - Type engine configuration: Resolved an issue where users were locked out from manually modifying or overriding the active type engine when looking directly at .pyi stub files - PY-89667.
    - LiteralString validation refinements: Resolved a false-positive inspection mismatch affecting consecutive literal strings under PEP 675 guidelines - PY-65488.
    - Strict variance reporting: PyCharm now detects and flags instances where an incompatible type is returned explicitly due to variance mismatches - PY-79221.
    - Annotation comments parsing: Fixed an issue where syntax highlighting failed to recognize code comments positioned directly inside annotations - PY-48749.
    Data science tools and Jupyter
    - Dataframe inspection visibility: Restored the "View as DataFrame" option inside the debugpy environment for the Jupyter DAP debugger - PY-86897.
    - Notebook workspace stability: Resolved a remote development tracking regression where startup routines would fail while an automated backend session was actively running - PY-88006.
    - Database highlighting integration: Added native code syntax highlighting for ClickHouse CREATE OR REPLACE TABLE statements inside Jupyter cells - PY-89425.
    - Memory tracking optimizations: Introduced visual UI improvements and a dedicated execution progress bar to the Jupyter Memory Usage tracking monitor - PY-89333 and PY-86753.
    Debugger
    - Console input loop handling: Fixed a critical regression in the debugpy engine where the debug console only successfully processed the first input() call, causing subsequent inputs to stall - PY-89481.
    Platform tools
    - Minimap editor positioning: Resolved an issue where editing a pyproject.toml file with the Minimap visualization active generated noticeable rendering and scrolling glitches - PY-89725.

    Full release notes.
