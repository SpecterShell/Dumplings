  Key: ReleaseNotes
  Value: |-
    This EAP focuses on improving the stability of remote interpreters and optimizing the Jupyter experience for AI-driven workflows.
    Jupyter and Data Science
    - LLM Optimization: Implemented Jupyter output truncation to improve performance and context management when working with LLM features - PY-85559.
    - Kernel Stability: Resolved a regression where the interrupt action failed to work on native Windows interpreters - PY-84889.
    Environment Management and Interpreters
    - WSL and Conda: Fixed a critical exception that occurred when attempting to use an existing Conda virtual environment within a WSL interpreter - PY-87695.
    - Stability Fixes: Addressed a high-frequency IllegalStateException error within the Python Package Manager that affected users transitioning from version 2025.3 - PY-86875.

    Full release notes.
