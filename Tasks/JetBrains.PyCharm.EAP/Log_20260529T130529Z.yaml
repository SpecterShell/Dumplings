  Key: ReleaseNotes
  Value: |-
    Code insight and performance
    - Boost editor responsiveness with incremental parsing: Implemented incremental lexing and parsing for Python to significantly optimize code analysis speed and reduce typing latency in large files - PY-64326.
    - Prevent unexpected type expansion in unions: Fixed a nightly regression where the float type was incorrectly expanded to a union with int during type evaluation - PY-88802.
    - Improve type alias resolution accuracy: Fixed an issue where an explicit type alias was incorrectly inferred as Any instead of its designated type - PY-89068.
    - Respect dunder methods assigned as class attributes: Fixed a type checker bug where the type inference engine ignored __init__ and __new__ methods when they were assigned directly via class attributes - PY-89571.
    Jupyter notebooks and debugging
    - Track variables seamlessly in the debug console: Fixed an issue in the debugpy engine where threads and variables failed to display newly created variables in the debug console during Jupyter notebook debugging sessions - PY-89641.
    Package management
    - Persist Python packages requirements preferences reliably: Fixed a bug that prevented changes to Ignored packages option within the Unsatisfied package requirements inspection from being saved - PY-80815.

    Full release notes.
