  Key: ReleaseNotes
  Value: |-
    Code insight and type checking
    - Enhanced unpacking analysis: Perform precise type and length validation for iterable unpacking to prevent unexpected errors during structural assignments - PY-12592.
    - PEP 561 partial stubs support: Include support for py.typed partial stub packages according to PEP 561 specifications to improve type detection for nested external libraries - PY-55589.
    - Decorator parameter inference: Automatically infer function parameters directly from decorators to ensure accurate code insight within wrapped definitions - PY-79204.
    - Literal enum type tracking: Resolve accurate types when working with a Literal declaration that directly references an Enum member value - PY-42473.
    Jupyter notebooks and debugging
    - Notebook structural integrity during unshelve: Fixes layout corruption within Jupyter notebooks by preserving proper cell structure instead of nesting raw JSON payloads - PY-88732.
    - WSL managed server browser routing: Fixed unexpected 404 Not Found errors when using Open Notebook in Browser option for a managed Jupyter server running inside WSL - PY-88906.
    - Cancellable chart generation: Cancel chart building operations on demand to instantly reclaim computing power and avoid workspace freezes during rendering routines - PY-83397.
    - Comprehension loop debugging precision: Fixed the debugpy engine from incorrectly halting the Run to cursor action at individual iteration steps inside a comprehension block - PY-89748.
    Interpreter settings and platform
    - Startup deadlock mitigation: Fixed severe startup freezes due to a thread deadlock vulnerability within the PyVirtualEnvTerminalCustomizer system architecture - PY-90230.
    - Interpreter renaming guards: Fixed an "Please specify a different SDK name" error when trying to rename an active Python interpreter configuration - PY-88229.
    - Project-scoped language injections: Apply custom language injections across the entire workspace reliably when configured with a Project scope restriction - PY-50126.
    - PyPI package cache optimization: Index environment package listings with a significantly lighter footprint due to a storage overhaul migrating to a PackedAsciiStringSet structure - PY-90156.

    Full release notes.
