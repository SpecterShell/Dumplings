  Key: ReleaseNotes
  Value: |-
    Fixes
    - #503 — Streaming think tag leak: Created StreamingThinkFilter that processes text deltas incrementally, buffering <think> reasoning content so it never reaches the client during streaming. Handles partial tags split across chunks. 17 new tests.
    - #504 — Cron jobs orphaned after agent deletion: kill_agent() now calls remove_agent_jobs() on the cron scheduler and persists the change. Previously, deleting and recreating an agent left old cron entries pointing at a dead UUID. 3 new tests.
    - Added trader bundled hand with SKILL.md
