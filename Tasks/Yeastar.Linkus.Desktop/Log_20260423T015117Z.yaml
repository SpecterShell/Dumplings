Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Added compatibility with the following system-level configurations.
       - Added support for logging in to Linkus client using your extension number when connecting to a P-Series Cloud PBX, depending on the allowed login method configured by the system administrator.
       - When you receive a call forwarded from another extension, the original extension's name and number may be displayed on the call window based on the Caller ID display strategy configured by the system administrator.
       - When you create a session on an SMS or WhatsApp channel, but another session with the same sender and receiver already exists on the channel, a prompt may appear based on the system administrator's messaging channel settings. If you continue, you will take over the session from the original handler, along with the complete chat history.
    2. Optimized Voicemail feature:
       - Added support for forwarding voicemails to specified extensions.
       - When you dial feature code to play a voicemail forwarded from another extension, the Linkus client will play a voice prompt that includes the number of the extension from which the voicemail was forwarded.
    3. Optimized user experience in the interface: Added support for right-clicking in an input field to copy, paste, cut, and select all content.
    4. Optimized Call Notes feature: If you click the Send Email while editing call notes, the Linkus client will automatically save the latest content of the call notes and add it to the email for delivery.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 兼容以下系统层面的配置。
       - 支持在 Linkus 客户端与 P 系列云 PBX 连接时，使用分机号码登录 Linkus 客户端，取决于系统管理员配置的允许登录方式。
       - 当你收到从其他分机转接的来电时，Linkus 客户端将根据系统管理员配置的来电显示策略在通话窗口中显示原分机的名称和号码。
       - 当你在 SMS 渠道或 WhatsApp 渠道上创建会话，但渠道中已存在相同发送方和接收方的活跃会话时，Linkus 客户端将根据系统管理员配置的消息渠道设置弹出提示。如果你继续操作，你将从原会话处理人处接管带有完整聊天记录的会话。
    2. 优化 语音留言 功能：
       - 支持将语音留言转发到指定的分机。
       - 当你拨打特征码播放从其他分机转发来的语音留言时，Linkus 客户端会播放包括语音留言转发方的分机号码的提示音。
    3. 优化用户的界面使用体验：支持在输入框中通过鼠标右键复制、粘贴、剪切或全选内容。
    4. 优化 通话备注 功能：如果你在编辑通话备注时点击 发邮件，Linkus 客户端将自动保存当前最新的备注内容，并将其添加至邮件中一并发送。
