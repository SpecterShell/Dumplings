Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    1. Added compatibility with PBX's AI Receptionist feature:
       - When receiving an AI receptionist-transferred call, the incoming call window displays a From AI Receptionist tag.
       - After answering the call, the call window shows the AI receptionist-generated call transcript and summary, as well as collected customer information.
       Note:
       - The information is visible only to the first person who answers the transferred call. It is no longer displayed after the call becomes a multi‑party call or is transferred again.
       - Whether customer information is displayed depends on the AI Receptionist configuration on the PBX.
       - When sending call details via email from the call window, the displayed customer information is automatically included in the email content.
    2. Optimized Internal Chat feature: Added support for permanently deleting all chat history within a single chat session.
       When you click Clear chat history on a session, you can select the Delete All Chat History option from the pop-up window to permanently remove the chat history from both Linkus clients and the server.
    3. Optimized External Chat feature: For a WhatsApp session, if no matching number is found among existing contacts, Linkus uses the recipient's WhatsApp profile name as the session name.
       Note: The session name updates only when the recipient replies to your message.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    1. 兼容 PBX 的 AI 接待员 功能：
       - 接收到从 AI 接待员转接而来的来电时，来电通知窗口会显示 来自 AI 接待员 的标记。
       - 接听来电后，通话窗口会显示 AI 接待员自动生成的通话转写原文和总结，以及收集的客户信息。
       注：
       - 此信息仅首个接听者可见，转为多方通话或再次转接后不再显示。
       - 客户信息的展示取决于 PBX 上的 AI 接待员配置。
       - 当从通话窗口中通过邮件发送通话详情时，客户信息会自动包含在邮件内容中。
    2. 优化 内部聊天 功能：支持永久删除单个会话中的所有聊天记录。
       当你在某个会话上点击 清空聊天记录 时，可在弹窗中勾选 删除所有聊天记录，从而将聊天记录从 Linkus 客户端和服务器中永久删除。
    3. 优化外部聊天功能：对于 WhatsApp 会话，若未匹配到有对应号码的联系人，将使用收件人的 WhatsApp 用户名称作为会话名称。
       注：会话名称仅在对方回复消息后更新。
