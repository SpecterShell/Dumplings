Version: 19.1.0
Installer:
- InstallerUrl: https://www.password-depot.de/download/v19/pdepot19CE.exe
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Support for the modern key derivation function Argon2id as well as user-defined iteration numbers for PBKDF2 - for stronger protection against brute force attacks.
    - Improved processes for WebAuthn/Passkey authentication and registration with modal dialogs.
    - WebAuthn/Passkey authentication now pre-selects the user account, avoiding conflicts when multiple accounts are registered on the same security device.
    - Updated authentication flow for Entra ID (Azure AD).
    - Improved reliability of browser extensions after standby mode and longer idle times.
