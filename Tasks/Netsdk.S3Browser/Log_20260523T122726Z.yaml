  Key: ReleaseNotes
  Value: |-
    - Added support for AWS European Sovereign Cloud
    - Added Sync Exclusion Rules for the Folder Sync Tool
    - Added new CLI commands - /file list-sync-jobs and /file run-sync-job
    - Added option to keep Folder Sync Tool metadata cache file locally (UI and CLI)
    - Improved Folder Sync Tool results: sorting, image preview, and quick actions
    - Added support for AWS CLI SSO session profiles and AWS SSO token caching
    - Improved Web URL Generator (TinyURL API and Signature V4 by default)
    - Added advanced Copy menu for file names and paths
    - Improved accounts import - append accounts and add drag-and-drop support
    - Fixed various issues reported via Error Reports
    - Various UI improvements and internal stability fixes
