Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    - Files and folders can now be renamed. Press F2 or click on a file, then after a short pause click on the file name again to rename it. Renaming can be disabled via Tweaks->Enable Rename setting
    - Header section (top of screen area) can be toggled off and on by pressing Ctrl+H - This provides some more space for data display. Reminder: the font size can be adjusted by holding CTRL key and scrolling the mouse wheel up or down
    - Fixed possible security issue with illegal file names (e.g. containing a trailing space) that could cause the wrong file to be opened by WizTree when double clicked
    - Thai characters typed into file search would not be displayed correctly - fixed
    - Scan progress indicator in taskbar: any issues detected when enabling this will cause it to be disabled instead of displaying an initialization exception error on startup
    - Various UI improvements
ReleaseTime: 2026-03-04
