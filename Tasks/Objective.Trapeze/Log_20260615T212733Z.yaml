Version: 26.6.0
Installer:
- Architecture: x86
  InstallerUrl: https://s3-ap-southeast-2.amazonaws.com/trapezedownload.objective.com/Objective_Trapeze_x86.msi
- Architecture: x64
  InstallerUrl: https://s3-ap-southeast-2.amazonaws.com/trapezedownload.objective.com/Objective_Trapeze_x64.msi
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    New
    - A 64-bit Unicode version of Trapeze is now available
    Changes
    - Changed click-to-select annotations when selecting regions in document compare to allow only regions to be selected
    - Changed the MSI installers to allow downgrades
    - Changed the Trapeze version in About/System Information to include version type
    - Changed to add settings for handling network errors when saving PDFs
    - Changed to add support for opening OCR text when the OCR text tool is selected
    - Changed to improve handling of large numbers of memory allocations
    - Changed to show messages similar to bad bookmark messages for unsupported bookmarks
    - Changed to show progress on slow Trapeze Cloud stamp uploads and slow stamp verification
    Fixes
    - Added a workaround for XML namespace error on WebDAV properties
    - Fixed a memory leak
    - Fixed a memory leak on error comparing regions in document compare
    - Fixed a resource leak when dragging toolbars and panels
    - Fixed a SharePoint forms based authentication endless loop
    - Fixed a tools gallery issue when not themed
    - Fixed an extra tool launcher separator when scanning isn't licensed
    - Fixed an incorrect width calculation when opening bookmarks with italic or bold
    - Fixed an issue with Classic mode re-selection after making changes to the document in another mode
    - Fixed bookmark undo not handling Unicode characters, bold, italic or text colour
    - Fixed PDF bookmark blue and red being reversed when reading bookmark colours
    - Fixed PDF stamp dialog error display
    - Fixed $pdftemp$ not working in the Run script command
    - Fixed some copied SharePoint links not working when opened
    - Fixed the Copy Text button showing in the rectangle selection panel when OCR isn't licensed
ReleaseTime: 2026-06-16
RealVersion: 26.6.18240.0
