    - fix: update webui to v4.11.1 by @lidel in https://github.com/ipfs/ipfs-desktop/pull/3109
    - fix: prevent port replacement from corrupting IP addresses by @lidel in https://github.com/ipfs/ipfs-desktop/pull/3035
