  Value: |-
    What's new in Wave Link 3.2?
    ⚠️ This update includes a new Wave Link audio driver update. Virtual devices may appear differently in apps like OBS Studio and Discord — we recommend checking your audio settings in any app that uses Wave Link once the update is complete.

    🔌 Remove Wave Device Channels
    You can now remove the Wave device channel from Wave Link without needing to disconnect your device first.

    🛠️ Improvements and bug fixes
    - When connecting a Wave device, Wave Link will now prompt you to install a firmware update if one is available — so you're up to date from the very first use.
    - Wave Link now shows an error message when communication with a Wave device is not working.
    - Fixed a crash that could occur on launch when Windows microphone permission had been denied.

