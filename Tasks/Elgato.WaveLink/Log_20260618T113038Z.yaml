  Value: |-
    What's new in Wave Link 3.2.4?
    ⚠️ This update includes a new Wave Link audio driver update. Virtual devices may appear differently in apps like OBS Studio and Discord — we recommend checking your audio settings in any app that uses Wave Link once the update is complete.

    🎙️ Wave XLR Pro Support
    Wave XLR Pro drops a full-sized mixing desk in the palm of your hand — with dual XLR inputs, dual USB-C, line in, line out, and the full Wave FX audio processing suite, it's built for creators who demand more from their audio.
    Wave Link 3.2 brings full support for Wave XLR Pro. Early access is available now, with general availability on June 3rd.
    🔗 Discover Wave XLR Pro

    🔌 Remove Wave Device Channels
    You can now remove the Wave device channel from Wave Link without needing to disconnect your device first.

    🛠️ Improvements and bug fixes
    3.2.1
    - When connecting a Wave device, Wave Link will now prompt you to install a firmware update if one is available — so you're up to date from the very first use.
    - Wave Link now shows an error message when communication with a Wave device is not working.
    - Fixed a crash that could occur on launch when Windows microphone permission had been denied.
    3.2.2
    - Fixed an issue where the Wave Link driver installation could fail on ARM64 devices.
    - Fixed an issue where app channels would disappear after the PC woke from sleep when using Wave XLR Pro, leaving only the hardware inputs visible. A restart was previously required to recover.
    - Fixed an issue where a connection error could appear during a mixer transition or after a firmware update on Wave XLR Pro, blocking the Wave Link UI and requiring a restart.
    3.2.3
    - Added migration progress for large channel setups if the Wave XLR Pro is connected for the first time.
    - Fixed Wave XLR Pro ducking not working for non-Wave device hardware inputs.
    - Fixed a rare crash while disconnecting a Wave device.
    - Fixed second Wave device disappearing after Wave XLR Pro disconnect.
    - Fixed Wave device onboarding not resuming after firmware update.
    - Fixed wrong release notes shown after update.
    - Improved reliability when resuming from sleep or hibernate.
    3.2.4
    - Fixed an issue where Wave devices would not appear in Wave Link depending on the Windows region format setting.
    - Fixed an issue where audio playback through Wave XLR Pro outputs would stop when Wave Link was closed.
    - Fixed an issue where audio applications could stop routing through Wave Link after waking from sleep, showing as "Unavailable" despite actively playing audio.
    - Fixed an issue where users with Wave XLR Pro could be limited to fewer than 8 channels.
    - Fixed an issue where the input gain of Wave XLR MK1 would reset after a system restart.
    - Fixed Wave Link stability issues that could occur when reconnecting Wave XLR Pro during an active mixer transition.
    - Fixed an issue where Wave XLR Pro hardware outputs were missing from the Personal Mix output assignment UI, even though audio was routed correctly on the device.
    - Fixed an issue where switching the Sound Check playback device to a Wave XLR Pro output did not take effect while Sound Check was already playing.
    - Fixed an issue where the Expander toggle could appear out of sync with its actual state in the Wave XLR Pro effects panel.
    - Voice Focus is now correctly disabled by default for USB In and Line In inputs on Wave XLR Pro.

