  Value: |-
    What’s new in Wave Link 3.0.1?
    This update addresses several top-reported issues since the launch of Wave Link 3.0, improving stability and audio routing reliability.

    Bug fixes & performance improvements
    - Wave Link now detects an incomplete driver installation and shows a clear error with a "Repair driver" option, instead of getting stuck on the loading screen.
    - Fixed an issue where apps could be routed to the wrong input channel, especially when adding or rearranging channels while an app was inactive or closed.
    - Fixed a crash that could occur when switching between or closing apps and games.
    - Fixed a crash that could occur when adding an audio effect plugin to an input channel.
    - Fixed an issue where multiple Wave Link processes could start at the same time, causing conflicts with audio routing and mixer settings.
    - Fixed a crash that could occur when updating your output device configuration.
    - Fixed an issue where Wave Link would get stuck on the loading screen when a driver update was pending on startup.
    - Improved mix renaming so that name changes are applied to Windows only after you've finished typing, making mix renaming more reliable.

