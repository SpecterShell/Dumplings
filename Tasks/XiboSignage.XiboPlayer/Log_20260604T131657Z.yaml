  Key: ReleaseNotes
  Value: |-
    We are pleased to announce Xibo for Windows v4 R407. This is a bug fix release which focuses on memory and stability. The following things have been solved in this release:
    - Embedded widget is not cleaned up if it has only <audio> tags in it
    - Enable Large Address aware to allow more memory usage
    - Fatal error initialising the application: HRESULT 0xD0000003
    - Invalid layout (corrupted XLF) causes permanent splash screen
    - Memory Leak (svchost.exe/Audiosrv)
    - Use code onboarding CMS URL/key not persisted
    - WebView2 (edge): Recover broken webview
    - Windows Player crashes, possible memory leak
    - XfW: Overlay Layouts stays on top of Interrupt Layout
    - XMR: incorrectly reported status when connected via WebSocket
