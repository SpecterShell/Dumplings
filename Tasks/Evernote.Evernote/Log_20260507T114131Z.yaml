  Key: ReleaseNotes
  Value: |-
    Features:
    - Mermaid diagrams are now available in Evernote so you can create flowcharts directly from the AI Assistant.
    - You can now remove recent and saved searches directly from the search modal.
    - The AI Assistant can now create, pin, and open templates.
    - A new three-dot menu is available on the web when looking at a stack in the note list for easy notebook creation, stack renaming, removal, and more!

    Fixes:
    - Fixed a bug where AI-generated titles could be applied to the wrong note when switching notes quickly.
    - Fixed a bug where the AI Assistant returned an error on very large notes.
