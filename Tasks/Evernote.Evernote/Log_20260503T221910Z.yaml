  Key: ReleaseNotes
  Value: |-
    Features:
    - You can now generate an AI-suggested title for notes with at least 250 characters of content.
    - Callout blocks are now available in the editor.
    - Navigate between tabs with keyboard shortcuts: Cmd+Ctrl+1..9 to jump to a specific tab, Ctrl+Tab / Ctrl+Shift+Tab to cycle through tabs.
    - You can now right-click note links in the Tasks kingdom to open them in a new tab.

    Fixes:
    - Fixed a crash when opening Settings.
    - Fixed the notebook list freezing after creating a notebook in a stack.
    - Fixed the AI Assistant using the wrong note as context when on Tasks or other non-note views.
    - Fixed a crash in the keyboard shortcut manager.
