  Key: ReleaseNotes
  Value: |-
    Features:
    - The AI Assistant can now move notes to trash, with the ability to restore them.
    - The AI Assistant can now manage your notebooks — create, rename, and delete them directly from chat.
    - You can now upload attachments to the AI Assistant by dragging and dropping files directly into the message window.
    - A new extra-small heading size (H4) is now available in the formatting bar.
    - You can now add toggle blocks to organize and collapse content in your notes.
    - You can now change the color of callout blocks.

    Fixes:
    - Fixed a bug where deleted search history entries would reappear.
    - Fixed a bug where the three-dot menu was clipped near the bottom of a list.
