  Key: ReleaseNotes
  Value: |-
    Features:
    - You can now add and manage AI Assistant memories to personalize responses.
    - You can now upload and play .ogg and .opus audio files.
    - Pinned tabs can now be reordered by drag-and-drop.
    - Navigate to Home, Tasks, Calendar, and more directly from the Search modal.

    Fixes:
    - Fixed a bug where the AI Assistant moved only the last note instead of all selected notes.
    - Fixed a bug where F2 rename shortcut stopped working after opening multiple tabs.
    - Fixed various translation inconsistencies.
