  Key: ReleaseNotes
  Value: |-
    Features:
    - Add some personality to your notes with emojis! type : and start typing to search for the emoji you want.
    - HEIC images now display correctly with full preview support.
    - Smarter search experience: semantic and standard results now work independently for smoother, clearer discovery.
    - Dictate your prompts to the AI Assistant to write hands free.
    - Tasks can now be added inside tables, making it easier to organize and track work within structured notes.
    - Revamped audio component with faster actions and clearer indicators of the active transcription mode.

    Fixes:
    - Fixed a bug where the cursor was lost after interacting with the toolbar.
