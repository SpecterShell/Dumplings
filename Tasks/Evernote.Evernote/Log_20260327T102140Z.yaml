  Key: ReleaseNotes
  Value: |-
    Features:
    - AI Assistant can now handle much larger note sets, making retrieval, summarization and bulk processing more powerful.
    - Bulk actions with AI Assistant: you can now move and tag multiple notes at once.
    - You no longer need to keep a note open during transcription! Feel free to navigate across Evernote, transcription will now continue in the background
    - Select and drag multiple blocks at once using the 4-dot handle to move content more efficiently.
    - More control when pasting links: choose how links are displayed each time, or set a default in Settings.

    Fixes:
    - Fixed a bug where anchor links incorrectly displayed the note title.
