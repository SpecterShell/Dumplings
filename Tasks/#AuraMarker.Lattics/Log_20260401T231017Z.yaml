Version: 3.4.8
Installer: []
Locale:
- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    [New] Automatic update the third-party sync configuration across multiple devices. Settings and changes made on one device will automatically update on other devices without reconfiguration.
    [New] PDF files can now be searched in the global search.
    [New] When copying and pasting Word and Scrivener text, highlighting, underlining, and font styles are preserved in Lattics.
    [Optimized] Further optimized the performance of the editor when displaying long articles.
    [Fixed] Resolved issues with data storage mechanisms, preventing the inability to create new articles and occasional content loss when splitting articles.
    [Fixed] Resolved issues with blank content during table editing and occasional table loss when copying tables.
    [Fixed] Resolved the issues of  creating new cards in the card library, editing images, and copying PDF translations.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    【新增】支持第三方同步配置可在多设备中自动同步，一个设备上完成设置和更改，其他设备即可自动更新设置，无需重新配置
    【新增】在全局搜索中可以搜索 PDF 文件
    【新增】复制粘贴 Word，Scrivener 文本时，可保留高亮、下划线、字体等样式到 Lattics 中
    【优化】再次优化编辑器显示长篇文章的性能
    【优化】解决了数据存储机制，避免出现无法新建文章，切分文章偶尔会丢失内容的情况
    【优化】解决了表格编辑时会发生内容空白的问题，以及复制表格有时会丢失表格的情况
    【优化】优化了卡片库新建卡片、图片编辑、复制 PDF 对照翻译的内容出现多余方格符号的问题
