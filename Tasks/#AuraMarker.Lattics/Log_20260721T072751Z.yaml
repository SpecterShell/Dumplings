- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    Lattics introduces AI Assistence features for writing and deep research, including translation, proofreading, rewriting, creative writing, and Chat Research.

    - Supports multiple AI providers, including mainstream models from US and China, such as OpenAI, Antropic, Google, DeepSeek, GLM, Kimi, MiniMax, MiMo, etc., as well as third-party providers like OpenRouter and OpenCode. It also supports Ollama and user-deployed models.
    - Allows setting different AI models for different tools; for example, local models can be used for translation, while DeepSeek can be used for in-depth research.
    - Allows control and authorization of project folders accessed by AI, enhancing data privacy and security.
    - Allows editing of AI translation and rewriting results; AI can remember personal style and preferences.
    - Allows commenting on AI-generated content and allows traversing different versions generated by AI. This is an unique innovation of Lattics for human-AI interaction and collaboration.
    - Supports batch operations; multiple articles can be selected in the project outline for translation, and multiple articles and files can be @mentioned in AI Chat for analysis.
    - Allows in-depth analysis of PDF files.
    - AI Chat Content can be dragged and dropped directly into Lattics articles and automatically converted into mathematical formulas, tables, and link citations. It also automatically generates bibliographies with webpage titles, URLs, and access dates.

    ***Lattics' AI Assistence features are all completely free!***

    Additionally, this version significantly optimizes and improves third-party cloud synchronization, supports WebDAV stream sync, and improves the OneDrive sync experience.
- Locale: zh-CN
  Key: ReleaseNotes
  Value: |-
    Lattics 推出 AI 辅助写作和深度研究的功能，包括翻译、校对、改写、创意写作、Chat Research（深度研究）
    - 支持多种 AI Provider，包括中美主流模型，比如 OpenAI，Antropic，Google，DeepSeek，GLM，Kimi，MiniMax，MiMo 等，以及第三方 OpenRouter，OpenCode 等，并支持 Ollama 和自己部署的模型
    - 可对不同的工具设置不同的 AI 模型，比如 翻译可使用本地模型，深度研究可使用 DeepSeek
    - 可控制和授权 AI 访问的项目文件夹，增强数据隐私安全性
    - 可编辑 AI 翻译、改写的结果，AI 可记忆个人风格和偏好
    - 可在 AI 生成的基础上进行评论，并可回溯 AI 生成的不同版本，这是 Lattics 的人与 AI 交互协作的独家创新
    - 可批量操作，在项目大纲中选中多个文章进行翻译，也可在 AI Chat 中 @ 多篇文章和文件进行分析
    - 可对 PDF 文件进行深度分析
    - AI Chat 中的内容可以直接拖拽到 Lattics 文章中，并自动转为数学公式、表格、以及链接的引用，并可自动生成参考文献，带有网页标题，URL 和访问时间

    *** Latics 的 AI 辅助写作与深度研究功能完全免费 ！***

    另外，此版本对第三方云同步功能做了大幅优化和改进，支持 WebDAV 的流式同步，改进 OneDrive 同步体验
