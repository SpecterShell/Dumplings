  Key: ReleaseNotes
  Value: |-
    New Features
    New selection commands
    Two new selection commands (Set Selection Anchor and Anchor to Selection) could be used to mark the beginning and end of a new selection region. Full macro support for these commands is also provided.
    Note: Go to Tools » Settings » Keyboard and press the Reset All button to restore keyboard shortcuts for these commands if upgrading from the previous version.
    Bug Fixes
    Hang during saving changes to process memory
    Hex Editor Neo could hang when trying to save changes to process memory. Fixed.
