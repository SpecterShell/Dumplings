    - Fixed session timeline jumping when scrolling
    - Improve sidebar user experience
    - Improve application startup efficiency
    - Fix sidebar text truncation
    - Improve application startup efficiency
    - Eliminate N+1 reactive subscriptions in SessionTurn (@BYK)
