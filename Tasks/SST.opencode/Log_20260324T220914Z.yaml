    - Filter non-renderable part types from browser store (@BYK)
    - Stop terminal autofocus on shortcuts
    - Keep file tree open at its minimum resized width
    - Navigate prompt history only when input is empty
    - Handle session busy state better in app
    - Lift up project hover state to layout in app
    - Prefer Cmd+K for command palette on macOS instead of Ctrl+K
    - Prevent stale session hover preview on refocus
    - Batch multi-file prompt attachments in app
    - Restore keyboard project switching in open sidebar
    - Fix padding bottom on the context tab
    - Prevent project avatar popover flicker when switching projects
