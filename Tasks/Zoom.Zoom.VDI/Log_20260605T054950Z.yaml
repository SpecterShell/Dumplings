  Key: ReleaseNotes
  Value: |-
    New, enhanced, and changed features

    Windows and macOS features
    - Support for Voice translator
    Support has been added for the Voice translator feature.

    Windows features
    - Support for the ARM64 Citrix Workspace app
    Added support for the ARM64 version of the Citrix Workspace app on ARM-based Windows systems. This allows the Zoom VDI plugin to support both x64 and ARM64 versions of the Citrix Workspace app on these platforms.

    - VDI Windows Universal Plugin self-diagnose and self-repair
    Self-diagnose and self-repair capabilities have been added for the VDI Windows Universal Plugin. When the plugin encounters installation file or plugin configuration issues, the VDI Windows Plugin Management (if installed) can automatically diagnose and repair the related issues, improving the reliability and stability of the plugin in Windows VDI environments

    - Updated default plugin auto-update behavior and added auto-update status in the Statistics tab
    The Later option in the plugin auto-update dialog has been enabled by default. When clicked, the update is deferred until the user disconnects from their virtual desktop(s) and then performs the update. The plugin auto-update status (e.g., Up to date, Pending install, Disabled by TC policy, Update skipped) is also displayed in the VDI Statistics tab, giving users and administrators clearer visibility into the current update state.

    Mac features
    - Support for Omnissa Horizon Client Next app
    Support has been added for the Omnissa Horizon Client Next app.

    - Support for Amazon Workspaces Client on macOS
    Support has been added for Zoom VDI video optimization for the Amazon WorkSpaces Client for macOS.
