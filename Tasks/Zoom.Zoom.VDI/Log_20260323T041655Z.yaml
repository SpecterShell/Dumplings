  Key: ReleaseNotes
  Value: |-
    New, enhanced, and changed features

    Linux features
    - Universal plugin support for eLux6
    Support has been added for using the Zoom VDI plugin on hosts running the eLux 6 operating system.

    macOS features
    - Support for pairing the VDI client with AVD using pairing code
    Users can pair the VDI client with the VDI plugin for AVD, utilizing a pairing code. The pairing code, an alphanumeric 6-digit code, appears within the interface after being retrieved from the VDI Plugin Management tool, ensuring a seamless link between the client and plugin.

    Resolved issues

    General fixes
    - Security enhancements

    Windows fixes
    - Lag and freezing when attempting to utilize the raise hand feature
    An issue has been resolved where users experienced issues with the Zoom VDI client lagging or freezing for a substantial amount of time when attempting to use the raise hand feature.

    - Unable to set virtual backgrounds
    An issue has been resolved where users were unable to utilize the Virtual Backgrounds feature.
