  Key: ReleaseNotes
  Value: |-
    - New: Drop of 32bit OS support
    - New: End User License Agreement replaced by Terms Of Use
    - New: User interface terminology updated to align with Terms Of Use
    - New: Manual restoration of backed-up files by Ransomware Remediation
    - New: Vulnerability & Patch Management update optimization, allowing easier bug fixing
    - New: Refactored Web control rule editor, settings and extended web page blocking Categories
    - New: Multi-detection support, a group of objects that were detected at different times but are logically connected to a single detection
    - New: Moldavian language support
    - Improved: Audit log user identification
    - Improved: Manually scanned email result notification added
    - Improved: Migration of 'per-user' to 'per-system' installation during upgrades
    - Improved: Extended options for Patching behavior when apps are running of Vulnerability & Patch Management
    - Fixed: Offline installer upgrade failed
    - Fixed: User principal name missing in Detection log for EntraID Users
    - Fixed: Outlook crashes when sending email caused by tags added to all scanned emails
